<p><em>Reference: Nicolai M. Josuttis, </em><em>C++17 - The Complete Guide</em><em>, Chapter 27, pp. 321-326.</em></p>
<p>This chapter summarizes supplementary synchronization utilities: <strong><code>std::scoped_lock</code></strong> for multi-mutex locking, <strong><code>std::shared_mutex</code></strong>, compile-time lock-free queries via <strong><code>std::atomic::is_always_lock_free</code></strong>, and <strong>cache-line hint constants</strong> for avoiding false sharing.</p>
<hr />
<h2 id="271-supplementary-mutexes-and-locks-p-321">27.1 Supplementary Mutexes and Locks (p. 321)</h2>
<hr />
<h2 id="2711-stdscoped_lock-p-321">27.1.1 <code>std::scoped_lock</code> (p. 321)</h2>
<p><strong>Problem:</strong> Locking multiple mutexes in a fixed order everywhere is error-prone; <strong>deadlock</strong> can occur if two threads lock <code>A</code> then <code>B</code> vs <code>B</code> then <code>A</code>.</p>
<p><strong>[OOPS] C++14-style manual fix</strong> — correct acquisition order but verbose and easy to get wrong under maintenance:</p>
<pre><code class="language-cpp">#include &lt;mutex&gt;

std::mutex a, b;

void legacy() {
    std::lock(a, b);                      // deadlock-free acquisition of both
    std::lock_guard&lt;std::mutex&gt; ga(a, std::adopt_lock);
    std::lock_guard&lt;std::mutex&gt; gb(b, std::adopt_lock);
    // ... critical section ...
}
</code></pre>
<p><strong>C++17 solution:</strong> <code>std::scoped_lock</code> accepts <strong>one or more mutexes</strong> and locks them <strong>atomically</strong> using <code>std::lock</code> underneath (avoiding deadlock via the standard lock algorithm).</p>
<pre><code class="language-cpp">#include &lt;mutex&gt;
#include &lt;thread&gt;

std::mutex m1, m2, m3;

void work() {
    std::scoped_lock lk{m1, m2, m3};
    // all three locked, released at scope end
}
</code></pre>
<p><strong>Replaces:</strong> manual <code>std::lock(m1,m2,m3);</code> plus multiple <code>std::lock_guard</code> or <code>std::adopt_lock</code>.</p>
<h3 id="class-template-argument-deduction-ctad">Class template argument deduction (CTAD)</h3>
<pre><code class="language-cpp">std::scoped_lock lk(m1, m2);  // types deduced
</code></pre>
<p>No need to spell <code>std::scoped_lock&lt;std::mutex, std::mutex&gt;</code> in many cases.</p>
<hr />
<h3 id="ascii-deadlock-pattern-vs-scoped_lock">ASCII: deadlock pattern vs <code>scoped_lock</code></h3>
<pre><code>[ERROR] inconsistent lock order:

 Thread 1             Thread 2
    │                    │
    ▼                    ▼
 lock(A)              lock(B)
    │                    │
    ▼                    ▼
 lock(B)   waits...    lock(A)   waits...
    └──── deadlock cycle ────┘

[OK] std::scoped_lock{A,B} / std::lock algorithm:

 Both threads request {A,B} as a set -&gt; acquiring all or none
 without requiring manual global ordering discipline in user code.
</code></pre>
<hr />
<h2 id="2712-stdshared_mutex-p-322">27.1.2 <code>std::shared_mutex</code> (p. 322)</h2>
<p><code>std::shared_mutex</code> is a <strong>reader-writer</strong> mutex:</p>
<ul>
<li>Many <strong>shared</strong> (read) locks <strong>or</strong> one <strong>exclusive</strong> (write) lock.</li>
</ul>
<h3 id="readers">Readers</h3>
<pre><code class="language-cpp">#include &lt;shared_mutex&gt;
#include &lt;vector&gt;

std::shared_mutex rw;
std::vector&lt;int&gt; data{1, 2, 3, 4, 5};

int read_sum() {
    std::shared_lock&lt;std::shared_mutex&gt; lk(rw);
    int s = 0;
    for (int x : data) s += x;
    return s;
}
</code></pre>
<h3 id="writers">Writers</h3>
<pre><code class="language-cpp">void write_push(int x) {
    std::unique_lock&lt;std::shared_mutex&gt; lk(rw);
    data.push_back(x);
}
</code></pre>
<h3 id="difference-vs-shared_timed_mutex">Difference vs <code>shared_timed_mutex</code></h3>
<ul>
<li><code>shared_mutex</code>: <strong>no</strong> <code>try_lock_for</code> / <code>try_lock_until</code> on the standard mutex object (timed operations were on timed mutex types).</li>
<li>Potentially simpler / faster on platforms where timed sharing is unnecessary (implementation-defined).</li>
<li><strong>[OK]</strong> Typical pattern: <strong><code>std::shared_lock&lt;shared_mutex&gt;</code></strong> for <strong>readers</strong> (many concurrent shared locks) and <strong><code>std::unique_lock&lt;shared_mutex&gt;</code></strong> for <strong>writers</strong> (exclusive access). Together this implements <strong>multiple readers OR one writer</strong>.</li>
</ul>
<h3 id="ascii-reader-writer-pattern">ASCII: reader-writer pattern</h3>
<pre><code>              shared_mutex state
        ┌─────────────────────────────┐
        │  readers: R (count)         │
        │  writer:  W (exclusive)     │
        └──────────────┬──────────────┘
                       │
       ┌───────────────┼───────────────┐
       ▼               ▼               ▼
  many shared_lock   one unique_lock   blocked combos
  allowed while      upgrades path     (writer vs readers)
  writer absent      excludes readers
</code></pre>
<hr />
<h2 id="272-is_always_lock_free-p-323">27.2 <code>is_always_lock_free</code> (p. 323)</h2>
<p><code>std::atomic&lt;T&gt;</code> provides:</p>
<ul>
<li><code>bool is_lock_free() const noexcept</code> -&gt; <strong>runtime</strong> query (constexpr in practice on many implementations but specified behavior is runtime for historical reasons in some cases).</li>
<li><strong><code>static constexpr bool is_always_lock_free</code></strong> -&gt; <strong>compile-time</strong> constant.</li>
</ul>
<pre><code class="language-cpp">#include &lt;atomic&gt;

static_assert(std::atomic&lt;int&gt;::is_always_lock_free);
// static_assert(std::atomic&lt;long double&gt;::is_always_lock_free);  // may fail on some platforms
</code></pre>
<p><strong>Use cases:</strong></p>
<ul>
<li><strong>SFINAE</strong> or <code>static_assert</code> in generic lock-free code.</li>
<li>Choosing alternative representations when atomics would silently use locks.</li>
</ul>
<hr />
<h2 id="273-cache-line-sizes-p-324">27.3 Cache Line Sizes (p. 324)</h2>
<p>Two <strong>implementation-defined</strong> constants (typically usable with <code>alignas</code>):</p>
<table>
<thead>
<tr>
<th>Constant</th>
<th>Intent</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>std::hardware_destructive_interference_size</code></td>
<td>Minimum offset between objects to avoid <strong>false sharing</strong> (independent atomics mutated by different threads landing in one cache line).</td>
</tr>
<tr>
<td><code>std::hardware_constructive_interference_size</code></td>
<td>Maximum size to promote <strong>true sharing</strong> when data is intentionally accessed together.</td>
</tr>
</tbody>
</table>
<p><strong>Typical platform note:</strong> <code>hardware_destructive_interference_size</code> is <strong>often 64 bytes</strong> on widely deployed CPUs—still treat it as <strong>implementation-defined</strong> and use the constant (do not hard-code <code>64</code> in portable logic). <strong><code>hardware_constructive_interference_size</code></strong> suggests an upper bound for grouping <strong>related</strong> fields so they <strong>fit in one cache line</strong> when you <em>want</em> them fetched together (the opposite goal of destructive separation).</p>
<pre><code class="language-cpp">// Pad hot independent atomics to different lines:
struct alignas(std::hardware_destructive_interference_size) PaddedData {
    std::atomic&lt;int&gt; counter{};
};
</code></pre>
<h3 id="false-sharing-example-conceptual">False sharing example (conceptual)</h3>
<pre><code class="language-cpp">#include &lt;new&gt;
#include &lt;atomic&gt;
#include &lt;thread&gt;

struct alignas(std::hardware_destructive_interference_size) Counter {
    std::atomic&lt;int&gt; v{0};
};

Counter a, b;

void workers() {
    std::thread t1([&amp;] { for (int i = 0; i &lt; 1'000'000; ++i) ++a.v; });
    std::thread t2([&amp;] { for (int i = 0; i &lt; 1'000'000; ++i) ++b.v; });
    t1.join();
    t2.join();
}
</code></pre>
<p>Without separation, <code>a.v</code> and <code>b.v</code> could reside in the <strong>same cache line</strong>, causing cache line bouncing.</p>
<hr />
<h3 id="ascii-false-sharing-layout">ASCII: false sharing layout</h3>
<pre><code>Without padding:

 cache line (64 bytes typical)
┌──────────────────────────────────────┐
│ atomic a (4-8B) │ atomic b │ padding │
└──────────────────────────────────────┘
  CPU0 writes a          CPU1 writes b
        │                        │
        └── both ping cache line ──┘  [slow: false sharing]

With alignas(destructive_interference_size):

┌──────── cache line 0 ────────┐ ┌──────── cache line 1 ────────┐
│ atomic a ...                 │ │ atomic b ...                 │
└──────────────────────────────┘ └──────────────────────────────┘
</code></pre>
<p><strong>Note:</strong> Values are <strong>hints</strong>; portable code should not assume exact sizes beyond &ldquo;avoid / promote sharing at coarse granularity&rdquo;.</p>
<hr />
<h2 id="putting-it-together-concurrent-counter-service">Putting it together: concurrent counter service</h2>
<pre><code class="language-cpp">#include &lt;shared_mutex&gt;
#include &lt;mutex&gt;
#include &lt;map&gt;
#include &lt;string&gt;
#include &lt;optional&gt;

class Config {
    mutable std::shared_mutex rw;
    std::map&lt;std::string, std::string&gt; kv;

public:
    void set(std::string k, std::string v) {
        std::unique_lock&lt;std::shared_mutex&gt; lk(rw);
        kv[std::move(k)] = std::move(v);
    }

    std::optional&lt;std::string&gt; get(const std::string&amp; k) const {
        std::shared_lock&lt;std::shared_mutex&gt; lk(rw);
        auto it = kv.find(k);
        if (it == kv.end()) return std::nullopt;
        return it-&gt;second;
    }
};
</code></pre>
<hr />
<h2 id="cross-reference">Cross-reference</h2>
<ul>
<li><strong>Chapter 22:</strong> parallel algorithms require thread-safe element operations.</li>
<li>Memory order on atomics: still <code>&lt;atomic&gt;</code> / <code>std::memory_order</code> (consult memory model chapters in Josuttis beyond p. 326 as your edition organizes them).</li>
</ul>` },

<p><em>Reference: Nicolai M. Josuttis, </em><em>C++17 - The Complete Guide</em><em>, Chapter 28, pp. 327-336.</em></p>
<p>This chapter collects <strong>miscellaneous</strong> library tweaks: <code>uncaught_exceptions</code>, <code>shared_ptr</code> extensions for arrays and casts, <code>weak</code> helpers, numeric/chrono additions, and broader <code>constexpr</code> / <code>noexcept</code> marking across the standard library.</p>
<hr />
<h2 id="281-stduncaught_exceptions-pattern-pp-327-329">28.1 <code>std::uncaught_exceptions()</code> pattern (pp. 327-329)</h2>
<pre><code class="language-cpp">#include &lt;exception&gt;

int n = std::uncaught_exceptions();  // number of active exceptions being unwound
</code></pre>
<p><strong>Difference vs the deprecated singular API</strong></p>
<ul>
<li><strong><code>std::uncaught_exception()</code> (deprecated / removed in C++17):</strong> returned <strong><code>bool</code></strong>: &ldquo;is there any active unwinding?&rdquo; Nested exceptions made this brittle when you needed a <strong>stack depth</strong>-style answer.</li>
<li><strong><code>std::uncaught_exceptions()</code> (since C++11; idiomatic in C++17):</strong> returns an <strong>integral count</strong> of uncaught exceptions currently in flight---- <strong><code>0</code></strong> in normal execution, increments as unwinding proceeds.</li>
</ul>
<h3 id="uncaughtexceptiondetector-class-complete-pattern"><code>UncaughtExceptionDetector</code> class (complete pattern)</h3>
<p><strong>Idea:</strong> the <strong>constructor</strong> stores <strong><code>std::uncaught_exceptions()</code></strong> at scope entry; the <strong>destructor</strong> compares the <strong>current</strong> count. If the current count is <strong>greater</strong> than the saved value, this object&rsquo;s destructor is running <strong>while unwinding</strong> an exception that started <strong>after</strong> construction----often you must <strong>suppress</strong> logging that throws, <strong>avoid</strong> <code>throw</code> in the destructor, or branch transaction commit vs rollback.</p>
<pre><code class="language-cpp">#include &lt;exception&gt;

class UncaughtExceptionDetector {
    const int entry_count_;
public:
    UncaughtExceptionDetector()
        : entry_count_(std::uncaught_exceptions()) {}

    ~UncaughtExceptionDetector() {
        if (std::uncaught_exceptions() &gt; entry_count_) {
            // destructor reached during stack unwind after construction
            // [OK] e.g. swallow secondary errors, avoid throw, mark rollback-only path
        } else {
            // normal destructor (no new in-flight uncaught exception vs construction)
            // [OK] success-path cleanup may still throw if your design allows
        }
    }

    UncaughtExceptionDetector(const UncaughtExceptionDetector&amp;) = delete;
    UncaughtExceptionDetector&amp; operator=(const UncaughtExceptionDetector&amp;) = delete;
};
</code></pre>
<p><strong>Replaces:</strong> <strong>[OOPS]</strong> any remaining use of <strong><code>uncaught_exception()</code></strong> (singular)----migrate to <strong><code>uncaught_exceptions()</code></strong> and the <strong>count-delta</strong> idiom.</p>
<p><strong>Use cases:</strong></p>
<ul>
<li>Logging / RAII guards that must not throw in destructor during exception handling.</li>
<li>Transaction rollbacks that distinguish success path cleanup vs failure.</li>
</ul>
<hr />
<h2 id="282-shared-pointer-improvements-p-329">28.2 Shared Pointer Improvements (p. 329)</h2>
<p>Header: <code>&lt;memory&gt;</code>.</p>
<hr />
<h3 id="2821-shared-pointers-to-raw-c-arrays-p-329-330">28.2.1 Shared pointers to raw C arrays (p. 329-330)</h3>
<p><strong>Before C++17:</strong> owning a raw array with <strong><code>shared_ptr</code></strong> required a <strong>custom deleter</strong> that called <strong><code>delete[]</code></strong>. [ERROR] <code>std::shared_ptr&lt;int&gt;(new int[10])</code> uses <strong><code>delete</code></strong> on the first element----<strong>undefined behavior</strong>.</p>
<pre><code class="language-cpp">// Pre-C++17 style (still valid conceptually)
auto p_old = std::shared_ptr&lt;int&gt;(new int[10], [](int* x) { delete[] x; });
</code></pre>
<p><strong>Since C++17:</strong> use the <strong><code>shared_ptr&lt;T[]&gt;</code></strong> partial specialization---- <strong><code>delete[]</code></strong> is selected automatically; <strong><code>operator[]</code></strong> is provided for indexing.</p>
<pre><code class="language-cpp">#include &lt;memory&gt;

std::shared_ptr&lt;int[]&gt; p{new int[10]};
p[3] = 42;
</code></pre>
<pre><code class="language-cpp">std::shared_ptr&lt;std::string[]&gt; ps{new std::string[10]};
ps[0] = &quot;example&quot;;
</code></pre>
<ul>
<li>[OK] <strong>Subscript</strong> syntax <strong><code>p[i]</code></strong> for array specializations.</li>
<li>[OOPS] There is still <strong><code>no</code></strong> <code>std::make_shared</code> for arbitrary <strong>C arrays</strong> with the same ergonomics as scalars in C++17----you may <strong><code>new T[n]</code></strong> into the smart constructor as shown, or keep <strong><code>vector</code>/<code>unique_ptr&lt;T[]&gt;</code></strong> when that fits better.</li>
</ul>
<p><strong>Preferred:</strong> <code>std::make_shared</code> is not provided for C arrays in C++17 the same way as scalars; initialize carefully.</p>
<hr />
<h3 id="2822-reinterpret_pointer_cast-p-330">28.2.2 <code>reinterpret_pointer_cast</code> (p. 330)</h3>
<p>Cast between <code>shared_ptr</code> instantiations using <code>reinterpret_cast</code> on the stored pointer.</p>
<p><strong>Typical uses:</strong> low-level interoperability where the same owned storage must be viewed under another type. This has the same preconditions as <code>reinterpret_cast</code> on raw pointers: <strong>alignment</strong>, <strong>lifetime</strong>, and <strong>strict-aliasing</strong> rules still apply; the reference counts stay synchronized because the <code>shared_ptr</code> control block is shared.</p>
<p>Consult the standard wording and Josuttis <strong>Section 28.2.2 (p. 330)</strong> before applying this in production; a one-size-fits-all code snippet is intentionally omitted here because correctness is entirely domain-specific.</p>
<hr />
<h3 id="2823-weak_type-p-330">28.2.3 <code>weak_type</code> (p. 330)</h3>
<pre><code class="language-cpp">#include &lt;memory&gt;

static_assert(
    std::is_same_v&lt;
        std::shared_ptr&lt;int&gt;::weak_type,
        std::weak_ptr&lt;int&gt;
    &gt;);
</code></pre>
<p>Enables generic code to name <code>weak_ptr</code> matching a given <code>shared_ptr</code> without repeating <code>T</code>.</p>
<hr />
<h3 id="2824-weak_from_this-pp-330-332">28.2.4 <code>weak_from_this</code> (pp. 330-332)</h3>
<p><strong>Purpose:</strong> inside a type derived from <strong><code>std::enable_shared_from_this&lt;T&gt;</code></strong>, obtain a <strong><code>std::weak_ptr&lt;T&gt;</code></strong> to <strong><code>*this</code></strong> without bumping the <strong>strong</strong> reference count.</p>
<p><strong>Why that matters:</strong> <strong><code>shared_from_this()</code></strong> always promotes to <strong><code>shared_ptr</code></strong>----handy, but inappropriate when you only need a <strong>non-owning</strong> handle (e.g. registration in a callback registry). <strong><code>weak_from_this()</code></strong> is ideal when <strong>circular <code>shared_ptr</code> graphs</strong> would otherwise leak or when callees must <strong>detect lifetime expiry</strong>.</p>
<pre><code class="language-cpp">#include &lt;memory&gt;

// Only valid once \`std::shared_ptr&lt;Node&gt;\` already owns *this (typical construction pattern).
struct Node : std::enable_shared_from_this&lt;Node&gt; {
    std::weak_ptr&lt;Node&gt; weak_self() { return weak_from_this(); }

    void register_callback() {
        std::weak_ptr&lt;Node&gt; w = weak_from_this();
        // Store handler that locks w before use; [OK] breaks cycles vs capturing shared_from_this()
    }
};
</code></pre>
<p>Calling <code>weak_from_this()</code> <strong>before</strong> the object is owned by a <code>shared_ptr</code> has undefined behavior (same precondition family as <code>shared_from_this()</code>).</p>
<hr />
<h2 id="283-numeric-extensions-p-332">28.3 Numeric Extensions (p. 332)</h2>
<p>Header: <code>&lt;numeric&gt;</code> / <code>&lt;cmath&gt;</code> (respectively).</p>
<h3 id="stdgcd--stdlcm"><code>std::gcd</code> / <code>std::lcm</code></h3>
<pre><code class="language-cpp">#include &lt;numeric&gt;

constexpr int g = std::gcd(48, 18);   // 6
constexpr int l = std::lcm(48, 18);   // 144
</code></pre>
<p>Works for integer types; <code>constexpr</code> friendly.</p>
<h3 id="stdhypot-three-argument"><code>std::hypot</code> three-argument</h3>
<pre><code class="language-cpp">#include &lt;cmath&gt;

<h2 id="284-chrono-extensions-floor--ceil--round--abs-pp-334-335">28.4 <code>chrono</code> extensions: <code>floor</code> / <code>ceil</code> / <code>round</code> / <code>abs</code> (pp. 334-335)</h2>
<p><code>std::chrono::floor</code>, <strong><code>ceil</code></strong>, <strong><code>round</code></strong>, and <strong><code>abs</code></strong> are function templates that operate on <strong><code>duration</code></strong> and <strong><code>time_point</code></strong> values, converting toward a coarser or finer tick period without manual integer-divide boilerplate.</p>
<p><strong>Semantics (Josuttis p. 334-335):</strong></p>
<ul>
<li><strong><code>std::chrono::floor&lt;ToDuration&gt;(d)</code>:</strong> rounds the <strong>duration</strong> toward <strong>minus infinity</strong> (algebraic floor on the tick count after conversion).</li>
<li><strong><code>std::chrono::ceil&lt;ToDuration&gt;(d)</code>:</strong> rounds toward <strong>plus infinity</strong>.</li>
<li><strong><code>std::chrono::round&lt;ToDuration&gt;(d)</code>:</strong> rounds to <strong>nearest</strong> representable tick count in <code>ToDuration</code>; <strong>ties to even</strong> (banker&rsquo;s rounding) on the resulting integer tick.</li>
<li><strong><code>std::chrono::abs(d)</code>:</strong> <strong>absolute value</strong> of a <strong>duration</strong> (if the duration is signed). [ERROR] Applying <strong><code>abs</code></strong> to an <strong>unsigned</strong> duration specialization is not the use case; check your <code>duration::rep</code>.</li>
</ul>
<pre><code class="language-cpp">#include &lt;chrono&gt;
#include &lt;iostream&gt;

int main() {
    using namespace std::chrono_literals;
    auto d = 3min + 1270ms;

    auto floored_to_sec = std::chrono::floor&lt;std::chrono::seconds&gt;(d);   // toward -inf
    auto ceiled_to_sec  = std::chrono::ceil&lt;std::chrono::seconds&gt;(d);    // toward +inf
    auto rounded_to_sec = std::chrono::round&lt;std::chrono::seconds&gt;(d);  // nearest, ties to even

    std::cout &lt;&lt; &quot;floor: &quot; &lt;&lt; floored_to_sec.count() &lt;&lt; &quot;s\\n&quot;;
    std::cout &lt;&lt; &quot;ceil:  &quot; &lt;&lt; ceiled_to_sec.count()  &lt;&lt; &quot;s\\n&quot;;
    std::cout &lt;&lt; &quot;round: &quot; &lt;&lt; rounded_to_sec.count() &lt;&lt; &quot;s\\n&quot;;

    using Sec = std::chrono::seconds;
    Sec a{10}, b{-25};
    auto ad = std::chrono::abs(a - b);  // magnitude of difference as duration
    std::cout &lt;&lt; &quot;abs: &quot; &lt;&lt; ad.count() &lt;&lt; &quot;s\\n&quot;;
}
</code></pre>
<p><strong>Why:</strong> cleaner rounding of timestamps for logging / scheduling vs manual integer division tricks.</p>

  { name: `30. Polymorphic Memory Resources`, path: `29_polymorphic_memory_resources.md`, dir: ``, body: `<h1 id="chapter-29-polymorphic-memory-resources-pmr">Chapter 29: Polymorphic Memory Resources (PMR)</h1>
<p>Tutorial aligned with <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis (Addison-Wesley). <strong>Page references</strong> use <strong>p.</strong> for this chapter’s span <strong>pp. 341-364</strong>.</p>
<p>C++17 introduces <strong>polymorphic memory resources</strong> in <code>&lt;memory_resource&gt;</code> (and allocator-aware containers in corresponding headers, e.g. <code>&lt;vector&gt;</code> via <code>std::pmr::vector</code>). The core idea: <strong>separate allocation strategy from container type</strong> by passing a <code>std::pmr::memory_resource*</code> (or using the <strong>default resource</strong>) instead of encoding the allocator type in the container’s template parameters.</p>
<hr />
<h2 id="conceptual-overview-memory-resource-hierarchy">Conceptual overview: memory resource hierarchy</h2>
<p>Josuttis motivates PMR by showing that you can keep <code>std::pmr::vector</code>, <code>std::pmr::string</code>, etc., and only swap the <strong>resource</strong> used for allocation (p. 342, 347).</p>
<pre><code>┌─────────────────────────────────────────────────────────────────┐
│                    Client code (containers)                     │
│  std::pmr::vector&lt;T&gt;, std::pmr::string, std::pmr::deque&lt;T&gt;, ... │
└────────────────────────────┬────────────────────────────────────┘
                             │ allocates/deallocates through
                             v
┌─────────────────────────────────────────────────────────────────┐
│              std::pmr::polymorphic_allocator&lt;T&gt;                 │
│ (type-erased interface to memory_resource; same vector&lt;T&gt; type) │
└────────────────────────────┬────────────────────────────────────┘
                             │ calls virtual hooks
                             v
┌─────────────────────────────────────────────────────────────────┐
│                 std::pmr::memory_resource (base)                │
│   do_allocate(), do_deallocate(), do_is_equal()                 │
└──────┬──────────────┬──────────────┬──────────────┬─────────────┘
       │              │              │              │
       v              v              v              v
┌────────────┐ ┌─────────────┐ ┌──────────────┐ ┌──────────────────┐
│ new_delete │ │ null_memory │ │ monotonic_   │ │ (un)synchronized │
│ _resource  │ │ _resource   │ │ buffer_      │ │ _pool_resource   │
└────────────┘ └─────────────┘ └──────────────┘ └──────────────────┘
     global         throws       fast bump       pooled chunks
     new/delete    bad_alloc      allocator      (thread opt.)
</code></pre>
<p><em>[Diagram: conceptual hierarchy as in Josuttis’s presentation of PMR, pp. 341-349.]</em></p>
<hr />
<h2 id="291-using-standard-memory-resources-p-342">29.1 Using standard memory resources (p. 342)</h2>
<h3 id="motivation-custom-allocation-without-changing-container-type">Motivation: custom allocation without changing container type</h3>
<p><strong>Traditional approach:</strong> <code>std::vector&lt;int, MyAlloc&lt;int&gt;&gt;</code> changes the <strong>type</strong> of the vector. Code that only knows <code>std::vector&lt;int&gt;</code> cannot interoperate without templates or conversions.</p>
<p><strong>PMR approach:</strong> <code>std::pmr::vector&lt;int&gt;</code> always uses a <strong><code>polymorphic_allocator&lt;int&gt;</code></strong>, which holds a pointer to a <code>memory_resource</code>. You can construct the vector with <code>&amp;pool</code> where <code>pool</code> is any <code>memory_resource</code> subclass. The <strong>static type</strong> stays <code>std::pmr::vector&lt;int&gt;</code>; <strong>behavior</strong> depends on the resource (p. 342).</p>
<h3 id="pmr-containers-and-namespace-stdpmr">pmr containers and namespace <code>std::pmr</code></h3>
<p>Standard <strong>allocator-aware</strong> typedefs/wrappers include (non-exhaustive):</p>
<ul>
<li><code>std::pmr::vector</code></li>
<li><code>std::pmr::deque</code></li>
<li><code>std::pmr::list</code></li>
<li><code>std::pmr::forward_list</code></li>
<li><code>std::pmr::set</code>, <code>std::pmr::map</code>, multiset/multimap</li>
<li><code>std::pmr::unordered_set</code>, <code>std::pmr::unordered_map</code></li>
<li><code>std::pmr::string</code> (typedef to <code>std::basic_string&lt;char, std::char_traits&lt;char&gt;, std::pmr::polymorphic_allocator&lt;char&gt;&gt;</code>)</li>
</ul>
<p><strong>All PMR facilities</strong> in the standard library for this facility live under <strong>namespace <code>std::pmr</code></strong> (p. 342).</p>
<hr />
<h2 id="2911-motivating-example-p-342">29.1.1 Motivating example (p. 342)</h2>
<h3 id="monotonic_buffer_resource-for-fast-allocation"><code>monotonic_buffer_resource</code> for fast allocation</h3>
<p>A <strong>monotonic buffer resource</strong> allocates by bumping a pointer forward in a buffer. <strong>Individual deallocations</strong> are typically <strong>no-ops</strong> (or batched): the whole arena is released when the resource is destroyed or reset (Josuttis details behavior and caveats around upstream resources on <strong>p. 349</strong>).</p>
<p><strong>Pattern from the book (conceptual):</strong> back a monotonic resource with a <strong>stack buffer</strong>, pass its address to <code>std::pmr::vector</code>, and use the vector normally.</p>
<pre><code class="language-cpp">#include &lt;memory_resource&gt;
#include &lt;vector&gt;
#include &lt;cstddef&gt;

void example_monotonic_inline_buffer() {
    alignas(std::max_align_t) char buf[1000];
    std::pmr::monotonic_buffer_resource pool{buf, sizeof(buf)};

    std::pmr::vector&lt;int&gt; v{&amp;pool};
    v.reserve(200);
    for (int i = 0; i &lt; 100; ++i) {
        v.push_back(i);
    }
    // [OK] Fast pushes: allocator does not round-trip to global heap for every element
    //      in the same way a general-purpose allocator might.
    //
    // When \`pool\` goes out of scope, memory in \`buf\` is no longer owned by live objects
    // from a C++ object lifetime perspective only if usage matches the resource rules;
    // Josuttis stresses understanding lifetimes (p. 342-349).
}
</code></pre>
<h3 id="performance-intuition-no-individual-deallocation">Performance intuition: no individual deallocation</h3>
<p>For many hot loops, <strong>avoiding per-element deallocation</strong> and reducing synchronization can dominate. A monotonic arena:</p>
<ul>
<li><strong>Allocates</strong> by advancing an offset (very cheap).</li>
<li><strong>May not reclaim</strong> partial blocks until the resource is destroyed or you adopt the upstream/reset patterns described in <strong>§29.1.3</strong> (p. 349).</li>
</ul>
<p><strong>Trade-off:</strong> if you need <strong>frequent releases</strong> of arbitrary subsets of objects, a monotonic strategy alone may be wrong; <strong>pool resources</strong> may fit better (p. 347).</p>
<hr />
<h2 id="2912-standard-memory-resources-p-347">29.1.2 Standard memory resources (p. 347)</h2>
<p>Josuttis summarizes the <strong>built-in</strong> memory resources:</p>
<table>
<thead>
<tr>
<th>Resource</th>
<th>Role (summary)</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>std::pmr::new_delete_resource()</code></td>
<td>Uses <strong>global</strong> <code>::operator new</code> / <code>::operator delete</code> (p. 347).</td>
</tr>
<tr>
<td><code>std::pmr::null_memory_resource()</code></td>
<td>Every allocation throws <strong><code>std::bad_alloc</code></strong> (p. 347). Useful for enforcing &ldquo;no heap&rdquo;.</td>
</tr>
<tr>
<td><code>std::pmr::monotonic_buffer_resource</code></td>
<td><strong>Fast</strong> bump-pointer style; <strong>does not</strong> individually deallocate in the usual sense (p. 347).</td>
</tr>
<tr>
<td><code>std::pmr::unsynchronized_pool_resource</code></td>
<td><strong>Pooled</strong> blocks; <strong>not thread-safe</strong> (p. 347).</td>
</tr>
<tr>
<td><code>std::pmr::synchronized_pool_resource</code></td>
<td><strong>Pooled</strong> blocks; <strong>thread-safe</strong> (p. 347).</td>
</tr>
</tbody>
</table>
<h3 id="default-resource-get_default_resource--set_default_resource">Default resource: <code>get_default_resource()</code> / <code>set_default_resource()</code></h3>
<pre><code class="language-cpp">#include &lt;memory_resource&gt;

void demo_default_resource() {
    std::pmr::memory_resource* old = std::pmr::get_default_resource();

    alignas(std::max_align_t) char buf[4096];
    std::pmr::monotonic_buffer_resource local{buf, sizeof(buf)};

    std::pmr::set_default_resource(&amp;local);

    std::pmr::vector&lt;int&gt; v;  // uses current default resource
    v.push_back(1);

    std::pmr::set_default_resource(old);
}
</code></pre>
<p><strong>Notes (Josuttis, p. 347 and surrounding):</strong></p>
<ul>
<li>The <strong>default resource</strong> is a process-wide pointer (thread interactions and ordering are your responsibility when changing it).</li>
<li>PMR containers default-constructed without an explicit resource use <strong><code>get_default_resource()</code></strong>.</li>
</ul>
<hr />
<h2 id="2913-memory-resources-in-detail-p-349">29.1.3 Memory resources in detail (p. 349)</h2>
<h3 id="monotonic_buffer_resource-with-upstream-resource"><code>monotonic_buffer_resource</code> with upstream resource</h3>
<p>When the <strong>initial buffer</strong> is exhausted, a monotonic resource can obtain more memory from an <strong>upstream</strong> <code>memory_resource*</code>. Josuttis explains the chaining model (p. 349).</p>
<p><strong>Layout intuition:</strong></p>
<pre><code>monotonic_buffer_resource
┌──────────────────────────────────────────────────────────┐
│ current_buffer  ──────&gt;  [  used  |  free...........  ]  │
│ next_offset                                              │
│ upstream  ───&gt; another memory_resource (e.g. new_delete) │
└──────────────────────────────────────────────────────────┘
        │
        │  when initial arena exhausted, may allocate
        │  additional chunks from upstream (p. 349)
        v
   [ optional extension blocks from upstream ]
</code></pre>
<h3 id="pool-resources-with-pool-options">Pool resources with pool options</h3>
<p><code>std::pmr::pool_options</code> can tune <strong>maximum blocks per chunk</strong> and <strong>desired chunk size</strong> (Josuttis, p. 349). Pool resources:</p>
<ul>
<li>Serve allocations from <strong>pools</strong> of fixed (or graded) block sizes.</li>
<li>Coalesce returns into freelists (implementation-defined exact strategy).</li>
</ul>
<p><strong>Layout intuition (pools):</strong></p>
<pre><code>synchronized_pool_resource / unsynchronized_pool_resource

│  pool for size class S1   :  [ free list ] &lt;-&gt; [ chunks ]   │
│  pool for size class S2   :  [ free list ] &lt;-&gt; [ chunks ]   │
│  ...                                                        │
│  upstream resource                                          │
└─────────────────────────────────────────────────────────────┘
</code></pre>
<p>Use <strong>unsynchronized</strong> when <strong>one thread</strong> owns all allocations; use <strong>synchronized</strong> for <strong>shared</strong> pools (p. 347).</p>
<hr />
<h2 id="292-defining-custom-memory-resources-p-355">29.2 Defining custom memory resources (p. 355)</h2>
<p>Derive from <code>std::pmr::memory_resource</code> and override:</p>
<ol>
<li><strong><code>do_allocate(std::size_t bytes, std::size_t alignment)</code></strong>  </li>
<li><strong><code>do_deallocate(void* p, std::size_t bytes, std::size_t alignment)</code></strong>  </li>
<li><strong><code>do_is_equal(const memory_resource&amp; other) const noexcept</code></strong></li>
</ol>
<p>The <strong>public</strong> non-virtual API (<code>allocate</code>, <code>deallocate</code>, <code>is_equal</code>) enforces alignment and forwards to <code>do_*</code>.</p>
<h3 id="example-tracking-allocator-pattern">Example: tracking allocator (pattern)</h3>
<pre><code class="language-cpp">#include &lt;memory_resource&gt;
#include &lt;cstdlib&gt;
#include &lt;atomic&gt;
#include &lt;cassert&gt;

class tracking_resource : public std::pmr::memory_resource {
    std::pmr::memory_resource* upstream_;
    std::atomic&lt;std::size_t&gt; allocated_{0};
    std::atomic&lt;std::size_t&gt; deallocated_{0};

public:
    explicit tracking_resource(std::pmr::memory_resource* u =
                                   std::pmr::get_default_resource())
        : upstream_(u) {}

    std::size_t bytes_allocated() const { return allocated_.load(); }
    std::size_t bytes_deallocated() const { return deallocated_.load(); }

private:
    void* do_allocate(std::size_t bytes, std::size_t alignment) override {
        void* p = upstream_-&gt;allocate(bytes, alignment);
        allocated_ += bytes;
        return p;
    }

    void do_deallocate(void* p, std::size_t bytes, std::size_t alignment) override {
        upstream_-&gt;deallocate(p, bytes, alignment);
        deallocated_ += bytes;
    }

    bool do_is_equal(const memory_resource&amp; other) const noexcept override {
        return this == &amp;other;
    }

</code></pre>

<hr />
<h2 id="2921-equality-of-memory-resources-p-358">29.2.1 Equality of memory resources (p. 358)</h2>
<p><strong>Definition (intuitive):</strong> Two resources are <strong>equal</strong> if memory allocated from one may be <strong>deallocated through</strong> the other <strong>with matching</strong> <code>bytes</code> and <code>alignment</code>.</p>
<p><strong>Typical patterns:</strong></p>
<ul>
<li><strong>Same object:</strong> <code>&amp;a == &amp;b</code> implies equality.</li>
<li><strong>Singletons</strong> like <code>new_delete_resource()</code> returned pointers compare equal per standard.</li>
<li><strong>Distinct trackers</strong> wrapping different state: usually <strong>not equal</strong> even if they share upstream, unless you explicitly design otherwise (p. 358).</li>
</ul>
<p>If <code>is_equal</code> is wrong, <strong>undefined behavior</strong> can result when containers move memory between resources incorrectly.</p>

<h2 id="293-pmr-support-for-custom-types-p-360">29.3 PMR support for custom types (p. 360)</h2>

<p><strong><code>polymorphic_allocator&lt;T&gt;</code></strong> is <strong>type-erased</strong> at the resource level: it does not template your entire library on <code>MyAlloc&lt;T&gt;</code> (p. 360).</p>

<li>When <strong>moving</strong> <code>std::pmr::vector</code>, the allocator (resource pointer) is often <strong>moved</strong> with the representation; <strong>copies</strong> may allocate from the <strong>target’s</strong> resource or use propagate traits &ndash; verify per operation in Josuttis / cppreference for your version.</li>

<hr />
<h2 id="quick-checklist">Quick checklist</h2>
<ul>
<li>[OK] Use <strong><code>std::pmr::</code></strong> containers for a uniform static type with pluggable memory.</li>
<li>[OK] Use <strong>monotonic</strong> arenas for <strong>many small allocations</strong> with <strong>batch free</strong> semantics.</li>

<p>Tutorial aligned with <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. <strong>Page references</strong>: <strong>pp. 365-383</strong>.</p>
<p>This chapter covers <strong>over-aligned types</strong>: objects whose alignment exceeds the <strong>default alignment</strong> for dynamic allocation on your platform. C++17 fixed a longstanding portability gap: <strong>global <code>new</code></strong> may now allocate from a distinct <strong>over-aligned</strong> path so that <strong><code>alignas(N)</code></strong> types get storage that actually respects <strong>N</strong> (p. 365-366).</p>
<hr />
<h2 id="301-using-new-with-alignments-p-365">30.1 Using <code>new</code> with alignments (p. 365)</h2>
<h3 id="alignas-and-the-alignment-requirement"><code>alignas</code> and the alignment requirement</h3>
<pre><code class="language-cpp">struct Ordinary {
    int x;
};

struct alignas(32) Over32 {
    int y;
};

static_assert(alignof(Ordinary) &lt;= __STDCPP_DEFAULT_NEW_ALIGNMENT__);
// Over32 may have alignof == 32 &gt; default new alignment on some platforms.
</code></pre>
<p><strong>Before C++17:</strong> <code>new Over32</code> was not guaranteed to return memory aligned to 32 on all implementations; platforms might only guarantee <strong><code>__STDCPP_DEFAULT_NEW_ALIGNMENT__</code></strong> for ordinary <code>::operator new(std::size_t)</code> (often 16 or 8 bytes) (p. 365).</p>
<p><strong>Since C++17:</strong> allocation for types with extended alignment uses the <strong>over-aligned allocation path</strong> so the returned pointer satisfies <strong><code>alignof(T)</code></strong> (p. 365).</p>
<hr />
<h2 id="3011-distinct-dynamic--heap-memory-arenas-p-366">30.1.1 Distinct dynamic / heap memory arenas (p. 366)</h2>
<p>Implementations may use <strong>two conceptual arenas</strong> (not necessarily separate heaps, but distinct entry points):</p>
<ol>
<li><strong>Default-aligned</strong> allocations: plain <code>::operator new(size_t)</code> / <code>delete(void*)</code>.</li>
<li><strong>Over-aligned</strong> allocations: <code>::operator new(size_t, std::align_val_t)</code> and matching <strong><code>delete</code></strong>.</li>
</ol>
<p><strong>ASCII diagram: alignment and slot in a buffer</strong></p>
<pre><code>Address increases --&gt;

.. |  pad  |&lt;------ object of type T, alignof(T)=32 ------&gt;|
   ^        ^
   |        start address is a multiple of 32
   unused bytes to satisfy alignment (internal or at allocation boundary)

For dynamic storage, the runtime ensures the returned pointer p satisfies:
  reinterpret_cast&lt;std::uintptr_t&gt;(p) % alignof(T) == 0
</code></pre>
<p>Josuttis explains why splitting the interface matters for <strong>implementers</strong> and for <strong>replacing</strong> global <code>new</code> correctly (p. 366-370).</p>
<hr />
<h2 id="3012-passing-the-alignment-with-new-expression-p-367">30.1.2 Passing the alignment with <code>new</code> expression (p. 367)</h2>
<p>The compiler, when allocating an over-aligned type <strong>T</strong>, passes alignment as <strong><code>std::align_val_t(alignof(T))</code></strong> to the allocating <code>operator new</code>.</p>
<p><strong>Key overloads (conceptual):</strong></p>
<pre><code class="language-cpp">// Allocation
void* operator new(std::size_t count, std::align_val_t al);
void* operator new[](std::size_t count, std::align_val_t al);

// Deallocation (must match how allocation was obtained)
void operator delete(void* ptr, std::size_t count, std::align_val_t al) noexcept;
void operator delete[](void* ptr, std::size_t count, std::align_val_t al) noexcept;
</code></pre>
<p><strong>Notes:</strong></p>
<ul>
<li>The <strong><code>std::size_t</code></strong>-aware <code>delete</code> overloads support <strong>sized deallocation</strong> where enabled; Josuttis ties this to matching <strong>allocation</strong> and <strong>alignment</strong> for correctness (p. 367).</li>
<li><strong>Mismatch</strong> (wrong <code>delete</code> for pointer origin) remains <strong>undefined behavior</strong>.</li>
</ul>
<h3 id="minimal-usage-example">Minimal usage example</h3>
<pre><code class="language-cpp">#include &lt;new&gt;
#include &lt;cstdlib&gt;

struct alignas(64) CacheLineBlock {
    int data[16];
};

void use_overaligned() {
    auto* p = new CacheLineBlock{};
    // ... use *p ...
    delete p;  // Compiler selects aligned delete for over-aligned class types (C++17)
}
</code></pre>
<hr />
<h2 id="302-implementing-operator-new-for-aligned-memory-p-370">30.2 Implementing <code>operator new()</code> for aligned memory (p. 370)</h2>
<h3 id="pre-c17-workarounds">Pre-C++17 workarounds</h3>
<p>Portable C++ before the aligned <code>new</code> path often used:</p>
<ul>
<li><strong><code>std::aligned_alloc</code></strong> / <strong>C11</strong> (where available) with manual lifetime management.</li>
<li><strong><code>posix_memalign</code></strong> / platform APIs.</li>
</ul>
<p>These workarounds complicate <strong>constructors</strong>, <strong>exceptions</strong>, and <strong>array</strong> semantics (p. 370).</p>
<h3 id="type-specific-operator-new-with-alignment">Type-specific <code>operator new()</code> with alignment</h3>
<p>You can provide <strong>class-scoped</strong> allocation hooks:</p>
<pre><code class="language-cpp">#include &lt;new&gt;
#include &lt;cstdlib&gt;

struct alignas(128) Widget {
    static void* operator new(std::size_t n);
    static void operator delete(void* p, std::size_t n) noexcept;

    int payload;
};

inline void* Widget::operator new(std::size_t n) {
    void* p = std::aligned_alloc(128, n);
    if (!p) {
        throw std::bad_alloc{};
    }
    return p;
}

inline void Widget::operator delete(void* p, std::size_t n) noexcept {
    // n may be used for sized delete matching; free must match aligned_alloc
    std::free(p);
    (void)n;
}
</code></pre>
<p><strong>C++17 extension:</strong> for <strong>over-aligned</strong> types, you may also need <strong><code>operator new(std::size_t, std::align_val_t)</code></strong> &ndash; Josuttis explains when the class-specific <strong>aligned</strong> overloads are required vs when the <strong>global</strong> aligned <code>new</code> suffices (p. 370-377).</p>
<h3 id="placement-delete-and-construction-failure">Placement <code>delete</code> and construction failure</h3>
<p>If <strong><code>new (ptr) T(...)</code></strong> throws in a custom allocator routine, <strong>placement delete</strong> (if any) participates in cleanup strategies for <strong>failed construction</strong>. Josuttis revisits the <strong>placement new</strong> / <strong>exception</strong> interaction when layering aligned blocks (p. 370).</p>
<hr />
<h2 id="303-implementing-global-operator-new-p-378">30.3 Implementing global <code>operator new()</code> (p. 378)</h2>
<p>Replacing <strong>global</strong> allocation affects <strong>all</strong> dynamic storage. For <strong>C++17</strong>, a complete replacement strategy must consider:</p>
<ul>
<li><code>::operator new(std::size_t)</code></li>
<li><code>::operator new(std::size_t, std::align_val_t)</code>  // over-aligned path</li>
<li>Array forms, <code>nothrow</code> variants as required by your replacement policy</li>
</ul>
<p><strong>Sketch (illustrative only &ndash; production code needs full overload set and POSIX/ABI care):</strong></p>
<pre><code class="language-cpp">#include &lt;new&gt;
#include &lt;cstdlib&gt;

void* operator new(std::size_t size) {
    void* p = std::malloc(size);
    if (!p) {
        throw std::bad_alloc{};
    }
    return p;
}

void* operator new(std::size_t size, std::align_val_t al) {
    void* p = std::aligned_alloc(static_cast&lt;std::size_t&gt;(al), size);
    if (!p) {
        throw std::bad_alloc{};
    }
    return p;
}

void operator delete(void* p) noexcept {
    std::free(p);
}

void operator delete(void* p, std::size_t, std::align_val_t) noexcept {
    std::free(p);
}
</code></pre>
<p>Josuttis warns about <strong>ABI</strong>, <strong><code>aligned_alloc</code></strong> requirements (size multiple of alignment), and <strong>matching</strong> every overload your standard library may call (p. 378).</p>
<hr />
<h2 id="304-tracking-all-new-calls-p-380">30.4 Tracking all <code>::new</code> calls (p. 380)</h2>
<p>Josuttis gives a <strong>complete</strong> tracking example using <strong><code>inline</code> variables</strong> (C++17) to hold counters or logs shared across translation units without ODR pitfalls of naive statics in headers (p. 380).</p>
<h3 id="pattern-inline-variables-for-global-counters-c17">Pattern: inline variables for global counters (C++17)</h3>
<pre><code class="language-cpp">// tracking_new.hpp (header)
#pragma once
#include &lt;atomic&gt;
#include &lt;cstddef&gt;

inline std::atomic&lt;std::size_t&gt; g_new_calls{0};
inline std::atomic&lt;std::size_t&gt; g_aligned_new_calls{0};

// In a single .cpp that defines replacement operators, increment inside new.
</code></pre>
<p><strong>Why <code>inline</code> variables (Josuttis ties to C++17 machinery, p. 380):</strong></p>
<ul>
<li>One <strong>definition</strong> across TUs with <strong>ODR-safe</strong> merge semantics.</li>
<li>Suitable for <strong>header-only</strong> instrumentation kits.</li>
</ul>
<p>A full tracker would increment <strong><code>g_new_calls</code></strong> in <code>operator new(size_t)</code> and <strong><code>g_aligned_new_calls</code></strong> in <code>operator new(size_t, std::align_val_t)</code>, then mirror in <code>delete</code> for balance checks (p. 380).</p>
<hr />
<h2 id="memory-layout-diagram-default-vs-over-aligned-cells">Memory layout diagram: default vs over-aligned cells</h2>
<pre><code>Default heap block for T1 (alignof small)
┌──────────────────────────────┐
│ T1 object                    │
└──────────────────────────────┘

Over-aligned block for T2 (alignof=64)
┌── possibly unused padding ──┬──────────────────────────────┐
│                             │ T2 object (64-byte aligned)  │
└─────────────────────────────┴──────────────────────────────┘
         implementation may store size/metadata outside this view
</code></pre>
<p><em>[Conceptual figure after Josuttis’s discussion of arenas and aligned slots, pp. 366-370.]</em></p>
<hr />
<h2 id="checklist">Checklist</h2>
<ul>
<li>[OK] Rely on <strong>C++17</strong> <code>new</code>/<code>delete</code> for <strong><code>alignas</code> types</strong> without manual platform align APIs when possible (p. 365).</li>
<li>[OK] When replacing <strong>global</strong> <code>new</code>, supply <strong>aligned</strong> overloads too (p. 378).</li>
<li>[ERROR] Do not <code>free</code> a pointer from <strong><code>aligned_alloc</code></strong> with the wrong deallocation function.</li>
<li>[ERROR] Do not assume <strong><code>alignof(T) &lt;= __STDCPP_DEFAULT_NEW_ALIGNMENT__</code></strong> for all types.</li>
</ul>
<hr />

  { name: `32. To Chars From Chars`, path: `31_to_chars_from_chars.md`, dir: ``, body: `<h1 id="chapter-31-stdto_chars-and-stdfrom_chars">Chapter 31: <code>std::to_chars()</code> and <code>std::from_chars()</code></h1>
<p>Tutorial aligned with <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. <strong>Page references</strong>: <strong>pp. 385-391</strong>.</p>
<p>Header: <strong><code>&lt;charconv&gt;</code></strong>. These functions provide <strong>low-level</strong>, <strong>locale-independent</strong> numeric parsing and formatting with <strong>no allocations</strong>. They are intended for <strong>serialization</strong>, <strong>protocol</strong> coding, <strong>logging</strong>, and hot paths where <strong><code>sprintf</code></strong>, <strong><code>iostreams</code></strong>, or <strong><code>std::to_string</code></strong> are too heavy (p. 385).</p>
<hr />
<h2 id="311-motivation-p-385">31.1 Motivation (p. 385)</h2>
<h3 id="design-goals">Design goals</h3>
<table>
<thead>
<tr>
<th>Aspect</th>
<th><code>to_chars</code> / <code>from_chars</code></th>
<th>Many alternatives</th>
</tr>
</thead>
<tbody>
<tr>
<td>Allocations</td>
<td>No heap (you pass buffer)</td>
<td><code>to_string</code>, streams may allocate</td>
</tr>
<tr>
<td>Locale</td>
<td><strong>C locale</strong> numeric rules</td>
<td><code>sprintf</code> / streams locale-dependent</td>
</tr>
<tr>
<td>Errors</td>
<td><code>std::errc</code> on result</td>
<td>Exceptions or parse flags vary</td>
</tr>
<tr>
<td>Speed</td>
<td>Tuned for tight loops</td>
<td>Often slower (p. 385)</td>
</tr>
</tbody>
</table>
<p>Josuttis contrasts these with <strong><code>sprintf</code> / <code>sscanf</code></strong>, <strong><code>stoi</code></strong>, <strong><code>to_string</code></strong>, and streams for both <strong>performance</strong> and <strong>predictability</strong> (p. 385).</p>
<hr />
<h2 id="312-example-usage-p-386">31.2 Example usage (p. 386)</h2>
<h3 id="common-includes">Common includes</h3>
<pre><code class="language-cpp">#include &lt;charconv&gt;
#include &lt;string&gt;
#include &lt;array&gt;
#include &lt;system_error&gt;
</code></pre>
<hr />
<h2 id="3121-from_chars-p-386">31.2.1 <code>from_chars()</code> (p. 386)</h2>
<h3 id="result-type">Result type</h3>
<pre><code class="language-cpp">struct from_chars_result {
    const char* ptr;
    std::errc ec;
};
</code></pre>
<ul>
<li><strong><code>ptr</code></strong>: one past the last character consumed <strong>on success</strong>, or where parsing <strong>stopped</strong> / <strong>invalid</strong> (Josuttis clarifies error cases in context; see standard for full semantics).</li>
<li><strong><code>ec</code></strong>: <code>std::errc{}</code> (default-constructed = <strong>success</strong> / &ldquo;no error&rdquo; marker in this API) vs other <strong>error codes</strong>.</li>
</ul>
<h3 id="parsing-integers">Parsing integers</h3>
<pre><code class="language-cpp">#include &lt;charconv&gt;
#include &lt;string&gt;

bool parse_int_example(const std::string&amp; str, int&amp; out) {
    auto [ptr, ec] = std::from_chars(str.data(), str.data() + str.size(), out);
    if (ec != std::errc{}) {
        return false;  // [ERROR] overflow, invalid pattern, etc.
    }
    if (ptr != str.data() + str.size()) {
        // Trailing junk: decide policy
        return false;
    }
    return true;  // [OK] whole string consumed
}
</code></pre>
<h3 id="base-parameter-hex-example">Base parameter (hex example)</h3>
<pre><code class="language-cpp">unsigned value = 0;
const char hex[] = &quot;2A&quot;;
auto r = std::from_chars(hex, hex + sizeof(hex) - 1, value, 16);
// expect r.ec == std::errc{} and value == 42
</code></pre>
<p><strong>Bases:</strong> typically <strong>2-36</strong> for integer parsing per standard (p. 386).</p>
<hr />
<h2 id="3122-to_chars-p-387">31.2.2 <code>to_chars()</code> (p. 387)</h2>
<h3 id="result-type_1">Result type</h3>
<pre><code class="language-cpp">struct to_chars_result {
    char* ptr;
    std::errc ec;
};
</code></pre>
<p>On success, characters are written to <strong>[buf, ptr)</strong> &ndash; <strong><code>ptr</code></strong> is <strong>one past</strong> the last written character (Josuttis, p. 387).</p>
<h3 id="format-an-integer-into-a-stack-buffer">Format an integer into a stack buffer</h3>
<pre><code class="language-cpp">#include &lt;charconv&gt;

void print_42_to_buffer() {
    std::array&lt;char, 20&gt; buf{};
    auto [ptr, ec] = std::to_chars(buf.data(), buf.data() + buf.size(), 42);
    if (ec != std::errc{}) {
        // [ERROR] buffer too small / other error
        return;
    }
    // valid range: [buf.data(), ptr)
}
</code></pre>
<h3 id="base-parameter">Base parameter</h3>
<pre><code class="language-cpp">std::array&lt;char, 32&gt; buf{};
int v = 255;
auto r = std::to_chars(buf.data(), buf.data() + buf.size(), v, 16);
// writes lowercase hex without &quot;0x&quot; prefix by default rules (verify flags/options)
</code></pre>
<hr />
<h2 id="313-floating-point-round-trip-support-p-388">31.3 Floating-point round-trip support (p. 388)</h2>
<p>C++17 introduces <strong>consistent</strong> <code>to_chars</code> / <code>from_chars</code> for <strong>floating point</strong> in a way that supports <strong>round-trip</strong>: formatting with <code>to_chars</code> then parsing with <code>from_chars</code> recovers the <strong>same</strong> value for the <strong>supported</strong> formats and implementations meeting the standard guarantees (Josuttis, p. 388).</p>
<h3 id="chars_format-enumeration"><code>chars_format</code> enumeration</h3>
<p>Typical values (see <code>&lt;charconv&gt;</code>):</p>
<ul>
<li><code>std::chars_format::scientific</code></li>
<li><code>std::chars_format::fixed</code></li>
<li><code>std::chars_format::hex</code></li>
<li><code>std::chars_format::general</code> (often default-like combination behavior)</li>
</ul>
<p><strong>Example sketch:</strong></p>
<pre><code class="language-cpp">#include &lt;charconv&gt;
#include &lt;array&gt;

double x = 1.375;
std::array&lt;char, 64&gt; buf{};

auto t = std::to_chars(buf.data(), buf.data() + buf.size(), x);

  { name: `33. Std Launder`, path: `32_std_launder.md`, dir: ``, body: `<h1 id="chapter-32-stdlaunder">Chapter 32: <code>std::launder()</code></h1>
<p>Tutorial aligned with <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. <strong>Page references</strong>: <strong>pp. 393-398</strong>.</p>
<p>Header: <strong><code>&lt;new&gt;</code></strong>. <code>std::launder</code> is a <strong>low-level</strong> tool that interacts with the C++ <strong>object model</strong> and <strong>compiler optimizations</strong>. It is primarily needed when <strong>replacing an object</strong> at a <strong>fixed address</strong> (often via <strong>placement new</strong>) where <strong><code>const</code></strong> or <strong>reference</strong> members cause the compiler to assume <strong>immutable facts</strong> about the old object&rsquo;s memory that <strong>no longer hold</strong> after <strong>lifetime</strong> changes (p. 393-396).</p>
<hr />
<h2 id="321-motivation-p-393">32.1 Motivation (p. 393)</h2>
<h3 id="the-optimization-problem">The optimization problem</h3>
<p>Consider a type with a <strong><code>const</code></strong> member:</p>
<pre><code class="language-cpp">#include &lt;new&gt;

struct X {
    const int n;
    explicit X(int v) : n{v} {}
};

void broken_assumptions() {
    alignas(X) unsigned char storage[sizeof(X)];
    X* p = ::new (storage) X{7};

    // Destroy and reconstruct at same address:
    p-&gt;~X();
    ::new (storage) X{42};
}
</code></pre>
<p><strong>Naive mental model:</strong> <code>p</code> still points at the <strong>new</strong> <code>X</code>, so <code>p-&gt;n</code> should be <strong>42</strong>.</p>
<p><strong>Compiler model:</strong> For <strong><code>const</code> members</strong>, optimizers may legally <strong>cache</strong> <code>p-&gt;n</code> in registers or reuse a load across operations, <strong>because</strong> between well-defined access to <strong><code>p-&gt;n</code></strong>, the abstract machine promises <strong><code>const</code> subobjects</strong> are immutable <strong>for the current object&rsquo;s lifetime</strong> under the rules they applied at that optimization point.</p>
<p>After placement-new <strong>without</strong> updating the <strong>provenance</strong> of pointers the compiler tracked, reads through <strong><code>p</code></strong> may still &ldquo;see&rdquo; <strong>7</strong> (p. 393).</p>
<p><strong>Analogous issue:</strong> <strong>reference</strong> members similarly constrain what the compiler may assume about <strong>aliasability</strong> of subobjects (Josuttis ties this to object lifetimes; p. 393).</p>
<hr />
<h2 id="ascii-diagram-stale-compiler-knowledge-vs-fresh-object">ASCII diagram: stale compiler knowledge vs fresh object</h2>
<pre><code>Storage bytes at address A
┌───────────────────────────────────────┐
│ lifetime 1: X with const n == 7       │  Compiler may prove: load n -&gt; 7
└───────────────────────────────────────┘
                |
                | placement new X{42}
                v
┌───────────────────────────────────────┐
│ lifetime 2: X with const n == 42      │  True dynamic value changed
└───────────────────────────────────────┘

Pointer p still numerically equals A, but *unless* the compiler is told to
re-establish the object identity it may reuse cached facts about lifetime 1.

std::launder(p) yields pointer to the *current* object of type X at A (p. 396).
</code></pre>
<hr />
<h2 id="322-how-launder-solves-the-problem-p-396">32.2 How <code>launder()</code> solves the problem (p. 396)</h2>
<h3 id="core-idea">Core idea</h3>
<pre><code class="language-cpp">template &lt;class T&gt;
constexpr T* launder(T* p) noexcept;
</code></pre>
<p><strong>Effect:</strong> <code>std::launder(p)</code> is a <strong>barrier</strong> that <strong>rebinds</strong> the compiler&rsquo;s <strong>abstract object tracking</strong> for a pointer into a <strong>new object</strong> that <strong>occupies</strong> the storage <strong><code>p</code> addresses</strong> under strict preconditions (notably same <strong><code>T</code></strong>, compatible storage, no <strong>const</strong> access problems beyond what launder resolves).</p>
<h3 id="correct-usage-sketch-conceptual">Correct usage sketch (conceptual)</h3>
<pre><code class="language-cpp">#include &lt;new&gt;

struct X {
    const int n;
    explicit X(int v) : n{v} {}
};

void with_launder() {
    alignas(X) unsigned char storage[sizeof(X)];
    X* p0 = ::new (storage) X{7};
    p0-&gt;~X();
    X* p1 = ::new (storage) X{42};
    X* q = std::launder(p1);
    int v = q-&gt;n;  // [OK] fresh read under Josuttis / standard rules (p. 396)
    (void)v;
}
</code></pre>
<p>Josuttis describes <code>launder</code> as <strong>&ldquo;laundering&rdquo;</strong> the pointer through an <strong>optimization barrier</strong> so the compiler cannot keep stale assumptions (p. 396).</p>
<p><strong>Note:</strong> The illustrative pattern must follow <strong>strict lifetime rules</strong> &ndash; you may not access <strong><code>p0-&gt;n</code></strong> after destruction in ways that end the lifetime incorrectly; the chapter stresses correctness of <strong>placement new sequences</strong> (p. 393-398).</p>
<hr />
<h2 id="323-why--when-launder-does-not-work-p-397">32.3 Why / when <code>launder()</code> does not work (p. 397)</h2>
<p>Josuttis lists important <strong>limitations</strong> (p. 397):</p>
<ol>
<li>
<p><strong>Different types</strong> at the same address:If you end the lifetime of <strong><code>T</code></strong> and create <strong><code>U</code></strong> in the same storage, <strong><code>launder</code> as <code>T*</code></strong> does not magically bridge <strong>cross-type</strong> reuse for general cases.</p>
</li>
<li>
<p><strong>Stricter alignment or size</strong>: If the <strong>new</strong> object type has <strong>stronger alignment</strong> or <strong>different size</strong> requirements that violate storage assumptions, <strong><code>launder</code></strong> cannot rescue an invalid reuse.</p>
</li>
<li>
<p><strong>Not for everyday code</strong>: Typical application developers rarely need <strong><code>launder</code></strong>; <strong>containers</strong> and <strong>allocators</strong> in the standard library implementation may need it when juggling <strong>typed</strong> nodes in <strong>untyped</strong> buffers (p. 397).</p>
</li>
</ol>
<h3 id="decision-table-summary">Decision table (summary)</h3>
<table>
<thead>
<tr>
<th>Scenario</th>
<th><code>launder</code> helpful?</th>
</tr>
</thead>
<tbody>
<tr>
<td>Same type <code>T</code>, legal placement new cycle, <strong><code>const</code> / ref</strong> confusion</td>
<td>Often <strong>yes</strong></td>
</tr>
<tr>
<td>Reuse storage for <strong>different</strong> type</td>
<td><strong>No</strong> (not a <code>launder</code> fix)</td>
</tr>
<tr>
<td>Alignment / storage not suitable for new object</td>
<td><strong>No</strong></td>
</tr>
<tr>
<td>Ordinary heap <code>new</code>/<code>delete</code> without tricky aliasing</td>
<td><strong>No</strong></td>
</tr>
</tbody>
</table>
<hr />
<h2 id="relationship-to-stdstart_lifetime_as-note">Relationship to <code>std::start_lifetime_as</code> (note)</h2>
<p>Later standards introduce additional facilities related to object lifetime and storage reuse. In <strong>C++17</strong>, <strong><code>std::launder</code></strong> is the primary spelling discussed in Josuttis for this problem class (p. 396).</p>
<hr />
<h2 id="reference">Reference</h2>
<p>Josuttis: <strong>Chapter 32</strong>, <strong>pp. 393-398</strong>.</p>` },
  { name: `34. Generic Code Improvements`, path: `33_generic_code_improvements.md`, dir: ``, body: `<h1 id="chapter-33-improvements-for-implementing-generic-code">Chapter 33: Improvements for Implementing Generic Code</h1>
<p>Tutorial aligned with <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. <strong>Page references</strong>: <strong>pp. 399-404</strong>.</p>
<p>Three small <strong>standard library</strong> tools simplify <strong>generic programming</strong>:</p>
<ol>
<li><strong><code>std::invoke</code></strong>: uniform call syntax for callables and <strong>member pointers</strong> (p. 399).</li>
<li><strong><code>std::bool_constant</code></strong>: ergonomic <strong>boolean</strong> <code>integral_constant</code> (p. 401).</li>
<li><strong><code>std::void_t</code></strong>: helper for <strong>SFINAE</strong>-based detection (p. 403).</li>
</ol>
<p>Headers: <strong><code>&lt;functional&gt;</code></strong>, <strong><code>&lt;type_traits&gt;</code></strong>.</p>
<hr />
<h2 id="331-stdinvoke-p-399">33.1 <code>std::invoke&lt;&gt;</code> (p. 399)</h2>
<h3 id="purpose">Purpose</h3>
<p><code>std::invoke(f, args...)</code> calls <strong><code>f</code></strong> with <strong><code>args...</code></strong> using the same <strong>dispatch rules</strong> as the INVOKE pseudo-operation used by <strong><code>std::bind</code></strong>, <strong><code>std::thread</code></strong>, etc.</p>
<p>It handles:</p>
<ul>
<li><strong>Free functions</strong>: <code>std::invoke(f, a, b)</code> ~ <code>f(a, b)</code></li>
<li><strong>Function objects</strong>: <code>std::invoke(g, a)</code></li>
<li><strong>Pointer-to-member functions</strong>: <code>std::invoke(&amp;C::mf, obj, args...)</code></li>
<li><strong>Pointer-to-member data</strong>: <code>std::invoke(&amp;C::md, obj)</code> ~ member access</li>
</ul>
<h3 id="examples">Examples</h3>
<pre><code class="language-cpp">#include &lt;functional&gt;

void free_func(int, double) {}

struct Widget {
    int value;
    void print() const {}
};

void demo_invoke() {
    std::invoke(free_func, 1, 2.0);

    Widget w{42};
    std::invoke(&amp;Widget::print, w);
    int x = std::invoke(&amp;Widget::value, w);
    (void)x;
}
</code></pre>
<h3 id="why-prefer-invoke-in-generic-code">Why prefer <code>invoke</code> in generic code?</h3>
<pre><code class="language-cpp">template &lt;class Callable, class... Args&gt;
decltype(auto) call(Callable&amp;&amp; c, Args&amp;&amp;... args) {
    return std::invoke(std::forward&lt;Callable&gt;(c), std::forward&lt;Args&gt;(args)...);
}
</code></pre>
<p>Here <strong><code>c</code></strong> might be anything <strong>INVOKE</strong>-compatible; you avoid spelling <code>(*c)(...)</code> vs <code>c(...)</code> vs <code>(obj.*c)(...)</code> manually (p. 399).</p>
<hr />
<h3 id="ascii-diagram-invoke-dispatch-conceptual">ASCII diagram: <code>invoke</code> dispatch (conceptual)</h3>
<pre><code>                    std::invoke(f, args...)
                               |
            ┌──────────────────┼──────────────────┐
            v                  v                  v
      free function      function object    pointer-to-member
            |                  |                  |
            f(args...)         f(args...)    (object.*pmf)(...)
                                            or (object.*pmd)
</code></pre>
<p><em>[Dispatch union as described around INVOKE, Josuttis p. 399.]</em></p>
<hr />
<h2 id="332-stdbool_constant-p-401">33.2 <code>std::bool_constant&lt;&gt;</code> (p. 401)</h2>
<h3 id="definition">Definition</h3>
<p>C++17 adds:</p>
<pre><code class="language-cpp">template&lt;bool B&gt;
using bool_constant = std::integral_constant&lt;bool, B&gt;;
</code></pre>
<p>Thus:</p>
<ul>
<li><code>std::true_type</code>  == <code>bool_constant&lt;true&gt;</code></li>
<li><code>std::false_type</code> == <code>bool_constant&lt;false&gt;</code></li>
</ul>
<h3 id="example-in-a-trait">Example in a trait</h3>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

template &lt;class T&gt;
struct is_pointer_trait : std::bool_constant&lt;std::is_pointer&lt;T&gt;::value&gt; {};
</code></pre>
<p><strong>Benefit:</strong> less typing than <code>integral_constant&lt;bool, ...&gt;</code> in <strong>metaprogramming</strong> (p. 401).</p>
<hr />
<h2 id="333-stdvoid_t-p-403">33.3 <code>std::void_t&lt;&gt;</code> (p. 403)</h2>
<h3 id="definition_1">Definition</h3>
<pre><code class="language-cpp">template &lt;class...&gt;
using void_t = void;
</code></pre>
<p>It maps any <strong>valid</strong> type parameter pack to <strong><code>void</code></strong>. The power is in <strong>SFINAE</strong>: <strong>invalid</strong> instantiations <strong>discard</strong> the overload rather than error.</p>
<h3 id="detection-of-begin-classic-idiom">Detection of <code>.begin()</code> (classic idiom)</h3>
<pre><code class="language-cpp">#include &lt;type_traits&gt;
#include &lt;utility&gt;
#include &lt;vector&gt;

template &lt;class, class = void&gt;
struct has_begin : std::false_type {};

template &lt;class T&gt;
struct has_begin&lt;T, std::void_t&lt;decltype(std::declval&lt;T&gt;().begin())&gt;&gt;
    : std::true_type {};

static_assert(has_begin&lt;std::vector&lt;int&gt;&gt;::value);
</code></pre>
<p><strong>How it works:</strong></p>
<ul>
<li>Attempt <strong><code>decltype(std::declval&lt;T&gt;().begin())</code></strong> inside <strong><code>void_t&lt;...&gt;</code></strong>.</li>
<li>If <strong><code>T</code> has no <code>.begin()</code></strong>, substitution fails inside <code>void_t</code>.</li>
<li>
<p>The <strong>partial specialization</strong> is <strong>removed</strong> from the candidate set -&gt; the <strong>primary</strong> <code>false_type</code> template wins. [OK]</p>
</li>
<li>
<p>If <strong>valid</strong>, specialization <strong><code>has_begin&lt;T, void&gt;</code></strong> matches -&gt; <strong><code>true_type</code></strong>.</p>
</li>
</ul>
<hr />
<h3 id="ascii-diagram-void_t-sfinae-funnel">ASCII diagram: <code>void_t</code> SFINAE funnel</h3>
<pre><code>Template specialization selection for has_begin&lt;T&gt;
┌──────────────────────────────────────────────────────────────┐
│ Primary: has_begin&lt;T, void = void&gt;  --&gt;  std::false_type     │
└──────────────────────────────────────────────────────────────┘
                    ^
      if substitution fails in partial specialization
                    |
                    v
┌──────────────────────────────────────────────────────────────┐
│ Partial: has_begin&lt;T, void_t&lt;decltype(declval&lt;T&gt;().begin())&gt;&gt;│
│          -&gt; std::true_type                                   │
└──────────────────────────────────────────────────────────────┘
      only considered when void_t&lt;...&gt; is well-formed
</code></pre>
<hr />
<h3 id="advanced-note-pitfalls">Advanced note: pitfalls</h3>
<ul>
<li>
<p><strong>Arity / constness / rvalue</strong> sensitivity: <code>declval&lt;T&gt;()</code> may pick <strong><code>const</code></strong> overloads; tune <code>declval&lt;T&amp;&gt;()</code> / <code>declval&lt;const T&amp;&gt;()</code> to match intended concept (not unique to <code>void_t</code>, but frequent).</p>
</li>
<li>
<p>In C++20, <strong>constraints</strong> often supersede <code>void_t</code> tricks; in <strong>C++17</strong>, <strong><code>void_t</code></strong> remains idiomatic (p. 403).</p>
</li>
</ul>
<hr />
<h2 id="reference">Reference</h2>
<p>Josuttis: <strong>Chapter 33</strong>, <strong>pp. 399-404</strong>.</p>` },
  { name: `35. Common Cpp17 Settings`, path: `34_common_cpp17_settings.md`, dir: ``, body: `<h1 id="chapter-34-common-c17-settings">Chapter 34: Common C++17 Settings</h1>
<p>Tutorial aligned with <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. <strong>Page references</strong>: <strong>pp. 407-408</strong>.</p>
<p>This short chapter collects <strong>macro values</strong>, <strong>C compatibility</strong>, <strong>signal handler</strong> constraints, and <strong>forward progress</strong> wording that affect <strong>portable</strong> C++17 code (p. 407-408).</p>
<hr />
<h2 id="341-value-of-__cplusplus-p-407">34.1 Value of <code>__cplusplus</code> (p. 407)</h2>
<h3 id="standard-values">Standard values</h3>
<p>When compiling <strong>C++17</strong> in conforming modes, expect:</p>
<pre><code class="language-cpp">#if __cplusplus == 201703L
// C++17 translation unit
#endif
</code></pre>
<p><strong>Historical reference values</strong> (Josuttis, p. 407):</p>
<table>
<thead>
<tr>
<th>Standard</th>
<th>Typical <code>__cplusplus</code></th>
</tr>
</thead>
<tbody>
<tr>
<td>C++98</td>
<td><code>199711L</code></td>
</tr>
<tr>
<td>C++11</td>
<td><code>201103L</code></td>
</tr>
<tr>
<td>C++14</td>
<td><code>201402L</code></td>
</tr>
<tr>
<td>C++17</td>
<td><code>201703L</code></td>
</tr>
</tbody>
</table>
<p><strong>Feature detection idiom:</strong></p>
<pre><code class="language-cpp">#if __cplusplus &gt;= 201703L
#include &lt;optional&gt;
// ...
#endif
</code></pre>
<p><strong>Caveats:</strong></p>
<ul>
<li>Some compilers expose <strong><code>__cplusplus</code></strong> as an <strong>older</strong> value unless you pass flags like <strong><code>-std=c++17</code></strong> / <strong><code>/std:c++17</code></strong>; always verify your toolchain docs.</li>
<li>Prefer <strong>feature-test macros</strong> where available (C++20 formalizes more of this; C++17 code still leans on <strong><code>__cplusplus</code></strong> + vendor macros).</li>
</ul>
<hr />
<h2 id="342-compatibility-to-c11-p-407">34.2 Compatibility to C11 (p. 407)</h2>
<p><strong>C++17</strong> updates normative references so the <strong>C standard</strong> baseline is <strong>C11</strong> rather than <strong>C99</strong> (p. 407).</p>
<h3 id="practical-impact">Practical impact</h3>
<ul>
<li><strong>Headers</strong> like <strong><code>&lt;stdalign.h&gt;</code></strong>, <strong><code>&lt;stdbool.h&gt;</code></strong> are <strong>deprecated</strong> in C++ (p. 407); prefer native C++ spellings:</li>
</ul>
<pre><code class="language-cpp">alignas(16) int x;     // instead of C header patterns
bool flag = true;      // C++ keyword bool
</code></pre>
<ul>
<li><strong>Not all C11</strong> library features are <strong>re-required</strong> for C++ in identical form; Josuttis flags <strong>gaps</strong> and <strong>divergences</strong> (p. 407). When mixing <strong>C and C++</strong> TUs, audit <strong>ABI</strong> for <code>stdint</code>, <code>threads</code>, <code>aligned_alloc</code>, etc.</li>
</ul>
<h3 id="ascii-note-standards-stack">ASCII note: standards stack</h3>
<pre><code>C++17  ──references──&gt;  ISO C11  (baseline C library / atomics / threads overlap nuanced)
     \\
      \\── deprecates some C compatibility headers in favor of C++ keywords (p. 407)
</code></pre>
<hr />
<h2 id="343-dealing-with-signal-handlers-p-408">34.3 Dealing with signal handlers (p. 408)</h2>
<p>The C++ standard <strong>tightens</strong> what is safe inside a <strong>signal handler</strong> that uses <code>std::signal</code> (p. 408):</p>
<ul>
<li>Only <strong>lock-free</strong> <strong><code>std::atomic</code></strong> operations are safe for concurrent signaling patterns as described in the standard&rsquo;s limitations.</li>
<li>Most <strong>library</strong> and <strong>allocation</strong> functions are <strong>not async-signal-safe</strong> in the POSIX sense; <strong>do not</strong> call arbitrary C++ in handlers.</li>
</ul>
<h3 id="minimal-pattern-illustration-only">Minimal pattern (illustration only)</h3>
<pre><code class="language-cpp">#include &lt;csignal&gt;
#include &lt;atomic&gt;

std::atomic&lt;int&gt; g_sig{0};

extern &quot;C&quot; void handler(int signum) {
    // Must be lock-free for reliable signal handler use:
    static_assert(std::atomic&lt;int&gt;::is_always_lock_free ||
                  g_sig.is_lock_free());
    g_sig.store(signum, std::memory_order_relaxed);
}
</code></pre>
<p>Josuttis links this to <strong>standard clarification</strong> in C++17 rather than inventing new primitives (p. 408).</p>
<hr />
<h2 id="344-forward-progress-guarantees-p-408">34.4 Forward progress guarantees (p. 408)</h2>
<p>C++17 adds <strong>forward progress</strong> guarantees for <strong>threads of execution</strong>:</p>
<ul>
<li>A thread must <strong>eventually</strong> make <strong>forward progress</strong> (perform a <strong>visible step</strong>) unless it <strong>blocks</strong> in well-defined ways.</li>
<li>This prevents &ldquo;infinite starvation&rdquo; models forbidden by the standard&rsquo;s concurrency rules (p. 408).</li>
</ul>
<p><strong>Intuition for library authors:</strong> spinlocks and <strong>lock-free</strong> structures must avoid <strong>indefinite</strong> starvation assumptions that contradict these rules.</p>
<hr />
<h2 id="checklist">Checklist</h2>
<ul>

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */

    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

highlightAllCode();

/* ───── Wrap tables so they scroll horizontally on narrow screens ───── */
function wrapTables() {
    document.querySelectorAll('.tab-content table').forEach(table => {
        if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;
        const wrap = document.createElement('div');
        wrap.className = 'table-scroll';
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
    });
}
wrapTables();

const HLJS_LIGHT = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs.min.css';
const themeToggleBtn = document.getElementById('themeToggle');
const hljsLink = document.getElementById('hljs-theme');

const ICON_SUN = '<svg class="icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-1.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Zm5.657-8.157a.75.75 0 0 1 0 1.061l-1.061 1.06a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734l1.06-1.06a.75.75 0 0 1 1.06 0Zm-9.193 9.193a.75.75 0 0 1 0 1.06l-1.06 1.061a.75.75 0 1 1-1.061-1.06l1.06-1.061a.75.75 0 0 1 1.061 0ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0ZM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8Zm13 0a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8Zm-8 5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13Zm3.536-2.464a.75.75 0 0 1 1.06 0l1.061 1.06a.75.75 0 0 1-1.06 1.061l-1.061-1.06a.75.75 0 0 1 0-1.061Zm-8.132 0a.75.75 0 0 1 1.06 1.061l-1.06 1.06a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734Z"></path></svg>';
