/* === Reset & base === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* === Header bar (doc selector + search + theme toggle) ===
   The bar itself is fully transparent; the liquid-glass effect lives only on
   the individual floating controls inside it. */
.header-bar {

    box-shadow: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    height: var(--header-height);
    pointer-events: none;
}
/* Re-enable interaction for the actual controls (the bar is click-through). */

    align-items: center;
    gap: 12px;
    padding: 0 18px;
    height: 100%;
    min-width: 0;
    position: relative;
}

/* iOS-style condensed title: hidden until the page is scrolled down. */
.nav-doc-title {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, calc(-50% + 8px));
    max-width: min(60vw, 520px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    background: var(--ctrl-bg);
    border: 1px solid var(--ctrl-border);
    box-shadow: var(--ctrl-shadow);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    padding: 7px 18px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease, transform 0.28s ease;
}

/* Smoothly fade/lift the menu items in and out as the bar condenses. */
.brand-name, .doc-selector, .search-widget {
    transition: opacity 0.25s ease, transform 0.25s ease;
}

/* Condensed: keep the toggle icon, drop the collection name + menu items,
   and reveal the centered document title. */

body.nav-condensed .doc-selector,
body.nav-condensed .search-widget {
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
}
body.nav-condensed .nav-doc-title {

}

/* === Floating circular icon buttons (Apple-style) ===

.theme-toggle:hover,
.search-toggle:hover,

    box-shadow: var(--ctrl-shadow-hover);

}

.theme-toggle:active,
.search-toggle:active,
.toc-toggle:active { transform: translateY(0) scale(0.94); }

.theme-toggle .icon,
.search-toggle .icon,

/* The brand/sidebar toggle icon carries the brand accent color. */

.search-widget {

/* === Search results panel === */
.search-results {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;

}

.search-results.open { display: flex; justify-content: center; padding-top: 60px; }

    flex-direction: column;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);

.sr-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-input);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
}

.sr-header input {
    flex: 1;
    background: var(--bg-body);
    border: 1px solid var(--border-input);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 4px;
    outline: none;
    transition: background 0.25s, border-color 0.25s, color 0.25s;
}
.sr-header input:focus { border-color: var(--text-tab-active); }
.sr-header input::placeholder { color: var(--text-muted); }

.sr-count {
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
}

.sr-body {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0;
}

.sr-empty {
    color: var(--text-muted);
    text-align: center;
    padding: 32px 16px;
    font-size: 14px;
}

.sr-item {
    padding: 8px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--bg-sr-item-border);
    transition: background 0.1s;
}
.sr-item:hover, .sr-item.sr-active { background: var(--bg-sr-item-hover); }

.sr-item-tab {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tab-active);
    margin-bottom: 2px;
}

.sr-item-heading {
    font-size: 12px;
    color: var(--text-heading-h2);
    margin-bottom: 3px;
}

.sr-item-snippet {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.45;
    overflow: hidden;

}

.sr-item-snippet mark, .search-highlight {
    background: var(--bg-highlight);
    color: var(--text-mark-fg);
    border-radius: 2px;
    padding: 0 1px;
}

/* === Page layout: sidebar + content === */
.page-layout {
    display: flex;
    min-height: 100vh;
}

/* === Sidebar nav (Left) & TOC (Right) ===
   The sidebars span the full viewport height so their backgrounds meet the navbar
   seamlessly. */
.sidebar-nav {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-main);
    position: sticky;
    top: 0;
    height: 100vh;
    padding-top: var(--header-height);
    overflow-y: auto;
    overflow-x: hidden;
    flex-shrink: 0;
    transition: width 0.2s, min-width 0.2s, padding 0.2s, opacity 0.2s, background 0.25s, border-color 0.25s;
    z-index: 50;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar-thumb) var(--bg-sidebar);
}
.sidebar-nav::-webkit-scrollbar { width: 5px; }
.sidebar-nav::-webkit-scrollbar-track { background: var(--bg-sidebar); }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

.sidebar-nav.collapsed {
    width: 0;
    min-width: 0;
    padding: 0;
    opacity: 0;
    pointer-events: none;
}

.toc-sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-left: 1px solid var(--border-main);
    position: sticky;
    top: 0;
    height: 100vh;
    padding-top: var(--header-height);
    overflow-y: auto;
    overflow-x: hidden;
    flex-shrink: 0;
    transition: width 0.2s, min-width 0.2s, padding 0.2s, opacity 0.2s, background 0.25s, border-color 0.25s;
    z-index: 50;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar-thumb) var(--bg-sidebar);
}
.toc-sidebar::-webkit-scrollbar { width: 5px; }
.toc-sidebar::-webkit-scrollbar-track { background: var(--bg-sidebar); }
.toc-sidebar::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

.toc-sidebar.collapsed {
    width: 0;
    min-width: 0;
    padding: 0;
    opacity: 0;
    pointer-events: none;
}

.nav-title {

    gap: 7px;

    font-weight: 700;

    color: var(--text-muted);

}
.nav-title .icon { width: 13px; height: 13px; opacity: 0.85; }

.nav-dir-item {
    list-style: none;
    margin: 4px 0;
}
.nav-dir-header {
    display: flex;
    align-items: center;
    gap: 6px;

    cursor: pointer;
    border-radius: var(--radius-sm);
    user-select: none;
    transition: background 0.15s, color 0.15s;
}
.nav-dir-header:hover {
    color: var(--text-primary);
    background: var(--bg-code-block);
}

    width: 14px;
    height: 14px;
    opacity: 0.7;
    transition: transform 0.2s ease;
}

<h3 id="chapter-1---structured-bindings-approximately-pp-3-19">Chapter 1 - Structured Bindings (approximately pp. 3-19)</h3>
<p><strong>Subtopics</strong></p>
<ul>
<li>Syntax <code>auto [a, b, c] = expr;</code> and the <strong>anonymous object</strong> model behind it.</li>

<li>Move semantics: <code>auto</code> vs <code>auto&amp;&amp;</code> structured bindings.</li>
<li>Supported sources: <code>struct</code>/<code>class</code> (public members), inheritance limitations, raw arrays, <code>std::pair</code>, <code>std::tuple</code>, <code>std::array</code>.</li>
<li>Integrating with <strong><code>std::tie</code></strong> for assignment into existing objects.</li>
<li><strong>Tuple-like protocol</strong>: <code>std::tuple_size</code>, <code>std::tuple_element</code>, <code>get</code> overload set; <code>if constexpr</code>; <code>decltype(auto)</code> for read vs write access.</li>
<li>Afternotes: proposal history (Herb Sutter, Bjarne Stroustrup, Gabriel Dos Reis).</li>
</ul>
<p>See <code>01_structured_bindings.md</code>.</p>

<h2 id="why-structured-bindings-exist">Why structured bindings exist</h2>
<p>Before C++17, extracting multiple names from a composite value (struct, pair, tuple, array) required either verbose member access or <code>std::tie</code>. Structured bindings let you <strong>declare multiple names</strong> in one statement while keeping type deduction ergonomic and (often) const-correct.</p>
<pre><code>Before (C++14 style with a pair)              After (C++17)
───────────────────────────────────          ─────────────────────────────
auto result = m.insert({&quot;key&quot;, 42});         auto [pos, ok] = m.insert({&quot;key&quot;, 42});
auto pos = result.first;                     // pos and ok are direct names
bool ok = result.second;
</code></pre>
<hr />
<h2 id="11-structured-bindings-in-detail-book-p4">1.1 Structured Bindings in Detail (book p.4)</h2>
<h3 id="111-hidden-anonymous-entity-core-semantics">1.1.1 Hidden anonymous entity (core semantics)</h3>
<p>A structured binding <strong>always</strong> introduces a <strong>backing object</strong> (an unnamed variable in the compiler&rsquo;s model) initialized from the right-hand side. The bindings (<code>u</code>, <code>v</code>, etc.) are <strong>aliases</strong> to members or elements <strong>of that backing object</strong> (or pseudo-members via the tuple-like protocol), not independent variables that directly rebind to members of some pre-existing object.</p>
<p>Conceptual model for:</p>
<pre><code class="language-cpp">auto [u, v] = ms;
</code></pre>
<p>When <code>ms</code> is a struct with members <code>i</code> and <code>s</code>, the book explains that the construct behaves <strong>as if</strong> you first materialize a fresh object <code>e</code> initialized from <code>ms</code>, then introduce names that alias members accessed through that object.</p>
<p>ASCII picture:</p>
<pre><code>Right-hand side    Backing object &quot;e&quot;      Bindings (names you use)
────────────────   ────────────────────     ────────────────────────

    ms      ──►    ┌─────────────────┐
                   │  e.i   e.s      │
                   └────────┬────────┘
                            │
                    u  ─────┼── alias view into e.i   (not a reference variable)
                    v  ──────── alias view into e.s
</code></pre>
<p><strong>Critical fine point (book):</strong><br />
<code>u</code> and <code>v</code> are <strong>not</strong> <code>decltype(ms.i)</code>-style references unless you wrote reference qualifiers on the <strong>whole</strong> structured binding (see below). The bindings introduce names with types corresponding to the <strong>members&rsquo; types</strong> (possibly const-qualified through the anonymous entity&rsquo;s qualifiers). The standard wording is subtle; Josuttis emphasizes that imagining <code>aliasname u = e.i</code> captures the <strong>name lookup / meaning</strong>, but the <strong>types</strong> follow the structured binding rules (<code>decltype(u)</code> tracks the member&rsquo;s type, not a reference type, unless you forced references via <code>auto&amp;</code> / <code>auto&amp;&amp;</code> on the binding declaration).</p>
<h3 id="112-decltype-on-bindings">1.1.2 <code>decltype</code> on bindings</h3>
<p>For:</p>
<pre><code class="language-cpp">struct MS { int i; std::string s; };
MS ms{42, &quot;hi&quot;};
auto [u, v] = ms;
</code></pre>
<p><strong>Expectation from the book&rsquo;s discussion:</strong><br />
<code>decltype(u)</code> is <code>int</code>, not <code>int&amp;</code>. The binding name refers to the <code>int</code> member <strong>as accessed through</strong> the structured binding mechanism, but it does not behave as if you had written <code>int&amp; u = ms.i</code> in the general case.</p>
<h3 id="113-using-qualifiers-const-auto-auto-auto">1.1.3 Using qualifiers: <code>const auto&amp;</code>, <code>auto&amp;</code>, <code>auto&amp;&amp;</code></h3>
<p>Qualifiers apply to the <strong>anonymous entity</strong> initialization, not &ldquo;each binding&rdquo; in isolation.</p>
<p>Example patterns:</p>
<pre><code class="language-cpp">const auto&amp; [a, b] = expr; // backing object is const lvalue binding to whatever expr denotes
auto&amp;       [a, b] = expr; // backing entity binds as an lvalue reference to the referent
auto&amp;&amp;      [a, b] = expr; // backing entity is a forwarding reference initialized from expr
</code></pre>
<p>ASCII:</p>
<pre><code>Declaration              Effect on backing object          Typical effect on reads/writes
─────────────────────────────────────────────────────────────────────────────────────────
const auto&amp; [x,y] = o;   const lvalue ref to o           x,y read-only through binding
auto&amp; [x,y] = o;        lvalue ref to o                 x,y can modify members of o
auto&amp;&amp; [x,y] = std::move(o);  rvalue ref init           move-like access patterns possible
</code></pre>
<h3 id="114-alignas-interacts-with-the-backing-object">1.1.4 <code>alignas</code> interacts with the backing object</h3>
<p>From the book&rsquo;s note: <strong><code>alignas(16) auto [u, v] = ms;</code> aligns the anonymous entity</strong>, not &ldquo;later&rdquo; bindings like <code>v</code> individually. If you need member-level alignment, that belongs on the class definition.</p>
<h3 id="115-no-decay-for-arrays-contrast-with-plain-auto">1.1.5 No decay for arrays (contrast with plain <code>auto</code>)</h3>
<p>Plain <code>auto</code> <strong>decays</strong> arrays to pointers. Structured bindings <strong>do not</strong> decay array bindings the same way:</p>
<pre><code class="language-cpp">char a[6] = &quot;hello&quot;;
auto x = a;            // x is char*
auto [b0, b1, b2, b3, b4, b5] = a; // six char bindings (copied from elements)
</code></pre>
<p>In the array case, the backing object behaves like a <strong>copy</strong> of the array (see 1.2).</p>
<h3 id="116-move-semantics-auto-vs-auto">1.1.6 Move semantics: <code>auto</code> vs <code>auto&amp;&amp;</code></h3>
<pre><code class="language-cpp">struct MS { int i; std::string s; };
MS ms{42, &quot;hello&quot;};

auto [v, n] = std::move(ms);
// Commonly: n binds to a moved-from string inside the backing object copy/move;
// ms may be left moved-from depending on how bindings initialize.

auto&amp;&amp; [v2, n2] = std::move(ms2);
// Forwards/move semantics through the reference binding of the backing entity.
</code></pre>
<p><strong>Practical guidance:</strong> If you need to <strong>consume</strong> expensive members from an rvalue, use <code>auto&amp;&amp;</code> with <code>std::move</code> on the source, mirroring forwarding-reference style. If you want a <strong>copy</strong> into a new anonymous object, use <code>auto</code>.</p>
<p>Mini diagram for value categories:</p>
<pre><code>expr is lvalue                auto [a,b] = expr      copies / binds per rules
expr is prvalue               auto [a,b] = expr      materializes temporary T, binds to members/elements
std::move(lv) is xvalue       auto&amp;&amp; [a,b] = ...     treat like forwarding ref to xvalue
</code></pre>
<hr />
<h2 id="12-where-structured-bindings-can-be-used-book-p7">1.2 Where Structured Bindings Can Be Used (book p.7)</h2>
<h3 id="121-structures-and-classes-public-non-static-data-members">1.2.1 Structures and classes (public non-static data members)</h3>
<p>Structured bindings decompose <strong>non-static data members that are public</strong> and visible. Private members <strong>cannot</strong> be bound unless you use the <strong>tuple-like customization</strong> (1.3).</p>
<h3 id="122-inheritance-restriction-book-example">1.2.2 Inheritance restriction (book example)</h3>
<p>All bound members must come from <strong>one class definition&rsquo;s direct members</strong> (the book&rsquo;s point: you cannot mix a base subobject&rsquo;s members into the same binding list across an <strong>extension</strong> in the derived class in the broken way below).</p>
<p><strong>OK (derived adds no new members):</strong></p>
<pre><code class="language-cpp">struct B {
  int a = 1;
  int b = 2;
};

struct D1 : B { };

void demo_ok() {
  auto [x, y] = D1{};
  // x binds to B::a, y binds to B::b
}
</code></pre>
<p><strong>ERROR (derived adds member <code>c</code>; binding three names is not allowed in this pattern):</strong></p>
<pre><code class="language-cpp">struct D2 : B {
  int c = 3;
};

void demo_error() {
  // auto [i, j, k] = D2{}; // compile error (book illustration)
}
</code></pre>
<p>ASCII:</p>
<pre><code>┌─────────────────────────────────────────────────────────────┐
│ Binding \`[..]\` to class type T                              │
│ Requires: decomposition follows ONE class's member list     │
│ (Josuttis: not a flat mix across derived-added layout)      │
└─────────────────────────────────────────────────────────────┘
</code></pre>
<p>If you need a flat view across hierarchy, use accessors or tuple-like <code>get</code>.</p>
<h3 id="123-raw-arrays-copy-by-value">1.2.3 Raw arrays (copy by value)</h3>
<pre><code class="language-cpp">int arr[] = {47, 11};
auto [x, y] = arr; // copies the array into backing object (rare C++ array copy)
</code></pre>
<p>This is one of the few places C++ <strong>copies</strong> a raw array by value through initialization machinery.</p>
<h3 id="124-stdpair-stdtuple-stdarray-extensible-mechanism">1.2.4 <code>std::pair</code>, <code>std::tuple</code>, <code>std::array</code> (extensible mechanism)</h3>
<p><strong><code>std::array</code> by reference (modify original):</strong></p>
<pre><code class="language-cpp">#include &lt;array&gt;
std::array&lt;int, 4&gt; stdarr{1, 2, 3, 4};
auto&amp; [a, b, c, d] = stdarr;
b = 99; // mutates stdarr[1]
</code></pre>
<p><strong>Tuple from factory:</strong></p>
<pre><code class="language-cpp">#include &lt;tuple&gt;
std::tuple&lt;char, float, std::string&gt; getTuple();

void use() {
  auto [a, b, c] = getTuple();
}
</code></pre>
<p><strong><code>map::insert</code> result:</strong></p>
<pre><code class="language-cpp">#include &lt;map&gt;
#include &lt;string&gt;
void example_insert(std::map&lt;std::string, int&gt;&amp; coll) {
  auto [pos, ok] = coll.insert({&quot;new&quot;, 42});
  if (!ok) {
    // insertion failed: element exists
    const auto&amp; key = pos-&gt;first;
    (void)key;
  }
}
</code></pre>
<h3 id="125-iterating-maps-with-structured-bindings-realistic-idiom">1.2.5 Iterating maps with structured bindings (realistic idiom)</h3>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;map&gt;
#include &lt;string&gt;

void print_map(const std::map&lt;std::string, int&gt;&amp; m) {
  for (const auto&amp; [key, val] : m) {
    std::cout &lt;&lt; key &lt;&lt; &quot; -&gt; &quot; &lt;&lt; val &lt;&lt; '\\n';
  }
}
</code></pre>
<p><strong>Lifetime note:</strong> The range-for with <code>const auto&amp; [key, val]</code> binds to the pair type produced by the map iterator&rsquo;s <code>operator*</code>. Keep iterations <strong>local</strong>; do not store pointers to <code>key</code>/<code>val</code> beyond the iterator validity unless you extend lifetime explicitly.</p>
<h3 id="126-assigning-into-existing-objects-with-stdtie">1.2.6 Assigning into existing objects with <code>std::tie</code></h3>
<p>Bindings declare <strong>new names</strong>; they do not reassign symbols later. To <strong>write into existing variables</strong>, use <strong><code>std::tie</code></strong>:</p>
<pre><code class="language-cpp">#include &lt;tuple&gt;
void tie_example() {
  int a = 0, b = 0;
  std::tie(a, b) = std::make_pair(3, 4);
}
</code></pre>
<p>Use structured bindings for <strong>readability on fresh extraction</strong>; use <strong><code>tie</code> for out-parameters</strong> into pre-existing locals.</p>
<hr />
<h2 id="13-providing-a-tuple-like-api-for-structured-bindings-book-p11">1.3 Providing a Tuple-Like API for Structured Bindings (book p.11)</h2>
<p>This section mirrors Josuttis&rsquo;s <strong><code>Customer</code></strong> example: <strong>private data</strong>, public tuple-like interface.</p>
<h3 id="131-goals">1.3.1 Goals</h3>
<ul>
<li>Allow <code>auto [first, last, val] = c;</code> for <code>Customer c</code>.</li>
<li>Support <strong>read-only</strong> access for <code>const Customer&amp;</code>.</li>
<li>Support <strong>read/write</strong> through <code>Customer&amp;</code> and <code>Customer&amp;&amp;</code> as appropriate.</li>
</ul>
<h3 id="132-required-protocol-pieces">1.3.2 Required protocol pieces</h3>
<ol>
<li><code>std::tuple_size&lt;Customer&gt;::value == 3</code></li>
<li><code>std::tuple_element&lt;Idx, Customer&gt;</code> for <code>Idx in {0,1,2}</code></li>
<li><strong><code>get&lt;Idx&gt;(...)</code> overload sets</strong> for:
   - <code>const Customer&amp;</code>
   - <code>Customer&amp;</code>
   - <code>Customer&amp;&amp;</code></li>
<li>Implement <strong><code>get</code></strong> with <code>if constexpr</code> on index for clarity.</li>
</ol>
<h3 id="133-complete-example-educational-book-style">1.3.3 Complete example (educational, book-style)</h3>
<p>This compiles as C++17 and follows the book&rsquo;s pattern: <strong>private members</strong>, <strong><code>get</code> with <code>if constexpr</code></strong>, three overload sets for <strong><code>const&amp;</code> / <code>&amp;</code> / <code>&amp;&amp;</code></strong>, and <code>tuple_element</code> tied to what <strong><code>get</code></strong> returns.</p>
<pre><code class="language-cpp">#include &lt;tuple&gt;
#include &lt;string&gt;
#include &lt;utility&gt;
#include &lt;iostream&gt;
#include &lt;type_traits&gt;

class Customer {
 private:
  std::string first;
  std::string last;
  long val;

 public:
  Customer(std::string f, std::string l, long v)
  : first{std::move(f)}, last{std::move(l)}, val{v} {}

  // Ordinary accessors remain useful for non-binding callers:
  const std::string&amp; firstName() const { return first; }
  const std::string&amp; lastName()  const { return last; }
  long               value()     const { return val; }

  template&lt;std::size_t I&gt;
  friend constexpr decltype(auto) get(const Customer&amp; c) {
    if constexpr (I == 0) return (c.first);
    else if constexpr (I == 1) return (c.last);
    else return (c.val);
  }

  template&lt;std::size_t I&gt;
  friend constexpr decltype(auto) get(Customer&amp; c) {
    if constexpr (I == 0) return (c.first);
    else if constexpr (I == 1) return (c.last);
    else return (c.val);
  }

  template&lt;std::size_t I&gt;
  friend constexpr decltype(auto) get(Customer&amp;&amp; c) {
    if constexpr (I == 0) return std::move(c.first);
    else if constexpr (I == 1) return std::move(c.last);
    else return std::move(c.val);
  }
};

template&lt;&gt;
struct std::tuple_size&lt;Customer&gt; : std::integral_constant&lt;std::size_t, 3&gt; {};

template&lt;std::size_t I&gt;
struct std::tuple_element&lt;I, Customer&gt; {
  // Strip references so tuple_element names the &quot;element object type&quot;;
  // the bindings still bind according to the get overload and the structured-binding rules.
  using type = std::remove_reference_t&lt;decltype(get&lt;I&gt;(std::declval&lt;Customer&amp;&gt;()))&gt;;
};

int main() {
  Customer c{&quot;Tim&quot;, &quot;SuperDict&quot;, 42};

  auto [f, l, v] = c;
  std::cout &lt;&lt; &quot;copy-bind: &quot; &lt;&lt; f &lt;&lt; ' ' &lt;&lt; l &lt;&lt; ' ' &lt;&lt; v &lt;&lt; &quot;\\n&quot;;

  auto&amp; [f2, l2, v2] = c;
  f2 = &quot;Tom&quot;;
  v2 = 77;
  std::cout &lt;&lt; &quot;mutated: &quot; &lt;&lt; c.firstName() &lt;&lt; ' ' &lt;&lt; c.lastName() &lt;&lt; ' ' &lt;&lt; c.value() &lt;&lt; &quot;\\n&quot;;
}
</code></pre>
<p><strong>Why <code>decltype(auto)</code> and <code>return (member)</code>:</strong> Returning <code>(c.first)</code> yields an <strong>lvalue reference</strong> type in <code>decltype(auto)</code>; parenthesized <code>return (expr)</code> preserves a deliberate <strong>lvalue</strong> category in some idioms. <strong><code>std::move(c.first)</code></strong> in the <code>Customer&amp;&amp;</code> overload models <strong>move-return</strong> for rvalues (book: three overload sets for write access patterns).</p>
<h3 id="134-tuple-like-api-structure-diagram">1.3.4 Tuple-like API structure (diagram)</h3>
<pre><code>Customer
────────
 private:
   first, last, val
 public:
   normal methods
             │
             ▼
   Customization point in namespace std (specializations)
   ┌─────────────────────────────────────────────────────┐
   │ tuple_size&lt;Customer&gt;                                │
   │ tuple_element&lt;I, Customer&gt;                          │
   └───────────────┬─────────────────────────────────────┘
                   │
                   ▼
   Friend get&lt;I&gt;(Customer&amp;) / const&amp; / &amp;&amp;  (ADL finds get in Customer's scope)
   ┌─────────────────────────────────────────────────────┐
   │ if constexpr (I == 0) -&gt; first                      │
   │ if constexpr (I == 1) -&gt; last                       │
   │ if constexpr (I == 2) -&gt; val                        │
   └─────────────────────────────────────────────────────┘
                   │
                   ▼
   Compiler lowers: auto [a,b,g] = customer;
                    into get&lt;0&gt;, get&lt;1&gt;, get&lt;2&gt; calls
</code></pre>
<hr />
<h2 id="14-afternotes-book-p19">1.4 Afternotes (book p.19)</h2>
<p>Structured bindings originated from proposals associated with <strong>Herb Sutter</strong>, <strong>Bjarne Stroustrup</strong>, and <strong>Gabriel Dos Reis</strong>. As always, read the book&rsquo;s closing notes for historical context and committee rationale; standards evolve, but the C++17 behavior is stable.</p>

<p><strong>Book:</strong> <em>C++17 - The Complete Guide</em>, first edition, Nicolai M. Josuttis (published 2019-12-20, 452 pages)<br />
<strong>Chapter:</strong> 2 - <code>if</code> and <code>switch</code> with initialization<br />

<p>This note expands the book&rsquo;s examples with <strong>motivation</strong>, <strong>lifetime diagrams</strong>, and <strong>pitfalls</strong> (especially unnamed temporaries with RAII types like <code>std::lock_guard</code>).</p>

<h2 id="21-if-with-initialization-book-p21">2.1 <code>if</code> with initialization (book p.21)</h2>
<h3 id="211-new-syntax">2.1.1 New syntax</h3>
<p>C++17 allows an <strong>initializer statement</strong> before the condition:</p>
<pre><code>if ( initializer ; condition ) { ... } else { ... }
      └────┬────┘   └────┬────┘
           │             └─ bool (or contextually convertible)
           └─ either an expression or a declaration
</code></pre>
<p><strong>ASCII control flow:</strong></p>
<pre><code>    ┌──────────────┐
    │ Run init     │
    └──────┬───────┘
           │
           ▼
    ┌──────────────┐    no     ┌──────────────┐
    │ condition?   │────────►  │ else branch  │
    └──────┬───────┘           └──────┬───────┘
           │ yes                      │
           ▼                          │
    ┌──────────────┐                  │
    │ then branch  │                  │
    └──────┬───────┘                  │
           │                          │
           └──────────┬───────────────┘
                      ▼
               ┌──────────────┐
               │ Init scope   │
               │ ends here    │
               └──────────────┘
</code></pre>
<h3 id="212-lifetime-and-visibility">2.1.2 Lifetime and visibility</h3>
<p>Any <strong>name introduced in the initializer</strong> is in scope in:</p>
<ul>
<li>the <strong>condition</strong> expression, and</li>
<li><strong>both</strong> the <strong>then</strong> and <strong>else</strong> branches,</li>
</ul>
<p>and <strong>not</strong> beyond the full <code>if</code> statement.</p>
<p>This mirrors the existing scoping rules of a <code>for</code> loop&rsquo;s init statement, but for <code>if</code>/<code>else</code>.</p>
<p><strong>Book-style logging example:</strong></p>
<pre><code class="language-cpp">#include &lt;fstream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;

std::ofstream getLogStrm();

void log_collection(const std::vector&lt;std::string&gt;&amp; coll) {
  if (std::ofstream strm = getLogStrm(); coll.empty()) {
    strm &lt;&lt; &quot;&lt;no data&gt;\\n&quot;;
  } else {
    for (const auto&amp; elem : coll) {
      strm &lt;&lt; elem &lt;&lt; '\\n';
    }
  }
  // strm is NOT in scope here
}
</code></pre>
<p><strong>Why this matters:</strong> You can keep <strong>resource setup</strong> colocated with the decision, without polluting outer scope and without an extra nesting level.</p>
<h3 id="213-mutex-locking-idiom">2.1.3 Mutex locking idiom</h3>
<pre><code class="language-cpp">#include &lt;mutex&gt;
#include &lt;deque&gt;
#include &lt;iostream&gt;

std::mutex collMutex;
std::deque&lt;int&gt; coll;

void print_front_if_any() {
  if (std::lock_guard&lt;std::mutex&gt; lg{collMutex}; !coll.empty()) {
    std::cout &lt;&lt; coll.front() &lt;&lt; '\\n';
  }
}
</code></pre>
<h3 id="214-critical-warning-unnamed-temporaries-with-raii">2.1.4 CRITICAL WARNING: unnamed temporaries with RAII</h3>
<p>This is <strong>wrong</strong>:</p>
<pre><code class="language-cpp">// [ERROR] logical bug (do not write this):
if (std::lock_guard&lt;std::mutex&gt;{collMutex}; !coll.empty()) {
  // ...
}
</code></pre>
<p><strong>Reason:</strong> <code>std::lock_guard&lt;std::mutex&gt;{collMutex}</code> creates a <strong>temporary</strong> lock object. The temporary is <strong>destroyed at the end of the full initializer expression</strong>, <strong>before</strong> the condition and branches run. The mutex is <strong>not</strong> held during the branch body.</p>
<p>ASCII timeline:</p>
<pre><code>time ──────────────────────────────────────────────────────────►

init:  tmp lock constructed ──► tmp lock destroyed   condition   branches
                               ↑
                               mutex unlocked HERE (too early)
</code></pre>
<p>Contrast with a <strong>named</strong> guard:</p>
<pre><code>named lg constructed ──────────► condition ──► branches ──► lg destroyed
                                                          ↑
                                                          mutex unlocked HERE
</code></pre>
<p><strong>Rule of thumb:</strong> If the RAII object must survive until the end of the <code>if</code> statement branches, <strong>give it a name</strong> in the initializer.</p>
<h3 id="215-multiple-declarations-in-the-initializer">2.1.5 Multiple declarations in the initializer</h3>
<p>You may declare <strong>more than one variable</strong> when they share a single declaration form that allows it (as in the book):</p>
<pre><code class="language-cpp">int qqq1();
int qqq2();

void demo() {
  if (int x = qqq1(), y = qqq2(); x != y) {
    // use x and y
  }
}
</code></pre>
<p>The specifics mirror ordinary declaration rules: types must compose legally.</p>
<h3 id="216-combining-with-structured-bindings-book-pattern">2.1.6 Combining with structured bindings (book pattern)</h3>
<pre><code class="language-cpp">#include &lt;map&gt;
#include &lt;string&gt;
#include &lt;utility&gt;

void insert_or_inspect(std::map&lt;std::string, int&gt;&amp; coll) {
  if (auto [pos, ok] = coll.insert({&quot;new&quot;, 42}); !ok) {
    const auto&amp; [key, val] = *pos; // re-decompose the map element
    (void)key;
    (void)val;
    // Handle duplicate-key case with readable names
  }
}
</code></pre>
<p><strong>Why it is ergonomic:</strong> <code>insert</code> returns <code>std::pair&lt;iterator, bool&gt;</code>. The binding gives <strong>self-documenting names</strong> immediately, and the condition checks <strong><code>ok</code></strong> without a separate <code>.second</code> line.</p>
<h3 id="217-before-and-after-comparison-c14-vs-c17">2.1.7 Before and after comparison (C++14 vs C++17)</h3>
<p><strong>C++14</strong> (extra scope / repeated names):</p>
<pre><code class="language-cpp">{
  auto result = coll.insert({&quot;new&quot;, 42});
  if (!result.second) {
    const auto&amp; elem = *result.first;
    (void)elem;
  }
}
</code></pre>
<p><strong>C++17</strong>:</p>
<pre><code class="language-cpp">if (auto ins = coll.insert({&quot;new&quot;, 42}); !ins.second) {
  const auto&amp; elem = *ins.first;
  (void)elem;
}
// or with structured bindings:
// if (auto [pos, ok] = coll.insert(...); !ok) { ... }
</code></pre>
<p><strong>Gains:</strong></p>
<ul>
<li>Names live only where needed.</li>
<li>You can initialize <strong>streams</strong>, <strong>locks</strong>, <strong>status objects</strong>, and <strong>algorithm results</strong> right next to the boolean test.</li>
</ul>
<hr />
<h2 id="22-switch-with-initialization-book-p23">2.2 <code>switch</code> with initialization (book p.23)</h2>
<h3 id="221-syntax">2.2.1 Syntax</h3>
<pre><code>switch ( initializer ; condition ) { ... }
</code></pre>
<p>The <strong>name introduced by the initializer</strong> is visible in the <strong>condition</strong> and <strong>throughout all cases</strong> of the <code>switch</code>, including <strong>scopes guarded by <code>case</code> labels</strong>, per the usual <code>switch</code> scoping rules.</p>
<h3 id="222-filesystem-example-pattern-book-style">2.2.2 Filesystem example pattern (book style)</h3>
<pre><code class="language-cpp">#include &lt;filesystem&gt;
#include &lt;iostream&gt;

namespace fs = std::filesystem;

void describe(const char* name) {
  switch (fs::path p{name}; status(p).type()) {
    case fs::file_type::not_found:
      std::cout &lt;&lt; p &lt;&lt; &quot; not found\\n&quot;; // p visible
      break;
    case fs::file_type::regular:
      std::cout &lt;&lt; p &lt;&lt; &quot; is a file\\n&quot;;
      break;
    default:
      std::cout &lt;&lt; p &lt;&lt; &quot; is something else\\n&quot;;
      break;
  }
}
</code></pre>
<p><strong>Key idea:</strong> <strong><code>p</code></strong> is created once, then reused when printing diagnostics in multiple cases without re-parsing or re-storing the string.</p>
<h3 id="223-usual-switch-caveats-still-apply">2.2.3 Usual <code>switch</code> caveats still apply</h3>
<ul>
<li><strong><code>break</code> discipline</strong>: use <code>[[fallthrough]]</code> only with intent (C++17 attribute; see book Part I attributes chapter).</li>
<li><strong>Variable declarations in <code>case</code></strong>: still wrap in blocks <code>{}</code> if initialization is needed to avoid leaking names across cases.</li>
</ul>
<hr />
<h2 id="23-afternotes-book">2.3 Afternotes (book)</h2>
<p>The init-statement forms for <code>if</code> and <code>switch</code> are associated in the book&rsquo;s discussion with proposal work by <strong>Thomas Koppe</strong>.</p>
<hr />
<h2 id="practical-patterns-cheat-sheet">Practical patterns cheat sheet</h2>
<table>

<tr>
<th>Goal</th>
<th>Pattern</th>
</tr>
</thead>

<tr>
<td>Stream scoped to branches</td>
<td><code>if (std::ofstream os = open(); cond) { ... } else { ... }</code></td>
</tr>
<tr>
<td>Lock only around inspection + work</td>
<td><code>if (std::lock_guard lk{m}; pred()) { ... }</code></td>
</tr>
<tr>
<td>Parse once, branch on kind</td>
<td><code>switch (auto tok = lexer.next(); tok.kind) { ... }</code></td>
</tr>
<tr>
<td>Container insert + failure</td>
<td><code>if (auto [it, ins] = m.emplace(k, v); !ins) { ... }</code></td>
</tr>
</tbody>
</table>

  { name: `4. Inline Variables`, path: `03_inline_variables.md`, dir: ``, body: `<h1 id="chapter-3-inline-variables">Chapter 3: Inline Variables</h1>
<p><strong>Book:</strong> <em>C++17 - The Complete Guide</em>, first edition, Nicolai M. Josuttis (published 2019-12-20, 452 pages)<br />
<strong>Chapter:</strong> 3 - Inline variables<br />
<strong>Book page span:</strong> approximately <strong>pp. 25-31</strong> (sections <strong>3.1</strong>-<strong>3.5</strong>)</p>
<p>This chapter explains <strong><code>inline</code> global / static data</strong>, why header-only definitions become <strong>ODR-safe</strong>, and how C++17 changes <strong><code>constexpr static</code> members</strong> from &ldquo;often only declarations&rdquo; into <strong>real definitions</strong>.</p>
<hr />
<h2 id="31-motivation-for-inline-variables-book-p25">3.1 Motivation for inline variables (book p.25)</h2>
<h3 id="311-the-problem-non-constexpr-static-members">3.1.1 The problem: non-<code>constexpr</code> static members</h3>
<p>Consider:</p>
<pre><code class="language-cpp">// Thing.hpp
struct Thing {
  static std::string message; // declaration only
};
</code></pre>
<p>You <strong>still</strong> need <strong>exactly one definition</strong> in exactly one translation unit (TU):</p>
<pre><code class="language-cpp">// Thing.cpp
#include &quot;Thing.hpp&quot;
std::string Thing::message{&quot;hello&quot;};
</code></pre>
<p>If you attempt to <strong>define</strong> a non-constexpr <code>static</code> data member <strong>inside</strong> the class in pre-C++17, you hit language restrictions. If you <strong>define</strong> a variable with external linkage in a header included by multiple <code>.cpp</code> files <strong>without</strong> <code>inline</code>, you typically get <strong>linker multiple definition errors</strong>.</p>
<h3 id="312-header-only-libraries-and-repeated-definitions">3.1.2 Header-only libraries and repeated definitions</h3>
<p>Include guards prevent <strong>multiple inclusion in one TU</strong>, but they do <strong>not</strong> prevent <strong>different TUs</strong> each compiling a <strong>definition</strong> that came from the same header.</p>
<pre><code>TU A.cpp includes header.hpp  ──► compiles definition for Logger::level
TU B.cpp includes header.hpp  ──► compiles definition for Logger::level
                                        │
                                        ▼
                                  link step: [ERROR] duplicate symbol
</code></pre>
<h3 id="313-classic-workarounds-pre-c17">3.1.3 Classic workarounds (pre-C++17)</h3>
<p>The book surveys patterns such as:</p>
<ul>
<li><strong><code>static const</code> integral constants</strong> initialized in-class (limited type set).</li>
<li><strong><code>constexpr</code> values</strong> where applicable.</li>
<li><strong>Inline function</strong> returning <code>static</code> local:</li>
</ul>
<pre><code class="language-cpp">inline std::string&amp; msg() {
  static std::string m{&quot;OK&quot;};
  return m;
}
</code></pre>
<ul>
<li><strong><code>static</code> member function</strong> returning reference to function-local static.</li>
<li><strong>Variable templates</strong> (C++14) for some use cases.</li>
<li>Small <strong>class template</strong> tricks encapsulating storage.</li>
</ul>
<p>Each workaround trades <strong>syntax noise</strong>, <strong>ABI</strong>, or <strong>constexpr-ness</strong> for <strong>ODR correctness</strong>.</p>
<hr />
<h2 id="32-using-inline-variables-book-p27">3.2 Using inline variables (book p.27)</h2>
<h3 id="321-inside-classes-inline-static-data-members">3.2.1 Inside classes: <code>inline static</code> data members</h3>
<p>C++17 allows:</p>
<pre><code class="language-cpp">#include &lt;string&gt;

struct Config {
  inline static std::string msg{&quot;OK&quot;};
};
</code></pre>
<p>Every TU that <strong>odr-uses</strong> the member agrees the <strong>definition</strong> is the one from the class definition, similar to <strong>inline functions</strong>.</p>
<h3 id="322-namespace-scope-inline-globals">3.2.2 Namespace-scope inline globals</h3>
<pre><code class="language-cpp">#include &lt;string&gt;

inline std::string buildId{&quot;dev-1234&quot;};
</code></pre>
<p>You can place this in a header shared by multiple TUs <strong>without</strong> a <code>.cpp</code> definition.</p>
<p><strong>Book semantics reminder:</strong> Like inline functions, the definition must be <strong>identical</strong> in every TU that sees it (same tokens / token-wise equivalence rules).</p>
<h3 id="323-atomics">3.2.3 Atomics</h3>
<pre><code class="language-cpp">#include &lt;atomic&gt;

inline std::atomic&lt;bool&gt; ready{false};
</code></pre>
<p>This models a <strong>process-wide</strong> flag with header-friendly definition, subject to your platform&rsquo;s atomic width and alignment requirements.</p>
<h3 id="324-completeness-and-initialization-order">3.2.4 Completeness and initialization order</h3>
<p>The book warns: the <strong>type must be complete</strong> where the inline variable is <strong>defined</strong> (initialized). Do not rely on intricate <strong>static initialization order</strong> across translation units unless you follow safe idioms (<code>constexpr</code>, function-local statics, etc.).</p>
<hr />
<h2 id="33-constexpr-now-implies-inline-for-static-members-book-p28">3.3 <code>constexpr</code> now implies <code>inline</code> for static members (book p.28)</h2>
<h3 id="331-what-changed">3.3.1 What changed</h3>
<p>In C++17, a <strong><code>static constexpr</code> data member</strong> initialized inside the class is a <strong>definition</strong>, not merely a declaration that still needs an out-of-class duplicate for ODR reasons in many cases.</p>
<p><strong>Before C++17</strong> (common pitfall):</p>
<pre><code class="language-cpp">struct S {
  static constexpr int n = 5; // declaration-only in many contexts
};

void take_const_ref(const int&amp;);

void odr_use_before_cpp17() ; // Might require out-of-class definition:
// constexpr int S::n;
</code></pre>
<p><strong>C++17:</strong> ODR-use scenarios such as <strong>binding to <code>const int&amp;</code></strong> or taking <strong><code>&amp;S::n</code></strong> are resolved <strong>without</strong> a redundant out-of-class definition in typical toolchains.</p>
<p><strong>ASCII:</strong></p>
<pre><code>C++14 and earlier                    C++17 onward
────────────────                    ────────────

static constexpr int n = 5;         static constexpr int n = 5;
(often) needs TU definition         is a definition (implies inline)
for some ODR-uses                   for static data members
</code></pre>
<h3 id="332-deprecation-of-redundant-redeclarations">3.3.2 Deprecation of redundant redeclarations</h3>
<p>The book notes that <strong>out-of-class <code>constexpr</code> definitions</strong> may become <strong>redundant</strong>; modern codebases often delete them. Always consult your toolchains when upgrading standards.</p>
<hr />
<h2 id="34-inline-variables-and-thread_local-book-p29">3.4 Inline variables and <code>thread_local</code> (book p.29)</h2>
<h3 id="341-declaring-per-thread-storage">3.4.1 Declaring per-thread storage</h3>
<pre><code class="language-cpp">#include &lt;string&gt;

struct Worker {
  inline static thread_local std::string name;
};
</code></pre>
<p><strong>Meaning:</strong></p>
<ul>
<li><strong><code>thread_local</code></strong>: each thread gets <strong>distinct storage</strong>.</li>
<li><strong><code>static</code></strong>: storage is associated with the <strong>program / class</strong>, not with each instance (<code>Worker</code> has no per-object overhead for <code>name</code>).</li>
<li><strong><code>inline</code></strong>: safe <strong>single definition</strong> when the class definition appears in multiple TUs.</li>
</ul>
<h3 id="342-full-example-global-thread-local-and-instance-names">3.4.2 Full example: global, thread-local, and instance names</h3>
<p>This program illustrates <strong>three storage durations</strong> side by side. <strong>Typical output</strong> is shown after the code; exact thread IDs and pointer values vary by platform.</p>
<pre><code class="language-cpp">#include &lt;atomic&gt;
#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;thread&gt;

std::atomic&lt;int&gt; gCounter{0};

struct MyData {
  inline static std::string gName{&quot;global-inline-static&quot;};
  inline static thread_local std::string tName;
  std::string lName;

  explicit MyData(std::string local) : lName{std::move(local)} {}

  void bump_and_print(const char* who) {
    ++gCounter;
    if (tName.empty()) {
      tName = std::string{&quot;thread-&quot;} + who + &quot;-&quot; + std::to_string(gCounter.load());
    }
    std::cout &lt;&lt; who
              &lt;&lt; &quot; | gName=&quot; &lt;&lt; gName
              &lt;&lt; &quot; | tName=&quot; &lt;&lt; tName
              &lt;&lt; &quot; | lName=&quot; &lt;&lt; lName
              &lt;&lt; '\\n';
  }
};

int main() {
  MyData a{&quot;obj-a&quot;};
  MyData b{&quot;obj-b&quot;};

  a.bump_and_print(&quot;main&quot;);
  b.bump_and_print(&quot;main&quot;);

  std::thread t{[&amp;] {
    MyData c{&quot;obj-c&quot;};
    c.bump_and_print(&quot;side&quot;);
    MyData d{&quot;obj-d&quot;};
    d.bump_and_print(&quot;side&quot;);
  }};

  t.join();

  a.bump_and_print(&quot;main-after&quot;);
}
</code></pre>
<p><strong>Typical output (exact counters can vary by thread scheduling; structure is stable):</strong></p>
<pre><code>main | gName=global-inline-static | tName=thread-main-1 | lName=obj-a
main | gName=global-inline-static | tName=thread-main-1 | lName=obj-b
side | gName=global-inline-static | tName=thread-side-3 | lName=obj-c
side | gName=global-inline-static | tName=thread-side-3 | lName=obj-d
main-after | gName=global-inline-static | tName=thread-main-1 | lName=obj-a
</code></pre>
<p><strong>Reading the output:</strong> In the <strong>main thread</strong>, <code>tName</code> is created on the <strong>first</strong> <code>bump_and_print</code> and then <strong>reused</strong> for other <code>MyData</code> objects in that thread. In the <strong>side thread</strong>, the same pattern repeats with a <strong>different</strong> <code>tName</code> string.</p>
<table>
<thead>
<tr>
<th>Field</th>
<th>Storage</th>
<th>Sharing rule</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>gName</code></td>
<td><code>inline static</code></td>
<td><strong>ALL</strong> threads and objects see <strong>one</strong> string object for the program</td>
</tr>
<tr>
<td><code>tName</code></td>
<td><code>inline static thread_local</code></td>
<td><strong>One</strong> string <strong>per thread</strong>, shared by <strong>all</strong> <code>MyData</code> code running on that thread</td>
</tr>
<tr>
<td><code>lName</code></td>
<td>non-static member</td>
<td><strong>Each <code>MyData</code> instance</strong> has its own string</td>
</tr>
</tbody>
</table>
<h3 id="343-thread-local-memory-layout-conceptual">3.4.3 Thread-local memory layout (conceptual)</h3>
<pre><code>Process address space
┌────────────────────────────────────────────┐
│  .data / .bss: inline static gName         │  ◄── single object
├────────────────────────────────────────────┤
│  Thread 1 TLS block                        │
│    inline static thread_local tName        │  ◄── instance #1
├────────────────────────────────────────────┤
│  Thread 2 TLS block                        │
│    inline static thread_local tName        │  ◄── instance #2
└────────────────────────────────────────────┘

Stack frames (conceptual)
┌──────────────────┐
│ main() frame     │  MyData a.lName, MyData b.lName  (distinct)
└──────────────────┘
┌──────────────────┐
│ thread entry     │  MyData c.lName, MyData d.lName  (distinct)
└──────────────────┘
</code></pre>
<hr />
<h2 id="35-afternotes-book">3.5 Afternotes (book)</h2>
<p>Inline variables were <strong>motivated</strong> by <strong>David Krauss</strong> and <strong>proposed</strong> by <strong>Hal Finkel</strong> and <strong>Richard Smith</strong>, as the book notes.</p>
<hr />
<h2 id="odr-diagram-inline-fixes-duplicate-definitions">ODR diagram: inline fixes duplicate definitions</h2>

<h2 id="pitfalls-checklist">Pitfalls checklist</h2>

  { name: `5. Aggregate Extensions`, path: `04_aggregate_extensions.md`, dir: ``, body: `<h1 id="chapter-4-aggregate-extensions">Chapter 4: Aggregate Extensions</h1>
<p><strong>Book reference:</strong> <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis (pages 33-37)</p>
<p>This chapter explains how C++17 extends aggregate initialization so that types derived from base classes can often be initialized with brace notation like plain C-style structs, without writing explicit constructors. It also tightens the formal definition of an <em>aggregate</em> and introduces a small <strong>backward incompatibility</strong> you should know about.</p>
<hr />
<h2 id="41-motivation-for-extended-aggregate-initialization-p-34">4.1 Motivation for Extended Aggregate Initialization (p. 34)</h2>
<h3 id="before-c17">Before C++17</h3>
<p>If a <code>struct</code> or <code>class</code> <strong>derived from another type</strong>, it was <strong>not</strong> an aggregate in C++14. That meant you could <strong>not</strong> use aggregate initialization <code>{ ... }</code> for all members and bases in the familiar &ldquo;C struct&rdquo; style. You typically had to add a <strong>user-defined constructor</strong> to initialize base subobjects and members.</p>
<h3 id="after-c17">After C++17</h3>
<p>Aggregates can include <strong>public, non-virtual</strong> base classes in many common cases. You can initialize them with nested braces (one initializer list per base, then members in declaration order) or, in some situations, with a <strong>flattened</strong> list when unambiguous.</p>
<p><strong>Example pattern (conceptual):</strong> Suppose a base <code>Data</code> holds a <code>std::string</code> and a <code>double</code>, and <code>MoreData</code> adds a <code>bool</code>:</p>
<pre><code class="language-cpp">struct Data {
    std::string name;
    double      value;
};

struct MoreData : Data {
    bool good;
};

// C++17: aggregate init -- nested braces for base + member
MoreData y{{&quot;test1&quot;, 6.778}, false};

// C++17: sometimes a flattened list works when the rules allow it
MoreData y2{&quot;test1&quot;, 6.778, false};
</code></pre>
<p>Exact overload and initialization rules still follow the standard; the important takeaway from the book is that <strong>derivation no longer automatically blocks</strong> aggregate initialization the way it used to.</p>
<h3 id="default-member-initializers-vs-uninitialized-members">Default member initializers vs uninitialized members</h3>
<p>If some members have <strong>default member initializers</strong> and you use different forms of initialization, you can get surprising results:</p>
<pre><code class="language-cpp">struct MoreData : Data {
    bool good = true;   // default member initializer
};

MoreData u;   // [OOPS] default-initialized aggregate: can leave **uninitialized**
              // subobjects (e.g. non-class members in the base) in a bad state
              // while \`good\` still gets its default member initializer

MoreData z{}; // [OK] value-initialized aggregate: value-init for base + all
              // members that are not explicitly set; predictable state
</code></pre>
<p><strong>Reading note:</strong> The book stresses that <strong>careless use of <code>T obj;</code> vs <code>T obj{};</code></strong> matters for aggregates with mixed default member initializers and uninitialized bases. Prefer <strong>value initialization with <code>{}</code></strong> when you want a fully defined state.</p>
<hr />
<h2 id="42-using-extended-aggregate-initialization-p-34">4.2 Using Extended Aggregate Initialization (p. 34)</h2>
<h3 id="c-style-structs-extended-by-classes">C-style structs extended by classes</h3>
<p>You can inherit data layout from a POD-like base and add member functions without giving up aggregate initialization:</p>
<pre><code class="language-cpp">struct Data {
    std::string msg;
    double      val;
};

struct CppData : Data {
    bool critical;

    void print() const {
        // ...
    }
};
</code></pre>
<p><code>CppData</code> remains an <strong>aggregate</strong> if it satisfies the aggregate definition (see section 4.3).</p>
<h3 id="skipping-initial-values">Skipping initial values</h3>
<p>Not every element of the brace list must be specified; omitted elements are <strong>value-initialized</strong> (zeros, default construction, <code>false</code>, etc., as appropriate):</p>
<pre><code class="language-cpp">CppData x1{};           // everything value-initialized
CppData x2{{&quot;msg&quot;}};    // base partly set; rest value-initialized
CppData x3{{}, true};   // empty base init + explicit critical
CppData x4;             // default initialization -- often problematic vs x1
</code></pre>
<p>Compare <code>x1{}</code> (explicit value init) with <code>x4</code> (default init): for aggregates, <strong>default-initialized</strong> variables can leave non-class subobjects <strong>indeterminate</strong> in some cases. The book uses this to reinforce best practice.</p>
<h3 id="deriving-from-non-aggregates">Deriving from non-aggregates</h3>
<p>You can derive from types that are <strong>not</strong> aggregates (e.g. <code>std::string</code>) as long as the overall class still meets aggregate rules:</p>
<pre><code class="language-cpp">struct MyString : std::string {
    void print() const { /* ... */ }
};

MyString s{{'a','b','c'}};  // initialize string base from char sequence via list
</code></pre>
<p>The <strong>base&rsquo;s</strong> constructors are not used in aggregate init; the <strong>base subobject</strong> is initialized by the rules for aggregate initialization of that base.</p>
<h3 id="multiple-base-classes">Multiple base classes</h3>
<p>With <strong>multiple public non-virtual bases</strong>, each base is initialized in declaration order, then direct members:</p>
<pre><code class="language-cpp">#include &lt;string&gt;
#include &lt;complex&gt;

template&lt;typename T&gt;
struct D : std::string, std::complex&lt;T&gt; {
    std::string data;
};

D&lt;float&gt; s{{&quot;hello&quot;}, {4.5f, 6.7f}, &quot;world&quot;};
//         ^ string    ^ complex       ^ member
</code></pre>
<h3 id="lambda-overload-pattern">Lambda overload pattern</h3>
<p>A known idiom builds an overload set from lambdas by <strong>inheriting from multiple closure types</strong> and using using declarations for <code>operator()</code>. C++17 aggregate initialization can cooperate with this pattern when the resulting type is an aggregate (see book and follow-up examples). The chapter connects extended aggregates to <strong>concise initialization</strong> of such types.</p>

<h2 id="44-backward-incompatibilities-p-36">4.4 Backward Incompatibilities (p. 36)</h2>
<h3 id="friend-class-with-private-base-constructor">Friend class with private base constructor</h3>
<p><strong>Before C++17:</strong> A derived class with a <strong>friend</strong> might still get an <strong>implicitly declared default constructor</strong> that could initialize a base with a <strong>private constructor</strong> in some edge cases (the book gives a concrete example).</p>
<p><strong>Since C++17:</strong> The same type can become an <strong>aggregate</strong>. Aggregates <strong>do not</strong> use a &ldquo;compiler-generated constructor body&rdquo; in the same way for <code>{}</code> initialization; a <strong>private constructor on the base</strong> can make <strong>valid-looking <code>Derived d{};</code> fail</strong> where it previously appeared to work.</p>
<p><strong>Symptom:</strong> <code>Derived d1{};</code> might be <strong>[ERROR]</strong> where it was <strong>[OK]</strong> in C++14.</p>
<p><strong>Reason (conceptual):</strong> The type is now classified as an <strong>aggregate</strong>, so initialization follows aggregate rules; there is <strong>no implicit default constructor</strong> that quietly does the old thing.</p>
<p><strong>Practical fix:</strong> Add an explicit constructor, or adjust base access, or avoid aggregate classification as appropriate.</p>
<hr />
<h2 id="45-afternotes-p-37">4.5 Afternotes (p. 37)</h2>
<p>Extended aggregate initialization was <strong>proposed by Oleg Smolsky</strong>. As with many C++17 features, the motivation was to <strong>remove unnecessary friction</strong> when modeling simple layered data types (bases + extra fields) without forcing boilerplate constructors.</p>

  { name: `6. Mandatory Copy Elision`, path: `05_mandatory_copy_elision.md`, dir: ``, body: `<h1 id="chapter-5-mandatory-copy-elision-passing-unmaterialized-objects">Chapter 5: Mandatory Copy Elision (Passing Unmaterialized Objects)</h1>
<p><strong>Book reference:</strong> <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis (pages 39-46)</p>
<p>Copy elision (formerly called the &ldquo;named return value optimization&rdquo; when named, and RVO-related behavior for temporaries) has a long history. <strong>C++17</strong> makes <strong>copy elision mandatory</strong> in specific situations involving <strong>prvalues</strong>, which changes what programs <strong>must</strong> compile even when copy and move constructors are <strong>deleted</strong>.</p>
<hr />
<h2 id="51-motivation-for-mandatory-copy-elision-for-temporaries-p-39">5.1 Motivation for Mandatory Copy Elision for Temporaries (p. 39)</h2>
<h3 id="before-c17-elision-was-optional">Before C++17: elision was optional</h3>
<p>Compilers <em>could</em> elide copies/moves, but the program was still required to be <strong>valid</strong> if the compiler chose <strong>not</strong> to elide. Consequences:</p>
<ul>
<li><strong>Copy and move constructors</strong> often had to <strong>exist and be accessible</strong>, even if never called in optimized builds.</li>
<li>A class with <strong>deleted</strong> copy and move could <strong>not</strong> be returned by value from a factory-style function if the compiler needed those operations for the abstract machine.</li>
</ul>
<h3 id="since-c17-mandatory-for-certain-prvalue-cases">Since C++17: mandatory for certain prvalue cases</h3>
<p>For the cases covered by the standard (returning prvalues, throwing prvalues, etc.), the implementation <strong>does not</strong> require a copy/move: the <strong>temporary is constructed directly</strong> in the destination when the rules apply.</p>
<p><strong>Important nuance:</strong> <strong>Named Return Value Optimization (NRVO)</strong> is still <strong>optional</strong>. A function that returns a <strong>named local</strong> still conceptually needs <strong>copy/move</strong> available in general:</p>
<pre><code class="language-cpp">MyClass foo() {
    MyClass obj;
    return obj;   // NRVO may apply, but [NOT mandatory]
                  // type may still need move/copy in some cases
}
</code></pre>
<p>So: <strong>mandatory elision</strong> [OK] for certain <strong>prvalue</strong> returns; <strong>NRVO</strong> still [optional].</p>
<hr />
<h2 id="52-benefit-of-mandatory-copy-elision-for-temporaries-p-41">5.2 Benefit of Mandatory Copy Elision for Temporaries (p. 41)</h2>
<h3 id="performance-and-abstraction">Performance and abstraction</h3>
<ul>
<li><strong>Performance:</strong> You get the &ldquo;no extra object&rdquo; guarantee where the rule applies; no reliance on QoI.</li>
<li><strong>Generic factories</strong> become simpler and work with more types.</li>
</ul>
<p><strong>Factory template (book style):</strong></p>
<pre><code class="language-cpp">#include &lt;utility&gt;

template&lt;typename T, typename... Args&gt;
T create(Args&amp;&amp;... args) {
    return T{std::forward&lt;Args&gt;(args)...};
}
</code></pre>
<p>With mandatory elision, returning the <strong>prvalue</strong> <code>T{...}</code> can succeed even when <code>T</code> has <strong>no</strong> usable copy/move.</p>
<h3 id="examples-that-become-valid">Examples that become valid</h3>
<p><strong><code>std::atomic&lt;int&gt;</code>:</strong> Typically not movable/copyable like an <code>int</code>; returning a prvalue <code>std::atomic&lt;int&gt;{42}</code> into the caller&rsquo;s object can work under C++17 rules where it failed before.</p>
<p><strong>Copy-only type with deleted move:</strong></p>
<pre><code class="language-cpp">struct CopyOnly {
    CopyOnly() = default;
    CopyOnly(const CopyOnly&amp;) = default;
    CopyOnly&amp; operator=(const CopyOnly&amp;) = default;
    CopyOnly(CopyOnly&amp;&amp;) = delete;
    CopyOnly&amp; operator=(CopyOnly&amp;&amp;) = delete;
};

CopyOnly ret() {
    return CopyOnly{};   // [OK] since C++17 (prvalue return path)
}
</code></pre>
<hr />
<h2 id="53-clarified-value-categories-p-42">5.3 Clarified Value Categories (p. 42)</h2>
<h3 id="history-lvalue-and-rvalue-c">History: lvalue and rvalue (C)</h3>
<p>C inherited a simple picture: some expressions refer to <strong>objects with identity</strong> (lvalues), others behave like <strong>values</strong> on the right-hand side (rvalues).</p>
<h3 id="c11-five-fine-grained-categories">C++11: five fine-grained categories</h3>
<ul>
<li><strong>glvalue</strong> (&ldquo;generalized lvalue&rdquo;): has identity, <strong>refers to</strong> an object or function.</li>
<li><strong>prvalue</strong> (&ldquo;pure rvalue&rdquo;): computes a <strong>value</strong>; typically no identity of its own until materialized.</li>
<li><strong>xvalue</strong> (&ldquo;expiring value&rdquo;): glvalue that could be moved from (often the result of <code>std::move</code>).</li>
</ul>
<p><strong>rvalue</strong> = <strong>prvalue OR xvalue</strong>.<br />
<strong>lvalue</strong> = glvalue that is not an xvalue (historically &ldquo;plain&rdquo; lvalue).</p>
<h3 id="ascii-diagram-c11-hierarchy-conceptual">ASCII diagram: C++11 hierarchy (conceptual)</h3>
<pre><code>                         expression

└────────┘   └────────┘       └────────┘   └────────┘
                │                               │
                └─────────── &quot;rvalue&quot; ──────────┘
</code></pre>
<h3 id="ascii-diagram-c17-mental-model-p-44">ASCII diagram: C++17 mental model (p. 44)</h3>
<p>Same three <strong>leaf</strong> categories (<code>lvalue</code>, <code>xvalue</code>, <code>prvalue</code>) as in C++11, but the <strong>explanatory axis</strong> shifts:</p>
<pre><code>              every expression has a value category

            ┌────────────────┴────────────────┐
            ▼                                 ▼

   └────────┬────────┘               └────────┬────────┘

            │ lvalue  vs  xvalue              │
            │ (non-     (expiring,             │
            │  movable  often from             │

   ▼                 ▼                         │
 glvalue splits as in C++11 tree above ◄──────┘
        prvalue ──materialization──► xvalue (temporary object)
</code></pre>
<p><strong>Reading Josuttis:</strong> mandatory copy elision paths often keep a <strong>prvalue</strong> &ldquo;in flight&rdquo; until it <strong>initializes</strong> a result object; <strong>materialization</strong> is what happens when a glvalue context forces a real temporary.</p>

<h2 id="532-value-categories-since-c17-p-44">5.3.2 Value Categories Since C++17 (p. 44)</h2>
<h3 id="refined-intuition">Refined intuition</h3>
<ul>
<li><strong>glvalues:</strong> expressions that refer to <strong>locations</strong> (something in memory or a subobject model).</li>
<li><strong>prvalues:</strong> expressions that <strong>initialize</strong>; they <strong>compute a value</strong> and can often exist <strong>without</strong> a named temporary in the abstract machine until needed.</li>
</ul>
<h3 id="materialization-prvalue---xvalue">Materialization (prvalue [-&gt;] xvalue)</h3>
<p>When a prvalue is used where a glvalue is required, the language <strong>materializes</strong> a temporary object: prvalue [-&gt;] <strong>temporary object</strong> [-&gt;] treated as xvalue.</p>
<p><strong>Classic example:</strong> <code>void f(X&amp;);</code> cannot bind to a prvalue; <code>f(X());</code> <strong>materializes</strong> a temporary <code>X</code> and binds a reference to it (in earlier standards this was described differently; C++17 unified temporary creation with materialization).</p>
<pre><code>   prvalue expression  (e.g. return value object, literal object init)
            │
            │  &quot;needs a location&quot; context (e.g. binding to reference,
            │   accessing member, some glvalue rules)
            ▼
   ┌────────────────────┐
   │  MATERIALIZATION   │
   └─────────┬──────────┘
             ▼
   temporary object in memory (has identity now)
             │
             ▼
   glvalue (xvalue) referring to that temporary
</code></pre>
<h3 id="call-example">Call example</h3>
<pre><code class="language-cpp">void f(X x);
f(X());  // prvalue X() may be passed without extra copy/move
        // (subject to passing rules); when a temporary object exists,
         // it is an xvalue/gvalue context as appropriate
</code></pre>
<p>The book emphasizes <strong>unmaterialized return value passing</strong>: the return path can construct the result <strong>directly</strong> in the caller&rsquo;s slot.</p>
<hr />
<h2 id="54-unmaterialized-return-value-passing-p-45">5.4 Unmaterialized Return Value Passing (p. 45)</h2>
<h3 id="ascii-diagram-copy-elision-vs-nrvo-combined-flow">ASCII diagram: copy elision vs NRVO (combined flow)</h3>
<pre><code>  prvalue return:  return T{args};
        │
        ▼
   ┌─────────────┐      mandatory ──► caller's result object
   │ no named    │      elision         (T constructed once)
   │ temporary   │
   └─────────────┘

  named return:    T x; ...; return x;
        │
        ├── NRVO hits ──► no move/copy (optional optimization)
        │
        └── NRVO misses ──► move or copy (must be valid if selected)
</code></pre>
<h3 id="what-can-be-unmaterialized">What can be &ldquo;unmaterialized&rdquo;</h3>
<p>Situations discussed in the book include:</p>
<ul>
<li>Returning <strong>non-string literals</strong> as prvalues where applicable.</li>
<li>Returning <strong>temporary objects</strong> as prvalues.</li>
<li><code>decltype(auto)</code> and how the <strong>value category</strong> of the return expression propagates.</li>
</ul>
<p><strong>Key point:</strong> When returning a <strong>prvalue</strong> of type <code>T</code>, you <strong>need not</strong> have copy/move operations; the object is not &ldquo;moved out of&rdquo; a temporary in the older sense &ndash; the <strong>result object</strong> is initialized directly.</p>
<h3 id="copy-elision-flow-return">Copy elision flow (return)</h3>
<pre><code>  callee:  return T{args...};
              │
              │ prvalue of type T
              ▼
  ┌───────────────────────────────┐
  │ Mandatory elision context     │
  │ (return statement, prvalue)   │
  └───────────────┬───────────────┘
                  │
                  ▼
  caller's result object memory
  (e.g. variable or temporary in caller)
                  ▲
                  │
        T constructed HERE
        (no intermediate copy/move)
</code></pre>
<p><strong>NRVO (named local) flow</strong> remains <strong>[optional]</strong>:</p>
<pre><code>  callee:  T obj; ...; return obj;
              │
              │ named lvalue
              ▼
  [MAY elide] ──────────────────► caller's object
       │
       │ if no elision
       ▼
  move/copy (must be valid if required by overload resolution)
</code></pre>
