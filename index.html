<li>Implement <code>sum</code>, <code>product</code>, <code>allTrue</code> with unary folds; write static tests for empty pack behavior.</li>
<li>Benchmark string concatenation for left vs right folds on large packs.</li>
<li>Implement <code>hashVal</code> and compare distribution to <code>boost::hash_combine</code> patterns.</li>
</ol>
<hr />
<p><strong>Primary reference:</strong> Josuttis, <em>C++17 - The Complete Guide</em>, Chapter 11, <strong>pp. 107-118</strong>.</p>` },
  { name: `13. String Literals Template Params`, path: `12_string_literals_template_params.md`, dir: ``, body: `<h1 id="chapter-12-dealing-with-string-literals-as-template-parameters">Chapter 12: Dealing with String Literals as Template Parameters</h1>
<p><strong>Book:</strong> <em>C++17 - The Complete Guide</em>, Nicolai M. Josuttis<br />
<strong>Chapter:</strong> 12 - Dealing with String Literals as Template Parameters<br />
<strong>Book page span:</strong> <strong>pp. 119-120</strong> (section <strong>12.1</strong>)</p>
<p>This short chapter is about <strong>non-type template parameters (NTTP)</strong> that involve <strong>address constants</strong> and the evolution of linkage rules for string literals used through pointers/references in template parameters.</p>
<hr />
<h2 id="121-using-strings-in-templates-p119">12.1 Using Strings in Templates (p.119)</h2>
<h3 id="what-can-be-a-non-type-template-parameter-conceptual-list">What can be a non-type template parameter (conceptual list)</h3>
<p>Across C++17 discussions, NTTP includes (among other categories) <strong>integral</strong> values, <strong>pointer</strong> values (subject to constant-ness rules), <strong>reference</strong> parameters in some forms, and <strong><code>nullptr_t</code></strong>.</p>
<p><strong>Strings themselves are not passed “by value” as template arguments</strong> like integers: what you usually pass is a <strong>pointer</strong> to leading character of an array object with static storage duration, or similar address-constant expressions permitted by the language.</p>
<h3 id="linkage-and-address-constants-before-vs-c17-p119">Linkage and address constants: before vs C++17 (p.119)</h3>
<p><strong>Before C++17:</strong> using a pointer into a string literal or local static array as a template argument often required specific <strong>linkage</strong> arrangements so the address counted as a sufficiently stable <strong>address constant</strong> for the instantiation model.</p>
<p><strong>Since C++17:</strong> objects with <strong>no linkage</strong> in certain <code>static</code> local contexts become usable where the book says “no linkage allowed (static local)” — check <strong>p.119</strong> for the standard rule Josuttis cites and the motivating examples.</p>
<h3 id="examples-that-are-valid-across-many-modes-p119">Examples that are valid across many modes (p.119)</h3>
<p><strong>External linkage array (book notes [OK]</strong> in all versions covered):**</p>
<pre><code class="language-cpp">extern const char hello[] = &quot;Hello World!&quot;;
template&lt;const char* P&gt;
struct Message {};  // body omitted in tutorials

void demoExtern() {
  Message&lt;hello&gt; m;
  (void)m;
}
</code></pre>
<p><strong>Internal linkage / namespace scope <code>const</code> array (book: [OK] since C++11 in the narrative):</strong></p>
<pre><code class="language-cpp">const char hello11[] = &quot;Hello World!&quot;;
template&lt;const char* P&gt;
struct Message {};

void demoInternal() {
  Message&lt;hello11&gt; m;
  (void)m;
}
</code></pre>
<p><strong>Static local since C++17 (book story):</strong></p>
<pre><code class="language-cpp">template&lt;const char* P&gt;
struct Message {};

void demoStaticLocal() {
  static const char hello17[] = &quot;Hello World!&quot;;
  Message&lt;hello17&gt; m;
  (void)m;
}
</code></pre>
<h3 id="you-still-cannot-pass-a-raw-literal-token-as-template-argument-p119">You still cannot pass a raw literal token as <code>template</code> argument (p.119)</h3>
<p>This remains wrong:</p>
<pre><code class="language-cpp">// template&lt;class T, T v&gt; struct A; // illustration only

// Message&lt;&quot;hi&quot;&gt; x;  // [ERROR]: cannot pass string literal token directly as NTTP
</code></pre>
<p>The literal <code>"hi"</code> is not a template argument of form <code>const char*</code> at the language level without going through a named entity / approved constant expression path.</p>
<h3 id="constexpr-function-returning-an-address-p119"><code>constexpr</code> function returning an address (p.119)</h3>
<p>The book notes that since C++17 you can use patterns like a <code>constexpr</code> function yielding a pointer usable in template instantiation:</p>
<pre><code class="language-cpp">constexpr const char* pNum() {
  return &quot;42&quot;;
}

template&lt;const char* P&gt;
struct A {};

void demoConstexprFn() {
  A&lt;pNum()&gt; a;
  (void)a;
}
</code></pre>
<p><strong>Reading guide:</strong> The exact validity still depends on the function being a <strong>constexpr</strong> function in the strict sense and the returned pointer pointing into objects with the permitted lifetime rules for template arguments.</p>
<hr />
<h2 id="ascii-diagram-linkage--storage-mental-model">ASCII diagram: linkage / storage mental model</h2>
<pre><code>                    Template argument needs stable address constant
                                        │
            ┌───────────────────────────┼───────────────────────────┐
            │                           │                           │
            ▼                           ▼                           ▼
    extern const char s[]        const char s[]              static const char s[]
    at namespace scope           at namespace scope          inside function
    (classic)                    (C++11 story)               (C++17 story)
</code></pre>
<hr />
<h2 id="common-mistakes-checklist">Common mistakes checklist</h2>
<ol>
<li>Trying <code>Message&lt;"text"&gt;</code> directly [ERROR] (<strong>p.119</strong>).</li>
<li>Assuming <strong>any</strong> <code>const char*</code> works: it must meet constant-expression + linkage constraints.</li>
<li>Confusing <strong>class NTTP</strong> (C++20 adds more categories) with <strong>C++17</strong> rules — stay within the book’s C++17 scope unless upgrading deliberately.</li>
</ol>
<hr />
<h2 id="minimal-exercises">Minimal exercises</h2>
<ol>
<li>Instantiate three <code>Message&lt;&amp;helloX&gt;</code>-style templates for <code>extern</code>, namespace <code>const</code>, and <code>static</code> local forms; observe compiler errors when rules are violated.</li>
<li>Compare MSVC/GCC/Clang diagnostics for invalid NTTP pointers.</li>
</ol>
<hr />
<p><strong>Primary reference:</strong> Josuttis, <em>C++17 - The Complete Guide</em>, Chapter 12, <strong>pp. 119-120</strong>.</p>` },
  { name: `14. Placeholder Types Template Params`, path: `13_placeholder_types_template_params.md`, dir: ``, body: `<h1 id="chapter-13-placeholder-types-like-auto-as-template-parameters">Chapter 13: Placeholder Types like <code>auto</code> as Template Parameters</h1>
<p><strong>Book:</strong> <em>C++17 - The Complete Guide</em>, Nicolai M. Josuttis<br />
<strong>Chapter:</strong> 13 - Placeholder Types like <code>auto</code> as Template Parameters<br />
<strong>Book page span:</strong> <strong>pp. 121-127</strong> (sections <strong>13.1</strong>-<strong>13.3</strong>)</p>
<p>C++17 lets template parameters be deduced “non-types” using <strong><code>auto</code></strong> (and refined with <strong><code>decltype(auto)</code></strong> in <strong>13.3</strong>), which unifies NTTP syntax and enables cleaner metaprogramming for constants of many scalar kinds.</p>
<hr />
<h2 id="131-using-auto-for-template-parameters-p121">13.1 Using <code>auto</code> for Template Parameters (p.121)</h2>
<h3 id="basic-pattern">Basic pattern</h3>
<pre><code class="language-cpp">template&lt;auto N&gt;
struct S {};

void demoBasic() {
  S&lt;42&gt; s1;   // N deduced as int (book examples)
  S&lt;'a'&gt; s2;  // N deduced as char

  // S&lt;2.5&gt; s3;  // [ERROR] typically: floating-point NTTP not allowed here (pre-C++20 float NTTP rules)
}
</code></pre>
<p><strong>Book note:</strong> Floating literals as NTTP were not the C++17 story; <code>2.5</code> in <code>S&lt;2.5&gt;</code> is the textbook <strong>ERROR</strong> example on <strong>p.121</strong>.</p>
<h3 id="partial-specialization-still-names-the-underlying-value">Partial specialization still names the underlying value</h3>
<pre><code class="language-cpp">template&lt;auto N&gt;
class S {};

template&lt;int N&gt;
class S&lt;N&gt; {  // partial specialization when N’s type is int
 public:
  static constexpr int kind = 1;
};
</code></pre>
<h3 id="ctad-interplay-with-class-templates-that-have-auto-parameters-p121">CTAD interplay with class templates that have <code>auto</code> parameters (p.121)</h3>
<p>If a class template mixes type and <code>auto</code> non-type parameters, constructor-driven CTAD can deduce both <strong>types</strong> and <strong>values</strong> in some designs (<strong>p.121</strong>, ties back to Chapter 9).</p>
<p>Sketch:</p>
<pre><code class="language-cpp">template&lt;typename T, auto N&gt;
class A {
 public:
  A(T (&amp;)[N]) {}  // illustrative: array extent + element type
};
</code></pre>
<h3 id="qualified-auto-p121">Qualified <code>auto</code> (p.121)</h3>
<p>You can constrain placeholder kinds:</p>
<pre><code class="language-cpp">template&lt;const auto* P&gt;
struct PtrParam {};
</code></pre>
<p>Meaning: the non-type parameter is a pointer-ish <code>auto</code> deduced placeholder with <code>const</code> on the deduced type side as appropriate (follow book wording).</p>
<h3 id="heterogeneous-value-lists-p121">Heterogeneous value lists (p.121)</h3>
<pre><code class="language-cpp">template&lt;auto... VS&gt;
class HeteroValueList {};

void demoHetero() {
  HeteroValueList&lt;1, 'x', true&gt; hv;
  (void)hv;
}
</code></pre>
<h3 id="homogeneous-value-lists-pinning-first-type-p121">Homogeneous value lists pinning first type (p.121)</h3>
<pre><code class="language-cpp">template&lt;auto V1, decltype(V1)... Vs&gt;
class HomoValueList {};

void demoHomo() {
  HomoValueList&lt;1, 2, 3&gt; ok;
  // HomoValueList&lt;1, 2, 3u&gt; bad; // typically [ERROR]: 3u not same type as int V1 path
  (void)ok;
}
</code></pre>
<p><strong>Reading guide:</strong> The second parameter pack <strong>repeats</strong> <code>decltype(V1)</code> forcing a single scalar “family”.</p>
<hr />
<h2 id="1311-characters-and-strings-p122">13.1.1 Characters and Strings (p.122)</h2>
<h3 id="default-non-type-parameter-for-formatting">Default non-type parameter for formatting</h3>
<pre><code class="language-cpp">#include &lt;iostream&gt;

template&lt;auto Sep = ' '&gt;
void print() {}

// Overload set typically pairs Sep with variadic printing; book uses a pattern like:
template&lt;auto Sep = ' ', typename T, typename... Rest&gt;
void print(const T&amp; x, const Rest&amp;... rest) {
  std::cout &lt;&lt; x;
  ((std::cout &lt;&lt; Sep &lt;&lt; rest), ...);
}

void demoSep() {
  std::string s = &quot;world&quot;;
  print&lt;'-'&gt;(7.5, &quot;hello&quot;, s);  // book-style narrative: 7.5-hello-world
}
</code></pre>
<h3 id="using-static-const-char-sep-as-nttp-p122">Using <code>static const char sep[]</code> as NTTP (p.122)</h3>
<pre><code class="language-cpp">static const char sep[] = &quot;, &quot;;

template&lt;const char* S, typename T, typename... Rest&gt;
void printSep(const T&amp; x, const Rest&amp;... rest) {
  std::cout &lt;&lt; x;
  ((std::cout &lt;&lt; S &lt;&lt; rest), ...);
}
</code></pre>
<p>This illustrates lifting string data into named arrays so NTTP pointers refer to stable storage.</p>
<hr />
<h2 id="1312-metaprogramming-constants-p123">13.1.2 Metaprogramming Constants (p.123)</h2>
<h3 id="the-constant-wrapper-idiom">The <code>constant</code> wrapper idiom</h3>
<pre><code class="language-cpp">template&lt;auto v&gt;
struct constant {
  static constexpr auto value = v;
};

using i = constant&lt;42&gt;;
using c = constant&lt;'x'&gt;;

static_assert(i::value == 42);
static_assert(c::value == 'x');
</code></pre>
<h3 id="heterogeneous-sequences">Heterogeneous sequences</h3>
<pre><code class="language-cpp">template&lt;auto... Vs&gt;
struct sequence {};

using tupleLike = sequence&lt;0, 'h', true&gt;;
</code></pre>
<p>These become building blocks for compile-time data structures and algorithm dispatch.</p>
<hr />
<h2 id="132-variable-template-parameter-p124">13.2 Variable Template Parameter (p.124)</h2>
<h3 id="stdarray-alias-with-auto-extent"><code>std::array</code> alias with <code>auto</code> extent</h3>
<pre><code class="language-cpp">#include &lt;array&gt;

template&lt;typename T, auto N&gt;
std::array&lt;T, N&gt; arr{};

void demoArrayAlias() {
  arr&lt;int, 5&gt;;
  arr&lt;int, 5u&gt;;  // book: distinguishes types of NTTP -&gt; different objects/templates
}
</code></pre>
<p><strong>Book emphasis:</strong> <code>5</code> vs <code>5u</code> may instantiate <strong>distinct</strong> variable templates even when extents “mean the same size” at runtime.</p>
<h3 id="variable-template-shorthand-p124">Variable template shorthand (p.124)</h3>
<pre><code class="language-cpp">template&lt;auto N&gt;
constexpr auto val = N;

constexpr auto fortyTwo = val&lt;42&gt;;
</code></pre>
<p>Use this to propagate constants through generic code with less <code>typename</code> noise than type-only approaches.</p>
<hr />
<h2 id="133-decltypeauto-as-template-parameter-p126">13.3 <code>decltype(auto)</code> as Template Parameter (p.126)</h2>
<p>This section explores that <strong><code>auto</code> vs <code>decltype(auto)</code></strong> distinction for <strong>NTTP</strong> matches the same subtleties as in variable declarations: <strong>value vs reference</strong> kinds matter.</p>
<h3 id="setup-const-int-lvalue-constant">Setup: <code>const int</code> lvalue constant</h3>
<pre><code class="language-cpp">static const int c = 42;

template&lt;decltype(auto) N&gt;
struct S {
  static void printN();
};
</code></pre>
<h3 id="sc-vs-sc-vs-sv"><code>S&lt;c&gt;</code> vs <code>S&lt;(c)&gt;</code> vs <code>S&lt;(v)&gt;</code></h3>
<p><strong>Book patterns:</strong></p>
<ul>
<li><code>S&lt;c&gt;</code> deduces <strong>by name idiom</strong> leading to <code>const int</code> value semantics in the narrative.</li>
<li><code>S&lt;(c)&gt;</code> treats <code>(c)</code> as an <strong>lvalue expression</strong>, deducing <strong>reference</strong> kind: <code>const int&amp;</code> referring to <code>c</code>.</li>
<li>For a non-const <code>int v</code>, <code>S&lt;(v)&gt;</code> may deduce <code>int&amp;</code>, and mutating <code>v</code> later affects what member functions observe.</li>
</ul>
<p>Illustrative sketch:</p>
<pre><code class="language-cpp">int v = 42;

template&lt;decltype(auto) N&gt;
struct S2 {
  static void printN() {
    // std::cout &lt;&lt; N;
  }
};

void demoDecltypeAuto() {
  // S2&lt;c&gt;     ...
  // S2&lt;(c)&gt;   ...
  // S2&lt;(v)&gt;   ...
  v = 77;
  // S2&lt;(v)&gt;::printN(); // book narrative: prints 77 after mutation
}
</code></pre>
<p><strong>ASCII reference summary:</strong></p>
<pre><code>┌─────────────────────┬──────────────────────────────┬────────────────────────────┐
│ Template arg        │ Typical deduction story      │ What mutating source does  │
├─────────────────────┼──────────────────────────────┼────────────────────────────┤
│ c   (const int obj) │ const int value NTTP         │ source immutable           │
│ (c) (lvalue expr)   │ const int&amp; NTTP to c         │ still bound to c           │
│ (v) (mutable lvalue)│ int&amp; NTTP to v               │ affects via reference      │
└─────────────────────┴──────────────────────────────┴────────────────────────────┘
</code></pre>
<p><strong>Why this matters:</strong> metaprogramming sometimes wants <strong>by-value copies</strong> of constants; other times you intentionally want <strong>references</strong> into translation-unit objects for testing or advanced protocols — <code>decltype(auto)</code> exposes that choice explicitly.</p>
<hr />
<h2 id="practical-guidance">Practical guidance</h2>
<ol>
<li>Prefer <code>auto</code> NTTP for <strong>integral/enum/pointer</strong> constants; know the <strong>float</strong> limitations in C++17 (<strong>p.121</strong>).</li>
<li>Use <strong>heterogeneous</strong> packs for tuples-like lists; use <strong><code>decltype(V1)...</code></strong> to <strong>pin</strong> homogeneity (<strong>p.121</strong>).</li>
<li>Remember <code>5</code> vs <code>5u</code> can split instantiations for <code>template&lt;auto N&gt;</code> variable templates (<strong>p.124</strong>).</li>
<li>Treat <code>decltype(auto)</code> NTTP like ordinary <code>decltype(auto)</code> deduction: <strong>parentheses create expressions</strong> (<strong>p.126</strong>).</li>
</ol>
<hr />
<p><strong>Primary reference:</strong> Josuttis, <em>C++17 - The Complete Guide</em>, Chapter 13, <strong>pp. 121-127</strong>.</p>` },

<p><strong>Book:</strong> <em>C++17 - The Complete Guide</em>, Nicolai M. Josuttis<br />
<strong>Chapter:</strong> 14 - Extended Using Declarations<br />
<strong>Book page span:</strong> <strong>pp. 129-132</strong> (sections <strong>14.1</strong>-<strong>14.2</strong>)</p>
<p>C++17 extends <code>using</code> so you can import <strong>multiple</strong> names from a base in one declaration (comma-separated), and — critically for libraries — supports <strong>pack expansion</strong> in <code>using Base&lt;Ts&gt;::member...</code> forms. This enables idioms like <strong>inheritance-based overload sets</strong> and concise <strong>lambda overload</strong> wrappers.</p>
<hr />
<h2 id="141-using-variadic-using-declarations-p129">14.1 Using Variadic Using Declarations (p.129)</h2>
<h3 id="comma-separated-using">Comma-separated <code>using</code></h3>
<p>Old style (verbose):</p>
<pre><code class="language-cpp">struct Derived : Base {
  using Base::a;
  using Base::b;
  using Base::c;
};
</code></pre>
<p>C++17 style:</p>
<pre><code class="language-cpp">struct Derived : Base {
  using Base::a, Base::b, Base::c;
};
</code></pre>
<p><strong>Benefit:</strong> less repetition, especially in CRTP-heavy or policy-based designs.</p>
<hr />
<h2 id="lambda-overload-pattern-p129">Lambda overload pattern (p.129)</h2>
<h3 id="problem">Problem</h3>
<p><code>std::visit</code> for <code>std::variant</code> wants a <strong>callable</strong> with <code>operator()</code> overloads for each alternative type. Lambdas each have a unique closure type, so you cannot list them as a single type without merging.</p>
<h3 id="solution-inherit-from-all-lambdas--variadic-using">Solution: inherit from all lambdas + variadic <code>using</code></h3>
<pre><code class="language-cpp">#include &lt;utility&gt;

template&lt;typename... Ts&gt;
struct overload : Ts... {
  using Ts::operator()...;
};

template&lt;typename... Ts&gt;
overload(Ts...) -&gt; overload&lt;Ts...&gt;;

#include &lt;string&gt;
#include &lt;variant&gt;

void demoOverload() {
  auto twice = overload{
    [](std::string&amp; s) { s += s; },
    [](auto&amp; v) { v *= 2; },
  };

  std::variant&lt;int, double, std::string&gt; v{7};
  std::visit(twice, v);  // uses the generic lambda for int

  v = 3.5;
  std::visit(twice, v);  // uses generic lambda for double

  v = std::string{&quot;hi&quot;};
  std::visit(twice, v);  // uses string-specific lambda
}
</code></pre>
<p><strong>Reading guide:</strong></p>
<ul>
<li><code>overload</code> derives from each lambda type, so the closure <code>operator()</code> members live in base subobjects.</li>
<li><code>using Ts::operator()...</code> brings <strong>each</strong> <code>operator()</code> into the derived class’s overload set.</li>
<li>The <strong>deduction guide</strong> <code>overload(Ts...) -&gt; overload&lt;Ts...&gt;</code> (C++17 CTAD) saves writing template arguments.</li>
</ul>
<h3 id="application-stdvariant-visitors-p129">Application: <code>std::variant</code> visitors (p.129)</h3>
<p>This pattern is the modern replacement for nested <code>struct Visitor : lam1, lam2</code> boilerplate.</p>
<hr />
<h2 id="ascii-diagram-overload-resolution-with-variadic-using">ASCII diagram: overload resolution with variadic <code>using</code></h2>
<pre><code>Call:   visitor(arg)
            │
            ▼
┌───────────────────────────────────────────────┐
│ Name lookup finds overload::operator() names  │
│ imported from bases:                          │
│                                               │
│   overload                                    │
│     ├─ lambda_1::operator()(string&amp;)          │
│     └─ lambda_2::operator()(auto&amp; ) [generic] │
└───────────────────────┬───────────────────────┘
                        │
                        ▼
              Overload resolution picks best match
                  (exact &gt; generic, etc.)
                        │
                        ▼
                   Selected operator()
</code></pre>
<p><strong>Key idea:</strong> Without <code>using Ts::operator()...</code>, the <code>operator()</code> functions are <strong>hidden</strong> as base-class members in many call contexts; the <code>using</code> declarations <strong>inject</strong> them into one overload set in the derived type.</p>
<hr />
<h2 id="142-variadic-using-declarations-for-inheriting-constructors-p130">14.2 Variadic Using Declarations for Inheriting Constructors (p.130)</h2>
<h3 id="pattern">Pattern</h3>
<pre><code class="language-cpp">template&lt;typename T&gt;
struct Base {
  explicit Base(T) {}
};

template&lt;typename... Types&gt;
class Multi : private Base&lt;Types&gt;... {
 public:
  using Base&lt;Types&gt;::Base...;  // inherit each base’s constructors
};
</code></pre>
<h3 id="behavior-story-p130">Behavior story (p.130)</h3>
<p><code>MultiISB m1 = 42;</code> can invoke the <strong><code>Base&lt;int&gt;</code></strong> constructor path while defaulting / implicitly handling other bases per the book’s example naming (<code>MultiISB</code> stands in for a concrete typedef in the text).</p>
<p><strong>Caution:</strong> inheriting many constructors can create <strong>ambiguity</strong> if constructors overlap in viable resolution; design base constructors carefully.</p>
<h3 id="inheriting-assignment-operators-p130">Inheriting assignment operators (p.130)</h3>
<p>The book notes you can also inherit assignment operators similarly where appropriate:</p>
<pre><code class="language-cpp">using Base&lt;Types&gt;::operator=...;
</code></pre>
<p>(This is advanced; watch for slicing / deleted inherited assignment interactions.)</p>
<hr />
<h2 id="design-guidance">Design guidance</h2>
<ol>
<li>Use comma <code>using</code> to shorten repetitive injections (<strong>p.129</strong>).</li>
<li>Use <code>using Ts::operator()...</code> for <strong><code>overload</code> lambdas</strong> + <code>std::visit</code> (<strong>p.129</strong>).</li>
<li>Use <code>using Base&lt;Ts&gt;::Base...</code> for <strong>variadic mixin</strong> constructor forwarding (<strong>p.130</strong>).</li>
<li>When CTAD fails (C++17 edge cases), name <code>overload&lt;Ts...&gt;</code> explicitly.</li>
</ol>
<hr />
<h2 id="exercise">Exercise</h2>
<ol>
<li>Implement <code>overload</code> without CTAD (explicit <code>overload&lt;decltype(l1), decltype(l2)&gt;</code>).</li>
<li>Build a <code>Multi</code> template and trace which constructor is called for <code>Multi&lt;int,double&gt;{42}</code> vs brace forms.</li>
<li>Replace a visitor struct with three manual <code>operator()</code> overloads by a single <code>overload{...}</code>.</li>
</ol>
<hr />
<p><strong>Primary reference:</strong> Josuttis, <em>C++17 - The Complete Guide</em>, Chapter 14, <strong>pp. 129-132</strong>.</p>` },

<p>This chapter follows <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis (O&rsquo;Reilly). Page references use <strong>p.</strong> for a single page.</p>
<hr />
<h2 id="151-using-stdoptional-p-135">15.1 Using <code>std::optional&lt;&gt;</code> (p. 135)</h2>
<h3 id="nullable-instance-of-arbitrary-type">Nullable instance of arbitrary type</h3>
<p><code>std::optional&lt;T&gt;</code> models an object that <strong>either</strong> holds a value of type <code>T</code> <strong>or</strong> holds <strong>no value</strong>. It is the standard vocabulary type for &ldquo;maybe absent&rdquo; without sentinel values, raw pointers, or special return conventions like error codes paired with output parameters.</p>
<h3 id="size-and-storage-p-135">Size and storage (p. 135)</h3>
<ul>
<li><strong>Contained object</strong>: when engaged, the <code>optional</code> stores a full <code>T</code> in place (like a small buffer inside the optional).</li>
<li><strong>Discriminator</strong>: typically <strong>one extra byte</strong> (or minimal storage) records whether a value is present, subject to <strong>alignment</strong> padding so the whole <code>optional&lt;T&gt;</code> remains suitably aligned for <code>T</code>.</li>
<li><strong>No heap allocation</strong>: unlike <code>std::unique_ptr&lt;T&gt;</code>, <code>optional</code> does not allocate; everything is inline in the <code>optional</code> object.</li>
</ul>
<p>Josuttis emphasizes that you pay for the tag byte (plus possible padding), not for indirection.</p>
<h3 id="deep-copy-semantics-p-135">Deep copy semantics (p. 135)</h3>
<p>Copying an <code>optional&lt;T&gt;</code> copies the contained <code>T</code> when engaged, or copies an empty state when disengaged. Move semantics propagate similarly: moving from an engaged optional moves the inner <code>T</code> and leaves the source in a valid but unspecified state consistent with moved-from <code>T</code> rules.</p>
<hr />
<h2 id="1511-optional-return-values-p-135">15.1.1 Optional return values (p. 135)</h2>
<h3 id="parsing-example-asint">Parsing example: <code>asInt</code></h3>
<p>A classic pattern is returning an optional when a conversion might fail, without exceptions or out-parameters:</p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;string&gt;

std::optional&lt;int&gt; asInt(const std::string&amp; s) {
    try {
        return std::stoi(s);
    } catch (...) {
        return std::nullopt;
    }
}
</code></pre>
<p>Note: <code>std::stoi</code> can throw <code>std::invalid_argument</code> or <code>std::out_of_range</code>; catching and returning <code>nullopt</code> maps all failures to &ldquo;no value.&rdquo; For production code you may prefer narrower exception handling or a non-throwing conversion strategy; the <strong>idea</strong> from Josuttis is: <strong>optional expresses failure without a separate channel</strong>.</p>
<h3 id="checking-and-accessing">Checking and accessing</h3>
<pre><code class="language-cpp">auto oi = asInt(&quot;42&quot;);
if (oi) {
    int n = *oi;  // dereference: defined only if engaged
}
</code></pre>
<ul>
<li><strong><code>if (oi)</code></strong> / <strong><code>oi.has_value()</code></strong>: test presence.</li>
<li><strong><code>*oi</code></strong> / <strong><code>oi-&gt;</code></strong>: access the value when you know it exists (undefined behavior if empty on some operations; prefer safe access below).</li>
</ul>
<h3 id="value-throws-p-135-136"><code>value()</code> throws (p. 135-136)</h3>
<pre><code class="language-cpp">try {
    int x = oi.value();  // std::bad_optional_access if empty
} catch (const std::bad_optional_access&amp;) {
    // handle
}
</code></pre>
<h3 id="value_or-p-136"><code>value_or</code> (p. 136)</h3>
<pre><code class="language-cpp">int n = oi.value_or(0);  // 0 if no value
</code></pre>
<p>Useful when a default is always acceptable.</p>
<hr />
<h2 id="1512-optional-arguments-and-data-members-p-137">15.1.2 Optional arguments and data members (p. 137)</h2>
<h3 id="function-parameters">Function parameters</h3>
<p>Optional parameters let callers omit information:</p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;iostream&gt;

void printName(const std::string&amp; first,
               const std::optional&lt;std::string&gt;&amp; middle,
               const std::string&amp; last) {
    std::cout &lt;&lt; first;
    if (middle)
        std::cout &lt;&lt; ' ' &lt;&lt; *middle;
    std::cout &lt;&lt; ' ' &lt;&lt; last &lt;&lt; '\\n';
}

// Calls:
// printName(&quot;John&quot;, std::nullopt, &quot;Doe&quot;);
// printName(&quot;Mary&quot;, std::string{&quot;Q&quot;}, &quot;Smith&quot;);
</code></pre>
<h3 id="class-members">Class members</h3>
<pre><code class="language-cpp">struct Person {
    std::string first_name;
    std::optional&lt;std::string&gt; middle_name;  // may be absent
    std::string last_name;
};
</code></pre>
<p>This avoids sentinel strings like <code>""</code> or <code>"N/A"</code> that collide with legitimate data.</p>
<hr />
<h2 id="152-types-and-operations-p-139">15.2 Types and operations (p. 139)</h2>
<h3 id="complete-operations-overview-p-139">Complete operations overview (p. 139)</h3>
<p>The standard provides the following facilities on <code>std::optional&lt;T&gt;</code> (names summarize the intent; exact signatures are in <code>[optional.optional]</code>). Use this as a checklist while reading the rest of the chapter.</p>
<pre><code>+------------------------------------------------------------------+
| std::optional&lt;T&gt;  --  main operations (Ch. 15 / p. 139)          |
+-------------------+----------------------------------------------+
| Constructors      | default (empty); from nullopt (empty);     |
|                   | from U / T (engaged); copy/move;             |
|                   | in_place + ctor args; in_place + init-list   |
+-------------------+----------------------------------------------+
| std::make_optional| Factory; avoid spelling T twice              |
+-------------------+----------------------------------------------+
| Destructor        | Destroys contained T if engaged              |
+-------------------+----------------------------------------------+
| operator=         | From optional, T, nullopt, in_place args     |
+-------------------+----------------------------------------------+
| emplace           | Destroy old (if any); construct T in place   |
+-------------------+----------------------------------------------+
| reset             | Destroy contained value; become empty        |
+-------------------+----------------------------------------------+
| has_value         | [OK] true iff engaged                        |
+-------------------+----------------------------------------------+
| explicit bool /   | Conversion: [OK] true iff engaged            |
| operator bool     | (use explicit test; do not rely on &quot;truth&quot;)  |
+-------------------+----------------------------------------------+
| operator*         | Lvalue/rvalue; [ERROR] if empty: UB          |
+-------------------+----------------------------------------------+
| operator-&gt;        | Member access; [ERROR] if empty: UB          |
+-------------------+----------------------------------------------+
| value()           | Throws bad_optional_access if empty; else    |
|                   | returns lvalue/rvalue reference to T         |
+-------------------+----------------------------------------------+
| value_or(U&amp;&amp;)     | Returns contained T or decay-copy of default   |
+-------------------+----------------------------------------------+
| swap              | noexcept if T is swappable noexcept          |
+-------------------+----------------------------------------------+
| Comparisons       | optional vs optional, vs T, vs nullopt;      |
|                   | mixed T / U with converted values            |
+-------------------+----------------------------------------------+
| std::hash         | If hash&lt;T&gt; exists: engaged uses hash&lt;T&gt;;    |
|                   | empty: hash unspecified (p. 146)             |
+------------------------------------------------------------------+
</code></pre>
<hr />
<h3 id="construction-details-p-140">Construction details (p. 140)</h3>
<p><strong>Default and explicit empty</strong></p>
<p>Both of these create an empty optional:</p>
<pre><code class="language-cpp">std::optional&lt;int&gt; o1;                        // default: empty
std::optional&lt;int&gt; o2{std::nullopt};          // explicitly empty
</code></pre>
<p><strong>Class template argument deduction (CTAD, C++17)</strong></p>
<p>When the initializer fixes <code>T</code>, you can write <code>std::optional</code> without <code>&lt;T&gt;</code>:</p>
<pre><code class="language-cpp">std::optional o3{42};           // deduces std::optional&lt;int&gt;
std::optional o4{&quot;hello&quot;};      // deduces std::optional&lt;const char*&gt;  [OOPS] not std::string!
</code></pre>
<p>[OOPS] <code>o4</code> holds a pointer to the string literal’s array, not a <code>std::string</code>. If you want a string, spell it: <code>std::optional&lt;std::string&gt;{"hello"}</code> or <code>std::optional o4{std::string{"hello"}};</code>.</p>
<p><strong><code>std::in_place</code> with constructor arguments</strong></p>
<p>Construct the contained object directly inside the optional:</p>
<pre><code class="language-cpp">#include &lt;complex&gt;
#include &lt;optional&gt;

std::optional&lt;std::complex&lt;double&gt;&gt; o7{
    std::in_place, 3.0, 4.0};   // complex(3.0, 4.0) in place
</code></pre>
<p><strong><code>std::in_place</code> with <code>initializer_list</code> plus extra arguments</strong></p>
<p>Useful for containers whose constructors take an init-list first, then more parameters (here, a comparator):</p>
<pre><code class="language-cpp">#include &lt;cstdlib&gt;  // std::abs
#include &lt;functional&gt;
#include &lt;optional&gt;
#include &lt;set&gt;

auto sc = [](int a, int b) {
    return std::abs(a) &lt; std::abs(b);
};

// Brace form as in the book; forwarded to set's (initializer_list, Compare) ctor:
std::optional&lt;std::set&lt;int, decltype(sc)&gt;&gt; o8{
    std::in_place, {4, 8, -7, -2, 0, 5}, sc};
</code></pre>
<p><strong><code>std::make_optional</code></strong></p>
<p>Lets the type be inferred or supplies explicit template arguments for the contained object’s constructor:</p>
<pre><code class="language-cpp">auto o13 = std::make_optional(3.0);   // std::optional&lt;double&gt;, value 3.0

auto o15 = std::make_optional&lt;std::complex&lt;double&gt;&gt;(3.0, 4.0);
</code></pre>
<p><strong>Ternary with <code>optional</code> and <code>nullopt</code></strong></p>
<p>When one branch has a value and the other is empty, both operands should be <code>optional</code> types (or convertible so the expression has a common <code>optional</code> type):</p>
<pre><code class="language-cpp">#include &lt;map&gt;
#include &lt;optional&gt;
#include &lt;string&gt;

std::map&lt;std::string, int&gt; m;
auto pos = m.find(&quot;key&quot;);
auto end = m.end();
auto o16 = (pos != end) ? std::optional{pos-&gt;second} : std::nullopt;
</code></pre>
<p>[OK] The ternary keeps the “maybe absent” story in one expression without a dummy value.</p>
<p><strong>Copy / convert between optionals of related types</strong></p>
<p>Copying from <code>optional&lt;const char*&gt;</code> to <code>optional&lt;std::string&gt;</code> uses <code>std::string</code>’s converting constructor:</p>
<pre><code class="language-cpp">std::optional&lt;const char*&gt; o9{&quot;hello&quot;};
std::optional&lt;std::string&gt; o10{o9};   // engaged std::string(&quot;hello&quot;)
</code></pre>
<p><strong><code>emplace</code> after construction (same subsection as in_place in usage)</strong></p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;complex&gt;

std::optional&lt;std::complex&lt;double&gt;&gt; oc;
oc.emplace(1.0, 2.0);  // destroys nothing (was empty), constructs in place
</code></pre>
<hr />
<h3 id="value-access-references-temporaries-and-value_or-p-142">Value access: references, temporaries, and <code>value_or</code> (p. 142)</h3>
<p><strong><code>value()</code> returns a reference</strong></p>
<p><code>value()</code> yields <code>T&amp;</code>, <code>const T&amp;</code>, <code>T&amp;&amp;</code>, or <code>const T&amp;&amp;</code> depending on the value category of the optional (see <strong>Move semantics</strong> below). That means a reference can outlive the temporary optional or temporary contained object.</p>
<p>[ERROR] Dangling reference from a temporary:</p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;string&gt;

std::optional&lt;std::string&gt; getString();

void bad() {
    const std::string&amp; r1 = getString().value();  // [ERROR] r1 dangles after full-expression
}
</code></pre>
<p>[ERROR] Iterating a container accessed through a temporary optional:</p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;vector&gt;

std::optional&lt;std::vector&lt;int&gt;&gt; getVector();

void bad_loop() {
    for (int i : getVector().value()) {  // [ERROR] vector destroyed; loop undefined
        (void)i;
    }
}
</code></pre>
<p>Fix pattern: name the optional (or the vector) in a variable whose lifetime covers all uses.</p>
<p><strong><code>value()</code> vs <code>value_or()</code></strong></p>
<ul>
<li><code>value()</code> returns <strong>by reference</strong> (no allocation for <code>T</code>; may propagate references into danger with temporaries as above).</li>
<li><code>value_or(default)</code> returns <strong>by value</strong> (returns a copy of the contained value, or a copy of <code>default</code>). For expensive <code>T</code> (e.g. <code>std::string</code>), that may allocate or copy more than you need.</li>
</ul>
<p><strong>Efficiency idiom when you only need a “view”</strong></p>
<p>For <code>optional&lt;string&gt;</code>, printing without an extra string copy often looks like:</p>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;optional&gt;
#include &lt;string&gt;

void print(std::optional&lt;std::string&gt; const&amp; o) {
    std::cout &lt;&lt; (o ? o-&gt;c_str() : &quot;fallback&quot;);   // [OK] no value_or copy
}
</code></pre>
<p>[OOPS] Do not write <code>std::cout &lt;&lt; o ? o-&gt;c_str() : "fallback";</code>—without parentheses, <code>&lt;&lt;</code> binds tighter than <code>?:</code>, so the condition is wrong.</p>
<p>Use <code>value_or</code> when an actual <code>T</code> object (by value) is what you need.</p>
<p><strong><code>*</code> and <code>-&gt;</code></strong></p>
<p>[ERROR] Using <code>*o</code> or <code>o-&gt;</code> on an empty optional is <strong>undefined behavior</strong>. <code>value()</code> is how you get a checked reference (or an exception).</p>
<hr />
<h3 id="detailed-comparison-rules-p-143-144">Detailed comparison rules (p. 143-144)</h3>
<p><strong>Both empty</strong></p>
<p>Two empty optionals compare <strong>equal</strong> (<code>==</code> true, neither less than the other for a total order consistent with the standard).</p>
<p><strong>Exactly one empty</strong></p>
<p>In relational comparisons, the empty optional is <strong>less than</strong> any engaged optional.</p>
<p><strong>Compared with a bare value (or <code>nullopt</code>)</strong></p>
<p>Rough picture: empty optional behaves like “no value” and sorts <strong>less than</strong> any engaged value. Effects on mixed <code>optional</code> / <code>T</code> comparisons match that story.</p>
<p>[OOPS] Surprising but intended:</p>
<pre><code class="language-cpp">#include &lt;cassert&gt;
#include &lt;optional&gt;

void ordering_surprises() {
    std::optional&lt;unsigned&gt; uo;   // empty
    assert((uo &lt; 0U) == true);      // [OK] empty &lt; any engaged unsigned (here: 0)
    // Same idea with plain 0: uo &lt; 0 is also true (usual arithmetic conversions).

    std::optional&lt;bool&gt; bo;        // empty
    assert((bo &lt; false) == true);  // [OK] empty &lt; engaged false — not “bool meaning”
}
</code></pre>
<p>Do not read <code>&lt;</code> as “numeric less” when the left-hand side might be empty; read it as <strong>optional three-way ordering</strong>.</p>
<p><strong>Mixed <code>optional</code> types with comparable values</strong></p>
<p>If the contained values compare equal after usual conversions, the optionals compare equal:</p>
<pre><code class="language-cpp">#include &lt;cassert&gt;
#include &lt;optional&gt;

void mixed_types() {
    std::optional&lt;int&gt; o1{42};
    std::optional&lt;double&gt; o2{42.0};
    assert(o1 == o2);   // [OK] values equal as double/int
}
</code></pre>
<p><code>optional</code> also compares to <code>nullopt</code>, to <code>T</code>, and (where supported) between <code>optional&lt;T&gt;</code> and <code>optional&lt;U&gt;</code> using the same “both empty / one empty / both engaged” decomposition.</p>
<hr />
<h3 id="changing-values-p-144-145">Changing values (p. 144-145)</h3>
<p>Ways to replace or clear the contained object (Josuttis: <code>emplace</code>, assignment, <code>reset</code>, empty state, <code>nullopt</code>):</p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;string&gt;

std::optional&lt;std::string&gt; os{&quot;hi&quot;};

os.emplace(3, 'y');           // destroy old value (if any); construct new std::string in place
os = std::string{&quot;again&quot;};    // assign engaged value (replaces contents)
os = std::nullopt;           // [OK] disengage (no value)
os.reset();                  // [OK] destroy contained object, optional becomes empty
</code></pre>
<p><strong><code>operator=</code> and <code>{}</code></strong></p>
<ul>
<li><code>os = std::nullopt</code> clears the optional ([OK]).</li>
<li><code>os = some_T</code> engages or replaces the stored <code>T</code>.</li>
<li>[OOPS] Plain <code>os = {}</code> is <strong>not</strong> “clear the optional” in general: it typically uses <code>optional&lt;T&gt;::operator=(U&amp;&amp;)</code> with a <strong>value-initialized</strong> <code>T</code> (for <code>std::string</code>, that is an empty string—you stay <strong>engaged</strong>). For <code>std::optional&lt;int&gt;</code>, <code>o = {}</code> sets the value to <code>0</code>, still engaged.</li>
<li>To assign “empty optional” from another optional, you can write <code>os = std::optional&lt;std::string&gt;{};</code>.</li>
</ul>
<p>For <code>optional&lt;T&gt;</code>, assignment from <code>nullopt</code> clears. Assigning a <code>T</code> engages (or replaces) the value.</p>
<p>[ERROR] Assigning through dereference on an empty optional:</p>
<pre><code class="language-cpp">std::optional&lt;int&gt; o;
*o = 42;   // [ERROR] undefined behavior: no value object to assign into
</code></pre>
<p>Always ensure engagement (<code>if (o)</code> / <code>has_value()</code>) before <code>*o = ...</code>, or use <code>emplace</code> / <code>operator=</code> / <code>value()</code> on an engaged object.</p>
<hr />
<h3 id="move-semantics-p-145-146">Move semantics (p. 145-146)</h3>
<p><strong>Moving the whole <code>optional</code></strong></p>
<p>When you move from <code>std::optional&lt;T&gt;</code>, the <strong>empty/engaged flag</strong> is copied as appropriate and, if engaged, the contained <code>T</code> is <strong>moved-from</strong> (left in a valid but unspecified state per <code>T</code>).</p>
<p><strong>Move-assign into optional</strong></p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;string&gt;

std::string s{&quot;data&quot;};
std::optional&lt;std::string&gt; os;
os = std::move(s);   // engaged; s moved-from
</code></pre>
<p><strong>Move value out</strong></p>
<pre><code class="language-cpp">std::optional&lt;std::string&gt; os{&quot;data&quot;};
std::string s3 = std::move(*os);   // move from contained; optional still engaged [OOPS] but value unspecified/empty string typical
</code></pre>
<p>[OOPS] After moving <code>*os</code> out, the optional may still be “engaged” but its <code>string</code> is hollowed out; clear or assign if you need a known state.</p>
<p><strong>Ref-qualified <code>value()</code> and <code>operator*</code></strong></p>
<p><code>value()</code> and <code>*</code> have overloads for <code>&amp;</code>, <code>const&amp;</code>, <code>&amp;&amp;</code>, and <code>const&amp;&amp;</code> on the optional, so you can move out of rvalue optionals:</p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;string&gt;

std::optional&lt;std::string&gt; func();

void take() {
    std::string s4 = func().value();   // [OK] moves from temporary optional’s value
}
</code></pre>
<hr />
<h3 id="hashing-p-146">Hashing (p. 146)</h3>
<p>If <code>std::hash&lt;T&gt;</code> is available, <code>std::hash&lt;std::optional&lt;T&gt;&gt;</code> is defined such that:</p>
<ul>
<li><strong>Engaged</strong>: the hash is computed as for the contained <code>T</code> ([OK] same as hashing the value).</li>
<li><strong>Empty</strong>: the hash is <strong>unspecified</strong> by the standard (do not rely on a particular value across implementations or runs).</li>
</ul>
<hr />
<h3 id="stdnullopt-reminder-p-140"><code>std::nullopt</code> reminder (p. 140)</h3>
<pre><code class="language-cpp">std::optional&lt;int&gt; o = std::nullopt;  // explicitly empty
</code></pre>
<p><code>nullopt</code> is a tag meaning “disengaged optional” and participates in comparisons and assignments.</p>
<h3 id="emplace-reset-has_value-quick-recap-p-142-143"><code>emplace</code>, <code>reset</code>, <code>has_value</code> (quick recap, p. 142-143)</h3>
<pre><code class="language-cpp">std::optional&lt;std::string&gt; s;
s.emplace(5, 'x');      // in-place std::string(5, 'x')
s.reset();              // destroy value; optional is empty
assert(!s.has_value());
</code></pre>
<h3 id="monadic-operations-overview-p-143-145-context">Monadic operations (overview, p. 143-145 context)</h3>
<p>Josuttis discusses thinking of <code>optional</code> as supporting <strong>monadic composition</strong>: each step either produces a value or stops the chain. The <strong>C++17 standard library</strong> does not yet provide <code>and_then</code> / <code>transform</code> / <code>or_else</code> on <code>std::optional</code> (those arrive in C++23), but you express the same logic explicitly.</p>
<p><strong>Manual &ldquo;bind&rdquo; in C++17</strong> (flatten nested optionals after a step):</p>
<pre><code class="language-cpp">#include &lt;cmath&gt;
#include &lt;optional&gt;
#include &lt;string&gt;
#include &lt;type_traits&gt;

template &lt;class T, class F&gt;
auto flat_map(std::optional&lt;T&gt; o, F&amp;&amp; f)
    -&gt; std::optional&lt;std::invoke_result_t&lt;F, T&gt;&gt; {
    if (!o) return std::nullopt;
    return f(*o);
}

std::optional&lt;int&gt; asInt(const std::string&amp;);  // e.g. stoi wrapped as in 15.1.1
std::optional&lt;double&gt; sqrt_pos(int x) {
    if (x &lt; 0) return std::nullopt;
    return std::optional&lt;double&gt;{std::sqrt(static_cast&lt;double&gt;(x))};
}

std::optional&lt;double&gt; parsed_root(const std::string&amp; s) {
    return flat_map(asInt(s), [](int n) { return sqrt_pos(n); });
}
</code></pre>
<p><strong><code>or_else</code> style</strong> in C++17: use <code>value_or</code>, or <code>if (!o) o = fallback();</code>, or a small helper that returns the first engaged optional among alternatives. The <strong>idea</strong> (per Josuttis): keep failure implicit in the type instead of mixing sentinel values and error flags.</p>
<hr />
<h2 id="153-special-cases-p-146">15.3 Special cases (p. 146)</h2>
<h3 id="optionalbool-presence-vs-value"><code>optional&lt;bool&gt;</code>: presence vs value</h3>
<pre><code class="language-cpp">std::optional&lt;bool&gt; ob{false};  // HAS value, value is false
if (ob) { /* true: optional is engaged */ }  // [OK] tests ENGAGEMENT
</code></pre>
<p><strong>Gotcha</strong>: <code>if (ob)</code> answers &ldquo;is there a bool?&rdquo; not &ldquo;is the bool true?&rdquo; Use:</p>
<pre><code class="language-cpp">if (ob &amp;&amp; *ob) { /* value is true */ }
</code></pre>
<h3 id="optionalt-presence-vs-null-pointer"><code>optional&lt;T*&gt;</code>: presence vs null pointer</h3>
<pre><code class="language-cpp">int x = 1;
std::optional&lt;int*&gt; op{&amp;x};
if (op) { /* engaged: we have a pointer object */ }

std::optional&lt;int*&gt; emptyPtr{nullptr};
// Still &quot;engaged&quot; if you constructed with null pointer!
</code></pre>
<p>Actually: if you <strong>default-construct</strong> or assign <code>nullopt</code>, it&rsquo;s empty. If you store <code>nullptr</code> as the <strong>value</strong> of an <strong>engaged</strong> optional, <code>if (op)</code> is still true. So:</p>
<ul>
<li><strong><code>if (op)</code></strong> -&gt; is the optional engaged?</li>
<li><strong><code>if (op &amp;&amp; *op)</code></strong> -&gt; is there a non-null pointer <strong>value</strong>?</li>
</ul>
<p>Josuttis warns this double indirection is easy to misuse.</p>
<h3 id="nested-optionals-and-optional-of-optional-p-146-147">Nested optionals and “optional of optional” (p. 146-147)</h3>
<p>A value can be wrapped twice: the <strong>outer</strong> <code>optional</code> says whether the whole cell exists; the <strong>inner</strong> <code>optional</code> can represent another level of absence.</p>
<p><strong>Construction from a string literal (book example)</strong></p>
<p>Thanks to converting constructors, you can initialize nested optionals from a string literal; the result is <strong>outer engaged</strong>, <strong>inner engaged</strong>, holding a <code>std::string</code>:</p>
<pre><code class="language-cpp">#include &lt;optional&gt;
#include &lt;string&gt;

std::optional&lt;std::optional&lt;std::string&gt;&gt; oos2 = &quot;hello&quot;;   // outer + inner both engaged
</code></pre>
<p><strong>Two different ways to get “no value”</strong></p>
<pre><code class="language-cpp">std::optional&lt;std::optional&lt;std::string&gt;&gt; oos1{std::in_place, &quot;inner&quot;};  // engaged / engaged

// Inner becomes empty; outer is still engaged (you have an “empty inner optional” object):
*oos1 = std::nullopt;

// Outer becomes empty (the whole thing is absent):
oos1 = std::nullopt;
</code></pre>
<p>Diagram (states):</p>
<pre><code> Outer optional        Inner optional        Meaning
 ─────────────────────────────────────────────────────────────
 engaged               engaged             Value is present (**oos gives string)
 engaged               empty               “Slot exists” but inner has no string
 empty                 (inactive)          Whole thing absent
</code></pre>
<p><strong>Accessing the inner string</strong></p>
<p>You need two successful levels before using the contained <code>std::string</code>:</p>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;optional&gt;
#include &lt;string&gt;

void print_nested(std::optional&lt;std::optional&lt;std::string&gt;&gt; const&amp; oos1) {
    if (oos1 &amp;&amp; *oos1) {
        std::cout &lt;&lt; **oos1 &lt;&lt; '\\n';   // [OK] outer engaged and inner engaged
    }
}
</code></pre>
<p>[ERROR] Using <code>**oos1</code> without checking both levels is unsafe (undefined behavior if either level is empty), just like <code>*</code> on a single empty optional.</p>
<p><strong>Another illustration</strong></p>
<pre><code class="language-cpp">std::optional&lt;std::optional&lt;int&gt;&gt; oo{std::optional&lt;int&gt;{42}};
// Outer engaged, inner engaged, value 42.

std::optional&lt;std::optional&lt;int&gt;&gt; oo_empty_inner{
    std::optional&lt;int&gt;{}};  // outer engaged, inner empty — distinct from outer empty
</code></pre>
<p>Outer optional might be empty while inner encodes another layer of “maybe.” Useful rarely but <strong>meaningful</strong>: for example, outer = “field was supplied in JSON”, inner = “parsed int or null in JSON.”</p>
<hr />
<h2 id="memory-layout-ascii">Memory layout (ASCII)</h2>
<p>Conceptual layout (implementation-defined sizes; diagram is pedagogical):</p>
<pre><code> optional&lt;T&gt; object (inline storage)
 ┌──────────────────────────────────────────────┐
 │  engaged flag / discriminator (often 1 byte) │
 │  [padding for alignment of T]                │
 │  ┌────────────────────────────────────────┐  │
 │  │  storage for T (sizeof(T), aligned)    │  │
 │  └────────────────────────────────────────┘  │
 └──────────────────────────────────────────────┘
 * No pointer to heap for the T itself
</code></pre>
<p>Comparison semantics (schematic):</p>
<pre><code> State           Compares as
 ─────────────────────────────────────
 nullopt         &quot;less than&quot; any engaged value (when ordering)
 engaged a, b    lexicographic / type rules as for T
 empty vs empty  equal
</code></pre>

<h2 id="161-motivation-p-149-type-safe-union">16.1 Motivation (p. 149): type-safe union</h2>
<p>A C <code>union</code> holds one of several alternatives but <strong>does not track</strong> which member is active; reading the wrong member is undefined behavior. <code>std::variant&lt;Alternatives...&gt;</code> is a <strong>tagged union</strong>: it stores <strong>one</strong> of the types and remembers <strong>which</strong> one (the <strong>discriminator</strong> / <strong>index</strong>).</p>
<p><strong>Goals</strong> (as Josuttis presents them):</p>
<ul>
<li>Type-safe access (<code>std::get</code>, <code>std::get_if</code>, <code>std::visit</code>).</li>
<li>Value semantics (stack storage, no mandatory heap).</li>
<li>Suitable for <strong>closed</strong> sets of types known at compile time.</li>
</ul>
<hr />
<h2 id="162-using-stdvariant-p-150">16.2 Using <code>std::variant&lt;&gt;</code> (p. 150)</h2>
<h3 id="construction-and-active-alternative">Construction and active alternative</h3>
<pre><code class="language-cpp">#include &lt;variant&gt;
#include &lt;string&gt;

std::variant&lt;int, std::string&gt; var{&quot;hello&quot;};
// Active alternative is std::string if overload resolution picks it.
</code></pre>
<h3 id="construction-ambiguities-p-154-155">Construction ambiguities (p. 154-155)</h3>
<p>Overload resolution for the converting constructor can pick exactly one best-matching alternative. When no unique best match exists, the program is ill-formed.</p>
<pre><code class="language-cpp">std::variant&lt;long, int&gt; v2{42};
// [OK] index() == 1 — int is the better match than long for the int literal

std::variant&lt;long, long&gt; v3{42};
// [ERROR] ambiguous: both alternatives match equally well

std::variant&lt;int, float&gt; v4{42.3};
// [ERROR] ambiguous between int and float for the double literal

std::variant&lt;int, double&gt; v5{42.3};
// [OK] double literal unambiguously selects double

std::variant&lt;std::string, std::string_view&gt; v7{&quot;hello&quot;};
// [ERROR] ambiguous which string-like alternative is best

std::variant&lt;std::string, std::string_view, const char*&gt; v8{&quot;hello&quot;};
// [OK] const char* is the best match; index() == 2
</code></pre>
<p>Josuttis emphasizes that <strong>conversion sequences</strong> and <strong>ranking</strong> determine which alternative becomes active—not source order alone.</p>
<h3 id="stdin_place_type-and-stdin_place_index-p-154"><code>std::in_place_type</code> and <code>std::in_place_index</code> (p. 154)</h3>
<p>When overload resolution is unclear—or you must construct a specific alternative explicitly—use <strong>in-place tags</strong> so the variant knows <strong>which</strong> member to construct and with <strong>which</strong> constructor arguments.</p>
<pre><code class="language-cpp">#include &lt;complex&gt;
#include &lt;vector&gt;
#include &lt;set&gt;

std::variant&lt;std::complex&lt;double&gt;&gt; v11{
    std::in_place_type&lt;std::complex&lt;double&gt;&gt;, 3.0, 4.0
};
// Constructs complex from (3.0, 4.0) in the single alternative

std::variant&lt;int, int&gt; v13{std::in_place_index&lt;1&gt;, 77};
// [OK] Initializes the *second* int (index 1), not the first

// With initializer_list into a specific alternative (e.g. set with comparator):
struct SomeComp {
    bool operator()(int a, int b) const { return a &lt; b; }
} sc;
std::variant&lt;std::vector&lt;int&gt;, std::set&lt;int, decltype(sc)&gt;&gt; v15{
    std::in_place_index&lt;1&gt;, {4, 8, -7}, sc
};
// Brace list + comparator forwarded to std::set's constructor

<p><strong>No CTAD for <code>variant</code></strong>: class template argument deduction does not apply usefully here in the way it does for containers—the alternative list must be explicit.</p>
<p><strong>No <code>std::make_variant</code></strong>: unlike <code>make_pair</code> / <code>make_tuple</code>, a factory like <code>make_variant&lt;&gt;</code> does not exist in the library; the type set is the whole point of the object, so you always name the alternatives explicitly (possibly with <code>in_place_*</code> for construction).</p>
<h3 id="index-based-and-type-based-get">Index-based and type-based <code>get</code></h3>
<pre><code class="language-cpp">std::string&amp; s = std::get&lt;1&gt;(var);           // by index (0=int, 1=string)
std::string&amp; s2 = std::get&lt;std::string&gt;(var);
</code></pre>
<h3 id="index-p-150"><code>index()</code> (p. 150)</h3>
<pre><code class="language-cpp">assert(var.index() == 1);  // 1 means second type (string) — 0-based
</code></pre>
<h3 id="holds_alternative-p-151"><code>holds_alternative</code> (p. 151)</h3>
<pre><code class="language-cpp">if (std::holds_alternative&lt;std::string&gt;(var)) {
    // ...
}
</code></pre>
<h3 id="stdget-throws-stdbad_variant_access-p-151"><code>std::get</code> throws <code>std::bad_variant_access</code> (p. 151)</h3>
<pre><code class="language-cpp">var = 42;  // now holds int

    std::get&lt;std::string&gt;(var);  // [ERROR] wrong active type

    // handle
}
</code></pre>
<h3 id="stdget_if-pointer-or-nullptr-p-151"><code>std::get_if</code>: pointer or <code>nullptr</code> (p. 151)</h3>
<pre><code class="language-cpp">if (auto* p = std::get_if&lt;std::string&gt;(&amp;var)) {
    // use *p
}
</code></pre>
<p>Non-throwing inspection at the cost of pointer checks.</p>
