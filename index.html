<h2 id="163-types-and-operations-p-152">16.3 Types and operations (p. 152)</h2>
<h3 id="default-construction-first-alternative-p-152">Default construction: first alternative (p. 152)</h3>
<p>Default-constructed <code>std::variant&lt;T1, T2, ...&gt;</code> default-constructs <strong><code>T1</code></strong>. Therefore <strong><code>T1</code> must be default-constructible</strong> unless you use a workaround.</p>
<h3 id="stdmonostate-as-first-type-p-153"><code>std::monostate</code> as first type (p. 153)</h3>
<p>If the &ldquo;real&rdquo; first type is not default-constructible, prepend <code>std::monostate</code>:</p>
<pre><code class="language-cpp">#include &lt;variant&gt;

struct NoDefault {
    NoDefault(int) {}
};

std::variant&lt;std::monostate, NoDefault, int&gt; v;
// v holds monostate initially
</code></pre>
<p><code>std::monostate</code> is an empty type used purely as a placeholder.</p>
<h3 id="deriving-from-stdvariant-p-152">Deriving from <code>std::variant</code> (p. 152)</h3>
<p><code>std::variant</code> is not <code>final</code>. You may inherit publicly to add convenience or domain-specific APIs while reusing variant storage and dispatch.</p>
<pre><code class="language-cpp">class Derived : public std::variant&lt;int, std::string&gt; {};

Derived d = {{&quot;hello&quot;}};   // brace form initializes the base variant
d.emplace&lt;0&gt;(77);          // still use index-based emplace on the variant interface
</code></pre>
<p>The usual caveats apply: slicing if you pass <code>Derived</code> where a base <code>variant</code> is expected by value; prefer composition unless inheritance genuinely simplifies your design.</p>
<h3 id="duplicate-alternative-types-p-155-156">Duplicate alternative types (p. 155-156)</h3>
<p>If the same type appears more than once, <strong>index</strong> distinguishes the slots; <strong><code>std::get&lt;T&gt;</code> by type is ambiguous</strong>.</p>
<pre><code class="language-cpp">std::variant&lt;int, int, std::string&gt; var;   // two int slots (indices 0 and 1)

// std::get&lt;int&gt;(var);
// [ERROR] ambiguous at compile time: two alternatives are int

std::get&lt;0&gt;(var);  // [OK] first int (throws std::bad_variant_access if not active)

std::get&lt;1&gt;(var);  // [OK] second int — throws if the *currently active* index is not 1
</code></pre>
<p>Use <strong><code>std::get&lt;I&gt;(var)</code></strong> with a constant index when duplicates exist. If you request the wrong index for the active member, you get <strong><code>std::bad_variant_access</code></strong> at runtime—not a silent read from the wrong slot.</p>
<h3 id="assignment-emplace-comparisons-p-153-156">Assignment, <code>emplace</code>, comparisons (p. 153-156)</h3>
<pre><code class="language-cpp">std::variant&lt;int, std::string&gt; v = 7;
v = &quot;abc&quot;;                       // assigns active alternative
v.emplace&lt;int&gt;(99);              // destroys old alt, constructs int
</code></pre>
<p>Comparison operators are defined when the alternatives support comparison. Josuttis gives these <strong>ordering rules</strong> (p. 156-157):</p>
<ol>
<li><strong>Different active indices</strong>: Compare <strong>indices</strong> first. The alternative with the <strong>smaller index</strong> (listed <strong>earlier</strong> in <code>variant&lt;...&gt;</code>) orders <strong>before</strong> the other for <code>&lt;</code> / <code>&gt;</code> / <code>&lt;=</code> / <code>&gt;=</code>. For <code>==</code> and <code>!=</code>, different active indices mean <strong>not equal</strong> (values are not compared).</li>
<li><strong>Same active index</strong>: Compare the <strong>held values</strong> using that alternative’s <strong>own</strong> <code>operator==</code> / relational operators.</li>
<li><strong>Valueless by exception</strong> (see below): <strong><code>valueless_by_exception() == valueless_by_exception()</code></strong> is <code>true</code> for both in that state; a valueless variant compares <strong>less than</strong> any non-valueless variant (and not equal to any value-holding state).</li>
<li><strong>Different <code>variant</code> specializations</strong>: You cannot compare <code>std::variant&lt;A,B&gt;</code> with <code>std::variant&lt;C,D&gt;</code> if they are <strong>different types</strong>—that is a <strong>compile-time error</strong>, even if <code>A</code> and <code>C</code> are the same:</li>
</ol>
<pre><code class="language-cpp">std::variant&lt;int, double&gt; v1{1};
std::variant&lt;int, long&gt; v4{1};
// v1 == v4;
// [ERROR] different variant types; no comparison operator
</code></pre>
<h3 id="move-semantics-p-156">Move semantics (p. 156)</h3>
<p>Moves move the <strong>currently active</strong> object; moving-from leaves the variant in a valid state with a moved-from active object (per moved-from type&rsquo;s rules).</p>
<hr />
<h2 id="1633-visitors-p-157">16.3.3 Visitors (p. 157)</h2>
<h3 id="stdvisitvisitor-var"><code>std::visit(visitor, var)</code></h3>
<p>The visitor must be callable with <strong>every</strong> alternative type (with the value category the visit uses). The compiler generates the dispatch (effectively a jump table / cascade).</p>
<h3 id="function-object-visitor-p-157">Function object visitor (p. 157)</h3>
<p>A <strong>class-type visitor</strong> provides one <code>operator()</code> overload per alternative—clear and easy to optimize.</p>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;variant&gt;
#include &lt;string&gt;

struct MyVisitor {
    void operator()(int i) const { std::cout &lt;&lt; &quot;int: &quot; &lt;&lt; i &lt;&lt; '\\n'; }
    void operator()(const std::string&amp; s) const { std::cout &lt;&lt; &quot;str: &quot; &lt;&lt; s &lt;&lt; '\\n'; }
};

std::variant&lt;int, std::string&gt; v = 42;
std::visit(MyVisitor{}, v);
</code></pre>
<h3 id="modifying-visitors-p-157-158">Modifying visitors (p. 157-158)</h3>
<p>Passing a non-const variant to <code>visit</code> yields lvalue references to the active member, so the visitor can <strong>mutate</strong> the stored value:</p>
<pre><code class="language-cpp">struct Twice {
    void operator()(double&amp; d) const { d *= 2; }
    void operator()(int&amp; i) const { i *= 2; }
    void operator()(std::string&amp; s) const { s += s; }
};

std::variant&lt;double, int, std::string&gt; vv{3.14};
std::visit(Twice{}, vv);   // doubles the active double in place
</code></pre>
<h3 id="generic-lambda-visitor-p-158">Generic lambda visitor (p. 158)</h3>
<pre><code class="language-cpp">std::visit([](const auto&amp; val) { std::cout &lt;&lt; val; }, v);
</code></pre>
<p><code>val</code> is deduced independently for each alternative. For <strong>different behavior per category</strong>, combine with <strong><code>if constexpr</code></strong> and a trait that matches the <strong>value’s types as seen through references</strong>:</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;
// ...
std::visit([](const auto&amp; val) {
    if constexpr (std::is_convertible_v&lt;decltype(val), std::string&gt;) {
        // treat as string-like
    } else {
        // numeric or other
    }
}, v);
</code></pre>
<p><strong>Note</strong> (Josuttis): use <strong><code>std::is_convertible_v</code></strong> (or similar) rather than <strong><code>std::is_same</code></strong> with <code>decltype(val)</code>, because <code>val</code> is a <strong>reference</strong> type in the lambda; you care whether the <strong>referred-to</strong> type behaves like a string for your logic.</p>
<h3 id="return-values-from-visit-p-158-159">Return values from <code>visit</code> (p. 158-159)</h3>
<p>All <code>operator()</code> overloads (or lambda bodies) that <code>visit</code> might invoke must return <strong>the same type</strong> (after decay), or a <strong>common type</strong> the implementation can deduce. If deduction fails, specify the return type explicitly:</p>
<pre><code class="language-cpp">double r = std::visit([](const auto&amp; x) -&gt; double {
    return static_cast&lt;double&gt;(x);   // explicit -&gt; double unifies all branches
}, v);
</code></pre>
<p>Without a consistent return type, you get compile errors when one branch returns <code>void</code> and another returns a value, or when deduction is ambiguous.</p>
<h3 id="overload-pattern--overloaded-lambdas-p-158-159">Overload pattern / overloaded lambdas (p. 158-159)</h3>
<p>When behavior differs a lot per alternative, combine lambdas into one functor with overloaded <code>operator()</code> and pass it to <code>visit</code>:</p>
<pre><code class="language-cpp">template&lt;class... Ts&gt;
struct overload : Ts... { using Ts::operator()...; };
template&lt;class... Ts&gt;
overload(Ts...) -&gt; overload&lt;Ts...&gt;;

std::visit(overload{
    [](int i) { /*...*/ },
    [](const std::string&amp; s) { /*...*/ }
}, v);
</code></pre>
<p>Josuttis presents this as practical sugar: <strong><code>std::visit(overload{ ... }, var);</code></strong> reads as “dispatch to the matching lambda.”</p>
<h3 id="multi-variant-visit-p-159-160">Multi-variant <code>visit</code> (p. 159-160)</h3>
<pre><code class="language-cpp">std::variant&lt;int, double&gt; a{1};
std::variant&lt;int, double&gt; b{2.5};
std::visit([](auto x, auto y) {
    // Cartesian dispatch over alternatives
}, a, b);
</code></pre>
<p><strong>Return type rule</strong>: every overload invoked (for every combination of active alternatives) must return <strong>the same type</strong> (or a type convertible to one deduced result type).</p>
<hr />
<h2 id="1634-valueless-by-exception-p-161-162">16.3.4 Valueless by exception (p. 161-162)</h2>
<p>If an operation that <strong>changes the active alternative</strong> throws <strong>during</strong> the process, the variant can end up <strong>holding no value</strong>: the <strong>valueless-by-exception</strong> state.</p>
<pre><code class="language-cpp">if (v.valueless_by_exception()) {
    // rare; indicates failed transition
}
</code></pre>
<p>In that state, <strong><code>v.index() == std::variant_npos</code></strong> (implementation-defined constant; no valid alternative index).</p>
<h3 id="example-throwing-conversion-into-emplace-p-161-162">Example: throwing conversion into <code>emplace</code> (p. 161-162)</h3>
<pre><code class="language-cpp">struct S {
    operator int() { throw &quot;EXCEPTION&quot;; }
};

std::variant&lt;std::string, int&gt; vv{&quot;hello&quot;};
try {
    vv.emplace&lt;1&gt;(S{});   // attempting to construct int from S; conversion throws
} catch (...) { }

// [OOPS] vv may now be valueless_by_exception()
</code></pre>
<h3 id="guarantees-josuttis-p-161-162">Guarantees (Josuttis, p. 161-162)</h3>
<ul>
<li><strong><code>emplace</code></strong>: If an exception escapes while the variant switches or constructs the new alternative, the variant may become <strong>valueless</strong>; any strong guarantee depends on the exception occurring <strong>when</strong> relative to destroying the old state and building the new one.</li>
<li><strong><code>operator=</code></strong>: Whether you end up valueless depends on <strong>when</strong> the exception is thrown (e.g. during destruction of the old member vs. construction of the new). The standard specifies the exceptional cases; in practice treat <strong>valueless</strong> as a rare but possible outcome after a failed type-changing assignment or <code>emplace</code>.</li>
</ul>
<p>Non-state-changing operations on an already-correct alternative typically do not induce valuelessness; the risky transitions are those that <strong>replace</strong> the active type.</p>
<hr />
<h2 id="164-polymorphism-with-stdvariant-p-162">16.4 Polymorphism with <code>std::variant</code> (p. 162)</h2>
<h3 id="geometric-objects-geoobj-example-p-163-165">Geometric objects: <code>GeoObj</code> example (p. 163-165)</h3>
<p>Josuttis uses a <strong>closed</strong> set of geometric types—<strong>no common base class</strong> and <strong>no virtual functions</strong> required. Each concrete type implements its own <strong><code>draw()</code></strong> member; dispatch is via <strong><code>std::visit</code></strong> (or index), not vtables.</p>
<pre><code> Polymorphism via variant (closed set)
 ┌─────────────────────────────────────────┐
 │ GeoObj = variant&lt;Line, Circle, Rectangle&gt;│
 │   each type: concrete class + draw()     │
 └─────────────────────────────────────────┘
        │
        ▼ std::visit(lambda, geoObj) ──► obj.draw()
</code></pre>
<pre><code class="language-cpp">#include &lt;variant&gt;
#include &lt;vector&gt;
#include &lt;iostream&gt;

struct Line {
    void draw() const { std::cout &lt;&lt; &quot;Line\\n&quot;; }
};
struct Circle {
    double r{};
    void draw() const { std::cout &lt;&lt; &quot;Circle r=&quot; &lt;&lt; r &lt;&lt; '\\n'; }
};
struct Rectangle {
    double w{}, h{};
    void draw() const { std::cout &lt;&lt; &quot;Rectangle &quot; &lt;&lt; w &lt;&lt; 'x' &lt;&lt; h &lt;&lt; '\\n'; }
};

using GeoObj = std::variant&lt;Line, Circle, Rectangle&gt;;

void testGeo() {
    std::vector&lt;GeoObj&gt; coll;
    coll.push_back(Line{});
    coll.push_back(Circle{1.5});
    coll.push_back(Rectangle{2.0, 3.0});

    for (const auto&amp; obj : coll) {
        std::visit([](const auto&amp; o) { o.draw(); }, obj);
    }
}
</code></pre>
<p><strong>Takeaway</strong>: the <strong>variant</strong> is the sum type; <strong><code>visit</code> + generic lambda</strong> (or a visitor struct) is the uniform call pattern. Adding a type means editing <strong><code>GeoObj</code></strong> and recompiling—by design for a fixed world.</p>
<h3 id="closed-set-variant-vs-open-set-virtuals-p-163-165">Closed set (variant) vs open set (virtuals) (p. 163-165)</h3>
<table>
<thead>
<tr>
<th>Aspect</th>
<th><code>std::variant</code> (closed)</th>
<th><code>virtual</code> + inheritance (open)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Add new types</td>
<td>Edit variant, recompile</td>
<td>Derive new class, link</td>
</tr>
<tr>
<td>Dispatch</td>
<td><code>visit</code>/index (static)</td>
<td>vtable (dynamic)</td>
</tr>
<tr>
<td>Storage</td>
<td>Inline max size</td>
<td>Often heap + pointer</td>
</tr>
<tr>
<td>Performance</td>
<td>Often faster (localized)</td>
<td>Pointer chasing + virtual call</td>
</tr>
</tbody>
</table>
<p>Josuttis notes <code>variant</code> is attractive when the set is <strong>fixed</strong> and performance predictability matters.</p>
<h3 id="heterogeneous-collections-with-compile-time-dispatch-p-165-167">Heterogeneous collections with compile-time dispatch (p. 165-167)</h3>
<p>A <code>std::vector</code> of <strong><code>std::variant&lt;int, double, std::string&gt;</code></strong> (or similar) stores <strong>rows</strong> of mixed types. <strong>Printing</strong> can use <strong><code>std::visit</code></strong> so <strong>strings</strong> get <strong>quotes</strong> and <strong>numbers</strong> print plainly—using <strong><code>if constexpr</code></strong> inside a <strong>generic lambda</strong> (same idea as p. 158: <strong><code>is_convertible</code></strong> / string detection on <code>decltype(val)</code>).</p>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;variant&gt;
#include &lt;string&gt;
#include &lt;iostream&gt;
#include &lt;type_traits&gt;

using Var = std::variant&lt;int, double, std::string&gt;;

void printColl(const std::vector&lt;Var&gt;&amp; coll) {
    for (const auto&amp; elem : coll) {
        std::visit([](const auto&amp; val) {
            if constexpr (std::is_convertible_v&lt;decltype(val), std::string&gt;) {
                std::cout &lt;&lt; '&quot;' &lt;&lt; val &lt;&lt; '&quot;';
            } else {
                std::cout &lt;&lt; val;
            }
            std::cout &lt;&lt; ' ';
        }, elem);
    }
    std::cout &lt;&lt; '\\n';
}
</code></pre>
<p><strong>Visitor with overloaded alternatives</strong> (same collection type, explicit lambda per alternative):</p>
<pre><code class="language-cpp">template&lt;class... Ts&gt;
struct overload : Ts... { using Ts::operator()...; };
template&lt;class... Ts&gt;
overload(Ts...) -&gt; overload&lt;Ts...&gt;;

void printCollOverloaded(const std::vector&lt;Var&gt;&amp; coll) {
    for (const auto&amp; elem : coll) {
        std::visit(overload{
            [](int i) { std::cout &lt;&lt; i &lt;&lt; ' '; },
            [](double d) { std::cout &lt;&lt; d &lt;&lt; ' '; },
            [](const std::string&amp; s) { std::cout &lt;&lt; '&quot;' &lt;&lt; s &lt;&lt; &quot;\\&quot; &quot;; },
        }, elem);
    }
    std::cout &lt;&lt; '\\n';
}
</code></pre>
<p>Josuttis shows <strong>generic lambdas</strong> with <strong><code>if constexpr</code></strong> and <strong><code>overload{ ... }</code></strong> visitors as complementary styles for heterogeneous sequences.</p>
<hr />
<h2 id="165-special-cases-p-168">16.5 Special cases (p. 168)</h2>
<h3 id="bool-and-stdstring-oops"><code>bool</code> and <code>std::string</code> [OOPS]</h3>
<pre><code class="language-cpp">std::variant&lt;bool, std::string&gt; v = &quot;hi&quot;;  // may NOT do what you expect
</code></pre>
<p><strong>Problem</strong>: unscoped overload resolution: a <strong>string literal</strong> can convert to <code>const char*</code>, and <code>const char*</code> converts to <code>bool</code> (non-null pointer -&gt; <code>true</code>). So the literal may initialize the <strong><code>bool</code></strong> branch, not <code>std::string</code>.</p>
<p><strong>Fix</strong>: qualify the alternative:</p>
<pre><code class="language-cpp">v = std::string{&quot;hi&quot;};
</code></pre>
<p>or use different design (order alternatives carefully, prefer <code>std::string</code> before <code>bool</code>, but the implicit <code>const char*</code> -&gt; <code>bool</code> pitfall remains for certain initializations). Josuttis highlights this as a <strong>real footgun</strong>.</p>
<hr />
<h2 id="ascii-variant-vs-union-vs-inheritance">ASCII: variant vs union vs inheritance</h2>
<pre><code> C union (untagged)
 ┌─────────────────────────┐
 │  raw storage (max size) │  programmer must remember active member
 └─────────────────────────┘

 std::variant&lt;A,B,C&gt; (tagged)
 ┌───────┬─────────────────────────┐
 │ index │ storage for active type │
 └───────┴─────────────────────────┘

 Inheritance + virtual
      Shape*
         │
    ┌────┴────┬────────┐
    v         v        v
  Circle   Rectangle  Line
  (usually separate allocations when heap-polymorphic)
</code></pre>
<hr />
<h2 id="ascii-variant-memory-layout-schematic">ASCII: variant memory layout (schematic)</h2>
<pre><code> variant&lt;int, std::string&gt; (conceptual)
 ┌──────────────────────────────────────┐
 │ discriminator (which alternative)    │
 │ [possible padding]                   │
 │ union-like storage for max(sizeof...)│
 │   either int bits                    │
 │   or string object (SSO / heap ptr)  │
 └──────────────────────────────────────┘
</code></pre>
<p>(Exact layout is implementation-defined; string may use SSO so &ldquo;heap ptr&rdquo; is not always present.)</p>
<hr />
<h2 id="ascii-visitor-dispatch">ASCII: visitor dispatch</h2>
<pre><code> visit(visitor, variant)
        │
        ├─ index == 0 ──&gt; visitor(Alt0&amp;)
        ├─ index == 1 ──&gt; visitor(Alt1&amp;)
        └─ index == 2 ──&gt; visitor(Alt2&amp;)

 * Single dynamic branch on index, then static call
 * Compared to virtual: no per-object vptr indirection for the variant object itself
</code></pre>
<hr />
<h2 id="summary">Summary</h2>
<ul>
<li><strong><code>variant</code></strong> is the standard <strong>tagged union</strong> for a <strong>closed</strong> type set (Josuttis pp. 149-168).</li>
<li><strong>Construction</strong> can be <strong>[OK]</strong> (unique best alternative), <strong>[ERROR]</strong> (ambiguous overload), or surprising <strong>[OOPS]</strong> (<code>bool</code> vs string literal). Use <strong><code>in_place_type</code> / <code>in_place_index</code></strong> when you must disambiguate; there is <strong>no CTAD / <code>make_variant</code></strong>.</li>
<li><strong><code>std::get&lt;T&gt;</code></strong> is <strong>[ERROR]</strong> at compile time if <strong>duplicate</strong> <code>T</code> appears in the list; use <strong><code>get&lt;I&gt;</code></strong> by index.</li>
<li><strong>Comparisons</strong>: earlier index wins for ordering when indices differ; same index compares values; <strong>valueless</strong> compares specially; <strong>[ERROR]</strong> to compare <strong>different</strong> <code>variant&lt;...&gt;</code> specializations.</li>
<li>Prefer <strong><code>get_if</code></strong> / <strong><code>holds_alternative</code></strong> when you want non-throwing checks.</li>
<li><strong><code>visit</code></strong>: function objects, <strong>mutating</strong> visitors, <strong>generic lambdas</strong>, <strong><code>if constexpr</code></strong>, unified <strong>return types</strong>, and <strong><code>overload{...}</code></strong> cover most dispatch patterns.</li>
<li>Watch <strong>valueless-by-exception</strong> (e.g. throwing conversions in <strong><code>emplace</code></strong>) and the <strong><code>bool</code> / <code>const char*</code></strong> interaction (p. 168).</li>
</ul>` },
  { name: `18. Std Any`, path: `17_std_any.md`, dir: ``, body: `<h1 id="chapter-17-stdany-the-complete-guide-pp-171-177">Chapter 17: <code>std::any</code> (The Complete Guide, pp. 171-177)</h1>
<p>This chapter follows <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. Page references use <strong>p.</strong></p>
<hr />
<h2 id="171-using-stdany-p-171">17.1 Using <code>std::any</code> (p. 171)</h2>
<h3 id="empty-any">Empty <code>any</code></h3>
<pre><code class="language-cpp">#include &lt;any&gt;
#include &lt;string&gt;

std::any a;           // empty: no contained object
assert(!a.has_value());
</code></pre>
<h3 id="hold-any-copyable-type">Hold any (copyable) type</h3>
<pre><code class="language-cpp">std::any a = 42;
a = std::string{&quot;hello&quot;};  // replaces stored value
</code></pre>
<p><code>std::any</code> owns <strong>one</strong> object whose type is erased at compile time but recorded at run time (via <code>type()</code> -&gt; <code>std::type_info</code>).</p>
<h3 id="any_castta-throws-on-mismatch-p-172"><code>any_cast&lt;T&gt;(a)</code> throws on mismatch (p. 172)</h3>
<pre><code class="language-cpp">std::any a = 42;
int n = std::any_cast&lt;int&gt;(a);  // [OK]

try {
    std::any_cast&lt;std::string&gt;(a);  // [ERROR] bad_any_cast
} catch (const std::bad_any_cast&amp;) {
    // wrong type
}
</code></pre>
<h3 id="pointer-overload-nullptr-if-wrong-type-p-172">Pointer overload: <code>nullptr</code> if wrong type (p. 172)</h3>
<pre><code class="language-cpp">std::any a = 42;
if (int* p = std::any_cast&lt;int&gt;(&amp;a)) {
    *p = 100;  // modify inside the any
}
if (std::any_cast&lt;std::string&gt;(&amp;a) == nullptr) {
    // not a string
}
</code></pre>
<p>Non-throwing introspection + optional in-place update via pointer.</p>
<h3 id="type-has_value-reset-p-173"><code>type()</code>, <code>has_value()</code>, <code>reset()</code> (p. 173)</h3>
<pre><code class="language-cpp">const std::any&amp; ca = a;
assert(ca.type() == typeid(int));
a.reset();
assert(!a.has_value());
</code></pre>
<h3 id="make_any-p-173"><code>make_any</code> (p. 173)</h3>
<pre><code class="language-cpp">auto s = std::make_any&lt;std::string&gt;(5u, 'z');  // &quot;zzzzz&quot;
</code></pre>
<h3 id="any_cast-with-references-to-modify-in-place-p-173"><code>any_cast</code> with references to modify in place (p. 173)</h3>
<pre><code class="language-cpp">std::any a = std::string{&quot;hi&quot;};
std::any_cast&lt;std::string&amp;&gt;(a) += &quot; there&quot;;
</code></pre>
<p>Use the <strong>reference</strong> form when you need to mutate the contained object without replacing the whole <code>any</code>.</p>
<h3 id="decay-behavior-when-storing-p-173">Decay behavior when storing (p. 173)</h3>
<p>Values are stored using the <strong>decayed</strong> type of the initializer. String literals decay to <code>const char*</code>, not <code>std::string</code>.</p>
<pre><code class="language-cpp">std::any a = &quot;hello&quot;;
// [OK] a.type() is typeid(const char*), NOT typeid(std::string)
if (a.type() == typeid(const char*)) { /* [OK] true */ }

try {
    (void)std::any_cast&lt;std::string&gt;(a);  // [ERROR] bad_any_cast: wrong type
} catch (const std::bad_any_cast&amp;) { }
</code></pre>
<p>To hold a <code>std::string</code>, construct or assign one explicitly (e.g. <code>std::string{"hello"}</code> or <code>emplace&lt;std::string&gt;(...)</code>).</p>
<h3 id="in_place_type-when-the-constructed-type-differs-from-the-initializer-p-175"><code>in_place_type</code> when the constructed type differs from the initializer (p. 175)</h3>
<p>Josuttis shows the <strong>in-place constructor</strong> so the object inside the <code>any</code> is built as <strong><code>long</code></strong> or <strong><code>std::string</code></strong> even when the initializer alone would not select that type. The first argument is the tag <code>std::in_place_type_t&lt;T&gt;{}</code> (C++17); <strong>since C++20</strong> you can write <strong><code>std::in_place_type&lt;T&gt;</code></strong> as a shorthand <code>constexpr</code> tag object.</p>
<pre><code class="language-cpp">#include &lt;utility&gt;  // std::in_place_type_t

std::any a4{std::in_place_type_t&lt;long&gt;{}, 42};
std::any a5{std::in_place_type_t&lt;std::string&gt;{}, &quot;hello&quot;};  // [OK] std::string inside

// [OOPS] Even in_place_type does not bypass decay for array-to-pointer:
std::any a5b{std::in_place_type_t&lt;const char[6]&gt;{}, &quot;hello&quot;};
// Still stores const char* (array decays); not a char array inside the any
</code></pre>
<h3 id="what-stdany-does-not-provide-p-173">What <code>std::any</code> does <strong>not</strong> provide (p. 173)</h3>
<ul>
<li><strong>No</strong> <code>operator==</code> / <code>operator!=</code> (or other comparisons) for <code>std::any</code> values.</li>
<li><strong>No</strong> <code>std::hash&lt;std::any&gt;</code> in the standard library.</li>
<li><strong>No</strong> <code>.value()</code> member (unlike <code>optional</code> / some other wrappers); use <code>any_cast</code> after <code>type()</code> checks.</li>
</ul>
<hr />
<h2 id="172-types-and-operations-p-174">17.2 Types and operations (p. 174)</h2>
<h3 id="heap-allocation-and-small-buffer-optimization-p-174">Heap allocation and small-buffer optimization (p. 174)</h3>
<p>Unlike <code>optional</code>/<code>variant</code>, <code>any</code> may <strong>allocate</strong> on the heap for large or alignment-heavy types, but implementations often apply <strong>small buffer optimization (SBO)</strong>: small types stored inline, big types on the heap. Josuttis explains that this tradeoff makes <code>any</code> flexible but less transparent than <code>variant</code> for performance reasoning.</p>
<h3 id="value-semantics-deep-copy-p-174">Value semantics: deep copy (p. 174)</h3>
<p>Copying <code>std::any</code> <strong>copies the contained object</strong> if the held type is copyable. If the held type is not copyable, copying the <code>any</code> may be deleted or ill-formed depending on how the <code>any</code> was populated (Josuttis notes limitations around non-copyable types).</p>
<h3 id="emplacetargs-p-175"><code>emplace&lt;T&gt;(args...)</code> (p. 175)</h3>
<pre><code class="language-cpp">std::any a;
a.emplace&lt;std::vector&lt;int&gt;&gt;(5, 0);  // vector of five zeros
</code></pre>
<p>Destroys previous content (if any) and constructs <code>T</code> directly inside the <code>any</code>.</p>
<h3 id="comparison-with-void-and-boostany-p-175-176">Comparison with <code>void*</code> and Boost.Any (p. 175-176)</h3>
<table>
<thead>
<tr>
<th>Feature</th>
<th><code>void*</code></th>
<th><code>std::any</code></th>
</tr>
</thead>
<tbody>
<tr>
<td>Type safety</td>
<td>None (manual casts)</td>
<td>Checked <code>any_cast</code></td>
</tr>
<tr>
<td>Ownership</td>
<td>Manual</td>
<td><code>any</code> owns its object</td>
</tr>
<tr>
<td>Copy semantics</td>
<td>Shallow (pointer copy)</td>
<td>Deep copy of contained object</td>
</tr>
</tbody>
</table>
<p>Boost.Any inspired <code>std::any</code>; migration is usually straightforward for basic usage (Josuttis positions <code>std::any</code> as the standard facility).</p>
<h3 id="heterogeneous-sequence-stdvectorstdany-p-173">Heterogeneous sequence: <code>std::vector&lt;std::any&gt;</code> (p. 173)</h3>
<pre><code class="language-cpp">#include &lt;any&gt;
#include &lt;string&gt;
#include &lt;vector&gt;

std::vector&lt;std::any&gt; v;
v.push_back(42);
std::string s = &quot;hi&quot;;
v.push_back(s);

for (auto&amp; e : v) {
    if (int* p = std::any_cast&lt;int&gt;(&amp;e)) {
        // [OK] use *p
    } else if (std::string* ps = std::any_cast&lt;std::string&gt;(&amp;e)) {
        // [OK] use *ps
    }
}
</code></pre>
<p>There is <strong>no</strong> <code>switch</code> on the dynamic type and <strong>no</strong> <code>std::visit</code> for <code>any</code>; dispatch is typically an <strong>if–else</strong> chain (or a map from <code>type_index</code> to handlers).</p>
<hr />
<h2 id="move-semantics-with-stdany-pp-176-177">Move semantics with <code>std::any</code> (pp. 176-177)</h2>
<h3 id="move-only-types-are-not-supported">Move-only types are not supported</h3>
<p><code>std::any</code> requires the contained type to be <strong>copyable</strong> (CopyConstructible). <strong>Move-only</strong> types cannot be stored in <code>std::any</code> in the usual sense—Josuttis stresses this limitation relative to type-erased containers that only move.</p>
<h3 id="moving-in-and-out">Moving in and out</h3>
<pre><code class="language-cpp">std::any a;
std::string s = &quot;data&quot;;
a = std::move(s);  // [OK] move string into the any (s moved-from)

// Move out (idiomatic): modify through reference, then move from lvalue
std::string out = std::move(std::any_cast&lt;std::string&amp;&gt;(a));  // [OK] preferred idiom

// Alternative: extra move from the temporary returned by value overload
std::string out2 = std::any_cast&lt;std::string&gt;(std::move(a));  // [OK] but one extra move

// std::string&amp;&amp; r = std::any_cast&lt;std::string&amp;&amp;&gt;(a);  // [ERROR] does not compile
</code></pre>
<p>After moving <strong>out</strong>, <code>a</code> typically <strong><code>has_value()</code> remains true</strong>; the contained object is a <strong>moved-from</strong> <code>std::string</code> (valid but unspecified state), not an empty <code>any</code>. To clear, call <code>reset()</code> or assign a new value.</p>
<pre><code> Move-out via any_cast&lt;string&amp;&gt;(a)
 ┌────────────────────────────────────────┐
 │ any still holds type string            │
 │ contained object = moved-from string   │
 └────────────────────────────────────────┘
 Reset explicitly if you need &quot;empty any&quot;
</code></pre>
<hr />
<h2 id="ascii-optional-vs-variant-vs-any">ASCII: <code>optional</code> vs <code>variant</code> vs <code>any</code></h2>
<pre><code> Problem: &quot;maybe no value&quot;
 optional&lt;T&gt;
 ┌─────────────────────┐
 │ empty OR exactly T  │
 └─────────────────────┘
  T fixed at compile time

 Problem: &quot;one of several known types&quot;
 variant&lt;A,B,C&gt;
 ┌─────────────────────┐
 │ exactly one of A|B|C│
 └─────────────────────┘
  Closed set, tag is index

 Problem: &quot;any copyable value, type unknown until runtime&quot;
 any
 ┌─────────────────────┐
 │ type-erased object  │
 └─────────────────────┘
  Open (for copyable types), type in runtime type_info
</code></pre>
<p><strong>When to choose</strong> (Josuttis-style guidance):</p>
<ul>
<li><strong><code>optional</code></strong>: absence/presence of a <strong>single</strong> known type.</li>
<li><strong><code>variant</code></strong>: <strong>fixed</strong> alternation between specific types (<code>visit</code>-friendly).</li>
<li><strong><code>any</code></strong>: <strong>heterogeneous</strong> maps, plugin-like prototypes, or transitional APIs when you cannot template on all types—accept runtime typing cost.</li>
</ul>
<hr />
<h2 id="pitfalls-and-style-notes">Pitfalls and style notes</h2>
<ol>
<li><strong>Performance opacity</strong>: every access through <code>any_cast</code>; harder for optimizers than <code>variant</code> visitation.</li>
<li><strong>Testing types</strong>: prefer pointer <code>any_cast</code> when failure is expected.</li>
<li><strong>Large interfaces</strong>: exposing <code>std::any</code> widely can obscure contracts; prefer <code>variant</code> or templates when callers know types.</li>
</ol>
<hr />
<h2 id="minimal-worked-example-heterogeneous-map-idiom">Minimal worked example: heterogeneous map (idiom)</h2>
<pre><code class="language-cpp">#include &lt;any&gt;
#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;unordered_map&gt;

int main() {
    std::unordered_map&lt;std::string, std::any&gt; bag;
    bag[&quot;count&quot;] = 7;
    bag[&quot;name&quot;]  = std::string{&quot;Scot&quot;};

    int n = std::any_cast&lt;int&gt;(bag[&quot;count&quot;]);
    const std::string&amp; s = std::any_cast&lt;const std::string&amp;&gt;(bag[&quot;name&quot;]);
    std::cout &lt;&lt; n &lt;&lt; ' ' &lt;&lt; s &lt;&lt; '\\n';
}
</code></pre>
<p>(Production code often still prefers typed structs once the schema stabilizes; Josuttis presents <code>any</code> as a tool, not a default design.)</p>
<hr />
<h2 id="see-also-in-josuttis">See also in Josuttis</h2>
<ul>
<li><strong>§17.1</strong> (p. 171): usage, casts, mutation, decay, no comparison/hash/<code>value()</code>.</li>
<li><strong>§17.2</strong> (p. 174): mechanics, SBO, <code>emplace</code>, <code>in_place_type_t</code>, heterogeneous containers.</li>
<li><strong>Move semantics</strong> (pp. 176-177): move-in/move-out idioms, moved-from state, no <code>any_cast</code> rvalue reference overload.</li>
</ul>
<p>This file is a tutorial expansion keyed to the book&rsquo;s page ranges; consult the printed chapter for Josuttis&rsquo;s original prose and additional edge cases.</p>` },
  { name: `19. Std Byte`, path: `18_std_byte.md`, dir: ``, body: `<h1 id="chapter-18-stdbyte-the-complete-guide-pp-179-184">Chapter 18: <code>std::byte</code> (The Complete Guide, pp. 179-184)</h1>
<p>This chapter follows <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. Page references use <strong>p.</strong></p>
<hr />
<h2 id="181-using-stdbyte-p-179">18.1 Using <code>std::byte</code> (p. 179)</h2>
<h3 id="raw-memory-byte-not-arithmetic">Raw memory byte, not arithmetic</h3>
<p><code>std::byte</code> models a single <strong>raw byte</strong> of storage. It is <strong>not</strong> a numeric integer type in the interface sense: you are not supposed to do <code>+</code> / <code>-</code> on bytes as if they were <code>int</code>. The intent is clearer code for <strong>binary buffers</strong>, bit masks, and low-level layouts.</p>
<h3 id="relaxed-enum-initialization-c17-p-179">Relaxed enum initialization (C++17) (p. 179)</h3>
<p><code>std::byte</code> is a scoped enumeration backed by <code>unsigned char</code>. C++17 allows <strong>list-initialization</strong> from an integer <strong>if</strong> the conversion is to enum:</p>
<pre><code class="language-cpp">#include &lt;cstddef&gt;

std::byte b{42};
std::byte b2{0xFF};
</code></pre>
<p>This is the idiomatic way to construct a byte with a known bit pattern.</p>
<h3 id="initialization-constraints-p-180">Initialization constraints (p. 180)</h3>
<p>List initialization with <code>{…}</code> is the primary form; <strong>direct initialization</strong> <code>()</code> and <strong>copy</strong> forms <code>=</code> are ill-formed for the usual integer-to-byte path:</p>
<pre><code class="language-cpp">std::byte b1{42};     // [OK]
// std::byte b2(42);  // [ERROR] (not list-init from int the way enum class allows)
// std::byte b3 = 42; // [ERROR] (no viable conversion)
// std::byte b4 = {42}; // [ERROR] same issue as copy-init from int

// std::byte b5[] {1};           // [ERROR] no implicit conversion from int
std::byte b6[] {std::byte{1}};  // [OK] each element explicitly std::byte

std::byte b_uninit;   // [OOPS] indeterminate value if automatic storage
std::byte b_zero{};   // [OK] value-initialized (zero)
</code></pre>
<h3 id="sizeof-and-bit-width-pp-180-181"><code>sizeof</code> and bit width (pp. 180-181)</h3>
<pre><code class="language-cpp">static_assert(sizeof(std::byte) == 1);  // [OK] always 1 byte

#include &lt;limits&gt;
constexpr int bits =
    std::numeric_limits&lt;std::underlying_type_t&lt;std::byte&gt;&gt;::digits;
// Usually 8: same as unsigned char (via std::numeric_limits&lt;unsigned char&gt;::digits)
</code></pre>
<h3 id="adl-and-to_integer-p-180">ADL and <code>to_integer</code> (p. 180)</h3>
<p><code>std::to_integer</code> is <strong>not</strong> found by argument-dependent lookup when you call it <strong>unqualified</strong> with a <code>std::byte</code> argument—the usual &ldquo;just write <code>to_integer</code>&rdquo; pattern fails:</p>
<pre><code class="language-cpp">// std::cout &lt;&lt; to_integer&lt;int&gt;(b1) &lt;&lt; '\\n';  // [ERROR] ADL does not find std::to_integer

std::cout &lt;&lt; std::to_integer&lt;int&gt;(b1) &lt;&lt; '\\n';  // [OK] fully qualified

// if (b2) { }  // [ERROR] no bool conversion
if (std::to_integer&lt;bool&gt;(b2)) { }  // [OK] explicit numeric path to bool
</code></pre>
<h3 id="converting-to-integer-stdto_integerintb-p-180">Converting to integer: <code>std::to_integer&lt;int&gt;(b)</code> (p. 180)</h3>
<p>When you need a numeric <code>int</code> (for logging, indexing, arithmetic on the <em>numeric</em> value):</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

int x = std::to_integer&lt;int&gt;(b);
</code></pre>
<p>Use the explicit conversion pathway rather than relying on unsafe C-style casts everywhere.</p>
<h3 id="bitwise-operations-p-180">Bitwise operations (p. 180)</h3>
<p><code>std::byte</code> supports:</p>
<ul>
<li><code>|</code>, <code>&amp;</code>, <code>^</code>, <code>~</code></li>
<li><code>&lt;&lt;=</code>, <code>&gt;&gt;=</code> (and the non-assigning shifts on promoted operands per operator rules)</li>
</ul>
<p>Example:</p>
<pre><code class="language-cpp">std::byte a{0b1010'0000};
std::byte b{0b0000'1111};
std::byte c = a &amp; b;
</code></pre>
<hr />
<h2 id="182-types-and-operations-p-181">18.2 Types and operations (p. 181)</h2>
<h3 id="definition-p-181">Definition (p. 181)</h3>
<p>Josuttis quotes the spirit of the standard definition:</p>
<pre><code class="language-cpp">namespace std {
    enum class byte : unsigned char {};
}
</code></pre>
<p>So each <code>std::byte</code> has the <strong>same size and alignment</strong> as <code>unsigned char</code>.</p>
<h3 id="no-general-arithmetic-p-181">No general arithmetic (p. 181)</h3>
<p>There are <strong>no</strong> <code>operator+</code>, <code>operator-</code>, <code>*</code>, <code>/</code> for <code>std::byte</code>. If you want numeric addition on byte values, convert via <code>to_integer</code>, add as integers, then convert back (with range checks if needed).</p>
<p><strong>Rationale</strong> (as Josuttis explains): preventing accidental mixing of &ldquo;byte oriented&rdquo; logic with normal math, and preventing silent integral promotions that obscure bit logic.</p>
<h3 id="no-implicit-conversions-p-182">No implicit conversions (p. 182)</h3>
<p>You cannot implicitly use <code>std::byte</code> where an <code>int</code> is expected. This forces explicit <code>to_integer</code> or an explicit cast, reducing bugs.</p>
<h3 id="io-cast-for-output-p-182">I/O: cast for output (p. 182)</h3>
<pre><code class="language-cpp">#include &lt;iostream&gt;

std::byte b{  static_cast&lt;std::byte&gt;(42)  };
std::cout &lt;&lt; std::to_integer&lt;unsigned&gt;(b) &lt;&lt; '\\n';
</code></pre>
<p>There is no <code>operator&lt;&lt;</code> for <code>std::byte</code> in the standard stream interface in the same way as for <code>int</code>; you choose the integer type whose representation you want to print (decimal, or print hex yourself).</p>
<h3 id="binary-io-with-stdbitset-p-183">Binary I/O with <code>std::bitset</code> (p. 183)</h3>
<p>Print the bit pattern of a byte (including leading zeros) via a <code>bitset</code> sized to the byte width:</p>
<pre><code class="language-cpp">#include &lt;bitset&gt;
#include &lt;limits&gt;
#include &lt;iostream&gt;
#include &lt;string&gt;

using ByteBitset =
    std::bitset&lt;std::numeric_limits&lt;unsigned char&gt;::digits&gt;;

std::byte b1{0b0010'1010};
std::cout &lt;&lt; ByteBitset{std::to_integer&lt;unsigned&gt;(b1)};  // e.g. 00101010
std::string s = ByteBitset{std::to_integer&lt;unsigned&gt;(b1)}.to_string();  // [OK] &quot;00101010...&quot;
</code></pre>
<h3 id="stdto_chars--stdfrom_chars-and-formatted-binary-pp-183-184"><code>std::to_chars</code> / <code>std::from_chars</code> and formatted binary (pp. 183-184)</h3>
<p><code>std::to_chars</code> can write a <strong>binary</strong> representation <strong>without</strong> leading zeros (output length varies). For <strong>input</strong>, a practical pattern is <strong><code>istream</code> + <code>bitset</code></strong> for a fixed-width binary field; converting back needs an explicit cast because list-initialization from <code>unsigned long</code> can <strong>narrow</strong> relative to <code>std::byte</code>:</p>
<pre><code class="language-cpp">#include &lt;charconv&gt;
#include &lt;array&gt;
#include &lt;bitset&gt;
#include &lt;istream&gt;
// ...

std::array&lt;char, 64&gt; buf{};
auto r = std::to_chars(buf.data(), buf.data() + buf.size(),
                       std::to_integer&lt;unsigned&gt;(b1), 2);  // base 2, no leading zeros

// Example: input operator using bitset (fixed width = digits per byte)
std::istream&amp; operator&gt;&gt;(std::istream&amp; is, std::byte&amp; out) {
    ByteBitset bs;
    if (is &gt;&gt; bs) {
        unsigned long v = bs.to_ulong();
        out = static_cast&lt;std::byte&gt;(v);  // [OK] explicit; list-init would narrow
    }
    return is;
}
</code></pre>
<p>(Josuttis ties these techniques to readable hex/binary dumps without treating <code>std::byte</code> as an arithmetic type.)</p>
<h3 id="compound-bitwise-example-p-183">Compound bitwise example (p. 183)</h3>
<pre><code class="language-cpp">std::byte b1{0x0F};
std::byte b2{0xF0};
std::byte b3 = b1 &amp; b2;  // 0x00
</code></pre>
<hr />
<h2 id="ascii-byte-operations">ASCII: byte operations</h2>
<pre><code> Individual byte (8 bits on typical platforms)
 ┌───┬───┬───┬───┬───┬───┬───┬───┐
 │b7 │b6 │b5 │b4 │b3 │b2 │b1 │b0 │
 └───┴───┴───┴───┴───┴───┴───┴───┘
          ^
          interpreted as raw pattern, not &quot;number&quot; until to_integer

 AND (&amp;): both bits 1 -&gt; 1
 OR  (|): either 1 -&gt; 1
 XOR (^): different -&gt; 1
 NOT (~): flip bits (subject to type promotion rules in expressions)

 Shift (&lt;&lt;, &gt;&gt;): move pattern left/right; often combined with &amp;= on larger buffers
</code></pre>
<p><strong>Contrast with <code>unsigned char</code> used as &ldquo;small integer&rdquo;:</strong></p>
<pre><code> unsigned char: participates in arithmetic, promotes to int easily
 std::byte:     bitwise-focused API; explicit path to integer math
</code></pre>
<hr />
<h2 id="when-to-use-stdbyte-summary">When to use <code>std::byte</code> (summary)</h2>
<ul>
<li><strong>Binary protocols</strong>, <strong>file headers</strong>, <strong>checksum regions</strong>: operations are naturally bitwise.</li>
<li><strong>Interoperability</strong>: you still often need <code>reinterpret_cast</code> to/from <code>byte*</code> when interfacing with C APIs; keep such casts localized and documented (Josuttis warns about strict aliasing and alignment in neighboring chapters on low-level code).</li>
</ul>
<hr />
<h2 id="small-worked-example-or-a-mask-into-the-first-byte">Small worked example: OR a mask into the first byte</h2>
<p><code>std::byte</code> already provides <code>operator|</code> in the standard library; use it directly:</p>
<pre><code class="language-cpp">#include &lt;cstddef&gt;
#include &lt;cstdint&gt;

enum class Flags : std::uint32_t { Read = 1, Write = 2 };

void set_write(std::byte* word, std::size_t len_bytes) {
    if (len_bytes == 0) return;
    const std::byte mask{
        static_cast&lt;std::byte&gt;(static_cast&lt;std::uint32_t&gt;(Flags::Write))};
    word[0] = word[0] | mask;  // illustrative: lowest byte only
}
</code></pre>
<p>(In real code, endianness and endian-safe reads/writes matter; this only illustrates bitwise <code>|</code> on <code>std::byte</code>.)</p>
<hr />
<h2 id="references-in-josuttis">References in Josuttis</h2>
<ul>
<li><strong>§18.1</strong> (p. 179): motivation, list-init vs other forms, ADL/<code>to_integer</code>, <code>sizeof</code>/digits.</li>
<li><strong>§18.2</strong> (p. 181): precise operations; <strong>I/O</strong> (decimal, <strong>bitset</strong> binary strings, <strong><code>to_chars</code></strong> / stream patterns from pp. 183-184).</li>
</ul>
<p>Use the printed index for cross-references to <code>std::vector&lt;std::byte&gt;</code>-style buffers in other parts of the book.</p>` },
  { name: `20. String Views`, path: `19_string_views.md`, dir: ``, body: `<h1 id="chapter-19-string-views-the-complete-guide-pp-185-198">Chapter 19: String Views (The Complete Guide, pp. 185-198)</h1>
<p>This chapter follows <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. Page references use <strong>p.</strong></p>
<hr />
<h2 id="191-differences-vs-stdstring-p-185">19.1 Differences vs <code>std::string</code> (p. 185)</h2>
<p><code>std::string</code> <strong>owns</strong> a character buffer (typically heap-allocated beyond SSO threshold). <code>std::string_view</code> is a <strong>non-owning</strong> reference to a contiguous character sequence, represented as <strong><code>const char*</code> + <code>size</code></strong>.</p>
<p>Key contrasts Josuttis emphasizes:</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th><code>std::string</code></th>
<th><code>std::string_view</code></th>
</tr>
</thead>
<tbody>
<tr>
<td>Ownership</td>
<td>Owns buffer</td>
<td>Does not own</td>
</tr>
<tr>
<td>Allocation</td>
<td>May allocate</td>
<td>No allocation for view</td>
</tr>
<tr>
<td>Null termination</td>
<td>Often NTBS-compatible</td>
<td><strong>Not guaranteed</strong></td>
</tr>
<tr>
<td>Lifetime</td>
<td>Self-contained</td>
<td><strong>Depends on source</strong></td>
</tr>
</tbody>
</table>
<hr />
<h2 id="192-using-string-views-p-186">19.2 Using string views (p. 186)</h2>
<h3 id="construction-details-pp-193-195">Construction details (pp. 193-195)</h3>
<p><strong>Default-constructed view:</strong></p>
<pre><code class="language-cpp">std::string_view sv0;
// sv0.data() == nullptr; sv0.size() == 0
// sv0[0] is invalid / undefined; do not index without checking size
</code></pre>
<p><strong>From a null-terminated string literal</strong> (length excludes the terminating <code>\\0</code>):</p>
<pre><code class="language-cpp">std::string_view sv{&quot;hello&quot;};
// size() == 5; sv[0]..sv[4] valid; sv[5] is [ERROR] / UB (not part of the view)
</code></pre>
<p><strong>Including the null terminator in the span</strong> (length counts the extra byte):</p>
<pre><code class="language-cpp">std::string_view sv_nt{&quot;hello&quot;, 6};  // [OK] size() == 6, last char is '\\0'
</code></pre>
<p><strong>From <code>std::string</code>:</strong> implicit conversion yields a view into the string’s contiguous storage. The view is <strong>not</strong> guaranteed to be null-terminated—only <code>size()</code> bytes are valid.</p>
<p><strong><code>constexpr</code> views:</strong></p>
<pre><code class="language-cpp">constexpr std::string_view hello = &quot;Hello World!&quot;;  // [OK]
</code></pre>
<h3 id="construction-from-literal-quick-form">Construction from literal (quick form)</h3>
<pre><code class="language-cpp">#include &lt;string_view&gt;

std::string_view sv = &quot;hello&quot;;
</code></pre>
<p>The view points at static string literal storage with known length (implementation forms the view without allocating).</p>
<h3 id="substrings-and-trimming-p-186">Substrings and trimming (p. 186)</h3>
<pre><code class="language-cpp">std::string_view sv = &quot;  hello world  &quot;;
sv.remove_prefix(2);   // &quot;hello world  &quot;
sv.remove_suffix(2);   // &quot;hello world&quot;
auto tok = sv.substr(0, 5);  // view to first 5 chars: &quot;hello&quot;
</code></pre>
<p><strong>Josuttis-style trim example</strong> (<code>remove_prefix</code> / <code>remove_suffix</code>, p. 195):</p>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;string_view&gt;

std::string_view sv = &quot;I like my kindergarten&quot;;
sv.remove_prefix(2);   // drop &quot;I &quot;
sv.remove_suffix(8);   // drop &quot;garten&quot; (8 chars from end)
std::cout &lt;&lt; sv;       // [OK] prints: like my kind
</code></pre>
<p><strong>Note</strong>: <code>substr</code> on a <code>string_view</code> returns another <strong>view</strong>; still no allocation.</p>
<h3 id="no-operator-for-string_view-pp-195-196">No <code>operator+</code> for <code>string_view</code> (pp. 195-196)</h3>
<p><code>string_view</code> does not concatenate with <code>+</code> like strings:</p>
<pre><code class="language-cpp">// auto s1 = sv1 + sv2;              // [ERROR] no operator+
auto s2 = std::string(sv1) + sv2;    // [OK] at least one std::string participates
</code></pre>
<h3 id="cheap-to-copy-p-186">Cheap to copy (p. 186)</h3>
<p>Copying a <code>string_view</code> copies <strong>pointer + length</strong> (two word-like members typically), not the characters.</p>
<hr />
<h2 id="193-using-as-parameters-p-186">19.3 Using as parameters (p. 186)</h2>
<h3 id="pass-by-value-p-187">Pass by value (p. 187)</h3>
<pre><code class="language-cpp">void process(std::string_view sv);  // cheap by-value
</code></pre>
<p>Josuttis argues this is often superior to <code>const std::string&amp;</code> when the callee only needs <strong>read-only</strong> access, because call sites can pass <strong>literals and <code>const char*</code></strong> without constructing a temporary <code>std::string</code>.</p>
<h3 id="when-to-use-p-187">When to use (p. 187)</h3>
<ul>
<li>Parsing, scanning, logging prefixes/suffixes.</li>
<li>APIs that only <strong>read</strong> characters and do not need to extend lifetime.</li>
</ul>
<hr />
<h2 id="1931-string-view-considered-harmful-p-188">19.3.1 String view considered harmful (p. 188)</h2>
<h3 id="dangling-views">Dangling views</h3>
<p>A <code>string_view</code> does not keep the underlying characters alive.</p>
<p><strong>Bad pattern</strong> (conceptually what Josuttis warns against):</p>
<pre><code class="language-cpp">std::string_view bad() {
    std::string s = &quot;temporary&quot;;
    return s;  // [ERROR] s destroyed; view dangles
}
</code></pre>
<p>After the function returns, the pointer inside the view is invalid.</p>
<h3 id="do-not-return-string_view-from-factories-local-strings">Do not return <code>string_view</code> from factories Local strings</h3>
<p>If a function <strong>creates</strong> a <code>std::string</code> and the caller needs to observe it, return <code>std::string</code> (or move it), not <code>string_view</code>.</p>
<h3 id="do-not-store-string_view-without-lifetime-proof">Do not store <code>string_view</code> without lifetime proof</h3>
<pre><code class="language-cpp">struct Cache {
    std::string_view ref;  // dangerous if source may disappear
};
</code></pre>
<p>Prefer <code>std::string</code> for stored text unless you <strong>prove</strong> the backing buffer outlives <code>Cache</code> (e.g., points into static storage or a guaranteed parent string).</p>
<h3 id="no-implicit-conversion-to-stdstring">No implicit conversion to <code>std::string</code></h3>
<pre><code class="language-cpp">std::string_view sv = &quot;hi&quot;;
std::string s{sv};  // explicit construction
</code></pre>
<p>Implicit conversion would hide allocations; the design forces clarity.</p>
<h3 id="not-null-terminated-p-189-190">Not null-terminated (p. 189-190)</h3>
<p>You <strong>cannot</strong> safely pass <code>sv.data()</code> to <code>strlen</code> or legacy APIs that require a null-terminated string unless you have a separate guarantee. Josuttis recommends using the <strong>size</strong> (<code>sv.size()</code>) with modern APIs, or materialize an <code>std::string</code> when calling C APIs that need NTBS.</p>
<h3 id="function-templates-should-use-return-type-auto-p-190">Function templates should use return type <code>auto</code> (p. 190)</h3>
<p>If a generic function returns <code>x + y</code> for string-like <code>T</code>, <strong>naming</strong> the return type as <code>T</code> can yield a <strong><code>string_view</code></strong> that <strong>dangles</strong> when temporaries participate in <code>+</code>. Returning <strong><code>auto</code></strong> lets <code>operator+</code> deduce <code>std::string</code> when that is the natural result.</p>
<pre><code class="language-cpp">template &lt;typename T&gt;
auto concat(const T&amp; x, const T&amp; y) { return x + y; }  // [OK] e.g. std::string when x,y are string + literal chain

// template &lt;typename T&gt;
// T concat_bad(const T&amp; x, const T&amp; y) { return x + y; }
// [OOPS] If T is std::string_view, the result can be string_view to dead temporaries -&gt; dangling
</code></pre>
<p><strong>Rule of thumb:</strong> with <code>auto</code>, <code>xy</code> can stay <strong><code>std::string</code></strong> when that is what <code>operator+</code> produces; if the return type is forced to <strong><code>T</code></strong>, <strong><code>xy</code> may become <code>string_view</code></strong> even when the expression built temporaries—<strong>[ERROR] lifetime trap</strong>.</p>
<h3 id="do-not-use-string_view-in-call-chains-that-build-ownership-pp-190-191">Do not use <code>string_view</code> in call chains that build ownership (pp. 190-191)</h3>
<p><strong>Anti-pattern:</strong> constructor takes <code>string_view</code> but <strong>stores</strong> a <code>std::string</code> member initialized from that view—callers can pass temporaries; the view can dangle before the member string is fully established in larger refactorings, and <strong>moves</strong> through the API degrade.</p>
<pre><code class="language-cpp">// void Person(std::string_view n) : name{n} {}  // [OOPS] brittle for temporaries / chains

std::string s = &quot;Ada&quot;;
// Person p3{std::move(s)};  // [OOPS] broken move: may convert to view first, then new string
</code></pre>
<p><strong>Better:</strong> take owning <code>std::string</code> and move into the member:</p>
<pre><code class="language-cpp">// Person(std::string n) : name{std::move(n)} {}  // [OK]
</code></pre>
<h3 id="overloading-ambiguity-const-stdstring-vs-string_view-p-197">Overloading ambiguity: <code>const std::string&amp;</code> vs <code>string_view</code> (p. 197)</h3>
<pre><code class="language-cpp">void foo(const std::string&amp;);
void foo(std::string_view);

// foo(&quot;hello&quot;);  // [ERROR] ambiguous: both overloads viable
</code></pre>
<p>Resolve with an explicit cast, <code>std::string{"hello"}</code>, or <code>""sv</code>, or remove/rename one overload.</p>
<h3 id="summary-rules-pp-191-192">Summary rules (pp. 191-192)</h3>
<ul>
<li>Do <strong>not</strong> use <code>string_view</code> in APIs that <strong>always</strong> sink into <code>std::string</code> anyway—take <code>std::string</code> (or templates) and <strong>move</strong>.</li>
<li>Do <strong>not</strong> initialize <strong><code>std::string</code> data members</strong> directly from <strong><code>string_view</code> parameters</strong> without proven lifetime.</li>
<li>Do <strong>not</strong> <strong>return</strong> <code>string_view</code> <strong>unless</strong> you are clearly forwarding storage the caller already owns (static, parent string, etc.).</li>
<li>Function templates should <strong>not</strong> blindly return <code>T</code> when <code>T</code> might be <code>string_view</code> and the value is computed from temporaries.</li>
<li><strong>Never</strong> use a <strong>returned</strong> value to initialize a <strong><code>string_view</code></strong> unless lifetime is proven.</li>
<li><strong>AAA</strong> (“Almost Always <code>auto</code>”) interacts badly with <code>string_view</code>: <code>auto v = expr</code> can silently become a <strong>view</strong> where you meant an <strong>owning</strong> <code>std::string</code>—be explicit when ownership matters.</li>
</ul>
<hr />
<h2 id="194-types-and-operations-p-192">19.4 Types and operations (p. 192)</h2>
<h3 id="type-family">Type family</h3>
<ul>
<li><code>std::string_view</code> (<code>char</code>)</li>
<li><code>std::wstring_view</code></li>
<li><code>std::u16string_view</code></li>
<li><code>std::u32string_view</code></li>
</ul>
<h3 id="operations-p-192-194">Operations (p. 192-194)</h3>
<p>Essentially the <strong>const</strong> part of the <code>std::string</code> interface: <code>find</code>, <code>starts_with</code> (C++20 additions aside), iteration, indexing with bounds discipline, <code>compare</code>, etc. (Exact method availability follows the standard for each revision; Josuttis maps <code>string</code> familiarity to <code>string_view</code>.)</p>
<h3 id="user-defined-literal-operator-sv-p-195">User-defined literal <code>operator ""sv</code> (p. 195)</h3>
<pre><code class="language-cpp">using namespace std::literals;
auto sv = &quot;hello&quot;sv;  // std::string_view
</code></pre>
<h3 id="hashing-p-195">Hashing (p. 195)</h3>
<p><code>std::hash&lt;std::string_view&gt;</code> allows <code>unordered_map</code> with <code>string_view</code> keys <strong>if</strong> lifetimes are managed carefully (another dangling trap if keys view freed buffers).</p>
<hr />
<h2 id="195-using-in-apis-p-196">19.5 Using in APIs (p. 196)</h2>
<h3 id="replacing-const-stdstring">Replacing <code>const std::string&amp;</code></h3>
<pre><code class="language-cpp">void logMessage(std::string_view msg);
</code></pre>
<p><strong>Call sites:</strong></p>
<pre><code class="language-cpp">logMessage(&quot;literal&quot;);
std::string s = &quot;owned&quot;;
logMessage(s);
</code></pre>
<p>Implicit conversions produce a <strong>temporary view</strong> pointing into existing storage (<code>string</code> has contiguous data; Josuttis discusses temporary validity for the duration of the call).</p>
<h3 id="implicit-conversion-from-string-and-literal-p-196">Implicit conversion from <code>string</code> and literal (p. 196)</h3>
<p>This is the ergonomic win: fewer redundant <code>std::string</code> temporaries at boundaries.</p>
<hr />
<h2 id="ascii-string_view-internals">ASCII: <code>string_view</code> internals</h2>
<pre><code> std::string_view (conceptual)
 ┌───────────────────────────────────────┐
 │ pointer to first char (const char*)   │
 │ size_t length                         │
 └───────────────────────────────────────┘
           │                    │
           └────&gt;  h e l l o    (storage owned elsewhere)
</code></pre>
<hr />
<h2 id="ascii-lifetime-pitfall">ASCII: lifetime pitfall</h2>
<pre><code> Timeline
 ──────────────────────────────────────────────────────────&gt;
 1) std::string s = make();     [====string buffer====]
 2) std::string_view v = s;            v ----&gt; buffer
 3) s destroyed                      [buffer freed]
 4) use v                            [ERROR] dangling
</code></pre>
<p>Rule: <strong>view must not outlive</strong> the character storage.</p>
<hr />
<h2 id="practical-checklist">Practical checklist</h2>
<ul>
<li>[OK] Use <code>string_view</code> for <strong>read-only</strong> parameters <strong>when you do not extend lifetime</strong> and do not force awkward ownership chains.</li>
<li>[OK] Use <code>std::string</code> for <strong>ownership</strong> or <strong>storage</strong> in types.</li>
<li>[OK] Prefer <strong><code>auto</code></strong> return from generic concatenation helpers so <code>+</code> can produce <code>std::string</code> when appropriate.</li>
<li>[ERROR] Return <code>string_view</code> to <strong>interior</strong> of local <code>std::string</code>.</li>
<li>[ERROR] Assume <code>data()</code> is null-terminated.</li>
<li>[ERROR] Store <code>string_view</code> without documenting lifetime dependency.</li>
<li>[ERROR] Chain APIs that turn <code>std::string</code> into <code>string_view</code> then re-wrap as <code>std::string</code> without a clear owning parameter.</li>
<li>[ERROR] Overload <code>foo(const std::string&amp;)</code> and <code>foo(std::string_view)</code> and call with string literals without disambiguation.</li>
</ul>

<p>This chapter follows <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis. Page references use <strong>p.</strong></p>
<p>C++17 integrates the <strong>Filesystem library</strong> as defined in ISO C++17. The facilities live in <code>&lt;filesystem&gt;</code> under namespace <code>std::filesystem</code>.</p>
<p><strong>Markers used in this note:</strong></p>
<ul>
<li><strong>[OK]</strong> Correct usage or expected outcome.</li>
<li><strong>[ERROR]</strong> Typical failure mode, wrong assumption, or exception path.</li>
<li><strong>[OOPS]</strong> Subtle trap or portability footgun.</li>
</ul>

<h2 id="201-checkpath-full-example-p-201204">20.1 <code>checkpath</code>: full example (p. 201–204)</h2>
<p>A complete motivating program: for each path given on the command line, print the path, then whether it exists; if it exists, whether it is a regular file (with size) or a directory; if it is a directory, list immediate children with <code>directory_iterator</code>. Josuttis also shows switching on <strong>filesystem</strong> file type using <code>status(p).type()</code> (after confirming existence).</p>
<h3 id="complete-program-checkpath-style">Complete program (checkpath style)</h3>
<pre><code class="language-cpp">#include &lt;filesystem&gt;
#include &lt;fstream&gt;
#include &lt;iostream&gt;

namespace fs = std::filesystem;

// Print one path's nature using status().type() (p. 203-205)
void checkWithSwitch(const fs::path&amp; p) {
    if (!fs::exists(p)) {
        std::cout &lt;&lt; p &lt;&lt; &quot; does not exist\\n&quot;;
        return;
    }

    const fs::file_status st = fs::status(p);
    std::cout &lt;&lt; p &lt;&lt; &quot; exists as &quot;;
    switch (st.type()) {
        case fs::file_type::none:
            std::cout &lt;&lt; &quot;none\\n&quot;;
            break;
        case fs::file_type::not_found:
            std::cout &lt;&lt; &quot;not_found\\n&quot;;
            break;
        case fs::file_type::regular:
            std::cout &lt;&lt; &quot;a regular file (&quot; &lt;&lt; fs::file_size(p) &lt;&lt; &quot; bytes)\\n&quot;;
            break;
        case fs::file_type::directory:
            std::cout &lt;&lt; &quot;a directory containing:\\n&quot;;
            try {
                for (const fs::directory_entry&amp; e : fs::directory_iterator{p}) {
                    std::cout &lt;&lt; &quot;  &quot; &lt;&lt; e.path().filename() &lt;&lt; '\\n';
                }
            } catch (const fs::filesystem_error&amp; e) {
                std::cerr &lt;&lt; &quot;[ERROR] iteration: &quot; &lt;&lt; e.what() &lt;&lt; '\\n';
            }
            break;
        case fs::file_type::symlink:
            std::cout &lt;&lt; &quot;a symlink\\n&quot;;
            break;
        case fs::file_type::block:
            std::cout &lt;&lt; &quot;a block device\\n&quot;;
            break;
        case fs::file_type::character:
            std::cout &lt;&lt; &quot;a character device\\n&quot;;
            break;
        case fs::file_type::fifo:
            std::cout &lt;&lt; &quot;a fifo\\n&quot;;
            break;
        case fs::file_type::socket:
            std::cout &lt;&lt; &quot;a socket\\n&quot;;
            break;
        case fs::file_type::unknown:
        default:
            std::cout &lt;&lt; &quot;something unknown\\n&quot;;
            break;
    }
}

int main(int argc, char* argv[]) {
    if (argc &lt; 2) {
        // Default: current directory for demonstration
        checkWithSwitch(fs::current_path());
        return 0;
    }
    for (int i = 1; i &lt; argc; ++i)
        checkWithSwitch(fs::path{argv[i]});
    return 0;
}
</code></pre>
<h3 id="windows-path-handling-stream-vs-string-p-202204">Windows path handling: stream vs <code>.string()</code> (p. 202–204)</h3>
<p><strong>[OK]</strong> Inserting a <code>fs::path</code> into a stream (<code>std::cout &lt;&lt; p</code>) uses <strong>quoted</strong> representation so spaces and special characters are visible and unambiguous.</p>
<p><strong>[OK]</strong> Printing the native string (<code>std::cout &lt;&lt; p.string()</code> or <code>p.u8string()</code> / <code>wstring</code> as appropriate) shows the path <strong>without</strong> extra quotes—what you would pass to many APIs.</p>
<p><strong>[OOPS]</strong> On Windows, quoted stream output may show <strong>doubled backslashes</strong> in the presentation; that is presentation only, not a change to the path value.</p>
<p>Example distinction:</p>
<pre><code class="language-cpp">fs::path p = &quot;C:\\\\Program Files\\\\app\\\\test.txt&quot;;
std::cout &lt;&lt; p &lt;&lt; '\\n';           // often: &quot;C:\\\\Program Files\\\\app\\\\test.txt&quot;
std::cout &lt;&lt; p.string() &lt;&lt; '\\n';  // native:  C:\\Program Files\\app\\test.txt
</code></pre>
<p><code>status(p)</code> vs <code>symlink_status(p)</code>: <strong><code>status</code></strong> follows symlinks to classify the <strong>target</strong>; <strong><code>symlink_status</code></strong> classifies the <strong>link node itself</strong>. For a <code>switch</code> on “what is this name,” pick the one that matches your intent (p. 205).</p>
<hr />
<h2 id="201-createfiles-full-example-p-206210">20.1 <code>createfiles</code>: full example (p. 206–210)</h2>
<p>Shows <code>create_directories</code>, creating files with <code>std::ofstream</code>, <strong><code>operator/</code></strong> on <code>path</code>, <strong><code>create_directory_symlink</code></strong> (with the relative-target rule), <strong><code>recursive_directory_iterator</code></strong> with <strong><code>directory_options::follow_directory_symlink</code></strong>, <strong><code>lexically_normal()</code></strong> for readable output, and <strong><code>filesystem_error</code></strong> (<code>what()</code>, <code>path1()</code>, <code>path2()</code>).</p>
<h3 id="relative-target-rule-for-create_directory_symlink-p-208">Relative target rule for <code>create_directory_symlink</code> (p. 208)</h3>
<p><strong>[OK]</strong> The <strong>first argument</strong> (target) is resolved <strong>relative to the directory containing the new symlink</strong>, not relative to the process’s current directory (unless they coincide).</p>
<p><strong>[OOPS]</strong> If you pass an absolute target when you meant a sibling-relative name, behavior differs from shell <code>ln -s</code> mental model; verify with a small experiment on your OS.</p>
<h3 id="complete-program-createfiles-style">Complete program (createfiles style)</h3>
<pre><code class="language-cpp">#include &lt;filesystem&gt;
#include &lt;fstream&gt;
#include &lt;iostream&gt;

namespace fs = std::filesystem;

void printRecursive(const fs::path&amp; root) {
    namespace dopts = fs::directory_options;
    try {
        fs::recursive_directory_iterator it{
            root,
            dopts::follow_directory_symlink | dopts::skip_permission_denied
        };
        for (const fs::directory_entry&amp; e : it) {
            // lexically_normal cleans ., .., redundant separators in the printed form (p. 209-210)
            fs::path shown = e.path().lexically_normal();
            std::cout &lt;&lt; shown &lt;&lt; '\\n';
        }
    } catch (const fs::filesystem_error&amp; ex) {
        std::cerr &lt;&lt; &quot;[ERROR] &quot; &lt;&lt; ex.what() &lt;&lt; '\\n';
        if (!ex.path1().empty())
            std::cerr &lt;&lt; &quot;  path1: &quot; &lt;&lt; ex.path1() &lt;&lt; '\\n';
        if (!ex.path2().empty())
            std::cerr &lt;&lt; &quot;  path2: &quot; &lt;&lt; ex.path2() &lt;&lt; '\\n';
        std::cerr &lt;&lt; &quot;  code:  &quot; &lt;&lt; ex.code().message() &lt;&lt; '\\n';
    }
}

int main() {
    const fs::path base = fs::path{&quot;tmpdir&quot;} / &quot;createfiles_demo&quot;;
    try {
        fs::create_directories(base / &quot;sub&quot; / &quot;other&quot;);
        // Regular file via ofstream; path built with /  (p. 207)
        {
            std::ofstream{base / &quot;sub&quot; / &quot;other&quot; / &quot;hello.txt&quot;} &lt;&lt; &quot;hello\\n&quot;;
        }
        // Directory symlink: target string is relative to link’s parent directory (p. 208)
        fs::create_directory_symlink(&quot;other&quot;, base / &quot;sub&quot; / &quot;new_other&quot;);
    } catch (const fs::filesystem_error&amp; ex) {
        std::cerr &lt;&lt; &quot;[ERROR] setup: &quot; &lt;&lt; ex.what() &lt;&lt; &quot;\\n&quot;;
        return 1;
    }

    printRecursive(base);
    return 0;
}
</code></pre>
<p><strong>[OK]</strong> <code>create_directories</code> creates all missing intermediate directories; returns <code>true</code> if any directory was created.</p>
<p><strong>[ERROR]</strong> If the leaf exists as a file, directory creation fails (<code>filesystem_error</code> or non-throwing overload sets <code>ec</code>).</p>
<hr />
<h2 id="202-parallel-algorithms-remark-p-209">20.2 Parallel algorithms remark (p. 209)</h2>
<p>Josuttis notes combining directory iteration with parallel algorithms while remembering filesystems are <strong>concurrent</strong>: entries can appear or disappear between calls (TOCTOU). Any parallel walk must tolerate races or serialize sensitive operations.</p>
<hr />
<h2 id="202-portability-paths-roots-case-p-210212">20.2 Portability: paths, roots, case (p. 210–212)</h2>
<h3 id="case-sensitivity">Case sensitivity</h3>
<p><strong>[OOPS]</strong> POSIX filesystems are often <strong>case-sensitive</strong> (<code>File</code> ≠ <code>file</code>). Windows paths are usually <strong>case-insensitive</strong> but <strong>case-preserving</strong>. Lexical comparisons in C++ do <strong>not</strong> automatically fold case.</p>
<h3 id="absolute-vs-relative-bin-cbin-p-211">Absolute vs relative: <code>/bin</code>, <code>C:/bin</code> (p. 211)</h3>
<table>
<thead>
<tr>
<th>Path</th>
<th>POSIX typical interpretation</th>
<th>Windows typical interpretation</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>/bin</code></td>
<td><strong>Absolute</strong> (root <code>/</code>)</td>
<td><strong>Relative</strong> (current drive)</td>
</tr>
<tr>
<td><code>C:/bin</code> / <code>C:\\\\bin</code></td>
<td><strong>Relative</strong> (no root—you have a root-name <code>C:</code> without absolute root directory in the generic grammar sense) see book nuance</td>
<td><strong>Absolute</strong> on <code>C:</code></td>
</tr>
</tbody>
</table>
<p><strong>[OOPS]</strong> A path can look “familiar” from another platform but parse differently. Prefer <strong><code>fs::path</code></strong> and filesystem queries (<code>absolute</code>, <code>canonical</code>, <code>weakly_canonical</code>) over hand-parsing strings.</p>
<h3 id="generic-path-format-p-212">Generic path format (p. 212)</h3>
<p>Josuttis describes the logical layout:</p>
<pre><code>┌─────────────────────────────────────────────────────────────┐
│  [ root-name ] [ root-directory ] [ relative-path ]         │
│       optional      optional           optional              │
│                                                             │
│  Example (Windows):  C:  \\   usr\\bin\\gcc                    │
│  Example (POSIX):    (empty) / usr/bin/gcc                   │
└─────────────────────────────────────────────────────────────┘
</code></pre>
<ul>
<li><strong>root-name</strong>: e.g. volume or UNC host share prefix on Windows.</li>
<li><strong>root-directory</strong>: directory separator that anchors an <strong>absolute</strong> path (when present with root-name rules as per standard).</li>
<li><strong>relative-path</strong>: sequence of <em>filename</em> elements.</li>
</ul>
<hr />
<h2 id="normalization-table-lexically_normal-p-212213">Normalization table: <code>lexically_normal()</code> (p. 212–213)</h2>
<p><code>lexically_normal()</code> performs <strong>purely lexical</strong> cleanup (no filesystem calls): collapses <code>.</code>, resolves <code>..</code> where defined, folds redundant separators. <strong>Exact outcomes differ</strong> between POSIX-style and Windows-style paths as in the book.</p>
<table>
<thead>
<tr>
<th>Input path (example)</th>
<th>After <code>lexically_normal()</code> POSIX-style</th>
<th>After <code>lexically_normal()</code> Windows-style</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>foo/.///bar/../</code></td>
<td><code>foo/</code></td>
<td><code>foo\\</code></td>
</tr>
<tr>
<td><code>//host/../foo.txt</code></td>
<td><code>//host/foo.txt</code></td>
<td><code>\\\\host\\foo.txt</code></td>
</tr>
<tr>
<td><code>C:bar/../</code></td>
<td><code>.</code></td>
<td><code>C:</code></td>
</tr>
<tr>
<td><code>C:/bar/..</code></td>
<td><code>C:/</code></td>
<td><code>C:\\</code></td>
</tr>
<tr>
<td><code>C:\\bar\\..</code></td>
<td><code>C:\\bar\\..</code> (lexical rules: mixed grammar)</td>
<td><code>C:\\</code></td>
</tr>
</tbody>
</table>
<p><strong>[OOPS]</strong> Rows such as <code>C:\\bar\\..</code> illustrate that <strong>mixing</strong> separators and roots can leave paths that normalize oddly on a “wrong” platform abstraction—always construct paths with <strong><code>fs::path</code></strong>, not ad-hoc strings.</p>
<p><strong>[OK]</strong> For <strong>existing</strong> paths, <strong><code>canonical()</code></strong> / <strong><code>weakly_canonical()</code></strong> consult the OS and symlinks; they can differ from <code>lexically_normal()</code>.</p>
<hr />
<h2 id="member-vs-free-standing-operations-p-213">Member vs free-standing operations (p. 213)</h2>
<pre><code>┌──────────────────────────────┬────────────────────────────────────┐
│         Category             │              Cost / semantics         │
├──────────────────────────────┼───────────────────────────────────────┤
│ path members (p.filename(),  │  Cheap: lexical only, no OS calls     │
│   .parent_path(), +=, /=)   │                                       │
├──────────────────────────────┼───────────────────────────────────────┤
│ Free-standing (exists,       │  Potentially expensive: may call OS │
│   file_size, create_*)       │                                       │
└──────────────────────────────┴───────────────────────────────────────┘
</code></pre>
<p><strong>[OK]</strong> Argument-dependent lookup applies: <strong><code>remove(p)</code></strong> may find <strong><code>std::filesystem::remove</code></strong> when <code>p</code> is a <code>path</code>.</p>
<p><strong>[OOPS]</strong> If you write <strong><code>remove("tmpdir")</code></strong> with a string literal, <strong>ADL does not</strong> bring in <code>std::filesystem::remove</code> the same way; overload resolution may pick the C library <strong><code>::remove</code></strong> from <code>&lt;cstdio&gt;</code> (remove a file by <code>char*</code> name)—a classic <strong>name clash</strong>.</p>
<p><strong>[OK]</strong> Prefer <strong><code>fs::remove</code></strong> / <strong><code>std::filesystem::remove</code></strong> explicitly, or pass a <strong><code>fs::path</code></strong> so the filesystem overload is unambiguous.</p>

<h3 id="platform-illustration-chellotxt-p-219">Platform illustration: <code>C:/hello.txt</code> (p. 219)</h3>
<p><strong>[OOPS]</strong> On <strong>POSIX</strong>, <code>C:</code> is just a filename-like component; <code>/</code> starts an absolute path from root—so <strong><code>root_path()</code></strong> might be <strong><code>/</code></strong> and <strong><code>relative_path()</code></strong> begins with <strong><code>C:</code></strong>… Josuttis contrasts this with <strong>Windows</strong>, where <code>C:</code> + <code>\\</code> forms a familiar root.</p>
<p>Always test mental models with <strong><code>fs::path{"C:/hello.txt"}</code></strong> on your target OS or by reading decomposition in a debugger.</p>
<hr />
<h2 id="path-iteration-component-sequence-p-219220">Path iteration: component sequence (p. 219–220)</h2>
<p>Range-for over <strong><code>path</code></strong> yields each <strong>filename</strong> piece (including root directory as appropriate per platform).</p>
<pre><code class="language-cpp">#include &lt;filesystem&gt;
#include &lt;iostream&gt;

namespace fs = std::filesystem;

void printPath(const fs::path&amp; p) {
    for (const fs::path&amp; part : p) {
        std::cout &lt;&lt; '&quot;' &lt;&lt; part.string() &lt;&lt; &quot;\\&quot; &quot;;
    }
    std::cout &lt;&lt; '\\n';
}
</code></pre>
<p><strong>[OK]</strong> <code>printPath("../sub/file.txt")</code> → components such as <strong><code>".." "sub" "file.txt"</code></strong>.</p>
<p><strong>[OK]</strong> <code>printPath("/usr/tmp/test/dir/")</code> on POSIX-like paths → <strong><code>"/" "usr" "tmp" "test" "dir" ""</code></strong> (final empty component reflects trailing separator decomposition in the standard model—verify on your library).</p>
<p><strong>[OK]</strong> Windows: <code>"C:\\\\usr\\\\..."</code> may iterate as <strong><code>"C:" "\\\\" "usr" ...</code></strong> (root name, root directory, then names).</p>
<h3 id="trailing-separator-check-p-220">Trailing separator check (p. 220)</h3>
<p><strong>[OK]</strong> Detect “ends with directory separator” style paths using iterator to last element:</p>
<pre><code class="language-cpp">bool hasTrailingDirSep(const fs::path&amp; p) {
    if (p.empty()) return false;
    auto it = p.end();
    --it;
    return it-&gt;empty(); // last iterator element is empty for trailing separator case
}
</code></pre>
<p><strong>[OOPS]</strong> Rely on this idiom rather than string hacks so behavior stays aligned with <strong><code>path</code></strong> grammar.</p>
<hr />
