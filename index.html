<h3 id="lexically_relative-and-lexically_proximate-p-222223"><code>lexically_relative</code> and <code>lexically_proximate</code> (p. 222–223)</h3>
<p>Both are <strong>lexical</strong> (no filesystem).</p>
<ul>
<li><strong><code>lexically_relative(base, p)</code></strong>: If <code>p</code> shares a root with <code>base</code>, returns relative path from <code>base</code> to <code>p</code>; otherwise empty path.</li>
<li><strong><code>lexically_proximate(base, p)</code></strong>: Like relative, but if roots differ, may return <strong><code>p</code></strong> (so you always get <em>some</em> navigational hint).</li>
</ul>
<pre><code class="language-cpp">fs::path base = &quot;/a/b&quot;;
fs::path p    = &quot;/a/b/c/d&quot;;
fs::path rel  = p.lexically_relative(base);   // often: c/d
</code></pre>
<p><strong>[OOPS]</strong> After symlinks or mount points, lexical relative path may not match a valid relative <strong>filesystem</strong> walk—use <strong><code>relative</code></strong> (C++17 overloaded free function using <code>weakly_canonical</code>) when you need filesystem-aware semantics (where both paths exist).</p>
<hr />
<h2 id="path-modification-details-p-226228">Path modification details (p. 226–228)</h2>
<h3 id="-vs-"><code>+=</code> vs <code>/=</code></h3>
<table>
<thead>
<tr>
<th>Op</th>
<th>Meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong><code>p /= "sub"</code></strong></td>
<td>Append as <strong>path element</strong>: adds preferred separator between existing non-empty root-relative tail and new piece.</td>
</tr>
<tr>
<td><strong><code>p += ".git"</code></strong></td>
<td><strong>Literal character append</strong> to native representation—<strong>no</strong> automatic separator.</td>
</tr>
</tbody>
</table>
<p><strong>[OOPS]</strong> <code>p += "/sub"</code> stitches characters; you may get odd double slashes or ambiguous roots.</p>
<h3 id="appending-an-absolute-subpath-replaces-p-227">Appending an <strong>absolute</strong> subpath replaces (p. 227)</h3>
<p><strong>[OK]</strong> <strong><code>fs::path("/usr") / "/tmp"</code></strong> → <strong><code>"/tmp"</code></strong> (absolute right-hand side wins).</p>
<p><strong>[OOPS]</strong> On Windows, appending <strong><code>"</code> / &ldquo;<code>"</code></strong> across <strong><code>root_name</code></strong> boundaries follows standard <strong>root-truncation</strong> rules (e.g. <strong><code>D:\\</code></strong> wins over a prior <code>C:</code>-relative path)—consult table in Josuttis for <strong><code>path::operator/</code></strong> edge cases.</p>
<h3 id="replace_extension-p-228"><code>replace_extension</code> (p. 228)</h3>
<p><strong>[OK]</strong> <code>path{"file.txt"}.replace_extension(".tmp")</code> → <strong><code>file.tmp</code></strong>.</p>
<p><strong>[OOPS]</strong> <code>path{".git"}.replace_extension(".tmp")</code> → <strong><code>.git.tmp</code></strong> — a lone dot filename is <strong>not</strong> treated as “no stem + <code>.git</code> extension” the way you might expect; <strong>pure extension-looking names</strong> bite stem/extension rules.</p>
<hr />
<h2 id="comparisons-p-228229">Comparisons (p. 228–229)</h2>
<p><strong>[OK]</strong> <code>==</code>, <code>&lt;</code>, etc. compare paths <strong>lexically</strong> in the path’s <strong>element</strong> sequence—not necessarily the same as resolving onto the same inode.</p>
<p><strong>[OOPS]</strong> <strong><code>tmp1/f</code></strong> and <strong><code>./tmp1/f</code></strong> can compare <strong>unequal</strong> until you apply <strong><code>lexically_normal()</code></strong> (or equivalents).</p>
<p><strong>[OK]</strong> <strong><code>equivalent(p1, p2)</code></strong> resolves via the filesystem: <strong>[OK]</strong> both paths must refer to <strong>existing</strong> entities that the implementation can confirm as the same file (e.g. hard links). <strong>[ERROR]</strong> if one side is missing, typically <code>false</code> or error per overload.</p>
<hr />
<h2 id="last_write_time-p-232234"><code>last_write_time</code> (p. 232–234)</h2>
<p><strong>[OK]</strong> Return type is <strong><code>file_time_type</code></strong>, a <strong><code>chrono::time_point</code></strong> using the <strong>filesystem’s clock</strong>, <strong>not</strong> <code>std::chrono::system_clock</code>.</p>
<p><strong>[OOPS]</strong> You cannot <code>time_t</code>-cast <code>file_time_type</code> directly portably across all implementations without bridging clocks.</p>
<h3 id="josuttis-style-bridge-to-time_t-workaround-sketch">Josuttis-style bridge to <code>time_t</code> (workaround sketch)</h3>
<pre><code class="language-cpp">#include &lt;chrono&gt;
#include &lt;ctime&gt;
#include &lt;filesystem&gt;

template &lt;typename TimePoint&gt;
std::time_t toTimeT(TimePoint tp) {
    using namespace std::chrono;
    // Offset between file clock and system clock via &quot;now&quot; on both (p. 233-234)
    auto sctp = system_clock::now() + (tp - TimePoint::clock::now());
    return system_clock::to_time_t(sctp);
}
</code></pre>
<p><strong>[OOPS]</strong> Small races between the two <code>now()</code> calls can cause a one-second glitch near boundaries; for display-only use this is usually acceptable.</p>
<p><strong>[OK]</strong> Format with <strong><code>std::ctime</code></strong> (note: not thread-safe on some platforms) or <strong><code>strftime</code></strong> after converting to <code>tm</code> in UTC/local as appropriate.</p>

<p><em>Reference: Nicolai M. Josuttis, </em><em>C++17 - The Complete Guide</em><em>, Chapter 21, pp. 251-257.</em></p>
<p>This chapter documents C++17 extensions to <code>&lt;type_traits&gt;</code>: the <code>_v</code> variable templates for existing traits, new traits for aggregates, invocation, logical metafunctions, swappability, and the <code>bool_constant</code> alias.</p>
<hr />
<h2 id="211-type-traits-suffix-_v-p-251">21.1 Type Traits Suffix <code>_v</code> (p. 251)</h2>
<h3 id="motivation">Motivation</h3>
<p>Before C++17, querying a type trait meant spelling <code>Trait&lt;T&gt;::value</code>:</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

template&lt;typename T&gt;
void check() {
    if (std::is_const&lt;T&gt;::value) {
        // ...
    }
}
</code></pre>
<p>C++17 adds <strong>variable templates</strong> (see also inline variables) so each Boolean trait gains a <code>_v</code> form that expands directly to the <code>constexpr bool</code> value.</p>
<h3 id="definition-pattern-as-in-the-standard">Definition pattern (as in the standard)</h3>
<p>For each type trait <code>std::trait_name</code> that exposes <code>static constexpr bool value</code>, the standard provides:</p>
<pre><code class="language-cpp">template&lt;typename T&gt;
inline constexpr bool is_const_v = is_const&lt;T&gt;::value;
</code></pre>
<p>Key points:</p>
<ul>
<li><strong><code>inline constexpr</code> variables</strong> (C++17): a single definition in headers; ODR-safe across translation units.</li>
<li><strong>Name</strong>: <code>trait_v</code> mirrors <code>trait::value</code>.</li>
<li><strong>Applicability</strong>: all traits that expose a <code>value</code> member of type <code>bool</code> get the <code>_v</code> alias (e.g. <code>is_integral_v</code>, <code>is_same_v</code>, <code>is_base_of_v</code>, &hellip;).</li>
</ul>
<h3 id="usage-examples">Usage examples</h3>
<pre><code class="language-cpp">#include &lt;type_traits&gt;
#include &lt;iostream&gt;

void demo() {
    static_assert(std::is_const_v&lt;const int&gt;);
    static_assert(!std::is_const_v&lt;int&gt;);

    constexpr bool same = std::is_same_v&lt;int, int32_t&gt;;  // platform-dependent typedef

    if constexpr (std::is_integral_v&lt;double&gt;) {
        // never taken
    } else {
        std::cout &lt;&lt; &quot;double is not integral\\n&quot;;
    }
}
</code></pre>
<h3 id="relationship-to-_t-and-class-templates">Relationship to <code>_t</code> and class templates</h3>
<table>
<thead>
<tr>
<th>Form</th>
<th>Example</th>
<th>Role</th>
</tr>
</thead>
<tbody>
<tr>
<td>Class template</td>
<td><code>std::remove_const&lt;T&gt;</code></td>
<td>Type computation</td>
</tr>
<tr>
<td><code>_t</code> alias</td>
<td><code>std::remove_const_t&lt;T&gt;</code></td>
<td>Shorthand for <code>typename remove_const&lt;T&gt;::type</code></td>
</tr>
<tr>
<td><code>_v</code> variable</td>
<td><code>std::is_const_v&lt;T&gt;</code></td>
<td>Shorthand for <code>is_const&lt;T&gt;::value</code></td>
</tr>
</tbody>
</table>
<hr />
<h2 id="212-new-type-traits-p-252">21.2 New Type Traits (p. 252)</h2>
<h3 id="2121-stdis_aggregatet">21.2.1 <code>std::is_aggregate&lt;T&gt;</code></h3>
<p><strong>Purpose:</strong> Detects whether <code>T</code> is an <strong>aggregate</strong> per the language definition (no user-provided/ inherited/ explicit constructors, no private/protected non-static data members, no virtual functions, etc., subject to standard wording).</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

struct Agg { int x; double y; };
struct NonAgg { NonAgg() {} int x; };

static_assert(std::is_aggregate_v&lt;Agg&gt;);
static_assert(!std::is_aggregate_v&lt;NonAgg&gt;);
</code></pre>
<p>Useful for SFINAE when you want brace-initialization or structured-binding-friendly types.</p>
<h3 id="2122-stdhas_unique_object_representationst">21.2.2 <code>std::has_unique_object_representations&lt;T&gt;</code></h3>
<p><strong>Purpose:</strong> <code>true</code> if two objects of type <code>T</code> with equal value representations compare equal (no padding traps, no multiple representations for the same value). Informally: <strong>memcmp-safe</strong> equality for hashing raw bytes.</p>
<p><strong>[OK]</strong> When <code>has_unique_object_representations_v&lt;T&gt;</code> is <code>true</code>, <strong>reliable hashing</strong> can hash the object representation (e.g. feeding <code>sizeof(T)</code> bytes starting at the object address) without colliding distinct values that <code>operator==</code> would treat as equal. <strong>[OOPS]</strong> Still verify <code>true</code> for your <code>T</code> on each platform; padding and floating-point representations can make this <code>false</code>.</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

struct Padded {
    char c;
    // possible padding
    int i;
};

static_assert(std::has_unique_object_representations_v&lt;int&gt;);
// Padded may be false on typical implementations due to padding
</code></pre>
<p><strong>Note:</strong> Result can be <code>false</code> for types with padding or tricky floating-point representations. Prefer for trivially copyable types when designing hashers that read object representation.</p>
<h3 id="2123-invocation-traits">21.2.3 Invocation traits</h3>
<table>
<thead>
<tr>
<th>Trait</th>
<th>Meaning (informal)</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>std::is_invocable&lt;C, Args...&gt;</code></td>
<td><code>std::invoke(c, args...)</code> is well-formed</td>
</tr>
<tr>
<td><code>std::is_invocable_r&lt;R, C, Args...&gt;</code></td>
<td>Invocable and return convertible to <code>R</code></td>
</tr>
<tr>
<td><code>std::is_nothrow_invocable&lt;C, Args...&gt;</code></td>
<td><code>noexcept</code> <code>invoke</code></td>
</tr>
<tr>
<td><code>std::is_nothrow_invocable_r&lt;R, C, Args...&gt;</code></td>
<td>Nothrow + return <code>R</code></td>
</tr>
<tr>
<td><code>std::invoke_result_t&lt;C, Args...&gt;</code></td>
<td>Result type of <code>invoke</code></td>
</tr>
</tbody>
</table>
<p><code>std::result_of</code> is <strong>deprecated</strong> in C++17 in favor of <code>std::invoke_result</code> (clearer for pointers-to-member and <code>invoke</code> semantics).</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;
#include &lt;functional&gt;

struct S {
    int f(double) { return 0; }
};

using MemFn = decltype(&amp;S::f);

static_assert(std::is_invocable_v&lt;MemFn, S*, double&gt;);
static_assert(std::is_same_v&lt;std::invoke_result_t&lt;MemFn, S*, double&gt;, int&gt;);

int add(int a, int b) { return a + b; }
static_assert(std::is_invocable_r_v&lt;long, decltype(add), int, int&gt;);

int foo(int);
static_assert(std::is_same_v&lt;std::invoke_result_t&lt;decltype(foo), int&gt;, int&gt;);
</code></pre>
<h3 id="2124-stdconjunction-stddisjunction-stdnegation">21.2.4 <code>std::conjunction</code>, <code>std::disjunction</code>, <code>std::negation</code></h3>
<p>These model <strong>compile-time boolean logic</strong> on trait-like types (must be <em>BooleanTestable</em> / <code>_v</code>-friendly).</p>
<ul>
<li><strong><code>conjunction&lt;B1, B2, ...&gt;</code>:</strong> short-circuit <strong>AND</strong>&mdash;if <code>B1::value</code> is <code>false</code>, later traits are <strong>not instantiated</strong> (important for avoiding ill-formed instantiations).</li>
<li><strong><code>disjunction&lt;B1, B2, ...&gt;</code>:</strong> short-circuit <strong>OR</strong>&mdash;stops at first <code>true</code>.</li>
<li><strong><code>negation&lt;B&gt;</code>:</strong> <code>!B::value</code>.</li>
</ul>
<p><strong>Short-circuit and incomplete types:</strong> Because later operands are not instantiated once the result is fixed, <strong><code>conjunction</code> / <code>disjunction</code> avoid touching traits that would be ill-formed or undefined behavior</strong> on incomplete types or in situations where eager <code>::value</code> evaluation would instantiate bogus templates. Prefer them over hand-written <code>&amp;&amp;</code> / <code>||</code> of trait <code>value</code>s when the second check only makes sense if the first succeeds. <strong>[ERROR]</strong> Using a trait that requires completeness on an incomplete <code>T</code> without short-circuiting can yield <strong>undefined behavior</strong> or hard errors.</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

template&lt;typename T&gt;
struct is_integral_and_signed
    : std::conjunction&lt;std::is_integral&lt;T&gt;, std::is_signed&lt;T&gt;&gt; {};

template&lt;typename T&gt;
constexpr bool is_integral_and_signed_v = is_integral_and_signed&lt;T&gt;::value;

static_assert(is_integral_and_signed_v&lt;int&gt;);
static_assert(!is_integral_and_signed_v&lt;unsigned&gt;);
</code></pre>
<p><strong>Short-circuit example (avoid bad instantiation):</strong></p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

template&lt;typename T&gt;
struct has_foo_member {
    template&lt;typename U&gt;
    static auto test(int) -&gt; decltype(std::declval&lt;U&gt;().foo(), std::true_type{});
    template&lt;typename&gt;
    static std::false_type test(...);
    static constexpr bool value = decltype(test&lt;T&gt;(0))::value;
};

template&lt;typename T&gt;
struct safe_check
    : std::conjunction&lt;
          std::is_class&lt;T&gt;,
          std::integral_constant&lt;bool, has_foo_member&lt;T&gt;::value&gt;
      &gt; {};
</code></pre>
<p>If <code>T</code> is not a class, the second operand of a plain <code>&amp;&amp;</code> might still be instantiated; <code>conjunction</code> avoids evaluating <code>has_foo_member&lt;T&gt;</code> when <code>is_class_v&lt;T&gt;</code> is false (when structured carefully&mdash;adapt pattern to your detection needs).</p>
<h3 id="2125-swappability">21.2.5 Swappability</h3>
<table>
<thead>
<tr>
<th>Trait</th>
<th>Meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>is_swappable&lt;T&gt;</code></td>
<td><code>swap(l, r)</code> valid in <code>std</code>/<code>found by ADL</code> for two lvalues of type <code>T</code></td>
</tr>
<tr>
<td><code>is_nothrow_swappable&lt;T&gt;</code></td>
<td><code>swap</code> is <code>noexcept</code></td>
</tr>
<tr>
<td><code>is_swappable_with&lt;T, U&gt;</code></td>
<td><code>swap</code> between <code>T</code> and <code>U</code></td>
</tr>
<tr>
<td><code>is_nothrow_swappable_with&lt;T, U&gt;</code></td>
<td>Nothrow cross-type swap</td>
</tr>
</tbody>
</table>
<p>These align with Swappable requirements used throughout the library.</p>
<p><strong><code>is_swappable</code> (same type, two lvalues):</strong></p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;
#include &lt;string&gt;

static_assert(std::is_swappable_v&lt;std::string&gt;);   // [OK] lvalue swap well-formed
static_assert(!std::is_swappable_v&lt;void&gt;);        // [OK] not swappable
static_assert(!std::is_swappable_v&lt;char[]&gt;);      // [OK] array type not Swappable like this
</code></pre>
<p><strong><code>is_swappable_with</code> vs <code>is_swappable</code> (rvalues vs lvalues):</strong></p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

// Two rvalues of type int: not swappable as int&amp;&amp; / int&amp;&amp; in the std::swap sense
static_assert(!std::is_swappable_with_v&lt;int, int&gt;);
// Two lvalue references: swappable
static_assert(std::is_swappable_with_v&lt;int&amp;, int&amp;&gt;);
</code></pre>
<p><code>is_swappable&lt;T&gt;</code> is equivalent to <code>is_swappable_with_v&lt;T&amp;, T&amp;&gt;</code>.</p>
<h3 id="2126-stdbool_constantb">21.2.6 <code>std::bool_constant&lt;b&gt;</code></h3>
<p>Alias for <code>std::integral_constant&lt;bool, b&gt;</code>:</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

using ok = std::bool_constant&lt;true&gt;;
using no = std::bool_constant&lt;false&gt;;
static_assert(ok::value == true);
</code></pre>
<hr />
<h3 id="composite-traits-pointer-detection-and-integral-or-enum">Composite traits: pointer detection and integral-or-enum</h3>
<p><strong><code>IsPtr</code> — combine <code>is_null_pointer</code>, <code>is_member_pointer</code>, <code>is_pointer</code>:</strong></p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

struct S {};

template&lt;typename T&gt;
struct IsPtr : std::disjunction&lt;
    std::is_null_pointer&lt;T&gt;,
    std::is_member_pointer&lt;T&gt;,
    std::is_pointer&lt;T&gt;
&gt; {};

template&lt;typename T&gt;
inline constexpr bool IsPtr_v = IsPtr&lt;T&gt;::value;

static_assert(IsPtr_v&lt;int*&gt;);
static_assert(IsPtr_v&lt;void (S::*)()&gt;);
static_assert(IsPtr_v&lt;std::nullptr_t&gt;);
static_assert(!IsPtr_v&lt;int&gt;);
</code></pre>
<p><strong><code>IsIntegralOrEnum</code> — <code>conjunction</code> / <code>disjunction</code> / <code>negation</code>:</strong></p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

template&lt;typename T&gt;
struct IsIntegralOrEnum : std::disjunction&lt;
    std::is_integral&lt;T&gt;,
    std::is_enum&lt;T&gt;
&gt; {};

template&lt;typename T&gt;
inline constexpr bool IsIntegralOrEnum_v = IsIntegralOrEnum&lt;T&gt;::value;

// Equivalent style using negation for &quot;not floating-point&quot; is usually redundant here;
// disjunction of integral | enum is the direct idiom Josuttis-style metaprograms use.
template&lt;typename T&gt;
struct IsIntegralOrEnumAlt : std::disjunction&lt;
    std::conjunction&lt;std::is_arithmetic&lt;T&gt;, std::negation&lt;std::is_floating_point&lt;T&gt;&gt;&gt;,
    std::is_enum&lt;T&gt;
&gt; {};

template&lt;typename T&gt;
inline constexpr bool IsIntegralOrEnumAlt_v = IsIntegralOrEnumAlt&lt;T&gt;::value;

enum class E : int { a };

static_assert(IsIntegralOrEnum_v&lt;int&gt;);
static_assert(IsIntegralOrEnum_v&lt;E&gt;);
static_assert(!IsIntegralOrEnum_v&lt;double&gt;);
static_assert(IsIntegralOrEnumAlt_v&lt;int&gt;);
static_assert(!IsIntegralOrEnumAlt_v&lt;double&gt;);
</code></pre>

  { name: `23. Parallel Stl Algorithms`, path: `22_parallel_stl_algorithms.md`, dir: ``, body: `<h1 id="chapter-22-parallel-stl-algorithms">Chapter 22: Parallel STL Algorithms</h1>
<p><em>Reference: Nicolai M. Josuttis, </em><em>C++17 - The Complete Guide</em><em>, Chapter 22, pp. 259-277.</em></p>
<p>Parallel algorithms allow standard library algorithms to exploit multiple threads (and, for <code>par_unseq</code>, vectorization hints) while sharing a uniform interface through <strong>execution policies</strong> in <code>&lt;execution&gt;</code>.</p>
<hr />
<h2 id="220-timer-helper-for-micro-benchmarks-p-259">22.0 <code>Timer</code> helper for micro-benchmarks (p. 259)</h2>
<p>Josuttis pairs the parallel examples with a small <strong><code>Timer</code></strong> based on <strong><code>std::chrono::steady_clock</code></strong> (monotonic, suited to elapsed-time measurement).</p>
<pre><code class="language-cpp">#include &lt;chrono&gt;
#include &lt;iostream&gt;

class Timer {
    std::chrono::steady_clock::time_point start_;
public:
    Timer() : start_{std::chrono::steady_clock::now()} {}

    void printDiff(const char* msg) const {
        const auto stop = std::chrono::steady_clock::now();
        const auto dur  = stop - start_;
        const double ms = std::chrono::duration&lt;double, std::milli&gt;(dur).count();
        std::cout &lt;&lt; msg &lt;&lt; ms &lt;&lt; &quot; msec\\n&quot;;
    }
};
</code></pre>
<ul>
<li>[OK] Use <strong><code>steady_clock</code></strong>, not <code>system_clock</code>, so wall-clock adjustments do not skew timings.</li>
<li>[OOPS] Comparing runs on different machines or under heavy load still requires care; this is a <strong>relative</strong> helper for A/B on one setup.</li>
</ul>
<hr />
<h2 id="221-using-parallel-algorithms-p-260">22.1 Using Parallel Algorithms (p. 260)</h2>
<p>The first parameter is an <strong>execution policy</strong> object that selects sequential, parallel, or parallel-unsequenced execution.</p>
<h3 id="basic-pattern">Basic pattern</h3>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;algorithm&gt;
#include &lt;execution&gt;

void sort_parallel(std::vector&lt;int&gt;&amp; v) {
    std::sort(std::execution::par, v.begin(), v.end());
}
</code></pre>
<p><strong>Requirements:</strong></p>
<ul>
<li>Include <code>&lt;execution&gt;</code> for policy names.</li>
<li>Iterator requirements depend on the algorithm (typically forward or better; parallel versions may impose stronger requirements&mdash;consult the standard for each algorithm).</li>
<li><strong>Correctness is your responsibility:</strong> overlapping writes, unsynchronized shared mutable state, and iterator invalidation rules still apply.</li>
</ul>
<hr />
<h2 id="2211-parallel-for_each-p-260">22.1.1 Parallel <code>for_each()</code> (p. 260)</h2>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;algorithm&gt;
#include &lt;execution&gt;
#include &lt;atomic&gt;

void scale_ok(std::vector&lt;double&gt;&amp; v) {
    std::for_each(std::execution::par, v.begin(), v.end(), [](double&amp; x) {
        x *= 2.0;  // independent elements: OK
    });
}

void counter_problem() {
    std::vector&lt;int&gt; v(1000, 1);
    int bad = 0;  // [ERROR] data race if updated from multiple tasks
    std::for_each(std::execution::par, v.begin(), v.end(), [&amp;](int) {
        ++bad;   // undefined behavior
    });
}

void counter_fixed() {
    std::vector&lt;int&gt; v(1000, 1);
    std::atomic&lt;int&gt; ok{0};
    std::for_each(std::execution::par, v.begin(), v.end(), [&amp;](int) {
        ok.fetch_add(1, std::memory_order_relaxed);
    });
}
</code></pre>
<p><strong>WARNING (p. 260):</strong> Any <strong>shared mutable state</strong> updated from the body must use atomics, locks, or other synchronization. Unsynchronized updates are <strong>data races</strong> -&gt; undefined behavior.</p>
<h3 id="full-parforeachloop-example-with-timings-pp-260-263">Full <code>parforeachloop</code> example with timings (pp. 260-263)</h3>
<p>Pattern (after Josuttis <code>parforeachloop.cpp</code>): fill a vector, then time <strong><code>for_each</code></strong> with <strong><code>std::execution::seq</code></strong> vs <strong><code>std::execution::par</code></strong> for varying <strong><code>numElems</code></strong>, using the <strong><code>Timer</code></strong> from <a href="#220-timer-helper-for-micro-benchmarks-p-259">22.0</a>.</p>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;algorithm&gt;
#include &lt;execution&gt;
#include &lt;cmath&gt;

// Timer as in section 22.0

void foreach_test(std::size_t numElems) {
    std::vector&lt;double&gt; coll;
    coll.reserve(numElems);
    for (std::size_t i = 0; i &lt; numElems; ++i) {
        coll.push_back(static_cast&lt;double&gt;(i % 1000));
    }

    auto bulk_op = [](double&amp; val) {
        for (int i = 0; i &lt; 100; ++i) {
            val = std::sqrt(val * val * val);
        }
    };

    // sequenced
    {
        Timer t;
        std::for_each(std::execution::seq, coll.begin(), coll.end(), bulk_op);
        t.printDiff(&quot;sequenced for_each: &quot;);
    }
    // parallel
    {
        Timer t;
        std::for_each(std::execution::par, coll.begin(), coll.end(), bulk_op);
        t.printDiff(&quot;parallel   for_each: &quot;);
    }
}
</code></pre>
<p><strong>Representative outcomes (Josuttis, one machine; qualitative):</strong></p>
<pre><code>+------------+--------------------------+---------------------------+
| numElems   | faster policy            | comment                   |
+------------+--------------------------+---------------------------+
| 100        | sequential (~10x)        | scheduling dwarfs work    |
| 10 000     | roughly break-even         | crossover region          |
| 1 000 000  | parallel (~3x)           | bulk work amortizes cost  |
+------------+--------------------------+---------------------------+
</code></pre>
<ul>
<li>[OK] Large ranges with <strong>CPU-heavy</strong> per-element bodies favor <strong><code>par</code></strong>.</li>
<li>[ERROR] Tiny ranges: <strong><code>par</code></strong> often loses badly to <strong><code>seq</code></strong>.</li>
</ul>
<h3 id="count_if-and-trivial-predicates-p-263"><code>count_if</code> and trivial predicates (p. 263)</h3>
<p>For a <strong>simple</strong> predicate (e.g. <code>val &gt; 3</code>) on plain scalars, <strong><code>count_if(..., par, ...)</code></strong> is typically <strong>not</strong> worth it: counting is memory-bandwidth light and the parallel split/merge overhead dominates. Josuttis notes this pattern explicitly----<strong>parallel <code>count_if</code> for cheap predicates never pays</strong> on the examples he tried.</p>
<hr />
<h2 id="2212-parallel-sort-p-263">22.1.2 Parallel <code>sort()</code> (p. 263)</h2>
<pre><code class="language-cpp">std::sort(std::execution::par, v.begin(), v.end());
</code></pre>
<ul>
<li>May partition work across threads for large ranges.</li>
<li><strong>Not a stable sort</strong> when you need stability use <code>stable_sort</code> (also has parallel overload).</li>
<li><strong>Small inputs:</strong> threading overhead may dominate; see 22.4.</li>
</ul>
<h3 id="sorting-strings-like-id0-id0-id1--pp-263-265">Sorting strings like <code>"id0"</code>, <code>"ID0"</code>, <code>"id1"</code>, &hellip; (pp. 263-265)</h3>
<p>Josuttis builds many strings of the form <strong><code>id0</code> / <code>ID0</code> / <code>id1</code> / <code>ID1</code> / &hellip;</strong>, then compares:</p>
<ol>
<li><strong><code>std::sort(seq, ...)</code></strong> vs <strong><code>std::sort(par, ...)</code></strong> (same comparator on <code>std::string</code>).</li>
<li>Storing views: sort <strong><code>std::vector&lt;std::string&gt;</code></strong> but compare <strong><code>std::string_view</code></strong> fragments (e.g. <strong><code>substr</code> / substring-style key</strong>) to reduce comparison cost.</li>
<li><strong>Combined:</strong> <strong><code>par</code> + cheaper comparisons</strong> (often via <strong><code>std::string_view</code></strong>) yields the largest win----on the book&rsquo;s setup, <strong>up to ~10x</strong> speedup vs the naive sequential <code>std::string</code> sort (exact factor platform-dependent).</li>
</ol>
<pre><code class="language-cpp">#include &lt;algorithm&gt;
#include &lt;execution&gt;
#include &lt;cctype&gt;
#include &lt;string&gt;
#include &lt;string_view&gt;
#include &lt;vector&gt;

// Sketch: large vector of std::string keys &quot;id0&quot;, &quot;ID0&quot;, ...
// Compare using string_view to avoid repeated internal access patterns
// the book micro-optimizes; key idea: cheap view + parallel sort
bool sv_case_insensitive(std::string_view a, std::string_view b) {
    // book uses a concrete tolerant comparison; keep locale/policy in mind
    return std::lexicographical_compare(
        a.begin(), a.end(), b.begin(), b.end(),
        [](char x, char y) {
            return std::tolower(static_cast&lt;unsigned char&gt;(x))
                 &lt; std::tolower(static_cast&lt;unsigned char&gt;(y));
        });
}

void sort_strings_parallel(std::vector&lt;std::string&gt;&amp; coll) {
    std::sort(std::execution::par, coll.begin(), coll.end(), sv_case_insensitive);
}
</code></pre>
<ul>
<li>[OK] <strong><code>string_view</code></strong> in the comparator reduces per-comparison overhead when strings share structure.</li>
<li>[OK] <strong><code>par</code></strong> scales when <strong><code>N</code></strong> is large enough.</li>
<li>[OOPS] Picking the wrong comparator (locale, Unicode) changes correctness; this is still <strong>your</strong> contract.</li>
</ul>
<hr />
<h2 id="222-execution-policies-p-265">22.2 Execution Policies (p. 265)</h2>
<table>
<thead>
<tr>
<th>Policy</th>
<th>Meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>std::execution::seq</code></td>
<td><strong>Sequenced policy:</strong> runs like a classic serial algorithm in the <strong>calling thread</strong>; invocations are <strong>indeterminately sequenced</strong> with respect to each other only as the standard already allows, but you keep the usual <strong>deterministic algorithmic order</strong> expectations for element processing as documented for that algorithm.</td>
</tr>
<tr>
<td><code>std::execution::par</code></td>
<td><strong>Parallel policy:</strong> library <strong>may</strong> run element work on <strong>multiple threads</strong>; elements must not introduce <strong>data races</strong> or conflicting side effects.</td>
</tr>
<tr>
<td><code>std::execution::par_unseq</code></td>
<td><strong>Parallel-unsequenced policy:</strong> <strong>may</strong> vectorize (<strong>SIMD</strong>) <strong>and</strong> execute across threads; invocations may be <strong>interleaved</strong> even inside a single thread. Callables <strong>must not</strong> use <strong>mutexes</strong>, <strong>blocking</strong> calls, or other synchronization that assumes a strict thread-like sequencing of operations.</td>
</tr>
</tbody>
</table>
<p>Header: <strong><code>&lt;execution&gt;</code></strong> (defines <code>std::execution::seq</code>, <code>std::execution::par</code>, <code>std::execution::par_unseq</code>).</p>
<p><strong>Details (Josuttis p. 265):</strong></p>
<ul>
<li><strong><code>seq</code>:</strong> [OK] Same-thread sequential flavor; <strong>deterministic</strong> processing order from the <strong>algorithm&rsquo;s</strong> point of view (as with the non-policy overload). Good baseline and fallback.</li>
<li><strong><code>par</code>:</strong> [OK] Threads may cooperate; <strong>you</strong> guarantee the element function is safe under <strong>concurrent</strong> execution on <strong>different</strong> elements. [ERROR] Shared unsynchronized mutable state -&gt; data race.</li>
<li><strong><code>par_unseq</code>:</strong> [OK] Maximum freedom for the implementation (vectorization + threading). [ERROR] <strong><code>std::mutex</code></strong>, <strong><code>scoped_lock</code></strong>, condition variables, I/O waits, or <strong>blocking</strong> in the element function -&gt; <strong>[OOPS]</strong> you violated the policy&rsquo;s requirements; <strong>undefined behavior</strong> territory.</li>
</ul>
<p><strong>Semantic sketch:</strong></p>
<ul>
<li><code>seq</code>: one logical thread, strict induction order expectations for element access side effects (as per algorithm).</li>
<li><code>par</code>: multiple threads; function objects must tolerate <strong>concurrent</strong> invocation on <strong>different</strong> elements.</li>
<li><code>par_unseq</code>: may interleave vector lanes; callable must be safe for <strong>vectorization</strong> (no conflicting unsequenced memory dependencies the compiler/library cannot reason about).</li>
</ul>
<hr />
<h3 id="ascii-execution-policy-decision-tree">ASCII: execution policy decision tree</h3>
<pre><code>                    ┌─────────────────────────────┐
                    │ Need parallel speedup?      │
                    └──────────────┬──────────────┘
                                   │
              ┌────────────────────┴────────────────────┐
              │ no                                      │ [OK] use seq
              ▼                                         │
     ┌────────────────┐                                 │
     │ Large range +  │                                 │
     │ CPU-bound work │                                 │
     └────────┬───────┘                                 │
              │ yes                                     │
              ▼                                         │
     ┌────────────────────────────┐                     │
     │ Callable side-effect free  │                     │
     │ per element (no races)?    │                     │
     └────────────┬───────────────┘                     │
                  │ no -&gt; [ERROR] fix design            │
                  │ yes                                 │
                  ▼                                     │
     ┌────────────────────────────┐                     │
     │ Need SIMD / unsequenced?   │                     │
     └────────────┬───────────────┘                     │
            yes   │   no                                │
               ┌──┴──┐                                  │
               ▼     ▼                                  │
          par_unseq par                                 │
              │     │                                   │
              └─────┴───────────────────────────────────┘
                        -&gt; pick policy, measure
</code></pre>
<hr />
<h2 id="223-exception-handling-p-266">22.3 Exception Handling (p. 266)</h2>
<p>Parallel algorithm <strong>overloads</strong> (the ones whose <strong>first</strong> argument is an <strong><code>ExecutionPolicy</code></strong>) treat escaping exceptions from <strong>element access</strong> differently from <strong>classical</strong> overloads with <strong>no</strong> policy.</p>
<ul>
<li>[OK] <strong>Non-policy</strong> algorithms (e.g. plain <strong><code>std::for_each(first, last, f)</code></strong>): if <strong><code>f</code></strong> throws, the exception <strong>propagates</strong> normally out of <strong><code>for_each</code></strong>----familiar <strong><code>try</code> / <code>catch</code></strong> works.</li>
<li>[ERROR] <strong>Policy</strong> algorithms (<strong><code>std::for_each(execution::seq, ...)</code></strong>, <strong><code>par</code></strong>, <strong><code>par_unseq</code></strong>, &hellip;): if an <strong>element access</strong> exits via an <strong>uncaught</strong> exception, the program ends by calling <strong><code>std::terminate()</code></strong>----there is <strong>no</strong> portable guarantee that your <strong><code>catch</code></strong> around the algorithm will run.</li>
</ul>
<p>Josuttis stresses this contrast: <strong><code>seq</code></strong> still <strong>disables</strong> actual parallelism, but you are in the <strong>ExecutionPolicy overload set</strong>, so you are still subject to the <strong>terminate-on-exception</strong> rule for these algorithms.</p>
<p><strong>Practical guidance:</strong></p>
<ul>
<li>Prefer <code>noexcept</code> lambdas and validate inputs <strong>before</strong> calling parallel algorithms.</li>
<li>Do not rely on exceptions for control flow inside parallel element bodies.</li>
<li>Treat element bodies like <strong>thread pools</strong>: return error codes to shared state only if that state is <strong>race-free</strong>.</li>
</ul>
<hr />
<h2 id="224-benefit-of-not-using-parallel-algorithms-p-266">22.4 Benefit of NOT Using Parallel Algorithms (p. 266)</h2>
<p>Parallelism is <strong>not</strong> free.</p>
<ul>
<li><strong>Overhead:</strong> thread scheduling, work partitioning, synchronization inside the library.</li>
<li><strong>Small <code>N</code>:</strong> <code>seq</code> or plain algorithm can be faster.</li>
<li><strong>Not all algorithms scale:</strong> memory bandwidth, contention, Amdahl limits.</li>
<li><strong>Developer cost:</strong> reasoning about races is harder.</li>
</ul>
<p>Rule of thumb: <strong>benchmark</strong> on target hardware; start with <code>seq</code>, promote hot paths to <code>par</code> when justified.</p>
<hr />
<h3 id="ascii-performance-tradeoff-schematic">ASCII: performance tradeoff (schematic)</h3>
<pre><code>  time
    ^
    │  parallel sort total cost
    │     ┌───────────────────────────────
    │    /
    │   /   region A: parallel wins (large N)
    │  /
    │ / region B: seq wins (small N - overhead dominates)
    │/──────────────────────────────────────-&gt; N (problem size)
         ^
         └─ crossover point (platform-specific)
</code></pre>
<hr />
<h2 id="225-overview-of-parallel-algorithms-p-267">22.5 Overview of Parallel Algorithms (p. 267)</h2>
<p>C++17 adds overloads taking <strong><code>ExecutionPolicy&amp;&amp;</code> as the first parameter</strong> for the algorithms enumerated below (complete as in Josuttis <strong>pp. 267-269</strong> / ISO C++17 parallel algorithm set). Headers: <strong><code>&lt;algorithm&gt;</code></strong> and <strong><code>&lt;numeric&gt;</code></strong> (plus <strong><code>&lt;execution&gt;</code></strong> for the policies).</p>
<p><strong><code>&lt;algorithm&gt;</code>&mdash;complete list (alphabetical):</strong></p>
<ul>
<li><code>adjacent_find</code></li>
<li><code>all_of</code>, <code>any_of</code>, <code>none_of</code></li>
<li><code>copy</code>, <code>copy_if</code>, <code>copy_n</code>, <code>move</code></li>
<li><code>count</code>, <code>count_if</code></li>
<li><code>equal</code></li>
<li><code>fill</code>, <code>fill_n</code></li>
<li><code>find</code>, <code>find_end</code>, <code>find_first_of</code>, <code>find_if</code>, <code>find_if_not</code></li>
<li><code>for_each</code></li>
<li><code>generate</code>, <code>generate_n</code></li>
<li><code>inplace_merge</code></li>
<li><code>is_heap</code>, <code>is_heap_until</code></li>
<li><code>is_sorted</code>, <code>is_sorted_until</code></li>
<li><code>lexicographical_compare</code></li>
<li><code>max_element</code>, <code>min_element</code>, <code>minmax_element</code></li>
<li><code>merge</code></li>
<li><code>mismatch</code></li>
<li><code>next_permutation</code>, <code>prev_permutation</code></li>
<li><code>nth_element</code></li>
<li><code>partial_sort</code>, <code>partial_sort_copy</code></li>
<li><code>partition</code>, <code>stable_partition</code>, <code>partition_copy</code></li>
<li><code>remove</code>, <code>remove_if</code>, <code>remove_copy</code>, <code>remove_copy_if</code></li>
<li><code>replace</code>, <code>replace_if</code>, <code>replace_copy</code>, <code>replace_copy_if</code></li>
<li><code>reverse</code>, <code>reverse_copy</code></li>
<li><code>rotate</code>, <code>rotate_copy</code></li>
<li><code>search</code>, <code>search_n</code></li>
<li><code>sort</code>, <code>stable_sort</code></li>
<li><code>transform</code></li>
<li><code>unique</code>, <code>unique_copy</code></li>
</ul>
<p><strong><code>&lt;numeric&gt;</code>&mdash;complete list (alphabetical):</strong></p>
<ul>
<li><code>exclusive_scan</code></li>
<li><code>inclusive_scan</code></li>
<li><code>reduce</code></li>
<li><code>transform_exclusive_scan</code></li>
<li><code>transform_inclusive_scan</code></li>
<li><code>transform_reduce</code></li>
<li><code>for_each_n</code></li>
</ul>
<p><strong>ASCII: where to look first</strong></p>
<pre><code>  &lt;execution&gt;  ---------&gt;  policy tags (seq, par, par_unseq)
        |
        v
  first argument of algorithm overload
        |
   +----+-----+
   |          |
&lt;algorithm&gt;  &lt;numeric&gt;   (lists above)
</code></pre>
<p><strong>Note:</strong> Parallel overloads impose <strong>extra iterator / numeric / complexity</strong> requirements (e.g. mutable iterators for mutating algorithms, associativity assumptions for <code>reduce</code>/<code>scan</code> under <code>par</code>). <strong><code>std::accumulate</code></strong> has <strong>no</strong> parallel policy overload in C++17----use <strong><code>reduce</code></strong> instead when reordering is acceptable.</p>
<hr />
<h2 id="226-motivation-for-new-algorithms-reduce-vs-accumulate-p-269">22.6 Motivation for New Algorithms: <code>reduce</code> vs <code>accumulate</code> (p. 269)</h2>
<h3 id="stdaccumulate-historical-default"><code>std::accumulate</code> (historical default)</h3>
<ul>
<li><strong>Order is fixed:</strong> evaluation proceeds <strong>strictly left-to-right</strong> over the range, applying the binary operation to the running result and the next element.</li>
<li><strong>Deterministic</strong> for the same input range and initial value----even for <strong>floating-point</strong>, you get the <strong>one</strong> canonical left fold (modulo <code>-O0</code>/<code>std::</code>-exact details you already rely on today).</li>
<li>A parallel policy overload <strong>does not exist</strong> for <code>accumulate</code>----by design, because <strong>reordering is incompatible</strong> with the defined evaluation order.</li>
</ul>
<h3 id="stdreduce-c17"><code>std::reduce</code> (C++17)</h3>
<ul>
<li><strong>Reordering permitted:</strong> the implementation may combine subranges in <strong>tree</strong> fashion (especially under <strong><code>par</code></strong> / <strong><code>par_unseq</code></strong>); the <strong>binary operation need not see operands in left-to-right order</strong>.</li>
<li>For <strong>non-associative</strong> operations (notably <strong><code>double</code> addition</strong>), <strong>different evaluation trees -&gt; different rounding</strong> -&gt; <strong>different observable results</strong> compared to <code>accumulate</code>.</li>
<li>With <strong><code>std::execution::seq</code></strong>, <code>reduce</code> is closer to &ldquo;like <code>accumulate</code>&rdquo; in spirit, but read the <strong>[algorithm.requirements]</strong> clauses for the exact contract on your iterator category and <code>T</code>.</li>
</ul>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;numeric&gt;
#include &lt;execution&gt;

double sum_par(const std::vector&lt;double&gt;&amp; v) {
    return std::reduce(std::execution::par, v.begin(), v.end(), 0.0);
}
</code></pre>
<h3 id="integer-example-accumulate-vs-reduce-still-illustrates-ordering-freedom">Integer example: <code>accumulate</code> vs <code>reduce</code> still illustrates ordering freedom</h3>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;numeric&gt;
#include &lt;vector&gt;

int main() {
    std::vector&lt;long&gt; v{1, 2, 3, 4, 5};
    long a = std::accumulate(v.begin(), v.end(), 0L);              // forced left fold
    long r = std::reduce(std::execution::seq, v.begin(), v.end(), 0L);
    std::cout &lt;&lt; &quot;accumulate: &quot; &lt;&lt; a &lt;&lt; &quot;\\n&quot;;  // 15
    std::cout &lt;&lt; &quot;reduce(seq): &quot; &lt;&lt; r &lt;&lt; &quot;\\n&quot;; // 15 for + on long (associative)
}
</code></pre>
<p>For <strong><code>+</code></strong> on <strong><code>long</code></strong>, <code>accumulate</code> and <strong><code>reduce(..., seq, ...)</code></strong> agree in ordinary situations. Under <strong><code>par</code></strong>, integer addition still yields the mathematically exact sum (no rounding), but the <strong><code>reduce</code> contract</strong> is what permits <strong>out-of-order combination</strong> of subresults.</p>
<h3 id="floating-point-caveat-detailed">Floating-point caveat (DETAILED)</h3>
<p>For <strong><code>float</code>/<code>double</code></strong>, <strong>associativity fails in the reals they approximate</strong>:</p>
<ul>
<li>[OK] <strong><code>accumulate</code></strong> always means <strong><code>(((...(init + v[0]) + v[1]) + v[2]) ...)</code></strong>----<strong>one</strong> rounding pattern.</li>
<li>[ERROR] <strong><code>reduce(..., par, ...)</code></strong> may group as <strong><code>(v[0]+v[1]) + (v[2]+v[3]) + ...</code></strong> or other trees----<strong>another</strong> rounding pattern.</li>
<li>[OOPS] <strong>Bit-identical</strong> reproducibility across compilers/machines -&gt; <strong>[ERROR]</strong> do not bet on <strong><code>par</code> reduce</strong> with raw <code>+</code> on floats.</li>
</ul>
<p><strong>When to prefer which</strong></p>
<table>
<thead>
<tr>
<th>Goal</th>
<th>Prefer</th>
</tr>
</thead>
<tbody>
<tr>
<td>Bit-reproducible left fold</td>
<td><code>accumulate</code> (or <code>reduce</code> with <code>seq</code>)</td>
</tr>
<tr>
<td>Speed on large arrays, acceptable numerical drift</td>
<td><code>reduce</code> with <code>par</code></td>
</tr>
<tr>
<td>Parallel + deterministic requirement</td>
<td>Must use <code>seq</code> or a compensated summation strategy (Kahan, etc.)</td>
</tr>
</tbody>
</table>
<h3 id="stdtransform_reduce-pp-269-277"><code>std::transform_reduce</code> (pp. 269-277)</h3>
<p><strong><code>transform_reduce</code></strong> fuses <strong>unary/unary-or-binary transform + reduction</strong> into a <strong>single</strong> parallel-friendly pass: first <strong>map</strong> elements (and optionally pair them with a second range), then <strong>reduce</strong> with your associative/commutative op where required by the policy.</p>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;numeric&gt;
#include &lt;functional&gt;
#include &lt;execution&gt;

double sum_of_squares(const std::vector&lt;double&gt;&amp; v) {
    return std::transform_reduce(
        std::execution::par,
        v.begin(), v.end(),
        0.0,
        std::plus&lt;&gt;(),
        [](double x) { return x * x; });
}
</code></pre>
<ul>
<li>[OK] One traversal, good cache behavior, exposes parallelism to the library.</li>
<li>[ERROR] Same <strong>floating-point non-determinism</strong> caveats as <strong><code>reduce</code></strong> when you use non-exact ops under <strong><code>par</code></strong>.</li>
</ul>
<hr />
<h2 id="minimal-complete-example">Minimal complete example</h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;vector&gt;
#include &lt;algorithm&gt;
#include &lt;execution&gt;
#include &lt;numeric&gt;

int main() {
    std::vector&lt;int&gt; v{3, 1, 4, 1, 5, 9, 2, 6, 5};

    long s = std::reduce(std::execution::par, v.begin(), v.end(), 0L);
    std::sort(std::execution::par, v.begin(), v.end());

    std::cout &lt;&lt; &quot;sum=&quot; &lt;&lt; s &lt;&lt; &quot;\\n&quot;;
    for (int x : v) std::cout &lt;&lt; x &lt;&lt; ' ';
    std::cout &lt;&lt; '\\n';
    return 0;
}
</code></pre>
<hr />

<p><em>Reference: Nicolai M. Josuttis, </em><em>C++17 - The Complete Guide</em><em>, Chapter 23, pp. 279-291.</em></p>
<p>This chapter focuses on algorithms <strong>new or redesigned</strong> in C++17: <code>for_each_n</code>, numeric reductions and scans (<code>reduce</code>, <code>transform_reduce</code>, inclusive/exclusive scans and transform variants), including interactions with parallel execution policies from Chapter 22.</p>

<h2 id="231-stdfor_each_n-p-279">23.1 <code>std::for_each_n()</code> (p. 279)</h2>
<p>Applies a function to <strong>the first <code>n</code> elements</strong> starting at an iterator.</p>
<p><strong>[OK]</strong> Return value: an iterator <strong>one past the last processed element</strong> (i.e. the position in the sequence after applying <code>f</code> to <code>n</code> elements), not merely an opaque completion flag.</p>
<h3 id="signature-conceptual">Signature (conceptual)</h3>
<pre><code class="language-cpp">template&lt;class InputIt, class Size, class Function&gt;
InputIt for_each_n(InputIt first, Size n, Function f);
</code></pre>
<ul>
<li><strong><code>f</code></strong> is invoked for each of the <code>n</code> elements.</li>
<li><strong>Returns</strong> an iterator <strong>past the last processed element</strong> (<code>first + n</code> if <code>first</code> is a random-access iterator and <code>n</code> is valid; in general, after advancing <code>n</code> times).</li>
</ul>
<h3 id="example">Example</h3>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;algorithm&gt;
#include &lt;iostream&gt;

int main() {
    std::vector&lt;int&gt; v{10, 20, 30, 40, 50};

    auto it = std::for_each_n(v.begin(), 3, [](int&amp; x) { x *= 2; });
    // v == {20, 40, 60, 40, 50}
    // it points at first unmodified element (40)

    std::cout &lt;&lt; &quot;distance: &quot; &lt;&lt; (it - v.begin()) &lt;&lt; '\\n';  // 3
}
</code></pre>
<h3 id="overload-with-execution-policy">Overload with execution policy</h3>
<pre><code class="language-cpp">std::for_each_n(std::execution::par, v.begin(), n, [](auto&amp; x) { ... });
</code></pre>
<p>Parallel semantics follow Chapter 22: <strong>no races</strong> on shared state.</p>
<hr />
<h2 id="232-new-numeric-algorithms-p-281">23.2 New Numeric Algorithms (p. 281)</h2>
<p>Header: <code>&lt;numeric&gt;</code> (same as <code>accumulate</code>, <code>iota</code>, etc.).</p>
<hr />
<h2 id="2321-stdreduce-p-281">23.2.1 <code>std::reduce()</code> (p. 281)</h2>
<p><strong>Purpose:</strong> Generalized sum / fold with <strong>unspecified</strong> evaluation order when not using <code>std::execution::seq</code>, which enables efficient parallel tree reduction.</p>
<h3 id="typical-uses">Typical uses</h3>
<pre><code class="language-cpp">#include &lt;numeric&gt;
#include &lt;vector&gt;
#include &lt;execution&gt;

std::vector&lt;int&gt; v{1, 2, 3, 4, 5};

// Default: uses std::plus and value-initialized T (0 for int)
int s1 = std::reduce(v.begin(), v.end());

// With initial value
long s2 = std::reduce(v.begin(), v.end(), 10L);

// Custom op (should be associative/commutative for parallel)
int s3 = std::reduce(v.begin(), v.end(), 1, [](int a, int b) { return a * b; });

// Parallel
int s4 = std::reduce(std::execution::par, v.begin(), v.end(), 0);
</code></pre>
<h3 id="reduce-vs-accumulate-execution-order">Reduce vs <code>accumulate</code> (execution order)</h3>
<p><code>accumulate</code> folds <strong>left to right</strong> deterministically. <code>reduce</code> may regroup terms.</p>
<hr />
<h3 id="ascii-accumulate-left-fold-order">ASCII: <code>accumulate</code> (left fold order)</h3>
<pre><code>elements:  e0   e1   e2   e3
           │    │    │    │
           ▼    │    │    │
           +◄───+    │    │
                │    │    │
                ▼    │    │
                +◄───+    │
                     │    │
                     ▼    │
                     +◄───+
                          │
                          ▼
                        result
</code></pre>
<h3 id="ascii-reduce-allowed-to-associate-differently">ASCII: <code>reduce</code> (allowed to associate differently)</h3>
<pre><code>        e0   e1   e2   e3
         ╲ ╱     ╲ ╱
          +       +
           ╲     ╱
            +---+----&gt; result  (actual tree is implementation-defined)
</code></pre>
<p><strong>Floating-point:</strong> reordering changes rounding -&gt; <strong>non-bit-identical</strong> results vs <code>accumulate</code>.</p>
<hr />
<h2 id="2322-stdtransform_reduce-p-283">23.2.2 <code>std::transform_reduce()</code> (p. 283)</h2>
<p><strong>Purpose:</strong> Combine <strong>transform</strong> + <strong>reduce</strong> in one pass. <strong>[OK]</strong> There are two essential forms: a <strong>binary / two-range</strong> overload (generalized <strong>inner product</strong> style: combine pairwise <code>op2</code> then reduce with <code>op1</code>) and a <strong>unary</strong> overload (<strong>map then reduce</strong>: apply unary <code>op</code> to each element, then fold with <code>binary_op</code>).</p>
<h3 id="binary-form-two-range-inner-product-style">Binary form (two-range inner-product style)</h3>
<pre><code class="language-cpp">#include &lt;numeric&gt;
#include &lt;vector&gt;

std::vector&lt;int&gt; a{1, 2, 3};
std::vector&lt;int&gt; b{4, 5, 6};

// Like inner_product with std::plus and std::multiplies defaults
int ip = std::transform_reduce(a.begin(), a.end(), b.begin(), 0);
// 1*4 + 2*5 + 3*6 = 32
</code></pre>
<h3 id="unary-form">Unary form</h3>
<pre><code class="language-cpp">#include &lt;numeric&gt;
#include &lt;vector&gt;
#include &lt;functional&gt;

std::vector&lt;int&gt; v{1, 2, 3, 4};
long sqsum = std::transform_reduce(
    v.begin(), v.end(),
    0L,
    std::plus&lt;&gt;{},
    [](int x) { return static_cast&lt;long&gt;(x) * x; });
// 1 + 4 + 9 + 16 = 30
</code></pre>
<h3 id="with-execution-policy">With execution policy</h3>
<pre><code class="language-cpp">double sumsq = std::transform_reduce(
    std::execution::par,
    v.begin(), v.end(),
    0.0,
    std::plus&lt;&gt;{},
    [](double x) { return x * x; });
</code></pre>
<p><strong>Notes:</strong></p>
<ul>
<li>Iterator requirements differ between overloads; parallel overloads need forward iterators at minimum (see exact constraints).</li>
<li>Custom reduction ops should behave sensibly under reordering when using <code>par</code>.</li>
</ul>
<hr />
<h2 id="2323-stdinclusive_scan-and-stdexclusive_scan-p-287">23.2.3 <code>std::inclusive_scan()</code> and <code>std::exclusive_scan()</code> (p. 287)</h2>
<p><strong>Prefix sums</strong> generalize to arbitrary <strong>associative</strong> binary operations (default <code>std::plus</code>).</p>
<h3 id="inclusive-scan-includes-current-element">Inclusive scan (includes current element)</h3>
<p>For input <code>[e0, e1, e2, ...]</code> output <code>o[i] = e0 OP e1 OP ... OP ei</code>.</p>
<pre><code>Input:   3   1   4   1   5  (OP = +)
Output:  3   4   8   9  14
</code></pre>
<h3 id="exclusive-scan-excludes-current-needs-initial-init">Exclusive scan (excludes current; needs initial <code>init</code>)</h3>
<p><code>o[0] = init</code> (conceptually), <code>o[i+1] = init OP e0 OP ... OP ei</code> (standard indexing details: output has same length as input; see signature).</p>
<pre><code>Input:   3   1   4   1   5  (OP = +, init = 0)
Output:  0   3   4   8   9
</code></pre>
<h3 id="example-code">Example code</h3>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;numeric&gt;
#include &lt;iostream&gt;

int main() {
    std::vector&lt;int&gt; v{3, 1, 4, 1, 5};

    std::vector&lt;int&gt; inc(v.size());
    std::inclusive_scan(v.begin(), v.end(), inc.begin());
    // inc: 3 4 8 9 14

    std::vector&lt;int&gt; exc(v.size());
    std::exclusive_scan(v.begin(), v.end(), exc.begin(), 0);
    // exc: 0 3 4 8 9
}
</code></pre>
<h3 id="step-by-step-ascii-inclusive-vs-exclusive-op---init--0">Step-by-step ASCII (inclusive vs exclusive, <code>OP = +</code>, <code>init = 0</code>)</h3>
<p><strong>Inclusive scan</strong> — each output includes the current element:</p>
<pre><code>i:         0   1   2   3   4
v[i]:      3   1   4   1   5
               │   │   │   │
inc[i]:      3───4───8───9──14
              └+─┘ └+──┘ └+──┘ ...
  step:     3   3+1  prev+4 prev+1 prev+5
</code></pre>
<p><strong>Exclusive scan</strong> — output at index <code>i</code> is the sum of inputs <em>before</em> <code>v[i]</code>; first slot is <code>init</code>:</p>
<pre><code>i:         0   1   2   3   4
v[i]:      3   1   4   1   5
init=0     │   │   │   │   │
exc[i]:    0───3───4───8───9
            │   └+3─┘ └+4─┘ ...
  step:     0   0+3 0+3+1 ...  (each exc[i] = fold of v[0]..v[i-1] with init)
</code></pre>
<p>[OK] Sanity: <code>exclusive_scan(..., init)[i] + v[i]</code> matches <code>inclusive_scan</code> at <code>i</code> when the op is <code>+</code> and the ranges align (informal check while reading the standard’s indexing).</p>
<h3 id="parallel-scans">Parallel scans</h3>
<pre><code class="language-cpp">std::inclusive_scan(std::execution::par, in.begin(), in.end(), out.begin());
</code></pre>
<p>Scans can be parallelized with work-efficient algorithms; requirements on <code>OP</code> and iterators apply.</p>
<hr />
<h2 id="2324-transform_inclusive_scan--transform_exclusive_scan-p-289">23.2.4 <code>transform_inclusive_scan</code> / <code>transform_exclusive_scan</code> (p. 289)</h2>
<p>Apply unary <code>transform</code> to each element, then scan with <code>binary_op</code>.</p>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;numeric&gt;
#include &lt;functional&gt;

std::vector&lt;int&gt; v{1, 2, 3, 4};
std::vector&lt;int&gt; out(v.size());

// First square, then inclusive plus-scan
std::transform_inclusive_scan(
    v.begin(), v.end(),
    out.begin(),
    std::plus&lt;&gt;{},
    [](int x) { return x * x; });
// v^2: 1 4 9 16 -&gt; prefix: 1 5 14 30
</code></pre>
<p><strong><code>transform_exclusive_scan</code></strong> — transform each element, then exclusive scan (needs <code>init</code>):</p>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;numeric&gt;
#include &lt;functional&gt;

std::vector&lt;int&gt; v{1, 2, 3, 4};
std::vector&lt;int&gt; out(v.size());

// Square each element, then exclusive plus-scan with init 0 -&gt; 0,1,5,14
std::transform_exclusive_scan(
    v.begin(), v.end(),
    out.begin(),
    0,
    std::plus&lt;&gt;{},
    [](int x) { return x * x; });
// transformed: 1 4 9 16 -&gt; out: 0 1 5 14
</code></pre>

<h2 id="end-to-end-histogram-normalization-sketch">End-to-end: histogram normalization sketch</h2>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;numeric&gt;
#include &lt;algorithm&gt;

std::vector&lt;double&gt; cumulative_weights(const std::vector&lt;int&gt;&amp; counts) {
    std::vector&lt;double&gt; w(counts.size());
    std::transform_exclusive_scan(
        counts.begin(), counts.end(),
        w.begin(),
        0.0,
        std::plus&lt;&gt;{},
        [](int c) { return static_cast&lt;double&gt;(c); });
    double total = std::reduce(std::execution::seq, counts.begin(), counts.end(), 0);
    std::for_each(w.begin(), w.end(), [total](double&amp; x) { x /= total; });
    return w;
}
</code></pre>

<p><em>Reference: Nicolai M. Josuttis, </em><em>C++17 - The Complete Guide</em><em>, Chapter 24, pp. 293-298.</em></p>
<p>Searchers encapsulate preprocessing of the <strong>pattern</strong> so repeated searches in a <strong>text</strong> reuse auxiliary tables (Boyer-Moore / Horspool). They integrate with <code>std::search</code> via overloads that take a <strong>searcher object</strong>.</p>
<hr />
<h2 id="241-using-substring-searchers-p-293">24.1 Using Substring Searchers (p. 293)</h2>
<p>Headers: <code>&lt;functional&gt;</code> (searcher types), <code>&lt;algorithm&gt;</code> (<code>search</code>).</p>
<h3 id="searcher-types">Searcher types</h3>
<table>
<thead>
<tr>
<th>Searcher</th>
<th>Idea</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>std::default_searcher</code></td>
<td>Classic forward algorithm (delegates to <code>search</code> / naive-style behavior; baseline).</td>
</tr>
<tr>
<td><code>std::boyer_moore_searcher</code></td>
<td>Boyer-Moore with bad-character + good-suffix heuristics; strong on large alphabets / long patterns.</td>
</tr>
<tr>
<td><code>std::boyer_moore_horspool_searcher</code></td>
<td>Simplified BM variant (bad-character style only); often good performance / less preprocessing.</td>
</tr>
</tbody>
</table>
<p>All are function objects with call operator matching <code>search</code> expectations.</p>
<hr />
<h2 id="2411-using-with-search-p-293">24.1.1 Using with <code>search()</code> (p. 293)</h2>
<pre><code class="language-cpp">#include &lt;string&gt;
#include &lt;algorithm&gt;
#include &lt;functional&gt;

int main() {
    std::string text = &quot;abcdaababcabcd&quot;;
    std::string pat  = &quot;abcabcd&quot;;

    auto pos = std::search(
        text.begin(), text.end(),
        std::boyer_moore_searcher(pat.begin(), pat.end()));

    if (pos != text.end()) {
        // match starts at pos (iterator to first element of occurrence)
    }
}
</code></pre>
<p><strong>Why use a searcher?</strong></p>
<ul>
<li>When the same <strong>pattern</strong> is reused across many texts (or large corpus), preprocessing cost amortizes.</li>
<li>For one-off tiny patterns, <code>default_searcher</code> or plain <code>search</code> may be simpler / competitive.</li>
</ul>
<hr />
<h2 id="2412-using-searchers-directly-p-295">24.1.2 Using Searchers Directly (p. 295)</h2>
<p>Searchers are <strong>callable</strong> as <code>searcher(haystack_first, haystack_last)</code> and return a <strong>pair</strong> of iterators delimiting the match (or <code>{last, last}</code> if none).</p>
<h3 id="structured-bindings">Structured bindings</h3>
<pre><code class="language-cpp">#include &lt;string&gt;
#include &lt;functional&gt;

bool contains_with_bm(std::string_view text, std::string_view pat) {
    std::boyer_moore_searcher bm(pat.begin(), pat.end());
    auto [beg, end] = bm(text.begin(), text.end());
    return beg != end;
}
</code></pre>
<h3 id="repeated-scans-with-stdtie">Repeated scans with <code>std::tie</code></h3>
<p><strong>Direct call</strong> (same as using <code>std::search</code> with a searcher): <code>auto [beg, end] = searcher(text.begin(), text.end());</code> — <code>[OK]</code> if <code>beg != end</code>, <code>[ERROR]</code> match is empty when <code>beg == end</code> (often both equal <code>text.end()</code>).</p>
<p><strong><code>for</code> loop with structured bindings and <code>std::tie</code> (advance <code>beg</code> from prior <code>end</code>):</strong></p>
<pre><code class="language-cpp">#include &lt;string&gt;
#include &lt;functional&gt;
#include &lt;tuple&gt;

void find_all_for(std::string_view text, std::string_view pat) {
    std::boyer_moore_searcher bms(pat.begin(), pat.end());
    for (auto [beg, end] = bms(text.begin(), text.end());

         std::tie(beg, end) = bms(end, text.end())) {
        // use match [beg, end)
        (void)beg;
        (void)end;
    }
}
</code></pre>

#include &lt;functional&gt;

    }
}
</code></pre>
<p><strong>Caution:</strong> advancing <code>first</code> defines whether you allow overlapping matches.</p>
<hr />
<h2 id="242-general-subsequence-searchers-p-296">24.2 General Subsequence Searchers (p. 296)</h2>
<p><code>std::search</code> with searchers generalizes beyond <code>char</code>: any <strong>forward iterator</strong> with an equality notion works. Patterns and texts can be arrays, <code>deque</code>, custom iterators&mdash;subject to searcher constructor storing copies or referencing iterator ranges <strong>(lifetime!)</strong>.</p>
<p><strong>Lifetime pitfall:</strong></p>
<pre><code class="language-cpp">// [ERROR] pattern iterators dangle if pat is destroyed before searcher use
auto make_bad() {
    std::string pat = &quot;abc&quot;;
    return std::boyer_moore_searcher(pat.begin(), pat.end());
}
</code></pre>
<p>Store pattern data <strong>outliving</strong> the searcher, or use <code>string_view</code> carefully with contiguous storage lifetime.</p>
<hr />
<h2 id="243-searcher-predicates-p-297">24.3 Searcher Predicates (p. 297)</h2>
<p>Searchers accept optional <strong>hash</strong> and <strong>equality</strong> callables for non-byte types or case-insensitive compares.</p>
<h3 id="case-insensitive-search-sketch">Case-insensitive search sketch</h3>
<pre><code class="language-cpp">#include &lt;functional&gt;
#include &lt;algorithm&gt;
#include &lt;cctype&gt;
#include &lt;string&gt;
#include &lt;string_view&gt;

struct ci_equal {
    bool operator()(char a, char b) const noexcept {
        return std::tolower(static_cast&lt;unsigned char&gt;(a)) ==
               std::tolower(static_cast&lt;unsigned char&gt;(b));
    }
};

struct ci_hash {
    std::size_t operator()(char c) const noexcept {
        return std::hash&lt;char&gt;{}(static_cast&lt;char&gt;(
            std::tolower(static_cast&lt;unsigned char&gt;(c))));
    }
};

bool contains_ci(std::string_view text, std::string_view pat) {
    std::boyer_moore_searcher bm(
        pat.begin(), pat.end(),
        ci_hash{},
        ci_equal{});
    auto [b, e] = bm(text.begin(), text.end());
    return b != e;
}
</code></pre>
<p><strong>Notes:</strong></p>
<ul>
<li>Hash and equality must be <strong>consistent</strong> (<code>eq(a,b)</code> implies <code>hash(a)==hash(b)</code> for the domain you use).</li>
<li>For <code>char</code> Boyer-Moore, custom hash defines how skips are computed under your equality semantics.</li>
</ul>

<td><code>boyer_moore_searcher</code></td>
</tr>

</tr>

<h2 id="251-size-empty-data-p-299">25.1 <code>size()</code>, <code>empty()</code>, <code>data()</code> (p. 299)</h2>
<p>These <strong>function templates</strong> unify access to <code>.size()</code>, <code>.empty()</code>, <code>.data()</code> for containers <strong>and</strong> raw C arrays.</p>
<h3 id="stdsize"><code>std::size</code></h3>
<pre><code class="language-cpp">#include &lt;iterator&gt;
#include &lt;vector&gt;

void demo_vector() {
    std::vector&lt;int&gt; v{1, 2, 3};
    static_assert(std::size(v) == 3);
}

void demo_c_array() {
    int arr[] = {10, 20, 30, 40};
    constexpr std::size_t n = std::size(arr);  // 4
    (void)n;

    int three[] = {1, 2, 3};
    static_assert(std::size(three) == 3);  // [OK] std::size on bound C array yields element count
}
</code></pre>
<p><strong>Why it matters:</strong> templates can write <code>std::size(x)</code> without special-casing pointers vs. containers. <strong>Note:</strong> Using <code>std::size</code> on a pointer is ill-formed unless you have a <code>std::extent</code> array type&mdash;raw pointers are not arrays.</p>
<h3 id="stdempty"><code>std::empty</code></h3>
<pre><code class="language-cpp">#include &lt;iterator&gt;
#include &lt;vector&gt;

    std::vector&lt;int&gt; v;
    int arr[] = {1};
    return std::empty(v) &amp;&amp; !std::empty(arr);
}

<p>Works for containers with <code>empty()</code>, for <code>initializer_list</code>, for C arrays (zero elements -&gt; empty), and strings.</p>
<h3 id="stddata"><code>std::data</code></h3>
<pre><code class="language-cpp">#include &lt;iterator&gt;
#include &lt;vector&gt;
#include &lt;cstring&gt;

    int* p = std::data(v);  // [OK] pointer to underlying contiguous element storage
    std::memset(p, 0, std::size(v) * sizeof(int));  // example only
}

    int arr[] = {1, 2, 3};
    int* p = std::data(arr);  // points to arr[0]
    (void)p;
}
</code></pre>
<p><strong>Use case:</strong> generic code interoperating with C APIs expecting pointers + lengths.</p>
<hr />
<h2 id="252-as_const-p-302">25.2 <code>as_const()</code> (p. 302)</h2>
<pre><code class="language-cpp">template&lt;typename T&gt;
constexpr const T&amp; as_const(T&amp; t) noexcept { return t; }
</code></pre>
<p><strong>Effect:</strong> obtains a <strong>const lvalue reference</strong> even if the original object is non-const.</p>
<h3 id="practical-uses">Practical uses</h3>
<p><strong>[OK]</strong> Force const overloads:</p>
<pre><code class="language-cpp">#include &lt;utility&gt;

struct Widget {
    void work() &amp;       { /* mutable path */ }
    void work() const&amp;  { /* const path */ }
};

void call_const_path(Widget&amp; w) {

}

<p><strong>[OK]</strong> Lambda capture holding const reference without copying:</p>

</code></pre>
<p><strong>Limitation:</strong> <code>as_const</code> does not help with <strong>deep const</strong> for pointers (<code>const T*</code> vs <code>T*</code>).</p>
<hr />
<h2 id="253-clamp-p-303">25.3 <code>clamp()</code> (p. 303)</h2>
<pre><code class="language-cpp">#include &lt;algorithm&gt;

template&lt;class T&gt;
constexpr const T&amp; clamp(const T&amp; v, const T&amp; lo, const T&amp; hi);

template&lt;class T, class Compare&gt;
constexpr const T&amp; clamp(const T&amp; v, const T&amp; lo, const T&amp; hi, Compare comp);
</code></pre>
<p><strong>Semantics (without custom comparator):</strong></p>
<ul>
<li>If <code>v &lt; lo</code> -&gt; return <code>lo</code></li>
<li>Else if <code>hi &lt; v</code> -&gt; return <code>hi</code></li>
<li>Else return <code>v</code></li>

<h3 id="examples">Examples</h3>
<pre><code class="language-cpp">#include &lt;algorithm&gt;
#include &lt;iostream&gt;

int main() {
    std::cout &lt;&lt; std::clamp(42, 0, 100) &lt;&lt; '\\n';   // 42

    std::cout &lt;&lt; std::clamp(150, 0, 100) &lt;&lt; '\\n';  // 100

    // Custom comparator (e.g., absolute tolerance domain)

    double x = std::clamp(1.7, 0.0, 1.0, abs_less);

</code></pre>

<h3 id="use-cases">Use cases</h3>
<ul>
<li>GUI sliders mapping input to bounds.</li>
<li>Physics or game clamps.</li>
<li>Normalizing user configuration values.</li>
</ul>
<hr />
<h2 id="254-sample-p-304">25.4 <code>sample()</code> (p. 304)</h2>
<p><strong>Signature shape (informal):</strong> <code>std::sample(first, last, out, n, rng)</code> — <strong>[OK]</strong> the sample <strong>preserves relative order</strong> of the chosen elements as they appeared in <code>[first, last)</code>.</p>
<pre><code class="language-cpp">#include &lt;random&gt;
#include &lt;algorithm&gt;
#include &lt;numeric&gt;
#include &lt;vector&gt;
#include &lt;iterator&gt;

int main() {
    std::vector&lt;int&gt; population(100);
    std::iota(population.begin(), population.end(), 0);

    std::vector&lt;int&gt; out;

        population.begin(), population.end(),
        std::back_inserter(out),

    // relative order among sampled elements follows their order in population

  { name: `27. Container String Extensions`, path: `26_container_string_extensions.md`, dir: ``, body: `<h1 id="chapter-26-container-and-string-extensions">Chapter 26: Container and String Extensions</h1>
<p><em>Reference: Nicolai M. Josuttis, </em><em>C++17 - The Complete Guide</em><em>, Chapter 26, pp. 309-319.</em></p>
<p>C++17 extends associative containers with <strong>node handles</strong> (<code>extract</code> / splice-style insertion), refines <strong>emplace</strong> return types, adds <code>try_emplace</code> / <code>insert_or_assign</code>, permits certain containers with <strong>incomplete</strong> value types, and makes <code>std::string::data()</code> provide <strong>mutable</strong> access.</p>
<hr />
<h2 id="261-node-handles-p-309">26.1 Node Handles (p. 309)</h2>
<p>Applicable to <strong>node-based</strong> associative containers: <code>std::map</code>, <code>std::multimap</code>, <code>std::set</code>, <code>std::multiset</code>, and their <code>unordered_*</code> counterparts.</p>
<p>A <strong>node handle</strong> (<code>node_type</code>) owns a single element <strong>outside</strong> any container, enabling moves without allocating new nodes.</p>
<hr />
<h2 id="2611-modifying-a-key-p-309">26.1.1 Modifying a Key (p. 309)</h2>
<p><code>std::map</code> keys are normally immutable in-place. <strong>Extract -&gt; mutate key -&gt; reinsert</strong> is the idiom.</p>
<pre><code class="language-cpp">#include &lt;map&gt;
#include &lt;string&gt;
#include &lt;iostream&gt;

int main() {
    std::map&lt;std::string, int&gt; m{{&quot;old&quot;, 42}};

    auto nh = m.extract(&quot;old&quot;);
    if (!nh.empty()) {
        nh.key() = &quot;new&quot;;  // modify key while out of container
        auto result = m.insert(std::move(nh));  // returns insert_return_type: position, inserted, node
        (void)result.position;
    }
}
</code></pre>
<p><strong>Practical note:</strong> Exact <code>insert</code> return type differs between map/set variants; always check your standard library docs for your container.</p>
<p><strong>Why it works:</strong> While extracted, the element is not located by the container&rsquo;s tree / bucket structure, so key hash / ordering invariants can be rebuilt on insertion.</p>
<hr />
<h2 id="2612-moving-nodes-between-containers-p-311">26.1.2 Moving Nodes Between Containers (p. 311)</h2>
<p>Transfer <strong>without</strong> copying mapped values or reallocating a new node (when successful).</p>
<pre><code class="language-cpp">#include &lt;map&gt;
#include &lt;string&gt;

void merge_one_entry(
    std::map&lt;std::string, int&gt;&amp; dst,
    std::map&lt;std::string, int&gt;&amp; src,
    std::map&lt;std::string, int&gt;::iterator it_in_src) {

    auto nh = src.extract(it_in_src);
    dst.insert(std::move(nh));
}
</code></pre>
<p><strong>Compatibility:</strong> Source and destination must have <strong>compatible</strong> <code>node_type</code> (same <code>key_type</code>, <code>mapped_type</code>, allocator, hash/compare for unordered maps).</p>
<hr />
<h2 id="2613-merging-containers-p-312">26.1.3 Merging Containers (p. 312)</h2>
<p><code>dst.merge(src)</code> moves <strong>all</strong> transferable nodes from <code>src</code> into <code>dst</code>.</p>
<ul>
<li><strong>Unique-key containers (<code>map</code>, <code>unordered_map</code>, <code>set</code>, &hellip;):</strong> If an element&rsquo;s key already exists in <code>dst</code>, that element <strong>stays</strong> in <code>src</code>.</li>
<li><strong><code>multimap</code> / <code>multiset</code>:</strong> All can move (duplicates allowed).</li>
</ul>
<pre><code class="language-cpp">#include &lt;map&gt;
#include &lt;iostream&gt;

int main() {
    std::map&lt;std::string, int&gt; a{{&quot;x&quot;, 1}, {&quot;y&quot;, 2}};
    std::map&lt;std::string, int&gt; b{{&quot;y&quot;, 99}, {&quot;z&quot;, 3}};

    a.merge(b);
    // a has x,y,z ; y kept original in 'a' (already present), 99 remains in b perhaps
    // b retains nodes whose keys collided in dst
    std::cout &lt;&lt; b.size() &lt;&lt; '\\n';
}
</code></pre>
<hr />
<h3 id="ascii-extract--reinsert-lifecycle">ASCII: extract / reinsert lifecycle</h3>
<pre><code>┌──────────── map container ────────────┐
│  ...  [ key=k  | value=v ]  ...       │
└────────────────┬──────────────────────┘
                 │ extract(it)
                 ▼
        ┌─────────────────┐
        │  node handle nh │
        │  owns element   │
        └────────┬────────┘
                 │ nh.key() = new_key   (map)
                 │ or move to other map insert(nh map std::move(nh))
                 ▼
┌──────────── target container ─────────┐
│  ... newly inserted / merged node ... │
└───────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="262-emplace-improvements-p-314">26.2 Emplace Improvements (p. 314)</h2>
<h3 id="2621-return-type-of-emplace-functions-p-314">26.2.1 Return Type of Emplace Functions (p. 314)</h3>
<p>For containers like <code>vector</code>, <code>deque</code>, <code>list</code>, <code>forward_list</code>:</p>
<ul>
<li><code>emplace</code>, <code>emplace_back</code>, <code>emplace_front</code> return <strong>reference</strong> to inserted element (instead of <code>void</code> where applicable previously). <strong>[OK]</strong> In particular, <code>emplace_back</code> returns <code>T&amp;</code> since C++17 (earlier <code>std::vector::emplace_back</code> was <code>void</code>).</li>
</ul>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;string&gt;

int main() {
    std::vector&lt;std::string&gt; v;
    std::string&amp; ref = v.emplace_back(&quot;hello&quot;);
    ref[0] = 'H';
}
</code></pre>
<hr />
<h3 id="2622-try_emplace-and-insert_or_assign-p-314">26.2.2 <code>try_emplace()</code> and <code>insert_or_assign()</code> (p. 314)</h3>
<p>Both return <strong><code>std::pair&lt;iterator, bool&gt;</code></strong> (for <code>map</code>-like unique-key containers).</p>
<p><strong><code>try_emplace</code>:</strong> Inserts only if key missing; <strong>does not move or construct</strong> mapped value arguments if key exists (useful for expensive values).</p>
<pre><code class="language-cpp">#include &lt;map&gt;
#include &lt;string&gt;
#include &lt;utility&gt;

struct Expensive {
    explicit Expensive(std::string) {}
};

int main() {
    std::map&lt;int, Expensive&gt; m;
    m.try_emplace(1, std::string(&quot;a&quot;));     // constructs
    m.try_emplace(1, std::string(&quot;ignored&quot;)); // no construction of Expensive

    std::map&lt;std::string, std::string&gt; cfg;
    std::string value = &quot;payload&quot;;
    cfg.try_emplace(&quot;key&quot;, std::move(value));  // [OK] value not moved from if &quot;key&quot; already exists
}
</code></pre>
<p><strong><code>insert_or_assign</code>:</strong> Updates mapped value if key exists (uses move/assignment), inserts otherwise.</p>
<pre><code class="language-cpp">#include &lt;map&gt;
#include &lt;string&gt;

int main() {
    std::map&lt;std::string, int&gt; cfg;
    std::pair&lt;std::map&lt;std::string, int&gt;::iterator, bool&gt; ir =
        cfg.insert_or_assign(&quot;timeout&quot;, 30);   // returns std::pair&lt;iterator, bool&gt;
    (void)ir;
    cfg.insert_or_assign(&quot;timeout&quot;, 60);  // overwrites; bool indicates insert vs assign semantics per standard
}
</code></pre>
<p><strong>Difference from <code>operator[]</code>:</strong> <code>insert_or_assign</code> works with <strong>non-default-constructible</strong> mapped types and can avoid accidental default insert side effects.</p>
<hr />
<h2 id="263-container-support-for-incomplete-types-p-316">26.3 Container Support for Incomplete Types (p. 316)</h2>
<p><code>std::vector</code>, <code>std::list</code>, and <code>std::forward_list</code> may be instantiated on <strong>incomplete</strong> <code>T</code> until the first use that requires completeness.</p>
<p>Enables recursive tree structures:</p>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;string&gt;

struct Node {
    std::string name;
    std::vector&lt;Node&gt; children;  // C++17: OK with incomplete Node at field declaration
};
</code></pre>
<p><strong>Caveats:</strong></p>
<ul>
<li>Completeness required before operations that allocate or destroy elements.</li>
<li>Not all containers gained this&mdash;e.g. <code>std::deque</code> historically differs; follow the standard for your type.</li>
</ul>
<hr />
<h2 id="264-string-improvements-p-318">26.4 String Improvements (p. 318)</h2>
<p><code>std::basic_string::data()</code> now returns <strong><code>CharT*</code></strong> (non-const) in addition to <code>const</code> overload&mdash;mutable access to underlying sequence (contiguous).</p>
<pre><code class="language-cpp">#include &lt;string&gt;
#include &lt;cstring&gt;

void fill(std::string&amp; s) {
    char* p = s.data();  // non-const CharT* since C++17
    std::memset(p, 'A', s.size());
}

void mutate_first(std::string&amp; s) {
    if (!s.empty()) {
        char* p = s.data();
        p[0] = 'X';  // [OK] mutable access via data()
    }
}
</code></pre>
<p><strong>Interaction with <code>std::as_bytes</code> / C++20:</strong> in C++17, this closes a long-standing gap vs <code>vector::data</code>.</p>
<hr />
<h2 id="quick-decision-guide">Quick decision guide</h2>
<table>
<thead>
<tr>
<th>Task</th>
<th>Mechanism</th>
</tr>
</thead>
<tbody>
<tr>
<td>Change map key</td>
<td><code>extract</code> + mutate <code>nh.key()</code> + <code>insert</code></td>
</tr>
<tr>
<td>Move map entry cheaply</td>
<td><code>extract</code> + <code>insert</code> into other map</td>
</tr>
<tr>
<td>Bulk steal compatible nodes</td>
<td><code>dst.merge(src)</code></td>
</tr>
<tr>
<td>Insert if missing, skip cost otherwise</td>
<td><code>try_emplace</code></td>
</tr>
<tr>
<td>Upsert config value</td>
<td><code>insert_or_assign</code></td>
</tr>
<tr>
<td>Recursive child lists</td>
<td><code>vector&lt;Node&gt;</code> with incomplete <code>Node</code> until used</td>
</tr>
</tbody>
</table>
<hr />

<li><strong>Chapter 25:</strong> <code>std::data</code> free function vs <code>string::data</code> (pp. 299-307).</li>
</ul>` },
