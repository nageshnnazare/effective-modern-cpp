<hr />
<h2 id="practical-advice">Practical advice</h2>
<ol>
<li>Prefer <strong>prvalue returns</strong> (<code>return T{...};</code>) for factories when you want maximum portability with <strong>non-movable</strong> types.</li>
<li>Do <strong>not</strong> assume NRVO; use move or explicit out-parameters if you must support types without move and named locals.</li>
<li>Teach your team <strong><code>std::is_copy_constructible</code> is the wrong gate</strong> for &ldquo;can I return this?&rdquo; in many C++17 patterns &ndash; understand <strong>prvalue</strong> semantics instead.</li>
</ol>
<hr />
<h2 id="afternotes-chapter-context">Afternotes (chapter context)</h2>
<p>The standard wording shift around <strong>prvalues initializing objects</strong> and <strong>guaranteed copy elision</strong> is one of the most impactful C++17 core language changes for <strong>move-less</strong> and <strong>wrapper</strong> types. Josuttis ties this to clearer <strong>value category</strong> teaching and to real-world library design (e.g. factories, atomics, immovable handles).</p>` },
  { name: `7. Lambda Extensions`, path: `06_lambda_extensions.md`, dir: ``, body: `<h1 id="chapter-6-lambda-extensions">Chapter 6: Lambda Extensions</h1>
<p><strong>Book reference:</strong> <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis (pages 47-53)</p>
<p>Lambdas in C++17 gain two headline features discussed in this chapter:</p>
<ol>
<li><strong><code>constexpr</code> lambdas</strong> (implicit or explicit).</li>
<li><strong><code>*this</code> capture</strong> (capture the current object <em>by value</em>), fixing lifetime bugs from pointer captures.</li>
</ol>
<p>There is also brief coverage of capturing by <strong>const reference</strong> with <code>std::as_const</code> (p. 53).</p>
<hr />
<h2 id="61-constexpr-lambdas-p-47">6.1 <code>constexpr</code> Lambdas (p. 47)</h2>
<h3 id="implicit-constexpr-when-possible">Implicit <code>constexpr</code> when possible</h3>
<p>Since C++17, a lambda&rsquo;s call operator is <strong><code>constexpr</code> automatically</strong> if the lambda satisfies the requirements for a <code>constexpr</code> function (roughly: what it does must be usable in constant evaluation).</p>
<p><strong>Example (book intent):</strong></p>
<pre><code class="language-cpp">auto squared = [](auto val) { return val * val; };

// Use in compile-time context:
#include &lt;array&gt;
std::array&lt;int, squared(5)&gt; a{};   // [OK] size 25
</code></pre>
<p>Here <code>squared(5)</code> is a <strong>constant expression</strong> because the lambda&rsquo;s <code>operator()</code> is <code>constexpr</code>.</p>
<h3 id="what-disables-constexpr">What disables <code>constexpr</code></h3>
<p>If the lambda body uses features <strong>not allowed</strong> in <code>constexpr</code> functions, it is <strong>not</strong> <code>constexpr</code>. Common disablers:</p>
<ul>
<li><strong><code>static</code> local variables</strong> inside the lambda body (state that cannot live in <code>constexpr</code> evaluation the same way).</li>
<li>Non-<code>constexpr</code> functions called from the body.</li>
<li>Other C++ <code>constexpr</code> restrictions of your language mode.</li>
</ul>
<pre><code class="language-cpp">auto bad = [] {
    static int x = 0;   // typically makes operator() non-constexpr
    return x;
};
// std::array&lt;int, bad()&gt; b;  // [ERROR]
</code></pre>
<h3 id="explicit-constexpr">Explicit <code>constexpr</code></h3>
<p>You can write <code>constexpr</code> explicitly for clarity or to get a diagnostic if it fails:</p>
<pre><code class="language-cpp">auto f = [](auto val) constexpr { return val * val; };
</code></pre>
<p>With an explicit return type:</p>
<pre><code class="language-cpp">auto g = [](int val) constexpr -&gt; int { return val * val; };
</code></pre>
<h3 id="closure-type">Closure type</h3>
<p>The <strong>closure type</strong>&rsquo;s <code>operator()</code> is <code>constexpr</code> when the rules are met &ndash; there is no separate &ldquo;runtime lambda&rdquo; type vs &ldquo;constexpr lambda&rdquo; type; it is one type with a <code>constexpr</code> <code>operator()</code>.</p>
<h3 id="constexpr-lambda-vs-constexpr-lambda-object"><code>constexpr</code> lambda vs <code>constexpr</code> lambda <em>object</em></h3>
<pre><code class="language-cpp">constexpr auto squared = [](auto val) constexpr { return val * val; };
//  ^^^^^^^^^
//  The variable 'squared' is constexpr -- the closure itself must be
//  literal and usable at compile time.
</code></pre>
<p>Compare with:</p>
<pre><code class="language-cpp">auto squared = [](auto val) { return val * val; };
// still may have constexpr operator() if possible, but 'squared' variable
// is not constexpr unless you mark it constexpr and the closure qualifies
</code></pre>
<hr />
<h2 id="611-using-constexpr-lambdas-p-49">6.1.1 Using <code>constexpr</code> Lambdas (p. 49)</h2>
<h3 id="compile-time-string-hash-djb2-style">Compile-time string hash (djb2 style)</h3>
<p>The book shows using a <code>constexpr</code> callable to hash string literals at compile time.</p>
<pre><code class="language-cpp">constexpr unsigned long long hashed(const char* s, int h = 5381) {
    return *s ? hashed(s + 1, ((h &lt;&lt; 5) + h) + *s) : h;
}
</code></pre>
<p>Or with a <strong>constexpr lambda</strong> wrapping the same idea (illustrative):</p>
<pre><code class="language-cpp">constexpr auto hashed_fn = [](const char* s) constexpr -&gt; unsigned long long {
    unsigned long long h = 5381;
    while (*s) {
        h = ((h &lt;&lt; 5) + h) + static_cast&lt;unsigned char&gt;(*s);
        ++s;
    }
    return h;
};
</code></pre>
<p><strong>Enum with compile-time values</strong> (using the <code>constexpr</code> function <code>hashed</code> above):</p>
<pre><code class="language-cpp">enum class Hashed : unsigned long long {
    beer = hashed(&quot;beer&quot;),
    wine = hashed(&quot;wine&quot;),
};
</code></pre>
<p>You can write the same algorithm as a <strong><code>constexpr</code> lambda</strong> stored in a <code>constexpr</code> variable and call that from <code>switch</code>, but <strong>enumerators</strong> need a single constant expression &ndash; the free function form is often simplest.</p>
<p><strong><code>switch</code> on runtime string-ish input</strong> still compares to <strong>compile-time</strong> constants:</p>
<pre><code class="language-cpp">// int main(int argc, char* argv[]) {
//     switch (hashed(argv[1])) {
//         case hashed(&quot;beer&quot;): ...
//         case hashed(&quot;wine&quot;): ...
//     }
// }
</code></pre>
<p>(Real code should handle invalid strings; this mirrors the book&rsquo;s teaching example.)</p>
<h3 id="stdarray-initialization"><code>std::array</code> initialization</h3>
<pre><code class="language-cpp">#include &lt;array&gt;

constexpr auto make_table = [] constexpr {
    std::array&lt;int, 10&gt; a{};
    for (int i = 0; i &lt; 10; ++i)
        a[i] = i * i;
    return a;
};
constexpr auto table = make_table();
</code></pre>
<h3 id="parameterized-lambda-with-another-constexpr-lambda">Parameterized lambda with another constexpr lambda</h3>
<p>Nested <code>constexpr</code> callables compose when everything stays in the <code>constexpr</code> subset.</p>
<hr />
<h2 id="62-passing-copies-of-this-to-lambdas-p-50">6.2 Passing Copies of <code>this</code> to Lambdas (p. 50)</h2>
<h3 id="the-problem-this-captures-a-pointer">The problem: <code>[this]</code> captures a <strong>pointer</strong></h3>
<pre><code class="language-cpp">struct Widget {
    std::string name;

    void demo() {
        auto lam = [this] { return name; };
        // lam stores pointer to *this
    }
};
</code></pre>
<p>If the lambda <strong>outlives</strong> the <code>Widget</code>, dereferencing the captured pointer is <strong>[ERROR]</strong> / undefined behavior.</p>
<p><code>[=]</code> may capture <code>this</code> implicitly in ways that surprise readers (book warns).</p>
<h3 id="c14-workaround-capture-a-copy-of-the-object">C++14 workaround: capture a copy of the object</h3>
<pre><code class="language-cpp">auto lam = [thisCopy = *this] { return thisCopy.name; };
</code></pre>
<h3 id="c17-this-capture">C++17: <code>*this</code> capture</h3>
<pre><code class="language-cpp">struct Data {
    std::string name;

    auto make_lambda() {
        return [*this] { return name; };  // copy of *this in closure
    }
};
</code></pre>
<p>The closure holds a <strong>copy</strong> of the object; the lambda can run later <strong>safely</strong> with respect to the original object&rsquo;s lifetime (subject to the usual rules for copying members).</p>
<h3 id="combining-captures">Combining captures</h3>
<ul>
<li><code>[&amp;, *this]</code> [OK] &ndash; default by-reference members, but object as value copy.</li>
<li><code>[this, *this]</code> [ERROR] &ndash; conflicting/duplicate specification of object capture (book).</li>
</ul>
<h3 id="thread-example">Thread example</h3>
<pre><code class="language-cpp">#include &lt;thread&gt;

class Data {
    // ...
public:
    void startThreadWithCopyOfThis() {
        std::thread t{[*this]() mutable {
            // use members of the *copy*
        }};
        t.detach();
    }
};
</code></pre>
<p><strong>Without <code>*this</code>:</strong> a lambda stored in a <code>std::thread</code> that captured <code>[this]</code> could run after the object is destroyed [ERROR] [undefined behavior].</p>
<hr />
<h2 id="63-capturing-by-const-reference-p-53">6.3 Capturing by <code>const</code> Reference (p. 53)</h2>
<p>Sometimes you want capture by reference but <strong>read-only</strong>, even when the source object is non-<code>const</code>. <strong><code>std::as_const</code></strong> helps:</p>
<pre><code class="language-cpp">#include &lt;utility&gt;

void example(std::string&amp; s) {
    auto lam = [&amp;s = std::as_const(s)] {
        // s inside lambda is const std::string&amp;
    };
}
</code></pre>
<p>This avoids accidentally mutating the outer object through a reference capture.</p>
<hr />
<h2 id="64-afternotes">6.4 Afternotes</h2>
<ul>
<li><strong><code>constexpr</code> lambdas</strong> were advanced by <strong>Faisal Vali</strong> et al.</li>
<li><strong><code>*this</code> capture</strong> was advanced by <strong>H. Carter Edwards</strong> et al.</li>
</ul>
<p>Both features close gaps that library authors and application developers hit regularly in C++14.</p>
<hr />
<h2 id="quick-reference">Quick reference</h2>
<table>
<thead>
<tr>
<th>Feature</th>
<th>Syntax / idea</th>
<th>Result</th>
</tr>
</thead>
<tbody>
<tr>
<td>Implicit constexpr</td>
<td>plain lambda body</td>
<td><code>operator()</code> constexpr if valid</td>
</tr>
<tr>
<td>Explicit constexpr</td>
<td><code>[]() constexpr { ... }</code></td>
<td>diagnostic if invalid</td>
</tr>
<tr>
<td>Copy *this</td>
<td><code>[*this]</code></td>
<td>closure stores subobject copy</td>
</tr>
<tr>
<td>Pointer this</td>
<td><code>[this]</code></td>
<td>closure stores pointer &ndash; lifetime bugs</td>
</tr>
<tr>
<td>const ref capture</td>
<td><code>[&amp;x = std::as_const(y)]</code></td>
<td>read-only alias</td>
</tr>
</tbody>
</table>
<hr />
<h2 id="self-check-questions">Self-check questions</h2>
<ol>
<li>Why does <code>static</code> inside a lambda often break compile-time use?</li>
<li>When does <code>[*this]</code> allocate more than <code>[this]</code>?</li>
<li>Why is <code>[this, *this]</code> ill-formed?</li>
</ol>
<p>(Answers follow directly from the sections above.)</p>` },
  { name: `8. New Attributes`, path: `07_new_attributes.md`, dir: ``, body: `<h1 id="chapter-7-new-attributes-and-attribute-features">Chapter 7: New Attributes and Attribute Features</h1>
<p><strong>Book reference:</strong> <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis (pages 55-59)</p>
<p>C++17 standardizes several attributes that compilers can use for <strong>warnings</strong>, <strong>portable annotation</strong>, and <strong>API evolution</strong>. This chapter focuses on <code>[[nodiscard]]</code>, <code>[[maybe_unused]]</code>, and <code>[[fallthrough]]</code>, plus <strong>general attribute extensions</strong> (namespaces, enumerators, attribute namespaces with <code>using</code>).</p>
<hr />
<h2 id="71-attribute-nodiscard-p-55">7.1 Attribute <code>[[nodiscard]]</code> (p. 55)</h2>
<h3 id="purpose">Purpose</h3>
<p><strong><code>[[nodiscard]]</code></strong> encourages Diagnosing <strong>discarded return values</strong>. If you call a function and ignore its result, the compiler may emit a <strong>warning</strong>.</p>
<h3 id="typical-use-cases-book">Typical use cases (book)</h3>
<ul>
<li><strong>Resource allocation</strong> patterns where ignoring the return value leaks (e.g. C-style <code>malloc</code> wrappers &ndash; though in modern C++ you prefer smart pointers).</li>
<li><strong>Async</strong> APIs where discarding the return value (e.g. from <code>std::async</code>) may mean you never observe results or exceptions.</li>
<li><strong>Query functions</strong> like <code>empty()</code> where ignoring the result is almost always a logic bug.</li>
</ul>
<h3 id="class-member-function-example">Class member function example</h3>
<pre><code class="language-cpp">class MyContainer {
public:
    [[nodiscard]] bool empty() const noexcept;
};
</code></pre>
<p>Callers should use the result:</p>
<pre><code class="language-cpp">void client(MyContainer&amp; coll) {
    if (coll.empty()) { /* ... */ }
}
</code></pre>
<h3 id="suppressing-the-warning-intentionally">Suppressing the warning intentionally</h3>
<p>If you truly intend to discard:</p>
<pre><code class="language-cpp">(void)coll.empty();
</code></pre>
<p>The cast-to-void idiom documents intent and typically silences <code>[[nodiscard]]</code> warnings.</p>
<h3 id="inheritance">Inheritance</h3>
<p><strong><code>[[nodiscard]]</code> is <em>not</em> inherited</strong> by overriding functions in the sense you might expect from <code>override</code> &ndash; if you need the warning on <strong>all</strong> overrides, repeat the attribute in the derived class as appropriate (book warns about this pitfall).</p>
<h3 id="placement">Placement</h3>
<p>Attributes may appear:</p>
<ul>
<li><strong>Before</strong> the declaration specifiers; or  </li>
<li><strong>After</strong> the function declarator (after the parameter list / function name part depending on syntax).</li>
</ul>
<p>Consult your compiler for the exact position it prefers in tricky cases; both placements are standardized for functions.</p>
<h3 id="standard-library-status-in-c17">Standard library status in C++17</h3>
<p>Many <code>[[nodiscard]]</code> additions people associate with <code>optional::value()</code>, <code>vector::empty()</code>, etc. landed in <strong>C++20</strong> for the standard library. Josuttis notes that in <strong>C++17</strong> the attribute exists in the language, but <strong>standard library marking was largely deferred</strong>.</p>
<hr />
<h2 id="72-attribute-maybe_unused-p-57">7.2 Attribute <code>[[maybe_unused]]</code> (p. 57)</h2>
<h3 id="purpose_1">Purpose</h3>
<p>Silence <strong>unused entity</strong> warnings for <strong>names</strong> that must exist for API or debugging reasons but are not always referenced.</p>
<h3 id="parameters">Parameters</h3>
<pre><code class="language-cpp">void foo(int val, [[maybe_unused]] std::string msg) {
    // msg might only be used in logging builds
}
</code></pre>
<h3 id="members-variables-functions-types-enumerators">Members, variables, functions, types, enumerators</h3>
<p>Applicable to many declaration kinds, e.g.:</p>
<pre><code class="language-cpp">[[maybe_unused]] static void helper() { }

enum class E {
    a = 1,
    b [[maybe_unused]] = 2,
};
</code></pre>
<h3 id="common-mistake-applying-to-a-statement">Common mistake: applying to a <em>statement</em></h3>
<pre><code class="language-cpp">// [[maybe_unused]] foo();  // [ERROR] not a declaration
</code></pre>
<h3 id="but-on-a-variable-initialized-from-a-call">But on a <em>variable</em> initialized from a call</h3>
<pre><code class="language-cpp">[[maybe_unused]] auto x = foo();  // [OK] names 'x'
</code></pre>
<p>The attribute applies to <strong><code>x</code></strong>, not to the statement alone.</p>
<hr />
<h2 id="73-attribute-fallthrough-p-58">7.3 Attribute <code>[[fallthrough]]</code> (p. 58)</h2>
<h3 id="purpose_2">Purpose</h3>
<p>In <code>switch</code> statements, compilers often warn on <strong>implicit fall-through</strong> between <code>case</code> labels. <code>[[fallthrough]]</code> documents <strong>intentional</strong> fall-through.</p>
<h3 id="must-appear-as-its-own-statement">Must appear as its own statement</h3>
<p>It must be used in an <strong>empty statement</strong> ending with <code>;</code> (book emphasizes the syntax discipline).</p>
<h3 id="example">Example</h3>
<pre><code class="language-cpp">#include &lt;cassert&gt;

void dispatch(int x) {
    switch (x) {
        case 1:
            do_first_thing();
            [[fallthrough]];   // intentional
        case 2:
            do_second_thing();
            break;
        default:
            assert(false);
            break;
    }
}
</code></pre>
<p>Without <code>[[fallthrough]];</code>, <code>-Wimplicit-fallthrough</code> or similar may warn on <code>case 1</code>.</p>
<hr />
<h2 id="74-general-attribute-extensions-p-58">7.4 General Attribute Extensions (p. 58)</h2>
<h3 id="attributes-on-namespaces">Attributes on <strong>namespaces</strong></h3>
<pre><code class="language-cpp">namespace [[deprecated]] DraftAPI {
    void experimental();
}
</code></pre>
<p>Using <code>DraftAPI::experimental()</code> may trigger deprecation diagnostics.</p>
<h3 id="attributes-on-enumerators">Attributes on <strong>enumerators</strong></h3>
<pre><code class="language-cpp">enum City {
    Mumbai = 2,
    Bombay [[deprecated]] = Mumbai,
};
</code></pre>
<h3 id="attribute-namespace-with-using-book-syntax-c17">Attribute namespace with <code>using</code> (book syntax, C++17)</h3>
<p>C++17 generalizes attribute syntax so a <strong>prefix</strong> can introduce a namespace for a comma-separated list of attributes. Josuttis gives forms along this line:</p>
<pre><code class="language-cpp">[[using MyLib: WebService, RestService, doc(&quot;html&quot;)]] void foo();
</code></pre>
<p>Here <code>MyLib</code> is treated as an <strong>attribute namespace</strong>; <code>WebService</code>, <code>RestService</code>, and <code>doc("html")</code> are attributes living in that vendor or library convention. Real compilers map such namespaces to their supported attribute schemes; until your toolchain documents a namespace, treat this as <strong>illustrative syntax</strong> from the standard&rsquo;s general attribute grammar.</p>
<p>Without <code>using</code>, the equivalent might require repeating <code>MyLib::</code> on each token; the prefix form batches them. For everyday code, prefer <strong>standard attributes</strong> (<code>[[nodiscard]]</code>, <code>[[maybe_unused]]</code>, <code>[[fallthrough]]</code>, <code>[[deprecated]]</code>) where they suffice.</p>
<p>Also see vendor spellings such as <code>[[gnu::...]]</code>, <code>[[clang::...]]</code>, <code>[[msvc::...]]</code> in compiler manuals.</p>
<hr />
<h2 id="75-afternotes">7.5 Afternotes</h2>
<p>Attributes in C++17 improve <strong>portability of common warnings</strong> that were previously compiler-specific pragmas (<code>__attribute__((warn_unused_result))</code>, etc.). The book positions them as part of making C++ <strong>easier to teach</strong> and <strong>safer by default</strong> through opt-in diagnostics.</p>
<hr />
<h2 id="summary-table">Summary table</h2>
<table>
<thead>
<tr>
<th>Attribute</th>
<th>Effect</th>
<th>Typical pitfall</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>[[nodiscard]]</code></td>
<td>warn on ignored return</td>
<td>not inherited on overrides</td>
</tr>
<tr>
<td><code>[[maybe_unused]]</code></td>
<td>suppress unused-name warn</td>
<td>cannot tag raw statements</td>
</tr>
<tr>
<td><code>[[fallthrough]]</code></td>
<td>suppress switch fallthrough warn</td>
<td>must be <code>[[fallthrough]];</code></td>
</tr>
</tbody>
</table>
<hr />
<h2 id="ascii-diagram-attribute-placement-functions-simplified">ASCII diagram: attribute placement (functions, simplified)</h2>
<pre><code>┌─────────────────────────────────────────────────────────────┐
│  [[nodiscard]] ReturnType function_name(Params) const;      │
│   ^ attribute before decl-specifiers                        │
└─────────────────────────────────────────────────────────────┘

┌─────────────────────────────────────────────────────────────┐
│  ReturnType [[nodiscard]] function_name(Params) const;      │
│               ^ attribute after declarator-id (allowed)     │
└─────────────────────────────────────────────────────────────┘
</code></pre>
<p>(Exact parsing rules follow the C++ grammar; compilers accept common layouts.)</p>` },
  { name: `9. Other Language Features`, path: `08_other_language_features.md`, dir: ``, body: `<h1 id="chapter-8-other-language-features">Chapter 8: Other Language Features</h1>
<p><strong>Book reference:</strong> <em>C++17 - The Complete Guide</em> by Nicolai M. Josuttis (pages 61-73)</p>
<p>This chapter collects several smaller but important C++17 changes: <strong>nested namespace</strong> syntax, <strong>specified evaluation order</strong>, relaxed <strong>scoped enum</strong> initialization, <strong><code>auto</code> brace init</strong> fixes, <strong>hex float</strong> literals, <strong><code>u8</code> character literals</strong>, <strong>exception specifications in types</strong>, <strong><code>static_assert</code> without message</strong>, and <strong><code>__has_include</code></strong>.</p>
<hr />
<h2 id="81-nested-namespaces-p-61">8.1 Nested Namespaces (p. 61)</h2>
<h3 id="single-line-syntax">Single-line syntax</h3>
<p>Instead of:</p>
<pre><code class="language-cpp">namespace A {
namespace B {
namespace C {
    void f();
} } }
</code></pre>
<p>C++17 allows:</p>
<pre><code class="language-cpp">namespace A::B::C {
    void f();
}
</code></pre>
<h3 id="limitation">Limitation</h3>
<p><strong><code>inline</code> namespace</strong> does not participate in this shorthand in C++17 the way you might wish for <code>A::inline B::C</code> &ndash; the book notes <strong>no inline namespace nesting support</strong> in this compact form (evolved in later standards for some related use cases; stick to C++17 facts here).</p>
<hr />
<h2 id="82-defined-expression-evaluation-order-p-62">8.2 Defined Expression Evaluation Order (p. 62)</h2>
<h3 id="the-problem">The problem</h3>
<p>Historically, many expressions had <strong>unspecified evaluation order</strong> between subexpressions. That led to <strong>undefined behavior</strong> when subexpressions mutated the same object without a sequence point rule.</p>
<p><strong>Book-style example pitfall:</strong></p>
<pre><code class="language-cpp">// Ill-advised pre-C++17 (could be UB depending on argument evaluation)
s.replace(0, 8, &quot;&quot;).replace(s.find(&quot;even&quot;), 4, &quot;sometimes&quot;);
</code></pre>
<p>If the second <code>replace</code> reads <code>s</code> while the first has not completed according to the old rules, disaster.</p>
<p>Similarly:</p>
<pre><code class="language-cpp">std::cout &lt;&lt; f() &lt;&lt; g() &lt;&lt; h();
</code></pre>
<p>The order of <code>f()</code>, <code>g()</code>, <code>h()</code> was <strong>unspecified</strong>.</p>
<h3 id="what-c17-guarantees-selected-cases">What C++17 guarantees (selected cases)</h3>
<p>Evaluation is more constrained for several operators (left-to-right where stated):</p>
<ul>
<li><strong>Indexing:</strong> <code>e1[e2]</code> &ndash; <code>e1</code> evaluated before <code>e2</code>.</li>
<li><strong>Member access:</strong> <code>e1.e2</code>, <code>e1-&gt;e2</code>, <code>e1.*e2</code>, <code>e1-&gt;*e2</code> &ndash; <code>e1</code> before <code>e2</code>.</li>
<li><strong>Shift:</strong> <code>e1 &lt;&lt; e2</code>, <code>e1 &gt;&gt; e2</code> &ndash; <code>e1</code> before <code>e2</code>.</li>
<li><strong>Assignment (built-in):</strong> value computations and side effects of the <strong>right-hand side</strong> occur <strong>before</strong> the <strong>write</strong> through the <strong>left-hand side</strong> lvalue for operators such as <code>=</code>, <code>*=</code>, <code>/=</code>, etc. (full list in the book and standard).</li>
</ul>
<p><strong>Assignment ordering (ASCII):</strong></p>
<pre><code>  e1 = e2;

  [1] evaluate / compute RHS  e2
  [2] evaluate LHS lvalue      e1
  [3] store RHS value into object designated by e1
</code></pre>
<p><strong><code>new</code>:</strong> allocation is <strong>before</strong> evaluation of constructor arguments as specified (simplifies reasoning).</p>
<h3 id="what-stays-unspecified">What stays unspecified</h3>
<p>Arguments of <strong>the same function call</strong> are still <strong>unordered</strong> relative to one another:</p>
<pre><code class="language-cpp">e1.f(a1, a2, a3);   // a1, a2, a3 evaluation order [unspecified]
</code></pre>
<h3 id="guaranteed-example-with-increments">Guaranteed example with increments</h3>
<pre><code class="language-cpp">int i = 0;
std::cout &lt;&lt; ++i &lt;&lt; ' ' &lt;&lt; --i &lt;&lt; '\\n';
// C++17: guaranteed output: &quot;1 0&quot; (book)
</code></pre>
<h3 id="backward-incompatibility-exceptions-and-output">Backward incompatibility: exceptions and output</h3>
<p>Tighter ordering can change observable behavior when exceptions and I/O interleave (book mentions <code>vector::at()</code> and output ordering). Code that <strong>relied</strong> on unspecified order may <strong>change</strong> its diagnostics &ndash; treat this as a portability and logging concern.</p>
<h3 id="ascii-diagram-evaluation-order-rules-overview">ASCII diagram: evaluation order rules (overview)</h3>
<pre><code>                    expression with subexpressions
                                   │
                                   ▼
              ┌────────────────────────────────────────┐
              │  Is it a single function call's args?  │
              └───────────────────┬────────────────────┘
                                  │
                     yes ◄────────┘────────► no
                      │                      │
                      ▼                      ▼
           ┌──────────────────┐    ┌─────────────────────────┐
           │ Order between a1,│    │ Apply C++17 rules for   │
           │ a2, a3:          │    │ operator / new / etc.   │
           │  [unspecified]   │    │ e.g. e1[e2]: e1 then e2 │
           └──────────────────┘    └────────────┬────────────┘
                                                │
                                                ▼
                                     assignment: RHS before LHS
                                     (built-in compound assign)
</code></pre>
<hr />
<h2 id="83-relaxed-enum-initialization-from-integral-values-p-65">8.3 Relaxed Enum Initialization from Integral Values (p. 65)</h2>
<h3 id="fixed-underlying-type-brace-init-from-integer">Fixed underlying type, brace init from integer</h3>
<pre><code class="language-cpp">enum MyInt : char { };
MyInt i1{42};   // [OK] since C++17
</code></pre>
<h3 id="copy-initialization-still-restricted">Copy initialization still restricted</h3>
<pre><code class="language-cpp">// MyInt i2 = 42;   // [ERROR] still not allowed
</code></pre>
<p>Only <strong>direct list initialization</strong> gets the relaxation (book).</p>
<h3 id="scoped-enums">Scoped enums</h3>
<pre><code class="language-cpp">enum class Weekday : int { mon, tue /*...*/ };
Weekday s1{0};  // [OK] since C++17 in direct-list-init
</code></pre>
<h3 id="narrowing-still-rejected">Narrowing still rejected</h3>
<pre><code class="language-cpp">// MyInt i5{42.2};  // [ERROR] narrowing
</code></pre>
<hr />
<h2 id="84-fixed-direct-list-initialization-with-auto-p-66">8.4 Fixed Direct List Initialization with <code>auto</code> (p. 66)</h2>
<h3 id="auto-a42-is-now-int"><code>auto a{42};</code> is now <code>int</code></h3>
<p>Before the defect report / C++17 retroactive fix, some compilers treated:</p>
<pre><code class="language-cpp">auto a{42};  // was std::initializer_list&lt;int&gt; in C++11 wording -- [FIXED]
</code></pre>
<p>as <code>std::initializer_list&lt;int&gt;</code>. <strong>C++17:</strong> <code>a</code> is <strong><code>int</code></strong>.</p>
<h3 id="multi-element-braces-with-auto-now-ill-formed">Multi-element braces with <code>auto</code> now ill-formed</h3>
<pre><code class="language-cpp">// auto b{1, 2, 3};  // [ERROR] since C++17
</code></pre>
<h3 id="copy-initialization-unchanged">Copy initialization unchanged</h3>
<pre><code class="language-cpp">auto c = {42};  // still std::initializer_list&lt;int&gt;
</code></pre>
<p>This is a <strong>breaking change</strong> relative to early C++11 implementations; Josuttis notes it was <strong>adopted retroactively</strong> even for <code>-std=c++11</code> modes in conforming implementations.</p>
<hr />
<h2 id="85-hexadecimal-floating-point-literals-p-67">8.5 Hexadecimal Floating-Point Literals (p. 67)</h2>
<p>Hex float literals use a <strong>hex significand</strong> and a <strong>decimal exponent</strong> for a <strong>power of two</strong>:</p>
<p><strong>Form:</strong> <code>0x</code> <em>significand</em> <code>p</code> <em>exponent</em></p>
<p>Examples:</p>
<table>
<thead>
<tr>
<th>Literal</th>
<th>Meaning</th>
<th>Decimal (conceptual)</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>0x1p4</code></td>
<td>1 * 2^4</td>
<td>16</td>
</tr>
<tr>
<td><code>0xAp2</code></td>
<td>10 * 2^2</td>
<td>40</td>
</tr>
<tr>
<td><code>0x1.4p+2</code></td>
<td>1.25 * 2^2</td>
<td>5</td>
</tr>
</tbody>
</table>
<p>Fractional hex digits after <code>.</code> represent <strong>binary fractions</strong> (each hex digit is 4 bits).</p>
<hr />
<h2 id="86-utf-8-character-literals-p-68">8.6 UTF-8 Character Literals (p. 68)</h2>
<pre><code class="language-cpp">auto c = u8'6';   // type is char in C++17 (book)
</code></pre>
<p><strong>Prefixes (overview):</strong></p>
<table>
<thead>
<tr>
<th>Prefix</th>
<th>Typical width / encoding</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>u8</code></td>
<td>UTF-8, stored in <code>char</code> (single code unit for ASCII)</td>
</tr>
<tr>
<td><code>u</code></td>
<td>UTF-16 unit (<code>char16_t</code>)</td>
</tr>
<tr>
<td><code>U</code></td>
<td>UTF-32 unit (<code>char32_t</code>)</td>
</tr>
<tr>
<td><code>L</code></td>
<td>wide character (<code>wchar_t</code>)</td>
</tr>
</tbody>
</table>
<p>String literals have related prefixes; character literals follow analogous rules with distinct types.</p>
<hr />
<h2 id="87-exception-specifications-as-part-of-the-type-p-69">8.7 Exception Specifications as Part of the Type (p. 69)</h2>
<h3 id="different-types">Different types</h3>
<p>These are <strong>different function types</strong>:</p>
<pre><code class="language-cpp">void f() noexcept;
void g();
</code></pre>
<p>You <strong>cannot</strong> bind a pointer to <code>void() noexcept</code> with an address of <code>void()</code> that might throw:</p>
<pre><code class="language-cpp">void (*fp)() noexcept = /* &amp;f */ /* [OK] */;
// fp = g_might_throw;  // [ERROR]
</code></pre>
<h3 id="no-overload-by-exception-spec-alone">No overload by exception spec alone</h3>
<p>You cannot overload <strong>only</strong> by <code>noexcept</code> on an otherwise identical signature.</p>
<h3 id="conditional-noexcept">Conditional <code>noexcept</code></h3>
<pre><code class="language-cpp">template&lt;typename T&gt;
void h() noexcept(sizeof(int) &lt; 4);
</code></pre>
<h3 id="generic-library-impact">Generic library impact</h3>
<p>Type traits and specializations multiply: Josuttis mentions <strong><code>std::is_function</code></strong> needing <strong>48 partial specializations</strong> in C++17, <strong>doubled from 24</strong>, because exception specifications become part of the type system in a finer-grained way.</p>
<hr />
<h2 id="88-single-argument-static_assert-p-72">8.8 Single-Argument <code>static_assert</code> (p. 72)</h2>
<p>The message string is <strong>optional</strong>:</p>
<pre><code class="language-cpp">template&lt;typename T&gt;
void require_default_constructible() {
    static_assert(std::is_default_constructible_v&lt;T&gt;);
}
</code></pre>
<hr />
<h2 id="89-preprocessor-condition-__has_include-p-73">8.9 Preprocessor Condition <code>__has_include</code> (p. 73)</h2>
<pre><code class="language-cpp">#if __has_include(&lt;filesystem&gt;)
#  include &lt;filesystem&gt;
#endif
</code></pre>
<p><strong>Pure preprocessor</strong> feature: not usable as a normal constant expression in source code outside <code>#if</code>.</p>
<p><strong>Typical use:</strong> probe optional headers across platforms before including.</p>

  { name: `10. Class Template Arg Deduction`, path: `09_class_template_arg_deduction.md`, dir: ``, body: `<h1 id="chapter-9-class-template-argument-deduction-ctad">Chapter 9: Class Template Argument Deduction (CTAD)</h1>
<p><strong>Book:</strong> <em>C++17 - The Complete Guide</em>, Nicolai M. Josuttis<br />
<strong>Chapter:</strong> 9 - Class Template Argument Deduction<br />
<strong>Book page span:</strong> <strong>pp. 77-93</strong> (section numbers below align with the book: <strong>9.1</strong>, <strong>9.2</strong>, and so on)</p>
<p>This tutorial is <strong>self-contained</strong> for study, but <strong>page references</strong> (<code>p.xx</code>) point into the book for additional nuance, standard citations, and library evolution notes.</p>
<hr />
<h2 id="overview">Overview</h2>
<p>Before C++17, every use of a class template required either <strong>explicit template arguments</strong> or a <strong>factory function</strong> (<code>std::make_pair</code>, <code>std::make_tuple</code>, &hellip;). C++17 adds <strong>class template argument deduction</strong>: when you name a class template in a context where an object is created, the compiler <strong>deduces</strong> the template arguments from the constructor arguments (and sometimes from <strong>deduction guides</strong>).</p>
<pre><code>C++14 style                          C++17 style (CTAD)
───────────────────────────────────  ───────────────────────────────────
std::complex&lt;double&gt; c{5.1, 3.3};    std::complex c{5.1, 3.3};
std::lock_guard&lt;std::mutex&gt; lg{mx};  std::lock_guard lg{mx};
std::vector&lt;int&gt; v{1, 2, 3};         std::vector v{1, 2, 3};
</code></pre>
<hr />
<h2 id="91-use-of-class-template-argument-deduction-p77">9.1 Use of Class Template Argument Deduction (p.77)</h2>
<h3 id="what-gets-deduced-book-examples">What gets deduced (book examples)</h3>
<p>Typical library patterns from Josuttis:</p>
<table>
<thead>
<tr>
<th>Code snippet</th>
<th>Deduced specialization (conceptual)</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>std::complex c{5.1, 3.3};</code></td>
<td><code>std::complex&lt;double&gt;</code> (floating literals promote inference to <code>double</code>)</td>
</tr>
<tr>
<td><code>std::lock_guard lg{mx};</code></td>
<td><code>std::lock_guard&lt;std::mutex&gt;</code> when <code>mx</code> is a <code>std::mutex</code></td>
</tr>
<tr>
<td><code>std::vector v1{1, 2, 3};</code></td>
<td><code>std::vector&lt;int&gt;</code></td>
</tr>
</tbody>
</table>
<p><strong>Initialization forms:</strong> CTAD applies across the usual initialization syntax families that create an object of class type, including <strong>braced initialization</strong>, <strong>parenthesized direct initialization</strong>, and <strong>copy initialization</strong> where the syntax leads to constructor resolution for the class template. The book walks through that “all init methods” angle because users often mentally associate CTAD only with <code>{}</code>.</p>
<p>Example sketch (verify with your standard library and warning levels):</p>
<pre><code class="language-cpp">#include &lt;complex&gt;
#include &lt;vector&gt;
#include &lt;mutex&gt;

void demo_init_forms() {
  std::mutex mx;

  // Braces (direct-list)
  std::complex ca{5.1, 3.3};

  // Parens (direct init) — generally OK for these types
  std::complex cb(5.1, 3.3);

  // Copy initialization — also participates where it calls a constructor
  std::complex cc = {5.1, 3.3};

  std::lock_guard lg{mx};
  std::vector v1{1, 2, 3};
}
</code></pre>
<h3 id="non-type-template-parameters-p77-78">Non-type template parameters (p.77-78)</h3>
<p>When a class template has both <strong>type</strong> and <strong>non-type</strong> parameters, deduction can fill <strong>both</strong> from a constructor call:</p>
<pre><code class="language-cpp">template&lt;typename T, int SZ&gt;
class MyClass {
 public:
  MyClass(const T (&amp;)[SZ]) {}
};

void demo() {
  MyClass mc(&quot;hello&quot;);  // deduces T as const char, SZ as 6 (includes null terminator array extent)
}
</code></pre>
<p><strong>Reading guide:</strong> The array parameter <code>const T (&amp;)[SZ]</code> ties <code>SZ</code> to the bound of the array passed. String literals have type <code>const char[N]</code> including the terminating <code>'\\0'</code>, which is why <code>SZ</code> becomes <code>6</code> for <code>"hello"</code>.</p>
<h3 id="variadic-class-templates-p78">Variadic class templates (p.78)</h3>
<pre><code class="language-cpp">#include &lt;tuple&gt;

void demo_tuple() {
  std::tuple t{42, 'x', nullptr};
  // Deduced roughly as std::tuple&lt;int, char, std::nullptr_t&gt;
}
</code></pre>
<p>The book uses this to illustrate that deduction propagates through <strong>multiple</strong> constructor parameters into <strong>multiple</strong> class template parameters at once.</p>
<hr />
<h2 id="911-copying-by-default-p79">9.1.1 Copying by Default (p.79)</h2>
<h3 id="the-core-pitfall-vector-of-vectors-vs-copy">The core pitfall: <code>vector</code> of vectors vs copy</h3>
<pre><code class="language-cpp">#include &lt;vector&gt;

void demo_vector_copy_vs_nested() {
  std::vector v1{1, 2, 3};        // std::vector&lt;int&gt;

  std::vector v2{v1};             // COPY: std::vector&lt;int&gt; (same element type as v1)
                                  // NOT std::vector&lt;std::vector&lt;int&gt;&gt;

  std::vector vv{v1, v2};         // Multiple vectors -&gt; elements ARE vectors
                                // std::vector&lt;std::vector&lt;int&gt;&gt;
}
</code></pre>
<p><strong>ASCII diagram: “one vector arg vs many vector args”</strong></p>
<pre><code>Case A: std::vector v2 { v1 }
─────────────────────────────

    v1  ──►  [1, 2, 3]     (element type: int)
                      │
                      │  constructor sees:
                      │  ONE argument of type vector&lt;int&gt;
                      │
                      ▼
               ┌──────────────────────────────┐
               │ Target: std::vector&lt;???&gt;     │
               │ Element type deduced as int  │
               │ (copy construction from v1)  │
               └──────────────────────────────┘


Case B: std::vector vv { v1, v2 }
─────────────────────────────────

    v1  ──►  vector&lt;int&gt; ─┐
    v2  ──►  vector&lt;int&gt; ─┼──► TWO arguments, same type: vector&lt;int&gt;
                          │
                          ▼
               ┌──────────────────────────────┐
               │ Target: std::vector&lt;???&gt;     │
               │ Element type deduced as      │
               │   std::vector&lt;int&gt;           │
               └──────────────────────────────┘
</code></pre>
<p><strong>Takeaway (book):</strong> When you pass <strong>one</strong> <code>std::vector&lt;T&gt;</code> where a <code>std::vector</code> is being constructed, do not assume a nested vector; the default story is “<strong>container of <code>T</code></strong>”, and a lone container argument often means “<strong>copy</strong>”.</p>
<hr />
<h2 id="912-deducing-the-type-of-lambdas-p80">9.1.2 Deducing the Type of Lambdas (p.80)</h2>
<p>Lambdas produce <strong>unique closure types</strong>. CTAD can capture that unique type as a template argument of a wrapper class.</p>
<h3 id="countcalls-pattern">CountCalls pattern</h3>
<p>The book presents a class that wraps a callable and counts invocations (see <strong>p.80</strong> for the full version). Conceptually:</p>
<pre><code class="language-cpp">#include &lt;utility&gt;

template&lt;typename Callable&gt;
class CountCalls {
 private:
  Callable c;
  long calls = 0;
 public:
  CountCalls(Callable c) : c(std::move(c)) {}

  template&lt;typename... Args&gt;
  decltype(auto) operator()(Args&amp;&amp;... args) {
    ++calls;
    return c(std::forward&lt;Args&gt;(args)...);
  }

  long count() const { return calls; }
};

#include &lt;vector&gt;
#include &lt;algorithm&gt;

void demo_lambda_sort() {
  std::vector&lt;int&gt; v{5, 42, 1};

  CountCalls sc{[](auto x, auto y) { return x &gt; y; }};

  // Important: std::sort takes the comparator by UNQUALIFIED value type;
  // passing the wrapper BY REFERENCE avoids copying the lambda-like callable
  std::sort(v.begin(), v.end(), std::ref(sc));

  // std::for_each may return a copy of the function object depending on signature;
  // the book contrasts “pass by ref for sort” vs “for_each returns copy” nuances.
  std::for_each(v.begin(), v.end(), sc);
}
</code></pre>
<p><strong>Practical reading:</strong></p>
<ul>
<li>For algorithms that take comparators <strong>by value</strong> internally, wrapping a lambda in heavy objects may imply <strong>copies</strong> unless you use <code>std::ref</code> / design choices discussed in the book.</li>
<li>The <strong>deduced</strong> type of <code>sc</code> includes the <strong>unique lambda type</strong> <code>Callable</code>.</li>
</ul>
<hr />
<h2 id="913-no-partial-class-template-argument-deduction-p81">9.1.3 No Partial Class Template Argument Deduction (p.81)</h2>
<h3 id="all-or-nothing-for-template-arguments">“All or nothing” for template arguments</h3>
<p>You <strong>cannot</strong> deduce <strong>only some</strong> class template parameters while explicitly specifying others in the same place as CTAD, the way you might intuitively want for function templates.</p>
<pre><code class="language-cpp">template&lt;typename T, typename U&gt;
class C {
 public:
  C(T, U) {}
};

void errors() {
  // C&lt;std::string&gt; c4(&quot;hi&quot;, &quot;my&quot;);  // [ERROR]: partial explicit args + deduction
  // C&lt;&gt; c5(22, 44.3);                // [ERROR]: even empty &lt;&gt; does not enable partial CTAD
}
</code></pre>
<h3 id="why-ambiguities-with-variadic-templates-p81">Why: ambiguities with variadic templates (p.81)</h3>
<p>The book explains ambiguity scenarios such as <code>std::tuple</code>-like templates where specifying some parameters while deducing others collides with <strong>variadic constructor</strong> shapes.</p>
<p>Sketch:</p>
<pre><code class="language-cpp">// Conceptual problem sketch (tuple-like):
// std::tuple&lt;int&gt; t(42, 43); // how many elements? what is deduced vs fixed?
</code></pre>
<h3 id="lambdas-and-stdset-p81">Lambdas and <code>std::set</code> (p.81)</h3>
<p>You still typically <strong>cannot</strong> plug a <strong>lambda</strong> directly as a template parameter for <code>std::set&lt;T, Compare&gt;</code> because the lambda type is not named unless you lift it via <code>decltype</code> / template parameters / wrapper patterns; <strong>CTAD does not magically solve</strong> the “anonymous closure type as comparator” ergonomics issue in the same way as other templates.</p>
<hr />
<h2 id="914-ctad-instead-of-convenience-functions-p83">9.1.4 CTAD Instead of Convenience Functions (p.83)</h2>
<h3 id="stdpair-without-make_pair"><code>std::pair</code> without <code>make_pair</code></h3>
<pre><code class="language-cpp">#include &lt;vector&gt;
#include &lt;utility&gt;

void demo_pair_ctad(std::vector&lt;int&gt;&amp; v) {
  std::pair p(v.begin(), v.end());   // Often replaces std::make_pair for iterator pairs
}
</code></pre>
<h3 id="decay-vs-reference-parameters-why-make_pair-still-matters-p83">Decay vs reference parameters: why <code>make_pair</code> still matters (p.83)</h3>
<p><code>make_pair</code> <strong>decays</strong> arguments (arrays to pointers, function types to function pointers, stripping top-level const in the value category ways described in the book). CTAD follows template deduction rules for constructors: <strong>if the constructor takes references</strong>, you may deduce <strong>array types</strong> instead of pointers, which can be surprising or <strong>ill-formed</strong> if the resulting <code>pair</code> type would store references to incompatible temporaries or mismatched cv extents.</p>
<p>Illustrative pattern from the narrative:</p>
<pre><code class="language-cpp">template&lt;typename T, typename U&gt;
struct Pair1 {
  Pair1(const T&amp;, const U&amp;);
};

template&lt;typename T, typename U&gt;
struct Pair2 {
  Pair2(T, U);
};

void demo_decay_stories() {
  // Pair1 p1{&quot;hi&quot;, &quot;world&quot;}; // Often [ERROR] / undesirable: char[N] vs char[M] mismatch story
  Pair2 p2{&quot;hi&quot;, &quot;world&quot;};    // [OK] typically: decay to const char* / pointer-ish types
}
</code></pre>
<p><strong>Reading guide:</strong> This is the “CTAD is not a drop-in semantic replacement for every factory” lesson.</p>
<hr />
<h2 id="92-deduction-guides-p84">9.2 Deduction Guides (p.84)</h2>
<p>Guides are <strong>explicit instructions</strong> that tell the compiler how to map constructor parameter patterns to <strong>class template specializations</strong>.</p>
<p>Syntax pattern:</p>
<pre><code class="language-cpp">template&lt;typename T1, typename T2&gt;
class Pair3 {
 public:
  Pair3(T1, T2) {}
};

// Deduction guide: left side pattern -&gt; right side invented type
template&lt;typename T1, typename T2&gt;
Pair3(T1, T2) -&gt; Pair3&lt;T1, T2&gt;;
</code></pre>
<h3 id="resolution-flow-ascii">Resolution flow (ASCII)</h3>
<pre><code>User writes:  Pair3 p(a, b);
                     │
                     ▼
┌────────────────────────────────────────────────────────────┐
│ 1) Collect candidate guides + constructors                 │
│    - guides: template patterns with &quot;-&gt; ResultType&quot;        │
│    - ctor templates may also deduce without a guide        │
└───────────────────────────┬────────────────────────────────┘
                            │
                            ? 2) Build candidates / reconcile matches ()
                            │
                            ▼
┌────────────────────────────────────────────────────────────┐
│ 3) Pick best via overload resolution-like rules            │
│    If guide ties: see 9.2.3 (guide preferences)            │
└───────────────────────────┬────────────────────────────────┘
                            │
                            ▼
                     Deduced: Pair3&lt;...&gt;
</code></pre>
<p><strong>Book emphasis:</strong> The <strong>right-hand side</strong> of <code>-&gt;</code> is the <strong>synthesized class template id</strong> with concrete arguments.</p>
<hr />
<h2 id="921-force-decay-p85">9.2.1 Force Decay (p.85)</h2>
<p>If a constructor template would deduce “ awkward” reference/array types, a guide taking parameters <strong>by value</strong> can force <strong>decay</strong>, matching the intuition of factory functions.</p>
<pre><code class="language-cpp">template&lt;typename T&gt;
class C {
 public:
  C(T) {}
};

template&lt;typename T&gt;
C(T) -&gt; C&lt;T&gt;;  // Taking T by value in the guide/ctor pairing can decay similarly to ctor(T)
</code></pre>
<p>(Read <strong>p.85</strong> for the precise mechanics and what happens if ctor signature differs.)</p>
<hr />
<h2 id="922-non-template-deduction-guides-p86">9.2.2 Non-Template Deduction Guides (p.86)</h2>
<p>A deduction guide need not introduce a new template: non-template guides apply to specific constructor shapes.</p>
<p>Typical library narrative example: a class template plus a <strong>non-template</strong> guide that maps <code>const char*</code> construction to <code>std::string</code> as the stored type parameter.</p>
<pre><code class="language-cpp">#include &lt;string&gt;

template&lt;typename T&gt;
class S {
 public:
  explicit S(T v) : value(std::move(v)) {}
  const T&amp; get() const { return value; }

 private:
  T value;
};

// Non-template deduction guide (p.86): note the arrow to a concrete specialization
S(const char*) -&gt; S&lt;std::string&gt;;

void demoNonTemplateGuide() {
  S s{&quot;hello&quot;};  // Deduces S&lt;std::string&gt; via the guide + decay story on p.86
  (void)s.get();
}
</code></pre>
<hr />
<h2 id="923-deduction-guides-vs-constructors-p86">9.2.3 Deduction Guides vs Constructors (p.86)</h2>
<p>When <strong>both</strong> a constructor template and a deduction guide could deduce the same pattern with equal “match quality”, the standard prioritizes <strong>deduction guides</strong> in the tie-break sense described on <strong>p.86</strong>.</p>
<hr />
<h2 id="924-explicit-deduction-guides-p87">9.2.4 Explicit Deduction Guides (p.87)</h2>
<p>Guides can be marked <code>explicit</code>, mirroring <code>explicit</code> constructor effects: <strong>copy initialization</strong> contexts may reject implicit guide-based deductions.</p>
<pre><code class="language-cpp">// Sketch (see book for compile-fail examples with '=' initialization)
template&lt;typename T&gt;
struct E {
  explicit E(const T&amp;) {}
};

// explicit E(const char*) -&gt; E&lt;std::string&gt;;  // example narrative on p.87
</code></pre>
<hr />
<h2 id="925-deduction-guides-for-aggregates-p88">9.2.5 Deduction Guides for Aggregates (p.88)</h2>
<p>Aggregates may not have “real” constructors, but you can still define guides to teach CTAD how to build the type.</p>
<pre><code class="language-cpp">template&lt;typename T&gt;
struct A {
  T name;
};

A(const char*) -&gt; A&lt;std::string&gt;;  // Aggregate + guide story (p.88)
</code></pre>
<hr />
<h2 id="926-standard-deduction-guides-p89">9.2.6 Standard Deduction Guides (p.89)</h2>
<h3 id="pairs-and-tuples">Pairs and tuples</h3>
<p>Standard guides generally incorporate <strong>decay</strong> behaviors analogous to historical <code>make_pair</code> / tuple factories.</p>
<h3 id="iterators-and-stdvector-p89-the-initializer_list-trap">Iterators and <code>std::vector</code> (p.89): the initializer_list trap</h3>
<p>There is a guide that maps an iterator pair to <code>vector</code> of <code>std::iterator_traits&lt;Iterator&gt;::value_type</code>.</p>
<p><strong>BEWARE (book warning):</strong></p>
<pre><code class="language-cpp">#include &lt;string&gt;
#include &lt;vector&gt;

void trap(std::string s) {
  // Many expect iterator CTAD here:
  std::vector v2{s.begin(), s.end()};
  // But this often hits std::initializer_list&lt;typename&gt; deduction instead
  // (not the iterator-pair guide), producing a surprising vector&lt;T&gt; type.
}
</code></pre>
<p>ASCII warning:</p>
<pre><code>You wrote:  std::vector v { s.begin(), s.end() };
                │
                ├─ (expected) iterator guide -&gt; vector&lt;char&gt; (for std::string)
                │
                └─ (often actual) -&gt; initializer_list&lt;iterator&gt;
                                    vector of iterators (unexpected!)
</code></pre>
<h3 id="stdarray-p89"><code>std::array</code> (p.89)</h3>
<p><code>std::array</code> deduction uses variadic tricks (fold / <code>enable_if</code> patterns in the standard) to ensure <strong>homogeneous</strong> element types.</p>
<h3 id="stdmap--stdmultimap-deduction-p89"><code>std::map</code> / <code>std::multimap</code> deduction (p.89)</h3>
<p>Early C++17 had deduction pitfalls around <strong>const key types</strong>; <strong>LWG 3025</strong> is cited in the book as the library fix trajectory.</p>
<h3 id="smart-pointers-p89">Smart pointers (p.89)</h3>
<p>No CTAD guides for <code>std::unique_ptr</code> / <code>std::shared_ptr</code> from raw pointers in the standard due to <strong>array allocation ambiguity</strong> (<code>new T</code> vs <code>new T[n]</code>).</p>
<hr />
<h2 id="quick-mental-checklist-chapter-summary">Quick “mental checklist” (chapter summary)</h2>
<ol>
<li>CTAD deduces from <strong>constructors</strong>; understand <strong>recursive copy</strong> vs <strong>nested vectors</strong> (<strong>p.79</strong>).</li>
<li><strong>Partial</strong> explicit template arguments do not compose with CTAD the way you might want (<strong>p.81</strong>).</li>
<li>Prefer guides when you need <code>make_*</code>-style <strong>decay</strong> semantics (<strong>p.83-85</strong>).</li>
<li>Library guides have sharp edges (<code>vector</code> + <code>{it,it}</code>, <code>map</code> key const, no smart-pointer guides) (<strong>p.89</strong>).</li>
</ol>
<hr />
<h2 id="suggested-exercises-optional">Suggested exercises (optional)</h2>
<ol>
<li>Reproduce the <code>std::vector{s.begin(), s.end()}</code> trap with <code>static_assert</code> or compiler error messages; compare to <code>std::vector&lt;char&gt;(s.begin(), s.end())</code>.</li>
<li>Implement <code>Pair3</code> with and without a deduction guide; compare <code>Pair3{"a","bc"}</code> deduced types when constructors take <code>(T,U)</code> vs <code>(const T&amp;, const U&amp;)</code>.</li>
<li>Write <code>CountCalls</code> and verify <code>std::sort(..., std::ref(sc))</code> vs passing <code>sc</code> by value.</li>
</ol>
<hr />
<p><strong>Primary reference:</strong> Josuttis, <em>C++17 - The Complete Guide</em>, Chapter 9, <strong>pp. 77-93</strong>.</p>` },
  { name: `11. Compile Time If`, path: `10_compile_time_if.md`, dir: ``, body: `<h1 id="chapter-10-compile-time-if">Chapter 10: Compile-Time <code>if</code></h1>
<p><strong>Book:</strong> <em>C++17 - The Complete Guide</em>, Nicolai M. Josuttis<br />
<strong>Chapter:</strong> 10 - Compile-Time <code>if</code><br />
<strong>Book page span:</strong> <strong>pp. 95-105</strong> (sections <strong>10.1</strong>-<strong>10.4</strong>)</p>
<p>This tutorial explains <code>if constexpr</code> as a <strong>template metaprogramming control structure</strong> that <strong>discards</strong> non-taken branches at template instantiation time, unlike runtime <code>if</code> which still requires all branches to be <strong>valid C++</strong> for the instantiation.</p>
<hr />
<h2 id="101-motivation-for-compile-time-if-p96">10.1 Motivation for Compile-Time <code>if</code> (p.96)</h2>
<h3 id="the-classic-problem-runtime-if-does-not-disable-compilation">The classic problem: runtime <code>if</code> does not disable compilation</h3>
<p>Consider a naive generic <code>asString</code> sketch where you want:</p>
<ul>
<li>arithmetic types [OK] -&gt; <code>std::to_string</code></li>
<li><code>std::string</code> [OK] -&gt; pass through / return directly</li>
<li>otherwise [ERROR] -&gt; maybe <code>static_assert</code></li>
</ul>
<p>If you write ordinary runtime <code>if</code> with type traits <strong>inside a function template</strong>, <strong>both branches must compile</strong> for every <code>T</code>, because the compiler still parses and instantiates the full function body unless you cut instantiation off.</p>
<p><strong>Broken shape (conceptual):</strong></p>
<pre><code class="language-cpp">#include &lt;string&gt;
#include &lt;type_traits&gt;

template&lt;typename T&gt;
std::string badAsString(T val) {
  if (std::is_same_v&lt;std::decay_t&lt;T&gt;, std::string&gt;) {
    return val;  // ill-formed when T is int, even if &quot;never runs&quot;
  } else if (std::is_arithmetic_v&lt;std::decay_t&lt;T&gt;&gt;) {
    return std::to_string(val);
  } else {
    return val;  // also ill-formed for many T
  }
}
</code></pre>
<p><strong>Fix direction (p.96):</strong> use <code>if constexpr</code> so the compiler <strong>discards</strong> branches that cannot apply for a given <code>T</code>.</p>
<pre><code class="language-cpp">#include &lt;string&gt;
#include &lt;type_traits&gt;

template&lt;typename T&gt;
std::string asString(T&amp;&amp; val) {
  if constexpr (std::is_same_v&lt;std::decay_t&lt;T&gt;, std::string&gt;) {
    return std::forward&lt;T&gt;(val);
  } else if constexpr (std::is_arithmetic_v&lt;std::decay_t&lt;T&gt;&gt;) {
    return std::to_string(val);
  } else {
    // Could static_assert here if unreachable for unsupported T
    static_assert(!sizeof(T*), &quot;unsupported type&quot;);
    return {};  // unreachable in well-formed programs if static_assert fires
  }
}
</code></pre>
<p><strong>Reading guide:</strong> Replace the <code>static_assert</code> line with your preferred policy (compile-time error message, constraints / <code>requires</code>, etc.) per your codebase standards.</p>
<h3 id="mental-model">Mental model</h3>
<pre><code>Runtime if: every branch must type-check in the instantiated template
──────────────────────────────────────────────────────────────────────
  instantiation for T = int
     ├─ then-branch must compile
     └─ else-branch must compile


Compile-time if: non-selected branches are DISCARDED (not instantiated)
────────────────────────────────────────────────────────────────────────
  instantiation for T = int
     └─ only compatible branches participate in instantiation
</code></pre>
<hr />
<h2 id="102-using-compile-time-if-p98">10.2 Using Compile-Time <code>if</code> (p.98)</h2>
<h3 id="mixing-with-runtime-conditions-p98">Mixing with runtime conditions (p.98)</h3>
<p>You can nest runtime predicates inside <code>if constexpr</code> arms or combine them as needed, provided you respect the instantiation rules.</p>
<pre><code class="language-cpp">template&lt;typename T&gt;
void demo(bool flag, T x) {
  if constexpr (sizeof(T) &gt; 1) {
    if (flag) {
      // runtime if inside a constexpr-selected branch
    }
  } else {
    // ...
  }
}
</code></pre>
<h3 id="not-a-preprocessor-replacement-p98">Not a preprocessor replacement (p.98)</h3>
<p><code>if constexpr</code> is <strong>not</strong> <code>#if</code>. It exists in function bodies (and certain other contexts per standard evolution) and participates in <strong>C++ semantics</strong>, including scoping, name lookup rules, and instantiation. You cannot use it “top-level” as if it were the preprocessor.</p>
<hr />
<h2 id="1021-caveats-p98">10.2.1 Caveats (p.98)</h2>
<h3 id="caveat-a-impacts-return-type-deduction-with-auto">Caveat A: impacts <code>return</code> type deduction with <code>auto</code></h3>
<p>If different <code>if constexpr</code> branches return <strong>different types</strong>, <code>auto</code> / <code>decltype(auto)</code> deduction for the function can fail or become surprising because the compiler still reasons about <strong>what <code>return</code> statements remain</strong> after discarding.</p>
<p><strong>Pattern:</strong> keep return type consistent, or use explicit trailing return type, or structure with helpers.</p>
<h3 id="caveat-b-else-matters-even-if-then-always-returns">Caveat B: <code>else</code> matters even if <code>then</code> always returns</h3>
<p>If after discarding you still have <strong>two <code>return</code> statements</strong> that produce incompatible deduction, you can get <strong>ambiguous return type deduction</strong> errors. Adding a trailing <code>else</code> / restructuring ends the ambiguity (book discussion around <strong>p.98</strong>).</p>
<p>Sketch:</p>
<pre><code class="language-cpp">template&lt;typename T&gt;
auto foo(T) {              // careful with auto return
  if constexpr (std::is_integral_v&lt;T&gt;) {
    return 0;
  }
  // Missing else branch can still interact poorly with other returns depending on code
  return 0.0;
}
</code></pre>
<p>(Adapt the book’s precise example; treat this as a hazard checklist.)</p>
<h3 id="caveat-c-no-short-circuiting-of-instantiation-for--in-the-condition">Caveat C: NO short-circuiting of instantiation for <code>&amp;&amp;</code> in the condition</h3>
<p>This is a <strong>major</strong> gotcha:</p>
<pre><code class="language-cpp">struct MyType { static constexpr int i = 42; };

template&lt;typename T&gt;
void bad() {
  // [ERROR] pattern: T::i is parsed in an ill-formed way for many T
  // if constexpr (std::is_same_v&lt;MyType, T&gt; &amp;&amp; T::i == 42) { }
}

template&lt;typename T&gt;
void good() {
  if constexpr (std::is_same_v&lt;MyType, T&gt;) {
    if constexpr (T::i == 42) {
      // [OK]: inner depends on T only after MyType match
    }
  }
}
</code></pre>
<p><strong>ASCII rule card:</strong></p>
<pre><code>WRONG:  if constexpr (A&lt;T&gt; &amp;&amp; B&lt;T&gt;)   // B&lt;T&gt; must still be valid for discarded path? (no short-circuit)
        ────────────────────────────
                │
                └── Often ill-formed: dependent parts still seen

RIGHT:  if constexpr (A&lt;T&gt;) {
            if constexpr (B&lt;T&gt;) { ... }
        }
</code></pre>
<p><strong>Book point:</strong> Template metaprogramming <code>&amp;&amp;</code> does <strong>not</strong> grant the “don’t compile rhs” protection you expect from runtime boolean <code>&amp;&amp;</code> during instantiation the way novices expect.</p>
<h3 id="caveat-d-discarded-statements-still-have-constraints-p98">Caveat D: discarded statements still have constraints (p.98)</h3>
<p>Even discarded branches:</p>
<ul>
<li>Must be <strong>syntactically</strong> valid as a template (with some exceptions around certain dependent contexts).</li>
<li><strong>Non-dependent</strong> names are still checked.</li>
</ul>
<p>So you cannot hide an obviously ill-formed construct behind <code>if constexpr (false)</code> if it uses non-dependent illegal code.</p>
<h3 id="caveat-e-static_assertfalse-is-not-a-generic-disable-branch-trick-p98">Caveat E: <code>static_assert(false)</code> is not a generic “disable branch” trick (p.98)</h3>
<p>A naively written <code>static_assert(false)</code> can fail <strong>even if</strong> the branch appears discarded, when it is not dependent in the right way. Prefer <strong>dependent</strong> <code>static_assert</code> patterns like <code>static_assert(!sizeof(T))</code> inside constrained contexts, or C++20 concepts, etc.</p>
<hr />
<h2 id="1022-other-examples-p101">10.2.2 Other Examples (p.101)</h2>
<h3 id="perfect-return-of-generic-values-handling-void">Perfect return of generic values: handling <code>void</code></h3>
<p>Generic wrappers often need to “maybe return” a value unless it is <code>void</code>.</p>
<p>Illustrative structure (book pattern):</p>
<pre><code class="language-cpp">#include &lt;utility&gt;
#include &lt;type_traits&gt;

template&lt;typename Callable, typename Arg&gt;
decltype(auto) invokeMaybe(Callable&amp;&amp; c, Arg&amp;&amp; arg) {
  if constexpr (std::is_void_v&lt;std::invoke_result_t&lt;Callable, Arg&gt;&gt;) {
    std::forward&lt;Callable&gt;(c)(std::forward&lt;Arg&gt;(arg));
  } else {
    return std::forward&lt;Callable&gt;(c)(std::forward&lt;Arg&gt;(arg));
  }
}
</code></pre>
<h3 id="tag-dispatching-replacement-advance-sketch-p101">Tag dispatching replacement: <code>advance</code> sketch (p.101)</h3>
<p><strong>Before:</strong> multiple overloads <code>advanceImpl(...)</code> selected via iterator tag types.</p>
<p><strong>After:</strong> one function with <code>if constexpr</code> over iterator category checks.</p>
<p>Conceptual sketch:</p>
<pre><code class="language-cpp">#include &lt;iterator&gt;
#include &lt;type_traits&gt;

template&lt;typename Iterator, typename Dist&gt;
void advanceLike(Iterator&amp; it, Dist n) {
  using Cat = typename std::iterator_traits&lt;Iterator&gt;::iterator_category;

  if constexpr (std::is_same_v&lt;Cat, std::random_access_iterator_tag&gt;) {
    it += n;
  } else if constexpr (std::is_same_v&lt;Cat, std::bidirectional_iterator_tag&gt;) {
    // ...
  } else {
    // input/output iterator path
    // ...
  }
}
</code></pre>
<p><strong>Trade-off:</strong> tag dispatch remains valuable for extension in some libraries; <code>if constexpr</code> trades <strong>fewer symbols</strong> for <strong>less open</strong> customization unless you mix approaches.</p>
<hr />
<h2 id="103-compile-time-if-with-initialization-p103">10.3 Compile-Time <code>if</code> with Initialization (p.103)</h2>
<p>C++17 allows the <code>if</code> / <code>if constexpr</code> form with init-statement:</p>
<pre><code class="language-cpp">template&lt;typename T&gt;
void demoInit(T x) {
  if constexpr (auto obj = x; std::is_same_v&lt;decltype(obj), T&gt;) {
    (void)obj;
  }
}
</code></pre>
<p>Here <code>obj</code> lives in both the condition arm’s scope rules (as usual for init-statement <code>if</code>).</p>
<p>For <strong>value-based</strong> constexpr checks, prefer conditions that are manifestly constant for the instantiation:</p>
<pre><code class="language-cpp">template&lt;typename T&gt;
void demoValue(T) {
  if constexpr (sizeof(T) == 4) {
    // ...
  }
}
</code></pre>
<p>The book discusses init-statement forms such as <code>if constexpr (auto obj = foo(x); ...)</code> on <strong>p.103</strong>; keep your condition in the “converted constant expression” rules of your language mode.</p>
<hr />
<h2 id="104-using-outside-templates-p104">10.4 Using Outside Templates (p.104)</h2>
<p><code>if constexpr</code> can appear in non-template functions, but <strong>discarding applies only when the condition is itself a value-dependent constexpr context</strong> as described in the book.</p>
<p><strong>Critical consequence:</strong> you <strong>cannot</strong> use non-template <code>if constexpr</code> to “delete” ill-formed non-dependent code the way template instantiation discarding does.</p>
<p><strong>Benefit called out (p.104):</strong> even where discarding is limited, <strong>discarded code may not become part of the executable</strong> when the condition folds to a compile-time constant.</p>
<hr />
<h2 id="ascii-diagram-compile-time-if-flow">ASCII diagram: compile-time if flow</h2>
<pre><code>Parse template function
        │
        ▼
Instantiate for T = T0
        │
        ▼
Evaluate if constexpr condition (compile-time)
                        │
        ┌───────────────┴────────────────┐
        │ true                           │ false
        ▼                                ▼
Selected branch                   Other branch
instantiated normally              DISCARDED (mostly not instantiated)
        │                                │
        ▼                                ▼
Continue                           (still: syntax / non-dependent checks)
</code></pre>
<hr />
<h2 id="practical-checklist">Practical checklist</h2>
<ol>
<li>Use <code>if constexpr</code> when you need <strong>different code</strong> for different <code>T</code> and runtime <code>if</code> would force <strong>all branches</strong> to compile (<strong>p.96</strong>).</li>
<li>Nest <code>if constexpr</code> instead of <code>&amp;&amp;</code> when the RHS depends on prior traits (<strong>p.98</strong>).</li>
<li>Watch <strong><code>auto</code> return</strong> interplay with multiple returns (<strong>p.98</strong>).</li>
<li>Do not treat <code>static_assert(false)</code> as a magic off-switch (<strong>p.98</strong>).</li>
<li><code>if constexpr</code> + init-statements can localize temporaries (<strong>p.103</strong>).</li>
</ol>
<hr />
<p><strong>Primary reference:</strong> Josuttis, <em>C++17 - The Complete Guide</em>, Chapter 10, <strong>pp. 95-105</strong>.</p>` },
  { name: `12. Fold Expressions`, path: `11_fold_expressions.md`, dir: ``, body: `<h1 id="chapter-11-fold-expressions">Chapter 11: Fold Expressions</h1>
<p><strong>Book:</strong> <em>C++17 - The Complete Guide</em>, Nicolai M. Josuttis<br />
<strong>Chapter:</strong> 11 - Fold Expressions<br />
<strong>Book page span:</strong> <strong>pp. 107-118</strong> (sections <strong>11.1</strong>-<strong>11.2.3</strong>)</p>
<p>Fold expressions compile <strong>parameter packs</strong> into repeated applications of a binary operator, generating concise code that used to require recursive templates or <code>(void)initializer_list&lt;int&gt;{(f(args),0)...}</code> tricks.</p>
<hr />
<h2 id="111-motivation-p108">11.1 Motivation (p.108)</h2>
<h3 id="before-folds-recursive-instantiation">Before folds: recursive instantiation</h3>
<p>Historically, summing a pack:</p>
<pre><code class="language-cpp">// Pre-C++17 style (conceptual)
template&lt;typename T&gt;
constexpr T sum(T v) { return v; }

template&lt;typename T, typename... Ts&gt;
constexpr T sum(T h, Ts... ts) {
  return h + sum(ts...);
}
</code></pre>
<p>This works, but it stresses compilers with deep instantiations for very large packs and spreads logic across multiple overloads.</p>
<h3 id="after-folds-one-expression">After folds: one expression</h3>
<pre><code class="language-cpp">template&lt;typename... Ts&gt;
constexpr auto sum(Ts... args) {
  return (args + ...);  // unary right fold by '+' (see table below)
}
</code></pre>
<p><strong>Book point:</strong> folds are not “runtime loops”; they expand at compile time into a nested expression involving operators.</p>
<hr />
<h2 id="112-using-fold-expressions-p108">11.2 Using Fold Expressions (p.108)</h2>
<p>Folds come in <strong>unary</strong> and <strong>binary</strong> forms, and <strong>left</strong> vs <strong>right</strong> variants.</p>
<h3 id="unary-folds">Unary folds</h3>
<p>Given a pack <code>args</code> with elements <code>a1, a2, ..., aN</code>:</p>
<table>
<thead>
<tr>
<th>Form</th>
<th>Expansion (conceptual)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Unary left fold <code>(... op args)</code></td>
<td><code>((a1 op a2) op a3) ... op aN</code></td>
</tr>
<tr>
<td>Unary right fold <code>(args op ...)</code></td>
<td><code>a1 op (a2 op (... op aN))</code></td>
</tr>
</tbody>
</table>
<p><strong>Parentheses required</strong> around the fold syntax as shown; the <code>...</code> placement distinguishes left vs right.</p>
<h3 id="why-associativity-matters-p108-strings">Why associativity matters (p.108): strings</h3>
<p>For non-associative operations (and for efficiency differences), order matters:</p>
<pre><code class="language-cpp">#include &lt;string&gt;

template&lt;typename... Strings&gt;
std::string concatLeft(Strings&amp;&amp;... s) {
  // Illustrative only: check book for exact recommended pattern / move semantics
  return (std::string{} + ... + std::forward&lt;Strings&gt;(s)); // binary left fold from an initial value
}
</code></pre>
<p>String concatenation creates temporaries; left vs right folds change <strong>temporary lifetimes</strong> and performance characteristics.</p>
<p><strong>ASCII expansion compare (three args a,b,c):</strong></p>
<pre><code>Unary LEFT fold:   (... + args)
────────────────────────────────
expands: ((a + b) + c)


Unary RIGHT fold:  (args + ...)
────────────────────────────────
expands: (a + (b + c))
</code></pre>
<p>For integers with <code>+</code>, results match; for strings, costs may differ.</p>
<hr />
<h2 id="1121-empty-parameter-packs-p109">11.2.1 Empty Parameter Packs (p.109)</h2>
<h3 id="unary-folds-and-empty-packs">Unary folds and empty packs</h3>
<p>If <code>args</code> is empty, unary folds have <strong>built-in rules</strong> for some operators:</p>
<table>
<thead>
<tr>
<th>Operator op</th>
<th>Empty-pack result</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>&amp;&amp;</code></td>
<td><code>true</code></td>
</tr>
<tr>
<td><code>\\|\\|</code></td>
<td><code>false</code></td>
</tr>
<tr>
<td><code>,</code> (comma)</td>
<td><code>void()</code></td>
</tr>
<tr>
<td>Most others</td>
<td><strong>ill-formed</strong></td>
</tr>
</tbody>
</table>
<p>So:</p>
<pre><code class="language-cpp">template&lt;typename... Bs&gt;
bool allTrue(Bs... bs) {
  return (bs &amp;&amp; ...);  // empty pack -&gt; true
}

template&lt;typename... Bs&gt;
bool anyTrue(Bs... bs) {
  return (bs || ...);  // empty pack -&gt; false
}
</code></pre>
<h3 id="binary-folds-p109">Binary folds (p.109)</h3>
<p>Binary folds include an explicit <strong>initial value</strong>:</p>
<table>
<thead>
<tr>
<th>Form</th>
<th>Conceptual expansion</th>
</tr>
</thead>
<tbody>
<tr>
<td>Binary left <code>(init op ... op args)</code></td>
<td><code>(((init op a1) op a2) op ... )</code></td>
</tr>
<tr>
<td>Binary right <code>(args op ... op init)</code></td>
<td><code>(a1 op (... op (aN op init)))</code></td>
</tr>
</tbody>
</table>
<h4 id="print-via-binary-left-fold-over--p109"><code>print()</code> via binary left fold over <code>&lt;&lt;</code> (p.109)</h4>
<pre><code class="language-cpp">#include &lt;iostream&gt;

template&lt;typename... Args&gt;
void print(const Args&amp;... args) {
  // Binary left fold: (((std::cout &lt;&lt; a1) &lt;&lt; a2) &lt;&lt; ...)
  (std::cout &lt;&lt; ... &lt;&lt; args);
}

// Often you append a terminator in a second statement or as part of another fold:
template&lt;typename... Args&gt;
void println(const Args&amp;... args) {
  (std::cout &lt;&lt; ... &lt;&lt; args) &lt;&lt; '\\n';
}
</code></pre>
<p><strong>Reading guide:</strong> Reproduce the book’s exact <code>print</code> snippet from <strong>p.109</strong> for pedagogical parity; the key idea is the binary fold with <code>std::cout</code> as the left “seed”.</p>
<p>Empty-pack behavior for binary folds is discussed relative to the chosen operator and whether an init value exists (<strong>p.109</strong>).</p>
<hr />
<h2 id="1122-supported-operators-p112">11.2.2 Supported Operators (p.112)</h2>
<h3 id="operators">Operators</h3>
<p>All <strong>binary</strong> operators are foldable <strong>except</strong>:</p>
<ul>
<li>Member access <code>.</code></li>
<li>Pointer member <code>-&gt;</code></li>
<li>Subscript <code>[]</code></li>
</ul>
<h3 id="folded-function-calls-with-comma-p112">Folded function calls with comma (p.112)</h3>
<p>You can invoke an expression for each element using comma folding:</p>
<pre><code class="language-cpp">template&lt;typename F, typename... Args&gt;
void forEachArg(F f, Args&amp;&amp;... args) {
  (f(std::forward&lt;Args&gt;(args)), ...);
}
</code></pre>
<p>This runs <code>f</code> for each argument; order follows the fold direction chosen.</p>
<h3 id="combining-hash-values-hashcombine-pattern-p112">Combining hash values: <code>hashCombine</code> pattern (p.112)</h3>
<p>A common pattern is mixing hashes:</p>
<pre><code class="language-cpp">#include &lt;cstddef&gt;

inline void hashCombine(std::size_t&amp; seed, std::size_t h) {
  seed ^= h + 0x9e3779b97f4a7c15ULL + (seed &lt;&lt; 6) + (seed &gt;&gt; 2);
}

template&lt;typename... Ts&gt;
std::size_t hashVal(const Ts&amp;... vals) {
  std::size_t seed = 0;
  (hashCombine(seed, std::hash&lt;Ts&gt;{}(vals)), ...);
  return seed;
}
</code></pre>
<p>(Adjust hashing to match your standard library’s best practices; the book cites this as idiomatic “seed mixing”.)</p>
<h3 id="folded-calls-for-base-classes-p112">Folded calls for base classes (p.112)</h3>
<p>Variadic CRTP / mixin bases sometimes expose <code>print()</code> methods; a fold over comma can call each:</p>
<pre><code class="language-cpp">template&lt;typename... Bases&gt;
struct Many : Bases... {
  void printAll() {
    (..., Bases::print());
  }
};
</code></pre>
<p>Note the leading comma usage pattern <code>(... , expr)</code> vs <code>(expr , ...)</code> variants; match the book’s canonical example to ensure the empty-pack behavior you intend.</p>
<h3 id="folded-path-traversals-with---p112">Folded path traversals with <code>-&gt;*</code> (p.112)</h3>
<p>The book shows traversing a chain of pointers-to-members through <code>-&gt;*</code> in a fold; this is powerful but easy to misuse if precedence is wrong.</p>
<hr />
<h2 id="1123-using-for-types-p117">11.2.3 Using for Types (p.117)</h2>
<h3 id="stdconjunction-like-patterns-with-packs"><code>std::conjunction</code>-like patterns with packs</h3>
<p>You can express “all types equal to <code>T1</code>” via folds over <code>std::is_same_v</code>:</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

template&lt;typename T1, typename... Ts&gt;
inline constexpr bool allSame = (std::is_same_v&lt;T1, Ts&gt; &amp;&amp; ...);
</code></pre>
<p>This is the “homogeneous pack” predicate used conceptually in <strong><code>std::array</code> deduction guides</strong> (<strong>p.117</strong>, ties back to <strong>Ch. 9</strong> in the book).</p>
<hr />
<h2 id="detailed-ascii-reference-table-forms-and-expansion">Detailed ASCII reference table (forms and expansion)</h2>
<pre><code>Legend:  a1..aN are pack elements, OP is a binary operator, I is init expression

┌───────────────────────────────┬──────────────────────────────────────────────┐
│ Syntax                        │ Meaning (informal expansion)                 │
├───────────────────────────────┼──────────────────────────────────────────────┤
│ (... OP pack)                 │ Unary LEFT: ((a1 OP a2) OP ...) OP aN        │
│ (pack OP ...)                 │ Unary RIGHT: a1 OP (a2 OP (... OP aN))       │
├───────────────────────────────┼──────────────────────────────────────────────┤
│ (I OP ... OP pack)            │ Binary LEFT: (((I OP a1) OP a2) OP ...)      │
│ (pack OP ... OP I)            │ Binary RIGHT: (a1 OP (... OP (aN OP I)))     │
├───────────────────────────────┼──────────────────────────────────────────────┤
│ Empty unary &amp;&amp;                │ true                                         │
│ Empty unary ||                │ false                                        │
│ Empty unary ,                 │ void()                                       │
│ Other empty unary OP          │ ill-formed                                   │
└───────────────────────────────┴──────────────────────────────────────────────┘
</code></pre>
<h3 id="precedence-reminder-practical-debugging">Precedence reminder (practical debugging)</h3>
<pre><code>Folds expand into raw operator expressions.
If you mix &lt;&lt;, +, and comparisons, add parentheses EXPLICITLY.
</code></pre>
<hr />
